apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
  namespace: flux-system
spec:
  interval: 10m0s
  targetNamespace: development
  chart:
    spec:
      chart: forgejo
      sourceRef:
        kind: HelmRepository
        name: forgejo
        namespace: flux-system
  install:
    createNamespace: false
  valuesFrom:
    - kind: Secret
      name: forgejo-admin-secret
      valuesKey: username
      targetPath: admin.username
    - kind: Secret
      name: forgejo-admin-secret
      valuesKey: email
      targetPath: admin.email
    - kind: Secret
      name: forgejo-admin-secret
      valuesKey: password
      targetPath: admin.password
    - kind: Secret
      name: forgejo-postgresql-secret
      valuesKey: POSTGRES_PASSWORD
      targetPath: postgresql.auth.password
    - kind: Secret
      name: forgejo-postgresql-secret
      valuesKey: POSTGRES_PASSWORD
      targetPath: gitea.config.database.PASSWD
    - kind: Secret
      name: forgejo-security-secret
      valuesKey: SECRET_KEY
      targetPath: gitea.config.security.SECRET_KEY
    - kind: Secret
      name: forgejo-internal-token-secret
      valuesKey: INTERNAL_TOKEN
      targetPath: gitea.config.security.INTERNAL_TOKEN
    - kind: Secret
      name: forgejo-lfs-jwt-secret
      valuesKey: LFS_JWT_SECRET
      targetPath: gitea.config.security.LFS_JWT_SECRET
  values:
    replicaCount: 1
    service:
      http:
        type: ClusterIP
      ssh:
        type: ClusterIP
    persistence:
      enabled: true
      size: 1Gi
      accessModes:
        - ReadWriteOnce
      storageClass: ""
    ingress:
      enabled: true
      className: nginx
      annotations:
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
        cert-manager.io/cluster-issuer: CHANGEME_CLUSTER_ISSUER
        lab42.io/mdns.enabled: "true"
        lab42.io/mdns.name: "forgejo"
        dashboard.ai-appliance.io/title: "Forgejo"
        dashboard.ai-appliance.io/description: "Git forge, pull requests and CI/CD."
        dashboard.ai-appliance.io/category: "Infrastructure"
        dashboard.ai-appliance.io/order: "20"
      hosts:
        - host: forgejo.example.local
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: forgejo-tls
          hosts:
            - forgejo.example.local
    postgresql:
      enabled: true
      auth:
        database: forgejo
        username: forgejo
      primary:
        persistence:
          enabled: true
          size: 1Gi
          storageClass: ""
    gitea:
      config:
        server:
          DOMAIN: forgejo.example.local
          ROOT_URL: https://forgejo.example.local/
        database:
          DB_TYPE: postgres
          HOST: forgejo-postgresql:5432
          NAME: forgejo
          USER: forgejo
        service:
          DISABLE_REGISTRATION: true
          REQUIRE_SIGNIN_VIEW: true
      podSecurityContext:
        fsGroup: 1000
      containerSecurityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        capabilities:
          drop:
            - ALL
