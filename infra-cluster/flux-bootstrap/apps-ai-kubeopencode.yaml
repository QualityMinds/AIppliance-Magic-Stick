apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-ai-kubeopencode
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-ai
  interval: 10m0s
  path: ./infra-cluster/apps-ai-kubeopencode
  postBuild:
    substitute:
      var_substitution_enabled: "true"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m0s
  healthChecks:
    - apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      name: agenttemplates.kubeopencode.io
