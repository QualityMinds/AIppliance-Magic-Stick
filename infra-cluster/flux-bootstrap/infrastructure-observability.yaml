apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-observability
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-ai
  interval: 10m0s
  path: ./infra-cluster/infrastructure-observability
  postBuild:
    substitute:
      var_substitution_enabled: "true"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
