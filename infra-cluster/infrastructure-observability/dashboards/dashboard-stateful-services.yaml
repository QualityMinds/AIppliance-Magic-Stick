apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-stateful-services
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  stateful-services.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []},
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 0},
          "id": 1,
          "targets": [
            {"expr": "kube_deployment_status_replicas_available{namespace=\"ai\",deployment=\"qdrant\"}", "refId": "A"}
          ],
          "title": "Qdrant verfügbare Replikas",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "bytes"}, "overrides": []},
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 0},
          "id": 2,
          "targets": [
            {"expr": "kubelet_volume_stats_used_bytes{persistentvolumeclaim=\"qdrant-storage\"}", "refId": "A"}
          ],
          "title": "Qdrant PVC genutzt",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "bytes"}, "overrides": []},
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 0},
          "id": 3,
          "targets": [
            {"expr": "kubelet_volume_stats_used_bytes{persistentvolumeclaim=\"litellm-postgresql-data\"}", "refId": "A"}
          ],
          "title": "PostgreSQL PVC genutzt",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "ops"}, "overrides": []},
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 8},
          "id": 4,
          "targets": [
            {"expr": "sum(rate(container_fs_reads_bytes_total{namespace=\"ai\",pod=~\"qdrant-.*|litellm-postgresql-.*\"}[5m]))", "legendFormat": "Read", "refId": "A"},
            {"expr": "sum(rate(container_fs_writes_bytes_total{namespace=\"ai\",pod=~\"qdrant-.*|litellm-postgresql-.*\"}[5m]))", "legendFormat": "Write", "refId": "B"}
          ],
          "title": "Stateful Service Disk I/O",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["qdrant", "stateful"],
      "templating": {"list": []},
      "time": {"from": "now-6h", "to": "now"},
      "title": "AI Appliance - Stateful Services",
      "version": 1
    }
