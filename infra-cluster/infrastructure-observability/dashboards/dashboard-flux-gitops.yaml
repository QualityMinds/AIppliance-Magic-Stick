apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-flux-gitops
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  flux-gitops.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "id": 1,
          "targets": [
            {"expr": "sum(gotk_reconcile_condition{type=\"Ready\",status=\"True\"})", "refId": "A"}
          ],
          "title": "Flux Reconciliations Ready",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "id": 2,
          "targets": [
            {"expr": "sum(gotk_reconcile_condition{type=\"Ready\",status=\"False\"})", "refId": "A"}
          ],
          "title": "Flux Reconciliations Failed",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []},
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 8},
          "id": 3,
          "targets": [
            {"expr": "histogram_quantile(0.95, sum(rate(gotk_reconcile_duration_seconds_bucket[5m])) by (le, kind))", "legendFormat": "{{kind}}", "refId": "A"}
          ],
          "title": "Flux Reconcile Dauer P95",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["flux", "gitops"],
      "templating": {"list": []},
      "time": {"from": "now-6h", "to": "now"},
      "title": "AI Appliance - Flux / GitOps",
      "version": 1
    }
