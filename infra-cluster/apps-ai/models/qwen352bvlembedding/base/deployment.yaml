apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen352bvlembedding
  namespace: ai
  labels:
    app: qwen352bvlembedding
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qwen352bvlembedding
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: qwen352bvlembedding
    spec:
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          command:
            - /bin/sh
            - '-c'
          args:
            - >
              GPU_MEMORY_CONSUMPTION=6144

              exec vllm serve LifetimeMistake/Qwen3-VL-Embedding-2B-AWQ-4bit 
              --served-model-name qwen352bvlembedding 
              --host 0.0.0.0 
              --port 8000 
              --runner pooling 
              --convert embed 
              --trust-remote-code 
              --quantization compressed-tensors 
              --limit-mm-per-prompt '{"image":1}' 
              --max-model-len 4096 
              --gpu-memory-utilization "$(awk "BEGIN { printf \"%.2f\", ${GPU_MEMORY_CONSUMPTION} / $(nvidia-smi --query-gpu=memory.total --format=csv,noheader,nounits | head -n1) }")"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 90    
            periodSeconds: 20       
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: cache
              mountPath: /root/.cache
          resources:
            requests:
              nvidia.com/gpu: "1"
            limits:
              nvidia.com/gpu: "1"
      volumes:
        - name: cache
          hostPath:
            path: /root/.cache
            type: DirectoryOrCreate
