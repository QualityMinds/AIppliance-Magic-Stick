apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen359b
  namespace: ai
  labels:
    app: qwen359b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qwen359b
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: qwen359b
    spec:
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          command:
            - /bin/sh
            - '-c'
          args:
            - >
              GPU_MEMORY_CONSUMPTION=15000

              exec vllm serve cyankiwi/Qwen3.5-9B-AWQ-4bit 
              --gpu-memory-utilization "$(awk "BEGIN { printf \"%.2f\", ${GPU_MEMORY_CONSUMPTION} / $(nvidia-smi --query-gpu=memory.total --format=csv,noheader,nounits | head -n1) }")"
              --served-model-name qwen359b 
              --host 0.0.0.0 
              --port 8000 
              --tensor-parallel-size 1 
              --reasoning-parser qwen3 
              --enable-auto-tool-choice 
              --tool-call-parser qwen3_coder
              --profiler
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 90
            periodSeconds: 20
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: cache
              mountPath: /root/.cache
          resources:
            requests:
              nvidia.com/gpu: "1"
            limits:
              nvidia.com/gpu: "1"
      volumes:
        - name: cache
          hostPath:
            path: /root/.cache
            type: DirectoryOrCreate
