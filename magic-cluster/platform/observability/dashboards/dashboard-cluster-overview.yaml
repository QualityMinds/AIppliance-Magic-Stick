apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-cluster-overview
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  cluster-overview.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "percentunit"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "id": 1,
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}},
          "targets": [
            {"expr": "sum(rate(node_cpu_seconds_total{mode!~\"idle|iowait\"}[5m])) / sum(rate(node_cpu_seconds_total[5m]))", "refId": "A"}
          ],
          "title": "Cluster CPU Auslastung",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "bytes"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "id": 2,
          "targets": [
            {"expr": "sum(node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes)", "refId": "A"}
          ],
          "title": "Cluster RAM genutzt",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []},
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 8},
          "id": 3,
          "targets": [
            {"expr": "count(kube_node_info)", "refId": "A"}
          ],
          "title": "Nodes gesamt",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []},
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 8},
          "id": 4,
          "targets": [
            {"expr": "sum(kube_pod_status_phase{phase=\"Running\"})", "refId": "A"}
          ],
          "title": "Running Pods",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "percentunit"}, "overrides": []},
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 8},
          "id": 5,
          "targets": [
            {"expr": "1 - (sum(kubelet_volume_stats_available_bytes) / sum(kubelet_volume_stats_capacity_bytes))", "refId": "A"}
          ],
          "title": "PVC Nutzung gesamt",
          "type": "stat"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["cluster", "kubernetes"],
      "templating": {"list": []},
      "time": {"from": "now-6h", "to": "now"},
      "title": "AI Appliance - Cluster Overview",
      "version": 1
    }
