apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus
  namespace: observability
  labels:
    app: prometheus
  annotations:
    lab42.io/mdns.enabled: "true"
    lab42.io/mdns.name: "prometheus.${AI_APPLIANCE_MDNS_NAME:=magicstick}"
    lab42.io/mdns.host: "prometheus.${AI_APPLIANCE_MDNS_NAME:=magicstick}"
spec:
  ingressClassName: nginx
  rules:
    - host: "prometheus.${AI_APPLIANCE_DOMAIN:=magicstick.example.com}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: observability-kube-prometheus-stack-prometheus
                port:
                  number: 9090
    - host: "prometheus.${AI_APPLIANCE_MDNS_DOMAIN:=magicstick.local}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: observability-kube-prometheus-stack-prometheus
                port:
                  number: 9090
