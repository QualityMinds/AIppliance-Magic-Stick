apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes-operator
  namespace: flux-system
spec:
  interval: 10m0s
  targetNamespace: hermes-operator-system
  chart:
    spec:
      chart: hermes-operator
      version: "0.1.18"
      sourceRef:
        kind: HelmRepository
        name: hermes-operator
        namespace: flux-system
  install:
    createNamespace: true
  upgrade:
    force: true
  values:
    # The 0.1.18 chart omits the "v" prefix although the published GHCR image
    # is tagged v0.1.18. Keep the chart version and runtime image aligned.
    image:
      tag: v0.1.18
