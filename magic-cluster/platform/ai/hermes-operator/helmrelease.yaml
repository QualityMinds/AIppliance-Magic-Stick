apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes-operator
  namespace: flux-system
spec:
  interval: 10m0s
  targetNamespace: hermes-operator-system
  chart:
    spec:
      chart: hermes-operator
      version: "0.1.17"
      sourceRef:
        kind: HelmRepository
        name: hermes-operator
        namespace: flux-system
  install:
    createNamespace: true
  values:
    image:
      # The 0.1.17 chart defaults to image tag "0.1.17", but upstream publishes
      # the operator image with the release tag prefix.
      tag: v0.1.17
