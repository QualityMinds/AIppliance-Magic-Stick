apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openclaw-operator
  namespace: flux-system
spec:
  interval: 10m0s
  targetNamespace: openclaw-operator-system
  chart:
    spec:
      chart: openclaw-operator
      version: "0.36.4"
      sourceRef:
        kind: HelmRepository
        name: openclaw-operator
        namespace: flux-system
  install:
    createNamespace: true
  values:
    crds:
      install: true
      keep: true
    webhook:
      enabled: false
    metrics:
      serviceMonitor:
        enabled: false
