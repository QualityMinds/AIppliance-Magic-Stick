apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agent-sandbox
  namespace: flux-system
spec:
  interval: 10m
  targetNamespace: agent-sandbox-system
  chart:
    spec:
      chart: ./helm
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: agent-sandbox
        namespace: flux-system
  install:
    createNamespace: false
  postRenderers:
    - kustomize:
        patches:
          - target:
              labelSelector: app.kubernetes.io/name=agent-sandbox
            patch: |-
              - op: remove
                path: /metadata/labels/helm.sh~1chart
  values:
    namespace:
      create: false
      name: agent-sandbox-system
    image:
      tag: v0.5.1
    controller:
      extensions: false
      leaderElect: true
      sandboxConcurrentWorkers: 2
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
    podSecurityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
