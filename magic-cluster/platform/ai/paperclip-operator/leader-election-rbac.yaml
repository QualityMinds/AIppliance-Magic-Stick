apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: paperclip-operator-leader-election
  namespace: paperclip-operator-system
rules:
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: paperclip-operator-leader-election
  namespace: paperclip-operator-system
subjects:
  - kind: ServiceAccount
    name: paperclip-operator-system-paperclip-operator
    namespace: paperclip-operator-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: paperclip-operator-leader-election
