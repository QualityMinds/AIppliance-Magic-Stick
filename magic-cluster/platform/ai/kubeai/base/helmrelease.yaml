apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubeai
  namespace: flux-system
spec:
  interval: 10m0s
  targetNamespace: ai
  chart:
    spec:
      chart: kubeai
      version: "0.23.2"
      sourceRef:
        kind: HelmRepository
        name: kubeai
        namespace: flux-system
  install:
    createNamespace: false
  values:
    crds:
      enabled: true
    open-webui:
      enabled: false
    service:
      type: ClusterIP
    ingress:
      enabled: false
    resourceProfiles:
      magicstick-nvidia-gpu:
        imageName: magicstick-vllm
        requests:
          cpu: "6"
          memory: 24Gi
          nvidia.com/gpu: "1"
        limits:
          nvidia.com/gpu: "1"
        tolerations:
          - key: nvidia.com/gpu
            operator: Equal
            value: present
            effect: NoSchedule
    modelServerPods:
      jsonPatches:
        - op: add
          path: /spec/volumes/-
          value:
            name: model-cache
            hostPath:
              path: /root/.cache
              type: DirectoryOrCreate
        - op: add
          path: /spec/containers/0/volumeMounts/-
          value:
            name: model-cache
            mountPath: /root/.cache
