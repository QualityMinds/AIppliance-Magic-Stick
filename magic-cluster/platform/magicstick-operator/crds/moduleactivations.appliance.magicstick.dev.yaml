apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: moduleactivations.appliance.magicstick.dev
  labels:
    app.kubernetes.io/name: magicstick-operator
    app.kubernetes.io/component: crd
spec:
  group: appliance.magicstick.dev
  names:
    kind: ModuleActivation
    listKind: ModuleActivationList
    plural: moduleactivations
    singular: moduleactivation
    shortNames:
      - msmod
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Module
          type: string
          jsonPath: .spec.module
        - name: Enabled
          type: boolean
          jsonPath: .spec.enabled
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Kustomization
          type: string
          jsonPath: .status.kustomization
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          description: ModuleActivation requests one Magic Stick module through the Magic Stick Operator.
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - module
              properties:
                module:
                  type: string
                  minLength: 1
                  description: Module catalog key, such as litellm or openclaw-operator.
                enabled:
                  type: boolean
                  default: true
                applianceRef:
                  type: object
                  properties:
                    name:
                      type: string
                      default: local
                    namespace:
                      type: string
                      default: ai-system
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                  minimum: 0
                phase:
                  type: string
                kustomization:
                  type: string
                message:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - lastTransitionTime
                      - reason
                      - message
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      observedGeneration:
                        type: integer
                        format: int64
                        minimum: 0
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
