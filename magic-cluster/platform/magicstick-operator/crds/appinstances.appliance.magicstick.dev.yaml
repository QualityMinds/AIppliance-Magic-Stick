apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: appinstances.appliance.magicstick.dev
  labels:
    app.kubernetes.io/name: magicstick-operator
    app.kubernetes.io/component: crd
spec:
  group: appliance.magicstick.dev
  names:
    kind: AppInstance
    listKind: AppInstanceList
    plural: appinstances
    singular: appinstance
    shortNames:
      - msinst
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.type
        - name: Enabled
          type: boolean
          jsonPath: .spec.enabled
        - name: Target
          type: string
          jsonPath: .spec.targetNamespace
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: URL
          type: string
          jsonPath: .status.url
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          description: AppInstance requests one application or agent instance.
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - type
              properties:
                type:
                  type: string
                  enum:
                    - openclaw
                    - hermes
                    - odysseus
                    - paperclip
                    - kubeopencode
                enabled:
                  type: boolean
                  default: true
                targetNamespace:
                  type: string
                  default: ai
                applianceRef:
                  type: object
                  properties:
                    name:
                      type: string
                      default: local
                    namespace:
                      type: string
                      default: ai-system
                parameters:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                  description: Public-safe instance parameters such as host, model, storage, and template.
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                  minimum: 0
                phase:
                  type: string
                kind:
                  type: string
                name:
                  type: string
                namespace:
                  type: string
                url:
                  type: string
                message:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - lastTransitionTime
                      - reason
                      - message
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      observedGeneration:
                        type: integer
                        format: int64
                        minimum: 0
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
