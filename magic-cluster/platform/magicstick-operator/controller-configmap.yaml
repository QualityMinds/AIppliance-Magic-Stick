                    },
                    "spec": {
                        "restartPolicy": "OnFailure",
                        "containers": [{
                            "name": "auth-config",
                            "image": "ghcr.io/paperclipai/paperclip:sha-e59eb10",
                            "imagePullPolicy": "IfNotPresent",
                            "command": ["/bin/sh", "-c"],
                            "args": [auth_config_patch],
                            "volumeMounts": [{"name": "paperclip-data", "mountPath": "/paperclip"}],
                            "securityContext": {
                                "allowPrivilegeEscalation": False,
                                "capabilities": {"drop": ["ALL"]},
                                "runAsNonRoot": True,
