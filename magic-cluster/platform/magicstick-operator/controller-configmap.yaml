apiVersion: v1
kind: ConfigMap
metadata:
  name: magicstick-operator-controller
  namespace: ai-system
  labels:
    app.kubernetes.io/name: magicstick-operator
    app.kubernetes.io/component: controller
data:
  controller.py: |
    #!/usr/bin/env python3
    import hashlib
    import json
    import os
    import ssl
    import textwrap
    import threading
    import time
    import traceback
    import urllib.error
    import urllib.parse
    import urllib.request
    from datetime import datetime, timezone

    APPLIANCE_GROUP = "appliance.magicstick.dev"
    APPLIANCE_VERSION = "v1alpha1"
    APPLIANCE_NAMESPACE = os.environ.get("APPLIANCE_NAMESPACE", "ai-system")
    APPLIANCE_NAME = os.environ.get("APPLIANCE_NAME", "local")
    CATALOG_NAMESPACE = os.environ.get("MODULE_CATALOG_NAMESPACE", "ai-system")
    CATALOG_NAME = os.environ.get("MODULE_CATALOG_NAME", "magicstick-module-catalog")
    MODEL_PRESETS_NAMESPACE = os.environ.get("MODEL_PRESETS_NAMESPACE", "ai-system")
    MODEL_PRESETS_NAME = os.environ.get("MODEL_PRESETS_NAME", "magicstick-model-presets")
    FLUX_NAMESPACE = os.environ.get("FLUX_NAMESPACE", "flux-system")
    SETTINGS_NAMESPACE = os.environ.get("SETTINGS_NAMESPACE", FLUX_NAMESPACE)
    SETTINGS_CONFIGMAP_NAME = os.environ.get("SETTINGS_CONFIGMAP_NAME", "ai-appliance-settings")
    KDNS_NAMESPACE = os.environ.get("KDNS_NAMESPACE", "kdns")
    KDNS_DEPLOYMENT_NAME = os.environ.get("KDNS_DEPLOYMENT_NAME", "kdns-kdns")
    DEFAULT_MDNS_DOMAIN = os.environ.get("DEFAULT_MDNS_DOMAIN", "magicstick.local")
    REQUEUE_SECONDS = int(os.environ.get("REQUEUE_SECONDS", "20"))
    KUBE_API = os.environ.get("KUBERNETES_SERVICE_URL", "https://kubernetes.default.svc").rstrip("/")
    SA_TOKEN_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/token"
    SA_CA_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
    FIELD_MANAGER = "magicstick-operator"
    MODULE_FINALIZER = "appliance.magicstick.dev/module-cleanup"
    APPINSTANCE_FINALIZER = "appliance.magicstick.dev/appinstance-cleanup"
    MODEL_FINALIZER = "appliance.magicstick.dev/model-cleanup"
    MODULE_PARAMETER_SUBSTITUTIONS = {
        "litellm": {
            "postgresStorage": "AI_APPLIANCE_LITELLM_POSTGRES_STORAGE",
        },
        "anything-llm": {
            "storage": "AI_APPLIANCE_ANYTHING_LLM_STORAGE",
            "qdrantStorage": "AI_APPLIANCE_QDRANT_STORAGE",
        },
        "observability": {
            "lokiStorage": "AI_APPLIANCE_LOKI_STORAGE",
            "alertmanagerStorage": "AI_APPLIANCE_ALERTMANAGER_STORAGE",
            "prometheusStorage": "AI_APPLIANCE_PROMETHEUS_STORAGE",
        },
    }

    PLURALS = {
        ("appliance.magicstick.dev", "ModuleActivation"): "moduleactivations",
        ("appliance.magicstick.dev", "AppInstance"): "appinstances",
        ("appliance.magicstick.dev", "ModelActivation"): "modelactivations",
        ("kustomize.toolkit.fluxcd.io", "Kustomization"): "kustomizations",
        ("batch", "Job"): "jobs",
        ("kubeai.org", "Model"): "models",
        ("openclaw.rocks", "OpenClawInstance"): "openclawinstances",
        ("hermes.agent", "HermesInstance"): "hermesinstances",
        ("paperclip.inc", "Instance"): "instances",
        ("kubeopencode.io", "Agent"): "agents",
        ("kubeopencode.io", "AgentTemplate"): "agenttemplates",
        ("apps", "Deployment"): "deployments",
        ("networking.k8s.io", "Ingress"): "ingresses",
        ("networking.k8s.io", "NetworkPolicy"): "networkpolicies",
        ("rbac.authorization.k8s.io", "ClusterRole"): "clusterroles",
        ("rbac.authorization.k8s.io", "ClusterRoleBinding"): "clusterrolebindings",
    }

    CLUSTER_SCOPED_RESOURCES = {
        ("rbac.authorization.k8s.io", "ClusterRole"),
        ("rbac.authorization.k8s.io", "ClusterRoleBinding"),
    }

    STATIC_DEPENDENCIES = {
        "basis": "infrastructure-basis",
        "dashboard": "apps",
    }

    MODULE_ALIASES = {
        "modelCatalog": "model-catalog",
        "anythingLlm": "anything-llm",
        "openclawOperator": "openclaw-operator",
        "hermesOperator": "hermes-operator",
        "paperclipOperator": "paperclip-operator",
    }

    LOCAL_MODEL_MODULES = ["gpu", "kubeai", "litellm", "model-catalog"]
    EXTERNAL_MODEL_MODULES = ["litellm", "model-catalog"]

    SSL_CONTEXT = ssl.create_default_context(cafile=SA_CA_PATH)


    def now():
        return datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")


    def token():
        with open(SA_TOKEN_PATH, "r", encoding="utf-8") as token_file:
            return token_file.read().strip()


    def request_json(method, path, body=None, content_type="application/json"):
        data = None
        headers = {
            "Accept": "application/json",
            "Authorization": "Bearer " + token(),
        }
        if body is not None:
            data = json.dumps(body).encode("utf-8")
            headers["Content-Type"] = content_type
        request = urllib.request.Request(KUBE_API + path, data=data, headers=headers, method=method)
        with urllib.request.urlopen(request, timeout=30, context=SSL_CONTEXT) as response:
            payload = response.read().decode("utf-8")
            return json.loads(payload) if payload else {}


    def get_json(path):
        return request_json("GET", path)


    def list_items(path):
        try:
            return get_json(path).get("items", [])
        except urllib.error.HTTPError as error:
            if error.code == 404:
                return []
            raise


    def patch_json(path, body, content_type="application/merge-patch+json"):
        return request_json("PATCH", path, body, content_type)


    def delete_json(path, body=None):
        try:
            return request_json("DELETE", path, body)
        except urllib.error.HTTPError as error:
            if error.code == 404:
                return None
            raise


    def resource_path(api_version, kind, namespace, name):
        if "/" in api_version:
            group, version = api_version.split("/", 1)
            plural = PLURALS[(group, kind)]
            if (group, kind) in CLUSTER_SCOPED_RESOURCES:
                return f"/apis/{group}/{version}/{plural}/{name}"
            return f"/apis/{group}/{version}/namespaces/{namespace}/{plural}/{name}"
        plural = kind.lower() + "s"
        return f"/api/{api_version}/namespaces/{namespace}/{plural}/{name}"


    def apply_resource(resource):
        api_version = resource["apiVersion"]
        kind = resource["kind"]
        metadata = resource.setdefault("metadata", {})
        namespace = metadata.get("namespace")
        name = metadata["name"]
        path = resource_path(api_version, kind, namespace, name)
        query = urllib.parse.urlencode({"fieldManager": FIELD_MANAGER, "force": "true"})
        return patch_json(path + "?" + query, resource, "application/apply-patch+yaml")


    def get_applied_resource(resource):
        api_version = resource["apiVersion"]
        kind = resource["kind"]
        metadata = resource.get("metadata") or {}
        try:
            return get_json(resource_path(api_version, kind, metadata.get("namespace"), metadata.get("name")))
        except urllib.error.HTTPError as error:
            if error.code == 404:
                return None
            raise


    def delete_applied_resource(resource):
        api_version = resource["apiVersion"]
        kind = resource["kind"]
        metadata = resource.get("metadata") or {}
        return delete_json(resource_path(api_version, kind, metadata.get("namespace"), metadata.get("name")))


    def delete_labeled_resources(api_version, kind, namespace, label_selector):
        item_path = resource_path(api_version, kind, namespace, "item")
        collection_path = item_path.rsplit("/", 1)[0]
        query = urllib.parse.urlencode({"labelSelector": label_selector})
        for resource in list_items(collection_path + "?" + query):
            name = ((resource.get("metadata") or {}).get("name") or "").strip()
            if name:
                delete_json(
                    collection_path + "/" + urllib.parse.quote(name, safe=""),
                    {"apiVersion": "v1", "kind": "DeleteOptions", "propagationPolicy": "Background"},
                )


    def get_resource(group, version, plural, namespace, name):
        path = f"/apis/{group}/{version}/namespaces/{namespace}/{plural}/{name}"
        try:
            return get_json(path)
        except urllib.error.HTTPError as error:
            if error.code == 404:
                return None
            raise


    def delete_resource(group, version, plural, namespace, name):
        return delete_json(f"/apis/{group}/{version}/namespaces/{namespace}/{plural}/{name}")


    def refresh_kdns(reason):
        try:
            patch_json(
                f"/apis/apps/v1/namespaces/{KDNS_NAMESPACE}/deployments/{KDNS_DEPLOYMENT_NAME}",
                {
                    "spec": {
                        "template": {
                            "metadata": {
                                "annotations": {
                                    "appliance.magicstick.dev/kdns-refresh": now(),
                                    "appliance.magicstick.dev/kdns-refresh-reason": str(reason or "runtime-ingress")[:63],
                                },
                            },
                        },
                    },
                },
            )
        except urllib.error.HTTPError as error:
            if error.code == 404:
                print(f"kdns deployment {KDNS_NAMESPACE}/{KDNS_DEPLOYMENT_NAME} not found; mDNS refresh skipped", flush=True)
                return
            raise
        except Exception as error:
            print(f"Could not refresh kdns: {error}", flush=True)


    def get_core_resource(version, plural, namespace, name):
        path = f"/api/{version}/namespaces/{namespace}/{plural}/{name}"
        try:
            return get_json(path)
        except urllib.error.HTTPError as error:
            if error.code == 404:
                return None
            raise


    def crd_exists(name):
        try:
            get_json(f"/apis/apiextensions.k8s.io/v1/customresourcedefinitions/{name}")
            return True
        except urllib.error.HTTPError as error:
            if error.code == 404:
                return False
            raise


    def ready_condition(resource):
        if (resource.get("status") or {}).get("ready") is True:
            return {"status": "True", "reason": "Ready", "message": "Target resource is ready."}
        for condition in (resource.get("status") or {}).get("conditions", []):
            if condition.get("type") == "Ready":
                return condition
        for condition in (resource.get("status") or {}).get("conditions", []):
            if condition.get("type") in ("ServerReady", "ServerHealthy"):
                return condition
        for condition in (resource.get("status") or {}).get("conditions", []):
            if condition.get("type") == "Available":
                return condition
        return {}


    def condition(status, reason, message, generation=0):
        return {
            "type": "Ready",
            "status": status,
            "observedGeneration": generation,
            "lastTransitionTime": now(),
            "reason": reason,
            "message": message,
        }


    def load_catalog():
        configmap = get_json(f"/api/v1/namespaces/{CATALOG_NAMESPACE}/configmaps/{CATALOG_NAME}")
        raw = (configmap.get("data") or {}).get("modules.json", "{}")
        return json.loads(raw)


    def load_model_presets():
        try:
            configmap = get_json(f"/api/v1/namespaces/{MODEL_PRESETS_NAMESPACE}/configmaps/{MODEL_PRESETS_NAME}")
        except urllib.error.HTTPError as error:
            if error.code == 404:
                return {}
            raise
        raw = (configmap.get("data") or {}).get("presets.json", "{\"presets\":{}}")
        return json.loads(raw).get("presets") or {}


    def positive_int(value):
        if isinstance(value, bool):
            return None
        if isinstance(value, int) and value > 0:
            return value
        if isinstance(value, str) and value.strip().isdigit():
            parsed = int(value.strip())
            return parsed if parsed > 0 else None
        return None


    def boolean_value(value, default=False):
        if isinstance(value, bool):
            return value
        if isinstance(value, str):
            normalized = value.strip().lower()
            if normalized in ("true", "1", "yes", "on"):
                return True
            if normalized in ("false", "0", "no", "off"):
                return False
        return default


    def parse_mib(value):
        if value is None or value == "":
            return None
        if isinstance(value, int):
            return value if value > 0 else None
        raw = str(value).strip()
        parsed = positive_int(raw)
        if parsed:
            return parsed
        number = ""
        unit = ""
        for char in raw:
            if char.isdigit() or char == ".":
                number += char
            else:
                unit += char
        if not number:
            return None
        unit = unit.strip().lower()
        factors = {"m": 1, "mb": 1, "mi": 1, "mib": 1, "g": 1024, "gb": 1024, "gi": 1024, "gib": 1024}
        if unit not in factors:
            return None
        return int(float(number) * factors[unit])


    def model_catalog_models(namespace):
        configmap = get_core_resource("v1", "configmaps", namespace, "ai-model-catalog")
        raw = ((configmap or {}).get("data") or {}).get("catalog.json", "{}")
        try:
            return (json.loads(raw).get("models") or [])
        except Exception:
            return []


    def catalog_contains_model(namespace, model_name):
        return any(model.get("id") == model_name or model.get("name") == model_name for model in model_catalog_models(namespace))


    def strip_model_provider_prefix(value):
        raw = str(value or "").strip()
        for prefix in ("litellm/", "openai/"):
            if raw.startswith(prefix):
                return raw[len(prefix):]
        return raw


    def model_catalog_chat_models(namespace):
        configmap = get_core_resource("v1", "configmaps", namespace, "ai-model-catalog")
        raw = ((configmap or {}).get("data") or {}).get("chat-models.json", "{}")
        try:
            catalog = json.loads(raw)
        except Exception:
            return [], ""
        models = [model for model in (catalog.get("models") or []) if model.get("id") or model.get("name")]
        return models, (catalog.get("defaultModel") or "").strip()


    def select_catalog_chat_model(namespace, requested_model):
        models, default_model = model_catalog_chat_models(namespace)
        model_ids = [model.get("id") or model.get("name") for model in models]
        normalized_requested = strip_model_provider_prefix(requested_model)
        selected = ""
        if normalized_requested in model_ids:
            selected = normalized_requested
        elif default_model in model_ids:
            selected = default_model
        elif model_ids:
            selected = model_ids[0]
        else:
            selected = normalized_requested or "CHANGEME_MODEL"
        return selected, models


    def dns_label_part(value, fallback="default"):
        raw = str(value or "").strip().lower()
        pieces = []
        last_dash = False
        for char in raw:
            if char.isalnum():
                pieces.append(char)
                last_dash = False
            elif not last_dash:
                pieces.append("-")
                last_dash = True
        clean = "".join(pieces).strip("-")
        return clean or fallback


    def normalize_domain(domain, fallback=DEFAULT_MDNS_DOMAIN):
        raw = str(domain or "").strip().strip(".").lower()
        labels = [dns_label_part(label, "") for label in raw.split(".")]
        labels = [label for label in labels if label]
        normalized = ".".join(labels)
        if not normalized or not normalized.endswith(".local"):
            return fallback
        return normalized


    def settings_data():
        configmap = get_core_resource("v1", "configmaps", SETTINGS_NAMESPACE, SETTINGS_CONFIGMAP_NAME) or {}
        return configmap.get("data") or {}


    def mdns_domain():
        try:
            data = settings_data()
            domain = data.get("AI_APPLIANCE_MDNS_DOMAIN")
            if not domain:
                name = data.get("AI_APPLIANCE_MDNS_NAME") or data.get("AI_APPLIANCE_DASHBOARD_MDNS_NAME")
                domain = (str(name).strip().strip(".") + ".local") if name else DEFAULT_MDNS_DOMAIN
            return normalize_domain(domain)
        except Exception as error:
            print(f"Could not read mDNS settings, using {DEFAULT_MDNS_DOMAIN}: {error}", flush=True)
            return DEFAULT_MDNS_DOMAIN


    def local_http_host(name, domain=None):
        raw = str(name or "").strip().strip(".").lower()
        if not raw:
            return ""
        if raw.endswith(".local"):
            return raw
        labels = [dns_label_part(label, "") for label in raw.split(".")]
        prefix = ".".join([label for label in labels if label])
        if not prefix:
            return ""
        return prefix + "." + normalize_domain(domain or mdns_domain())


    def local_mdns_name(host):
        raw = str(host or "").strip().strip(".").lower()
        return raw[:-6] if raw.endswith(".local") else raw


    def app_instance_short_name(instance, instance_type):
        metadata = instance.get("metadata") or {}
        params = ((instance.get("spec") or {}).get("parameters") or {})
        raw = str(params.get("name") or metadata.get("name") or "default").strip()
        prefix = str(instance_type or "").strip() + "-"
        if prefix and raw.startswith(prefix):
            raw = raw[len(prefix):]
        return dns_label_part(raw, "default")


    def app_instance_local_host(instance, instance_type):
        return local_http_host(app_instance_short_name(instance, instance_type) + "." + dns_label_part(instance_type, "instance"))


    def derived_resource_name(name, suffix):
        clean_name = dns_label_part(name, "app")
        clean_suffix = dns_label_part(suffix, "managed")
        max_base = 63 - len(clean_suffix) - 1
        return clean_name[:max_base].rstrip("-") + "-" + clean_suffix


    def ingress_backend_port(value):
        if isinstance(value, int):
            return {"number": value}
        if isinstance(value, str) and value.isdigit():
            return {"number": int(value)}
        return {"name": str(value or "http")}


    def managed_ingress(name, namespace, hosts, service_name, service_port, annotations=None, labels=None):
        unique_hosts = []
        for host in hosts:
            host = str(host or "").strip().strip(".").lower()
            if host and host not in unique_hosts:
                unique_hosts.append(host)
        return {
            "apiVersion": "networking.k8s.io/v1",
            "kind": "Ingress",
            "metadata": {
                "name": name,
                "namespace": namespace,
                "labels": labels or {},
                "annotations": annotations or {},
            },
            "spec": {
                "ingressClassName": "nginx",
                "rules": [{
                    "host": host,
                    "http": {
                        "paths": [{
                            "path": "/",
                            "pathType": "Prefix",
                            "backend": {
                                "service": {
                                    "name": service_name,
                                    "port": ingress_backend_port(service_port),
                                },
                            },
                        }],
                    },
                } for host in unique_hosts],
            },
        }


    def dashboard_ingress_annotations(title, description, icon, category, order, local_name, extra=None):
        annotations = {
            "dashboard.ai-appliance.io/title": title,
            "dashboard.ai-appliance.io/description": description,
            "dashboard.ai-appliance.io/icon": icon,
            "dashboard.ai-appliance.io/category": category,
            "dashboard.ai-appliance.io/order": str(order),
            "lab42.io/mdns.enabled": "true",
            "lab42.io/mdns.name": local_name,
            "lab42.io/mdns.host": local_name,
        }
        annotations.update(extra or {})
        return annotations


    def canonical_module(name):
        return MODULE_ALIASES.get(name, name)


    def appliance():
        return get_resource(APPLIANCE_GROUP, APPLIANCE_VERSION, "appliances", APPLIANCE_NAMESPACE, APPLIANCE_NAME)


    def module_activations():
        items = list_items(f"/apis/{APPLIANCE_GROUP}/{APPLIANCE_VERSION}/namespaces/{APPLIANCE_NAMESPACE}/moduleactivations")
        by_module = {}
        for item in items:
            module = canonical_module(((item.get("spec") or {}).get("module") or (item.get("metadata") or {}).get("name") or "").strip())
            if module:
                by_module[module] = item
        return by_module


    def module_activation_path(activation):
        metadata = activation.get("metadata") or {}
        return f"/apis/{APPLIANCE_GROUP}/{APPLIANCE_VERSION}/namespaces/{metadata.get('namespace')}/moduleactivations/{metadata.get('name')}"


    def ensure_module_finalizer(activation):
        metadata = activation.get("metadata") or {}
        finalizers = list(metadata.get("finalizers") or [])
        if MODULE_FINALIZER in finalizers or metadata.get("deletionTimestamp"):
            return
        finalizers.append(MODULE_FINALIZER)
        patch_json(module_activation_path(activation), {"metadata": {"finalizers": finalizers}})


    def remove_module_finalizer(activation):
        metadata = activation.get("metadata") or {}
        finalizers = [item for item in (metadata.get("finalizers") or []) if item != MODULE_FINALIZER]
        patch_json(module_activation_path(activation), {"metadata": {"finalizers": finalizers}})


    def app_instances():
        return list_items(f"/apis/{APPLIANCE_GROUP}/{APPLIANCE_VERSION}/namespaces/{APPLIANCE_NAMESPACE}/appinstances")


    def app_instance_path(instance):
        metadata = instance.get("metadata") or {}
        return f"/apis/{APPLIANCE_GROUP}/{APPLIANCE_VERSION}/namespaces/{metadata.get('namespace')}/appinstances/{metadata.get('name')}"


    def ensure_app_instance_finalizer(instance):
        metadata = instance.get("metadata") or {}
        finalizers = list(metadata.get("finalizers") or [])
        if APPINSTANCE_FINALIZER in finalizers or metadata.get("deletionTimestamp"):
            return
        finalizers.append(APPINSTANCE_FINALIZER)
        patch_json(app_instance_path(instance), {"metadata": {"finalizers": finalizers}})


    def remove_app_instance_finalizer(instance):
        metadata = instance.get("metadata") or {}
        finalizers = [item for item in (metadata.get("finalizers") or []) if item != APPINSTANCE_FINALIZER]
        patch_json(app_instance_path(instance), {"metadata": {"finalizers": finalizers}})


    def model_activations():
        return list_items(f"/apis/{APPLIANCE_GROUP}/{APPLIANCE_VERSION}/namespaces/{APPLIANCE_NAMESPACE}/modelactivations")


    def model_activation_path(activation):
        metadata = activation.get("metadata") or {}
        return f"/apis/{APPLIANCE_GROUP}/{APPLIANCE_VERSION}/namespaces/{metadata.get('namespace')}/modelactivations/{metadata.get('name')}"


    def ensure_model_finalizer(activation):
        metadata = activation.get("metadata") or {}
        finalizers = list(metadata.get("finalizers") or [])
        if MODEL_FINALIZER in finalizers or metadata.get("deletionTimestamp"):
            return
        finalizers.append(MODEL_FINALIZER)
        patch_json(model_activation_path(activation), {"metadata": {"finalizers": finalizers}})


    def remove_model_finalizer(activation):
        metadata = activation.get("metadata") or {}
        finalizers = [item for item in (metadata.get("finalizers") or []) if item != MODEL_FINALIZER]
        patch_json(model_activation_path(activation), {"metadata": {"finalizers": finalizers}})


    def get_module_activation(module):
        return get_resource(APPLIANCE_GROUP, APPLIANCE_VERSION, "moduleactivations", APPLIANCE_NAMESPACE, canonical_module(module))


    def ensure_module_activation(module, auto=False):
        module = canonical_module(module)
        if module in ("basis", "dashboard"):
            return
        existing = get_module_activation(module)
        if auto and existing:
            metadata = existing.get("metadata") or {}
            spec = existing.get("spec") or {}
            if metadata.get("deletionTimestamp") or spec.get("enabled", True) is False:
                return
            if spec.get("enabled", True) is not False:
                return
        activation = {
            "apiVersion": f"{APPLIANCE_GROUP}/{APPLIANCE_VERSION}",
            "kind": "ModuleActivation",
            "metadata": {
                "name": module,
                "namespace": APPLIANCE_NAMESPACE,
                "labels": {
                    "app.kubernetes.io/managed-by": "magicstick-operator",
                    "appliance.magicstick.dev/module": module,
                },
            },
            "spec": {
                "module": module,
                "enabled": True,
                "applianceRef": {
                    "name": APPLIANCE_NAME,
                    "namespace": APPLIANCE_NAMESPACE,
                },
            },
        }
        if auto:
            activation["metadata"].setdefault("annotations", {})["appliance.magicstick.dev/auto-enabled"] = "true"
        apply_resource(activation)


    def seed_appliance_modules(current, catalog, activations):
        catalog_modules = catalog.get("modules") or {}
        for module, spec in ((current.get("spec") or {}).get("modules") or {}).items():
            module = canonical_module(module)
            if module in ("basis", "dashboard") or module not in catalog_modules:
                continue
            if module in activations:
                continue
            if (spec or {}).get("enabled") is True:
                ensure_module_activation(module, auto=True)


    def dependency_name(module, catalog):
        module = canonical_module(module)
        if module in STATIC_DEPENDENCIES:
            return STATIC_DEPENDENCIES[module]
        return ((catalog.get("modules") or {}).get(module) or {}).get("kustomizationName")


    def parameter_value(parameters, key):
        value = (parameters or {}).get(key)
        if isinstance(value, dict):
            value = value.get("size") or value.get("storageSize")
        return str(value or "").strip()


    def module_parameter_substitutions(module, parameters):
        substitutions = {}
        for parameter_name, env_name in (MODULE_PARAMETER_SUBSTITUTIONS.get(module) or {}).items():
            value = parameter_value(parameters, parameter_name)
            if value:
                substitutions[env_name] = value
        return substitutions


    def generated_kustomization(module, module_spec, catalog, enabled, source, parameters=None):
        depends_on = []
        for dependency in module_spec.get("requires") or []:
            dep_name = dependency_name(dependency, catalog)
            if dep_name:
                depends_on.append({"name": dep_name})
        spec = {
            "interval": "10m0s",
            "deletionPolicy": "Delete",
            "path": "./" + module_spec["path"].lstrip("./"),
            "prune": True,
            "sourceRef": {
                "kind": (source.get("kind") or "GitRepository"),
                "name": (source.get("name") or "flux-system"),
            },
            "suspend": not enabled,
            "wait": False,
        }
        if depends_on:
            spec["dependsOn"] = depends_on
        substitutions = module_parameter_substitutions(module, parameters)
        if module_spec.get("postBuildSubstitution"):
            substitute = {"var_substitution_enabled": "true"}
            substitute.update(substitutions)
            spec["postBuild"] = {
                "substitute": substitute,
                "substituteFrom": [{"kind": "ConfigMap", "name": "ai-appliance-settings", "optional": True}],
            }
        elif substitutions:
            spec["postBuild"] = {
                "substitute": substitutions,
            }
        health_checks = [
            {"apiVersion": "apiextensions.k8s.io/v1", "kind": "CustomResourceDefinition", "name": crd}
            for crd in module_spec.get("requiredCrds") or []
        ]
        if health_checks:
            spec["healthChecks"] = health_checks
        return {
            "apiVersion": "kustomize.toolkit.fluxcd.io/v1",
            "kind": "Kustomization",
            "metadata": {
                "name": module_spec["kustomizationName"],
                "namespace": FLUX_NAMESPACE,
                "labels": {
                    "app.kubernetes.io/managed-by": "magicstick-operator",
                    "appliance.magicstick.dev/module": module,
                },
            },
            "spec": spec,
        }


    def delete_module_kustomization(module, module_spec, catalog, source):
        name = module_spec["kustomizationName"]
        kustomization = get_resource("kustomize.toolkit.fluxcd.io", "v1", "kustomizations", FLUX_NAMESPACE, name)
        if not kustomization:
            return False
        if not (kustomization.get("metadata") or {}).get("deletionTimestamp"):
            apply_resource(generated_kustomization(module, module_spec, catalog, True, source))
            delete_resource("kustomize.toolkit.fluxcd.io", "v1", "kustomizations", FLUX_NAMESPACE, name)
        return True


    def missing_module_dependencies(module_spec, catalog):
        missing = []
        for dependency in module_spec.get("requires") or []:
            dep = canonical_module(dependency)
            if dep in STATIC_DEPENDENCIES:
                if not module_ready(dep, catalog):
                    missing.append(dep)
                continue
            activation = get_module_activation(dep)
            if not activation:
                missing.append(dep)
                continue
            metadata = activation.get("metadata") or {}
            spec = activation.get("spec") or {}
            if metadata.get("deletionTimestamp") or spec.get("enabled", True) is False:
                missing.append(dep)
                continue
            if not module_ready(dep, catalog):
                missing.append(dep)
        return missing


    def reconcile_module(module, activation, catalog, source):
        module_spec = (catalog.get("modules") or {}).get(module)
        generation = int((activation.get("metadata") or {}).get("generation") or 0)
        if not module_spec:
            patch_module_status(activation, "Degraded", "", "UnknownModule", f"Unknown module '{module}'")
            return "Degraded", {"phase": "Degraded", "message": f"Unknown module '{module}'"}

        if (activation.get("metadata") or {}).get("deletionTimestamp"):
            if delete_module_kustomization(module, module_spec, catalog, source):
                phase = "Removing"
                message = "ModuleActivation is being deleted; generated Kustomization is being removed so Flux can prune resources."
                patch_module_status(activation, phase, module_spec["kustomizationName"], "Removing", message, generation)
                return phase, {"phase": phase, "kustomization": module_spec["kustomizationName"], "message": message}
            remove_module_finalizer(activation)
            phase = "Disabled"
            message = "ModuleActivation is deleted; generated Kustomization has been removed."
            return phase, {"phase": phase, "kustomization": "", "message": message}

        ensure_module_finalizer(activation)
        enabled = ((activation.get("spec") or {}).get("enabled", True) is not False)
        if not enabled:
            if delete_module_kustomization(module, module_spec, catalog, source):
                phase = "Removing"
                message = "ModuleActivation is disabled; generated Kustomization is being deleted so Flux can prune resources."
                patch_module_status(activation, phase, module_spec["kustomizationName"], "Removing", message, generation)
                return phase, {"phase": phase, "kustomization": module_spec["kustomizationName"], "message": message}
            phase = "Disabled"
            message = "ModuleActivation is disabled; generated Kustomization has been removed."
            patch_module_status(activation, phase, "", "Disabled", message, generation)
            return phase, {"phase": phase, "kustomization": "", "message": message}

        for dependency in module_spec.get("requires") or []:
            dep = canonical_module(dependency)
            if dep not in ("basis", "dashboard"):
                ensure_module_activation(dep, auto=True)

        missing_dependencies = missing_module_dependencies(module_spec, catalog)
        if missing_dependencies:
            delete_module_kustomization(module, module_spec, catalog, source)
            phase = "WaitingForModules"
            message = "Waiting for required modules: " + ", ".join(missing_dependencies)
            patch_module_status(activation, phase, module_spec["kustomizationName"], "WaitingForModules", message, generation)
            return phase, {"phase": phase, "kustomization": module_spec["kustomizationName"], "message": message}

        parameters = (activation.get("spec") or {}).get("parameters") or {}
        apply_resource(generated_kustomization(module, module_spec, catalog, enabled, source, parameters))
        kustomization = get_resource("kustomize.toolkit.fluxcd.io", "v1", "kustomizations", FLUX_NAMESPACE, module_spec["kustomizationName"])

        ready = ready_condition(kustomization or {})
        if ready.get("status") == "True":
            phase = "Ready"
            reason = "KustomizationReady"
            message = ready.get("message") or "Module Kustomization is ready."
        elif ready.get("status") == "False":
            phase = "Degraded"
            reason = ready.get("reason") or "KustomizationNotReady"
            message = ready.get("message") or "Module Kustomization is not ready."
        else:
            phase = "Reconciling"
            reason = "WaitingForKustomization"
            message = "Waiting for generated module Kustomization to become ready."
        patch_module_status(activation, phase, module_spec["kustomizationName"], reason, message, generation)
        return phase, {"phase": phase, "kustomization": module_spec["kustomizationName"], "message": message}


    def cleanup_stale_module_kustomizations(catalog, activations, source):
        modules = catalog.get("modules") or {}
        items = list_items(f"/apis/kustomize.toolkit.fluxcd.io/v1/namespaces/{FLUX_NAMESPACE}/kustomizations")
        for item in items:
            labels = (item.get("metadata") or {}).get("labels") or {}
            if labels.get("app.kubernetes.io/managed-by") != "magicstick-operator":
                continue
            module = canonical_module(labels.get("appliance.magicstick.dev/module", ""))
            if not module or module in activations or module not in modules:
                continue
            delete_module_kustomization(module, modules[module], catalog, source)


    def patch_module_status(activation, phase, kustomization, reason, message, generation=0):
        metadata = activation.get("metadata") or {}
        path = f"/apis/{APPLIANCE_GROUP}/{APPLIANCE_VERSION}/namespaces/{metadata.get('namespace')}/moduleactivations/{metadata.get('name')}/status"
        patch_json(path, {"status": {
            "observedGeneration": generation,
            "phase": phase,
            "kustomization": kustomization,
            "message": message,
            "conditions": [condition("True" if phase in ("Ready", "Suspended", "Disabled") else "False", reason, message, generation)],
        }})


    def patch_instance_status(instance, phase, target, reason, message, url="", generation=0):
        metadata = instance.get("metadata") or {}
        path = f"/apis/{APPLIANCE_GROUP}/{APPLIANCE_VERSION}/namespaces/{metadata.get('namespace')}/appinstances/{metadata.get('name')}/status"
        patch_json(path, {"status": {
            "observedGeneration": generation,
            "phase": phase,
            "kind": target.get("kind", ""),
            "name": target.get("name", ""),
            "namespace": target.get("namespace", ""),
            "url": url,
            "message": message,
            "conditions": [condition("True" if phase in ("Ready", "Suspended", "Disabled") else "False", reason, message, generation)],
        }})


    def patch_model_status(activation, phase, reason, message, model_ref="", catalog_id="", vram_mi=0, generation=0):
        metadata = activation.get("metadata") or {}
        path = f"/apis/{APPLIANCE_GROUP}/{APPLIANCE_VERSION}/namespaces/{metadata.get('namespace')}/modelactivations/{metadata.get('name')}/status"
        patch_json(path, {"status": {
            "observedGeneration": generation,
            "phase": phase,
            "modelRef": model_ref,
            "catalogId": catalog_id,
            "vramRequiredMi": int(vram_mi or 0),
            "message": message,
            "conditions": [condition("True" if phase in ("Ready", "Disabled") else "False", reason, message, generation)],
        }})


    def module_ready(module, catalog):
        if module in STATIC_DEPENDENCIES:
            name = STATIC_DEPENDENCIES[module]
        else:
            module_spec = (catalog.get("modules") or {}).get(module) or {}
            name = module_spec.get("kustomizationName")
        if not name:
            return False
        kustomization = get_resource("kustomize.toolkit.fluxcd.io", "v1", "kustomizations", FLUX_NAMESPACE, name)
        return ready_condition(kustomization or {}).get("status") == "True"


    def model_required_modules(model_type):
        return LOCAL_MODEL_MODULES if model_type == "local" else EXTERNAL_MODEL_MODULES


    def merged_local_model(activation, presets):
        metadata = activation.get("metadata") or {}
        spec = activation.get("spec") or {}
        local = dict(spec.get("local") or {})
        preset_name = local.get("preset") or metadata.get("name")
        preset = dict(presets.get(preset_name) or {})
        merged = dict(preset)
        merged.update(local)
        if not merged.get("features"):
            model_type = merged.get("modelType") or merged.get("type") or "chat"
            merged["features"] = ["TextEmbedding"] if model_type == "embedding" else ["TextGeneration"]
        if not merged.get("engine"):
            merged["engine"] = "VLLM"
        if not merged.get("resourceProfile"):
            merged["resourceProfile"] = "magicstick-nvidia-gpu:1"
        return merged


    def local_model_vram_mi(local):
        return parse_mib(local.get("vram")) or positive_int(local.get("vramMi")) or 0


    def model_args_with_runtime_limits(args, context_window, max_num_seqs):
        normalized = []
        skip_next = False
        for arg in [str(item) for item in (args or [])]:
            if skip_next:
                skip_next = False
                continue
            if arg in ("--max-model-len", "--max_model_len", "--max-num-seqs", "--max_num_seqs"):
                skip_next = True
                continue
            if (
                arg.startswith("--max-model-len=")
                or arg.startswith("--max_model_len=")
                or arg.startswith("--max-num-seqs=")
                or arg.startswith("--max_num_seqs=")
            ):
                continue
            normalized.append(arg)
        if context_window:
            normalized.append(f"--max-model-len={context_window}")
        if max_num_seqs:
            normalized.append(f"--max-num-seqs={max_num_seqs}")
        return normalized


    def non_negative_int(value, default):
        if value is None:
            return default
        if isinstance(value, bool):
            return default
        if isinstance(value, int) and value >= 0:
            return value
        if isinstance(value, str) and value.strip().isdigit():
            return int(value.strip())
        return default


    def kubeai_model_resource(activation, presets):
        metadata = activation.get("metadata") or {}
        spec = activation.get("spec") or {}
        name = metadata.get("name")
        namespace = spec.get("targetNamespace") or "ai"
        local = merged_local_model(activation, presets)
        url = (local.get("url") or "").strip()
        vram_mi = local_model_vram_mi(local)
        if not url:
            raise ValueError("local.url is required for local ModelActivation")
        if not vram_mi:
            raise ValueError("local.vram or local.vramMi is required for local ModelActivation")
        annotations = {}
        context_window = positive_int(local.get("contextWindow") or local.get("context_window"))
        max_num_seqs = positive_int(local.get("maxNumSeqs") or local.get("max_num_seqs"))
        if context_window:
            annotations["ai-appliance.io/context-window"] = str(context_window)
        env = dict(local.get("env") or {})
        env["MAGICSTICK_VLLM_VRAM_LIMIT"] = local.get("vram") or str(vram_mi)
        for legacy_key in (
            "MAGICSTICK_VLLM_ACTIVE_THREAD_PERCENTAGE",
            "MAGICSTICK_MPS_DEVICE",
            "CUDA_MPS_ACTIVE_THREAD_PERCENTAGE",
            "CUDA_MPS_PINNED_DEVICE_MEM_LIMIT",
            "CUDA_MPS_PIPE_DIRECTORY",
        ):
            env.pop(legacy_key, None)
        return {
            "apiVersion": "kubeai.org/v1",
            "kind": "Model",
            "metadata": {
                "name": name,
                "namespace": namespace,
                "labels": {
                    "app.kubernetes.io/managed-by": "magicstick-operator",
                    "appliance.magicstick.dev/modelactivation": name,
                },
                "annotations": annotations,
            },
            "spec": {
                "features": local.get("features") or ["TextGeneration"],
                "url": url,
                "engine": local.get("engine") or "VLLM",
                "resourceProfile": local.get("resourceProfile") or "magicstick-nvidia-gpu:1",
                "minReplicas": non_negative_int(local.get("minReplicas"), 1),
                "maxReplicas": non_negative_int(local.get("maxReplicas"), 1),
                "env": env,
                "args": model_args_with_runtime_limits(local.get("args") or [], context_window, max_num_seqs),
            },
        }, vram_mi


    def delete_kubeai_model(name, namespace):
        return delete_resource("kubeai.org", "v1", "models", namespace, name)


    def reconcile_model_activation(activation, catalog, presets):
        metadata = activation.get("metadata") or {}
        spec = activation.get("spec") or {}
        generation = int(metadata.get("generation") or 0)
        name = metadata.get("name")
        model_type = spec.get("type") or "local"
        namespace = spec.get("targetNamespace") or "ai"
        model_ref = ("kubeai/" + name) if model_type == "local" else ("litellm/" + name)

        if metadata.get("deletionTimestamp"):
            if model_type == "local":
                if get_resource("kubeai.org", "v1", "models", namespace, name):
                    delete_kubeai_model(name, namespace)
                    patch_model_status(activation, "Removing", "Removing", "ModelActivation is being deleted; KubeAI Model is being removed.", model_ref, name, generation=generation)
                    return "Removing", {"phase": "Removing", "modelRef": model_ref, "message": "KubeAI Model is being removed."}
            remove_model_finalizer(activation)
            return "Disabled", {"phase": "Disabled", "modelRef": model_ref, "message": "ModelActivation deleted."}

        ensure_model_finalizer(activation)
        enabled = spec.get("enabled", True) is not False
        vram_mi = 0
        if model_type == "local":
            try:
                vram_mi = kubeai_model_resource(activation, presets)[1]
            except ValueError:
                vram_mi = 0
        if not enabled:
            if model_type == "local" and get_resource("kubeai.org", "v1", "models", namespace, name):
                delete_kubeai_model(name, namespace)
                patch_model_status(activation, "Removing", "Removing", "ModelActivation is disabled; KubeAI Model is being removed.", model_ref, name, vram_mi, generation)
                return "Removing", {"phase": "Removing", "modelRef": model_ref, "vramRequiredMi": vram_mi, "message": "KubeAI Model is being removed."}
            message = "ModelActivation is disabled."
            patch_model_status(activation, "Disabled", "Disabled", message, model_ref, name, vram_mi, generation)
            return "Disabled", {"phase": "Disabled", "modelRef": model_ref, "vramRequiredMi": vram_mi, "message": message}

        if model_type not in ("local", "external"):
            message = "Unsupported model type: " + str(model_type)
            patch_model_status(activation, "Degraded", "UnsupportedType", message, model_ref, name, generation=generation)
            return "Degraded", {"phase": "Degraded", "modelRef": model_ref, "message": message}

        required_modules = model_required_modules(model_type)
        for module in required_modules:
            ensure_module_activation(module, auto=True)
        missing_modules = [module for module in required_modules if not module_ready(module, catalog)]
        if missing_modules:
            message = "Waiting for required modules: " + ", ".join(missing_modules)
            patch_model_status(activation, "WaitingForModules", "WaitingForModules", message, model_ref, name, vram_mi, generation)
            return "WaitingForModules", {"phase": "WaitingForModules", "modelRef": model_ref, "vramRequiredMi": vram_mi, "message": message}

        if model_type == "local":
            if not crd_exists("models.kubeai.org"):
                message = "Waiting for required CRDs: models.kubeai.org"
                patch_model_status(activation, "WaitingForCRDs", "WaitingForCRDs", message, model_ref, name, vram_mi, generation)
                return "WaitingForCRDs", {"phase": "WaitingForCRDs", "modelRef": model_ref, "vramRequiredMi": vram_mi, "message": message}
            try:
                resource, vram_mi = kubeai_model_resource(activation, presets)
            except ValueError as error:
                message = str(error)
                patch_model_status(activation, "Degraded", "InvalidModelSpec", message, model_ref, name, generation=generation)
                return "Degraded", {"phase": "Degraded", "modelRef": model_ref, "message": message}
            apply_resource(resource)

        if catalog_contains_model(namespace, name):
            message = "Model is available in the generated model catalog."
            patch_model_status(activation, "Ready", "CatalogReady", message, model_ref, name, vram_mi, generation)
            return "Ready", {"phase": "Ready", "modelRef": model_ref, "catalogId": name, "vramRequiredMi": vram_mi, "message": message}

        message = "Waiting for model-catalog to publish the model."
        patch_model_status(activation, "Reconciling", "WaitingForCatalog", message, model_ref, name, vram_mi, generation)
        return "Reconciling", {"phase": "Reconciling", "modelRef": model_ref, "catalogId": name, "vramRequiredMi": vram_mi, "message": message}


    def build_openclaw(instance):
        metadata = instance.get("metadata") or {}
        spec = instance.get("spec") or {}
        params = spec.get("parameters") or {}
        name = metadata.get("name")
        namespace = spec.get("targetNamespace") or "ai"
        host = ((params.get("ingress") or {}).get("host") or params.get("host") or "openclaw.example.local")
        local_host = app_instance_local_host(instance, "openclaw")
        local_name = local_mdns_name(local_host)
        model = params.get("model") or "CHANGEME_MODEL"
        storage = ((params.get("storage") or {}).get("size") or params.get("storageSize") or "10Gi")
        catalog_init_script = textwrap.dedent("""\
            set -eu
            for attempt in $(seq 1 120); do
              if [ -f /catalog/defaults.env ] && grep -q '^AI_APPLIANCE_MODEL_CATALOG_READY=true$' /catalog/defaults.env; then
                break
              fi
              echo "Waiting for ai-model-catalog ($attempt/120)"
              sleep 5
            done
            grep -q '^AI_APPLIANCE_MODEL_CATALOG_READY=true$' /catalog/defaults.env
            node <<'NODE'
            const fs = require("fs");
            const configPath = "/data/openclaw.json";
            const catalogPath = process.env.AI_MODEL_CATALOG_OPENCLAW_PATH || "/catalog/openclaw.json";
            const preferredModel = process.env.OPENCLAW_DEFAULT_MODEL || "";

            function normalizeModel(value) {
              return String(value || "").replace(/^(openai|litellm|openrouter)\\//, "");
            }

            function deepMerge(base, overlay) {
              const result = { ...base };
              for (const [key, value] of Object.entries(overlay)) {
                if (
                  value &&
                  typeof value === "object" &&
                  !Array.isArray(value) &&
                  result[key] &&
                  typeof result[key] === "object" &&
                  !Array.isArray(result[key])
                ) {
                  result[key] = deepMerge(result[key], value);
                } else {
                  result[key] = value;
                }
              }
              return result;
            }

            function deletePath(object, path) {
              const parts = path.split(".");
              let current = object;
              for (let index = 0; index < parts.length - 1; index += 1) {
                if (!current || typeof current !== "object") {
                  return;
                }
                current = current[parts[index]];
              }
              if (current && typeof current === "object") {
                delete current[parts[parts.length - 1]];
              }
            }

            const overlay = JSON.parse(fs.readFileSync(catalogPath, "utf8"));
            const provider = (((overlay.models || {}).providers || {}).litellm || {});
            provider.baseUrl = process.env.OPENAI_BASE_URL.replace(/\\/+$/, "");
            provider.apiKey = "$" + "{OPENAI_API_KEY}";
            const models = Array.isArray(provider.models) ? provider.models : [];
            if (models.length === 0) {
              throw new Error("ai-model-catalog has no OpenClaw chat models");
            }

            const ids = new Set(models.map((item) => item.id));
            const normalizedPreferredModel = normalizeModel(preferredModel);
            const catalogDefault = normalizeModel(((((overlay.agents || {}).defaults || {}).model || {}).primary || ""));
            const selectedModel = normalizedPreferredModel && ids.has(normalizedPreferredModel)
              ? normalizedPreferredModel
              : catalogDefault && ids.has(catalogDefault)
                ? catalogDefault
                : models[0].id;

            overlay.models = {
              ...(overlay.models || {}),
              providers: {
                ...((overlay.models || {}).providers || {}),
                litellm: provider,
              },
            };
            overlay.agents = {
              ...(overlay.agents || {}),
              defaults: {
                ...((overlay.agents || {}).defaults || {}),
                model: {
                  ...(((overlay.agents || {}).defaults || {}).model || {}),
                  primary: "litellm/" + selectedModel,
                },
              },
            };

            const existing = fs.existsSync(configPath)
              ? JSON.parse(fs.readFileSync(configPath, "utf8"))
              : {};
            for (const path of [
              "models.providers.openai",
              "models.providers.openrouter",
              "providers.openai",
              "providers.openrouter",
            ]) {
              deletePath(existing, path);
            }
            const config = deepMerge(existing, overlay);

            fs.writeFileSync(configPath, JSON.stringify(config, null, 2) + "\\n");
            console.log("Configured OpenClaw from ai-model-catalog with " + models.length + " models; primary=litellm/" + selectedModel);
            NODE
        """)
        openclaw_instance = {
            "apiVersion": "openclaw.rocks/v1alpha1",
            "kind": "OpenClawInstance",
            "metadata": {"name": name, "namespace": namespace, "labels": {"app": "openclaw"}},
            "spec": {
                "podAnnotations": {"ai-appliance.io/model-catalog-consumer": "true"},
                "config": {"mergeMode": "merge"},
                "env": [
                    {"name": "OPENAI_BASE_URL", "value": "http://litellm.ai.svc.cluster.local:4000/v1"},
                    {"name": "OPENCLAW_DEFAULT_MODEL", "value": model},
                    {"name": "OPENAI_API_KEY", "valueFrom": {"secretKeyRef": {"name": "litellm-masterkey-secret", "key": "LITELLM_MASTER_KEY"}}},
                ],
                "initContainers": [{
                    "name": "openclaw-litellm-models",
                    "image": "node:22-alpine",
                    "imagePullPolicy": "IfNotPresent",
                    "command": ["/bin/sh", "-c"],
                    "args": [catalog_init_script],
                    "env": [
                        {"name": "OPENAI_BASE_URL", "value": "http://litellm.ai.svc.cluster.local:4000/v1"},
                        {"name": "OPENCLAW_DEFAULT_MODEL", "value": model},
                        {"name": "AI_MODEL_CATALOG_OPENCLAW_PATH", "value": "/catalog/openclaw.json"},
                        {"name": "OPENAI_API_KEY", "valueFrom": {"secretKeyRef": {"name": "litellm-masterkey-secret", "key": "LITELLM_MASTER_KEY"}}},
                    ],
                    "volumeMounts": [
                        {"name": "data", "mountPath": "/data"},
