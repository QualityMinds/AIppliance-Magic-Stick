    def app_instance_target_resources(instance):
        metadata = instance.get("metadata") or {}
        spec = instance.get("spec") or {}
        params = spec.get("parameters") or {}
        instance_type = spec.get("type")
        name = metadata.get("name")
        namespace = spec.get("targetNamespace") or "ai"
        if instance_type == "openclaw":
            return [{"apiVersion": "openclaw.rocks/v1alpha1", "kind": "OpenClawInstance", "metadata": {"name": name, "namespace": namespace}}]
        if instance_type == "hermes":
            return [
                {"apiVersion": "hermes.agent/v1", "kind": "HermesInstance", "metadata": {"name": name, "namespace": namespace}},
                {"apiVersion": "networking.k8s.io/v1", "kind": "Ingress", "metadata": {"name": derived_resource_name(name or "hermes", "local"), "namespace": namespace}},
                {"apiVersion": "v1", "kind": "Secret", "metadata": {"name": derived_resource_name(name or "hermes", "api-server"), "namespace": namespace}},
            ]
        if instance_type == "paperclip":
            host = ((params.get("ingress") or {}).get("host") or params.get("host") or "paperclip.example.local")
            local_host = app_instance_local_host(instance, "paperclip")
            public_url = "http://" + host
            paperclip_image_tag = "sha-df0e5bd"
            job_base = (name or "paperclip")[:42].rstrip("-") or "paperclip"
            job_suffix = hashlib.sha256(((name or "paperclip") + "|auth-v4|" + paperclip_image_tag + "|" + public_url + "|" + local_host).encode("utf-8")).hexdigest()[:8]
            admin_job_suffix = hashlib.sha256(((name or "paperclip") + "|admin-v6|" + paperclip_image_tag + "|" + public_url).encode("utf-8")).hexdigest()[:8]
            admin = params.get("admin") or {}
            admin_password_ref = admin.get("passwordSecretRef") or {}
            admin_secret_name = (
                admin_password_ref.get("name")
                or admin.get("passwordSecretName")
                or params.get("adminPasswordSecretName")
                or ((name or "paperclip")[:56].rstrip("-") or "paperclip") + "-admin"
            )
            rancher_namespace_auth_name = derived_resource_name(
                namespace + "-" + (name or "paperclip"),
                "rancher-namespace-auth",
            )
            resources = [
                {"apiVersion": "paperclip.inc/v1alpha1", "kind": "Instance", "metadata": {"name": name, "namespace": namespace}},
                {"apiVersion": "v1", "kind": "ConfigMap", "metadata": {"name": derived_resource_name(name or "paperclip", "runtime-compat"), "namespace": namespace}},
                {"apiVersion": "rbac.authorization.k8s.io/v1", "kind": "ClusterRoleBinding", "metadata": {"name": rancher_namespace_auth_name}},
                {"apiVersion": "rbac.authorization.k8s.io/v1", "kind": "ClusterRole", "metadata": {"name": rancher_namespace_auth_name}},
                {"apiVersion": "batch/v1", "kind": "Job", "metadata": {"name": job_base + "-auth-" + job_suffix, "namespace": namespace}},
            ]
            if admin.get("enabled", True) is not False:
                resources.append({"apiVersion": "batch/v1", "kind": "Job", "metadata": {"name": job_base + "-admin-" + admin_job_suffix, "namespace": namespace}})
            if not params.get("authSecretName"):
                resources.append({"apiVersion": "v1", "kind": "Secret", "metadata": {"name": derived_resource_name(name or "paperclip", "auth"), "namespace": namespace}})
            if admin.get("enabled", True) is not False and not admin_password_ref.get("name"):
                resources.append({"apiVersion": "v1", "kind": "Secret", "metadata": {"name": admin_secret_name, "namespace": namespace}})
            if host != local_host:
                resources.append({"apiVersion": "networking.k8s.io/v1", "kind": "Ingress", "metadata": {"name": derived_resource_name(name or "paperclip", "local"), "namespace": namespace}})
            return resources
        if instance_type == "kubeopencode":
            templates = params.get("agentTemplates") or []
            template_name = params.get("template") or (templates[0].get("name") if templates else name)
            agent_name = params.get("agent") or params.get("agentName") or params.get("name") or name
            if str(agent_name or "").startswith("kubeopencode-"):
                agent_name = str(agent_name)[len("kubeopencode-"):]
            agent_name = agent_name or name
            return [
                {"apiVersion": "kubeopencode.io/v1alpha1", "kind": "Agent", "metadata": {"name": agent_name, "namespace": namespace}},
                {"apiVersion": "kubeopencode.io/v1alpha1", "kind": "AgentTemplate", "metadata": {"name": template_name, "namespace": namespace}},
                {"apiVersion": "networking.k8s.io/v1", "kind": "Ingress", "metadata": {"name": name, "namespace": namespace}},
            ]
        if instance_type == "odysseus":
            base_name = name or "odysseus"
            chroma_name = derived_resource_name(base_name, "chroma")
            searxng_name = derived_resource_name(base_name, "searxng")
            searxng_config = derived_resource_name(base_name, "searxng-config")
            ntfy_name = derived_resource_name(base_name, "ntfy")
            litellm_alias = derived_resource_name(base_name, "litellm")
            admin = params.get("admin") or {}
            admin_password_ref = admin.get("passwordSecretRef") or {}
            admin_secret_name = (
                admin.get("passwordSecretName")
                or params.get("adminPasswordSecretName")
                or derived_resource_name(base_name, "admin")
            )
            resources = [
                {"apiVersion": "networking.k8s.io/v1", "kind": "Ingress", "metadata": {"name": base_name, "namespace": namespace}},
                {"apiVersion": "apps/v1", "kind": "Deployment", "metadata": {"name": base_name, "namespace": namespace}},
                {"apiVersion": "apps/v1", "kind": "Deployment", "metadata": {"name": chroma_name, "namespace": namespace}},
                {"apiVersion": "apps/v1", "kind": "Deployment", "metadata": {"name": searxng_name, "namespace": namespace}},
                {"apiVersion": "apps/v1", "kind": "Deployment", "metadata": {"name": ntfy_name, "namespace": namespace}},
                {"apiVersion": "v1", "kind": "Service", "metadata": {"name": base_name, "namespace": namespace}},
                {"apiVersion": "v1", "kind": "Service", "metadata": {"name": chroma_name, "namespace": namespace}},
                {"apiVersion": "v1", "kind": "Service", "metadata": {"name": searxng_name, "namespace": namespace}},
                {"apiVersion": "v1", "kind": "Service", "metadata": {"name": ntfy_name, "namespace": namespace}},
                {"apiVersion": "v1", "kind": "Service", "metadata": {"name": litellm_alias, "namespace": namespace}},
                {"apiVersion": "v1", "kind": "ConfigMap", "metadata": {"name": searxng_config, "namespace": namespace}},
            ]
            if not admin_password_ref.get("name"):
                resources.append({"apiVersion": "v1", "kind": "Secret", "metadata": {"name": admin_secret_name, "namespace": namespace}})
            return resources
        return []


    def delete_target_resource(resource):
        delete_applied_resource(resource)


    def cleanup_app_instance_targets(instance):
        metadata = instance.get("metadata") or {}
        spec = instance.get("spec") or {}
        if spec.get("type") == "paperclip" and metadata.get("name"):
            namespace = spec.get("targetNamespace") or "ai"
            selector = "appliance.magicstick.dev/appinstance=" + metadata["name"]
            delete_labeled_resources("batch/v1", "Job", namespace, selector)
            delete_labeled_resources("v1", "Pod", namespace, selector)
        resources = app_instance_target_resources(instance)
        for resource in resources:
            delete_target_resource(resource)
        if resources:
            metadata = resources[0].get("metadata") or {}
            return {"kind": resources[0].get("kind", ""), "name": metadata.get("name", ""), "namespace": metadata.get("namespace", "")}
        return {"kind": "", "name": metadata.get("name", ""), "namespace": spec.get("targetNamespace") or "ai"}


    INSTANCE_BUILDERS = {
        "openclaw": build_openclaw,
        "hermes": build_hermes,
        "odysseus": build_odysseus,
        "paperclip": build_paperclip,
        "kubeopencode": build_kubeopencode,
    }


    def reconcile_instance(instance, catalog):
        metadata = instance.get("metadata") or {}
        spec = instance.get("spec") or {}
        status = instance.get("status") or {}
        generation = int(metadata.get("generation") or 0)
        observed_generation = int(status.get("observedGeneration") or 0)
        instance_type = spec.get("type")
        enabled = spec.get("enabled", True) is not False
        mapping = (catalog.get("instanceMappings") or {}).get(instance_type)
        if not mapping or instance_type not in INSTANCE_BUILDERS:
            if metadata.get("deletionTimestamp"):
                remove_app_instance_finalizer(instance)
                return "Disabled", {"kind": "", "name": metadata.get("name", ""), "namespace": spec.get("targetNamespace") or "ai"}
            patch_instance_status(instance, "Degraded", {}, "UnknownInstanceType", f"Unknown instance type '{instance_type}'", generation=generation)
            return "Degraded", {}
        if metadata.get("deletionTimestamp"):
            target = cleanup_app_instance_targets(instance)
            patch_instance_status(instance, "Removing", target, "Removing", "AppInstance is being deleted; generated target resources are being removed.", generation=generation)
            remove_app_instance_finalizer(instance)
            return "Disabled", target
        ensure_app_instance_finalizer(instance)
        if not enabled:
            target = {"kind": mapping.get("kind") or mapping.get("primaryKind") or "", "name": metadata.get("name"), "namespace": spec.get("targetNamespace") or "ai"}
            patch_instance_status(instance, "Suspended", target, "Suspended", "AppInstance is disabled.", generation=generation)
            return "Suspended", target

        required_modules = mapping.get("requiredModules") or []
        for module in required_modules:
            ensure_module_activation(module, auto=True)
        missing_modules = [module for module in required_modules if not module_ready(module, catalog)]
        target = {"kind": mapping.get("kind") or mapping.get("primaryKind") or "", "name": metadata.get("name"), "namespace": spec.get("targetNamespace") or "ai"}
        if missing_modules:
            message = "Waiting for required modules: " + ", ".join(missing_modules)
            patch_instance_status(instance, "WaitingForModules", target, "WaitingForModules", message, generation=generation)
            return "WaitingForModules", target

        missing_crds = [crd for crd in (mapping.get("requiredCrds") or []) if not crd_exists(crd)]
        if missing_crds:
            message = "Waiting for required CRDs: " + ", ".join(missing_crds)
            patch_instance_status(instance, "WaitingForCRDs", target, "WaitingForCRDs", message, generation=generation)
            return "WaitingForCRDs", target

        built_resources, url = INSTANCE_BUILDERS[instance_type](instance)
        resources = built_resources if isinstance(built_resources, list) else [built_resources]
        refresh_runtime_dns = generation > observed_generation and any(item.get("kind") == "Ingress" for item in resources)
        for item in resources:
            apply_resource(item)
        if refresh_runtime_dns:
            refresh_kdns(f"appinstance-{metadata.get('name', '')}")
        resource = resources[-1]
        target = {
            "kind": resource["kind"],
            "name": resource["metadata"]["name"],
            "namespace": resource["metadata"]["namespace"],
        }
        target_resource = get_applied_resource(resource)
        ready = ready_condition(target_resource or {})
        if ready.get("status") == "False":
            phase = "Degraded"
            reason = ready.get("reason") or "TargetNotReady"
            message = ready.get("message") or "Target resource is not ready."
        elif ready.get("status") == "True" or resource["kind"] == "AgentTemplate":
            phase = "Ready"
            reason = ready.get("reason") or "Applied"
            message = ready.get("message") or "Target resource has been applied."
        else:
            phase = "Reconciling"
            reason = "WaitingForTarget"
            message = "Target resource has been applied and is reconciling."
        patch_instance_status(instance, phase, target, reason, message, url=url, generation=generation)
        return phase, target


    def patch_appliance_status(module_statuses, instance_statuses, model_statuses):
        current = appliance()
        if not current:
            return
        degraded = any(item.get("phase") == "Degraded" for item in module_statuses.values())
        waiting = any(item.get("phase") not in ("Ready", "Suspended", "Disabled") for item in module_statuses.values())
        waiting = waiting or any(item.get("phase") not in ("Ready", "Suspended", "Disabled") for group in instance_statuses.values() for item in group.values())
        degraded = degraded or any(item.get("phase") == "Degraded" for item in model_statuses.values())
        waiting = waiting or any(item.get("phase") not in ("Ready", "Disabled") for item in model_statuses.values())
        phase = "Degraded" if degraded else ("Reconciling" if waiting else "Ready")
        message = "Runtime CRs reconciled through ModuleActivation, AppInstance, and ModelActivation resources."
        path = f"/apis/{APPLIANCE_GROUP}/{APPLIANCE_VERSION}/namespaces/{APPLIANCE_NAMESPACE}/appliances/{APPLIANCE_NAME}/status"
        patch_json(path, {"status": {
            "observedGeneration": int((current.get("metadata") or {}).get("generation") or 0),
            "phase": phase,
            "modules": module_statuses,
            "instances": instance_statuses,
            "models": model_statuses,
            "conditions": [condition("True" if phase == "Ready" else "False", phase, message)],
        }})


    def reconcile_paperclip_sandbox_network_policies(instances):
        paperclip_instances = []
        for instance in instances:
            metadata = instance.get("metadata") or {}
            spec = instance.get("spec") or {}
            if spec.get("type") != "paperclip" or spec.get("enabled", True) is False:
                continue
            name = metadata.get("name") or "paperclip"
            prefix = (dns_label_part(name, "paperclip")[:30].rstrip("-") or "paperclip") + "-"
            paperclip_instances.append((prefix, instance))
        paperclip_instances.sort(key=lambda item: len(item[0]), reverse=True)

        selector = urllib.parse.urlencode({"labelSelector": "paperclip.io/managed-by=paperclip-k8s-plugin"})
        namespaces = list_items("/api/v1/namespaces?" + selector)
        for item in namespaces:
            namespace = ((item.get("metadata") or {}).get("name") or "").strip()
            if not namespace:
                continue
            owner = next((instance for prefix, instance in paperclip_instances if namespace.startswith(prefix)), None)
            if not owner:
                continue
            owner_metadata = owner.get("metadata") or {}
            owner_spec = owner.get("spec") or {}
            owner_params = owner_spec.get("parameters") or {}
            owner_name = owner_metadata.get("name") or "paperclip"
            target_namespace = owner_spec.get("targetNamespace") or "ai"
            agent_execution = owner_params.get("agentExecution") or {}
            max_concurrent_agents = min(10, positive_int(agent_execution.get("maxConcurrentAgents")) or 2)
            open_claw = agent_execution.get("openClaw") or {}
            hermes = agent_execution.get("hermes") or {}
            open_claw_ref = open_claw.get("instanceRef") if isinstance(open_claw, dict) else ""
            hermes_ref = hermes.get("instanceRef") if isinstance(hermes, dict) else ""
            egress = [
                {
                    "to": [{
                        "namespaceSelector": {"matchLabels": {"kubernetes.io/metadata.name": target_namespace}},
                        "podSelector": {"matchLabels": {"app": "litellm"}},
                    }],
                    "ports": [{"protocol": "TCP", "port": 4000}],
                },
                {
                    "to": [{
                        "namespaceSelector": {"matchLabels": {"kubernetes.io/metadata.name": target_namespace}},
                        "podSelector": {"matchLabels": {
                            "app.kubernetes.io/instance": owner_name,
                            "app.kubernetes.io/name": "paperclip",
                        }},
                    }],
                    "ports": [{"protocol": "TCP", "port": 3100}],
                },
            ]
            if boolean_value(open_claw.get("enabled"), False) and open_claw_ref:
                egress.append({
                    "to": [{
                        "namespaceSelector": {"matchLabels": {"kubernetes.io/metadata.name": target_namespace}},
                        "podSelector": {"matchLabels": {
                            "app.kubernetes.io/instance": open_claw_ref,
                            "app.kubernetes.io/name": "openclaw",
                        }},
                    }],
                    "ports": [
                        {"protocol": "TCP", "port": 18789},
                        {"protocol": "TCP", "port": 18790},
                    ],
                })
            if boolean_value(hermes.get("enabled"), False) and hermes_ref:
                egress.append({
                    "to": [{
                        "namespaceSelector": {"matchLabels": {"kubernetes.io/metadata.name": target_namespace}},
                        "podSelector": {"matchLabels": {
                            "app.kubernetes.io/instance": hermes_ref,
                            "app.kubernetes.io/name": "hermes-agent",
                        }},
                    }],
                    "ports": [{"protocol": "TCP", "port": 8642}],
                })
            apply_resource({
                "apiVersion": "v1",
                "kind": "ResourceQuota",
                "metadata": {
                    "name": "paperclip-quota",
                    "namespace": namespace,
                    "labels": {"app.kubernetes.io/managed-by": "magicstick-operator"},
                },
                "spec": {"hard": {
                    "pods": str(max_concurrent_agents),
                    "requests.cpu": str(max_concurrent_agents * 500) + "m",
                    "requests.memory": str(max_concurrent_agents) + "Gi",
                    "limits.cpu": str(max_concurrent_agents * 2),
                    "limits.memory": str(max_concurrent_agents * 4) + "Gi",
                }},
            })
            apply_resource({
                "apiVersion": "v1",
                "kind": "LimitRange",
                "metadata": {
                    "name": "paperclip-limits",
                    "namespace": namespace,
                    "labels": {"app.kubernetes.io/managed-by": "magicstick-operator"},
                },
                "spec": {"limits": [{
                    "type": "Container",
                    "default": {"cpu": "1", "memory": "2Gi"},
                    "defaultRequest": {"cpu": "500m", "memory": "1Gi"},
                    "max": {"cpu": "2", "memory": "4Gi"},
                }]},
            })
            apply_resource({
                "apiVersion": "networking.k8s.io/v1",
                "kind": "NetworkPolicy",
                "metadata": {
                    "name": "ai-appliance-litellm-egress",
                    "namespace": namespace,
                    "labels": {
                        "app.kubernetes.io/managed-by": "magicstick-operator",
                        "paperclip.io/managed-by": "paperclip-k8s-plugin",
                    },
                },
                "spec": {
                    "podSelector": {"matchLabels": {"paperclip.io/role": "agent"}},
                    "policyTypes": ["Egress"],
                    "egress": egress,
                },
            })


    def watch_paperclip_sandbox_namespaces():
        query = urllib.parse.urlencode({
            "watch": "true",
            "allowWatchBookmarks": "true",
            "timeoutSeconds": "300",
        })
        path = "/api/v1/namespaces?" + query
        while True:
            request = urllib.request.Request(KUBE_API + path, headers={
                "Accept": "application/json",
                "Authorization": "Bearer " + token(),
            })
            try:
                with urllib.request.urlopen(request, timeout=330, context=SSL_CONTEXT) as response:
                    for raw_line in response:
                        if not raw_line.strip():
                            continue
                        event = json.loads(raw_line)
                        if event.get("type") not in ("ADDED", "MODIFIED"):
                            continue
                        namespace = event.get("object") or {}
                        labels = (namespace.get("metadata") or {}).get("labels") or {}
                        if labels.get("paperclip.io/managed-by") != "paperclip-k8s-plugin":
                            continue
                        reconcile_paperclip_sandbox_network_policies(app_instances())
            except Exception as error:
                print("sandbox namespace watch reconnecting: " + repr(error), flush=True)
                time.sleep(2)


    def reconcile_once():
        catalog = load_catalog()
        presets = load_model_presets()
        current = appliance() or {}
        source = ((current.get("spec") or {}).get("source") or {"kind": "GitRepository", "name": "flux-system", "namespace": FLUX_NAMESPACE})
        activations = module_activations()
        instances = app_instances()
        models = model_activations()

        seed_appliance_modules(current, catalog, activations)
        activations = module_activations()

        for instance in instances:
            mapping = (catalog.get("instanceMappings") or {}).get((instance.get("spec") or {}).get("type")) or {}
            if ((instance.get("spec") or {}).get("enabled", True) is False):
                continue
            for module in mapping.get("requiredModules") or []:
                ensure_module_activation(module, auto=True)
        for model in models:
            spec = model.get("spec") or {}
            if spec.get("enabled", True) is False:
                continue
            if (model.get("metadata") or {}).get("deletionTimestamp"):
                continue
            for module in model_required_modules(spec.get("type") or "local"):
                ensure_module_activation(module, auto=True)
        for activation in list(activations.values()):
            if ((activation.get("spec") or {}).get("enabled", True) is False):
                continue
            module = canonical_module((activation.get("spec") or {}).get("module") or (activation.get("metadata") or {}).get("name"))
            module_spec = (catalog.get("modules") or {}).get(module) or {}
            for dependency in module_spec.get("requires") or []:
                dep = canonical_module(dependency)
                if dep not in ("basis", "dashboard"):
                    ensure_module_activation(dep, auto=True)

        activations = module_activations()
        cleanup_stale_module_kustomizations(catalog, activations, source)
        module_statuses = {}
        for module, activation in sorted(activations.items()):
            phase, status = reconcile_module(module, activation, catalog, source)
            module_statuses[module] = status

        instance_statuses = {}
        for instance in instances:
            instance_type = (instance.get("spec") or {}).get("type") or "unknown"
            name = (instance.get("metadata") or {}).get("name")
            phase, target = reconcile_instance(instance, catalog)
            instance_statuses.setdefault(instance_type, {})[name] = {
                "phase": phase,
                "namespace": target.get("namespace", ""),
                "kind": target.get("kind", ""),
                "name": target.get("name", ""),
                "url": ((instance.get("status") or {}).get("url") or ""),
                "message": ((instance.get("status") or {}).get("message") or ""),
            }

        model_statuses = {}
        for model in models:
            name = (model.get("metadata") or {}).get("name")
            phase, status = reconcile_model_activation(model, catalog, presets)
            model_statuses[name] = status

        reconcile_paperclip_sandbox_network_policies(instances)
        patch_appliance_status(module_statuses, instance_statuses, model_statuses)
        print(f"reconciled modules={len(module_statuses)} instances={len(instances)} models={len(models)}", flush=True)


    def main():
        print("magicstick-operator live controller starting", flush=True)
        threading.Thread(target=watch_paperclip_sandbox_namespaces, daemon=True).start()
        while True:
            try:
                reconcile_once()
            except Exception as error:
                print("reconcile failed: " + repr(error), flush=True)
                traceback.print_exc()
            time.sleep(REQUEUE_SECONDS)


    if __name__ == "__main__":
        main()
