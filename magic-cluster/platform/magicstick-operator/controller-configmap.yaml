    def build_kubeopencode(instance):
        metadata = instance.get("metadata") or {}
        spec = instance.get("spec") or {}
        params = spec.get("parameters") or {}
        namespace = spec.get("targetNamespace") or "ai"
        server = params.get("server") or {}
        server_ingress = server.get("ingress") or {}
        host = server_ingress.get("host") or ((params.get("ingress") or {}).get("host")) or params.get("host") or "kubeopencode.example.local"
        if host == "kubeopencode.example.local":
            host = app_instance_local_host(instance, "kubeopencode")
        local_host = app_instance_local_host(instance, "kubeopencode")
        local_name = local_mdns_name(local_host)
        templates = params.get("agentTemplates") or []
        template_name = params.get("template") or (templates[0].get("name") if templates else metadata.get("name"))
        agent_name = params.get("agent") or params.get("agentName") or params.get("name") or metadata.get("name")
        if str(agent_name or "").startswith("kubeopencode-"):
            agent_name = str(agent_name)[len("kubeopencode-"):]
        agent_name = agent_name or metadata.get("name")
        model, chat_models = select_catalog_chat_model(namespace, params.get("model") or "")
        template_models = {
            model_item.get("id") or model_item.get("name"): {"name": model_item.get("name") or model_item.get("id")}
            for model_item in chat_models
        }
        if not template_models:
            template_models = {model: {"name": model if model != "CHANGEME_MODEL" else "Example model"}}
        template = {
            "apiVersion": "kubeopencode.io/v1alpha1",
            "kind": "AgentTemplate",
            "metadata": {"name": template_name, "namespace": namespace},
            "spec": {
                "serviceAccountName": "default",
                "workspaceDir": "/workspace",
                "config": {
                    "provider": {
                        "litellm": {
                            "npm": "@ai-sdk/openai-compatible",
                            "name": "LiteLLM",
                            "options": {
                                "baseURL": "http://litellm.ai.svc.cluster.local:4000/v1",
                                "apiKey": "{env:LITELLM_MASTER_KEY}",
                            },
                            "models": template_models,
                        }
                    },
                    "model": "litellm/" + model,
                    "small_model": "litellm/" + model,
                    "autoupdate": False,
                },
                "credentials": [{
                    "name": "litellm-api-key",
                    "secretRef": {"name": "litellm-masterkey-secret", "key": "LITELLM_MASTER_KEY"},
                    "env": "LITELLM_MASTER_KEY",
                }],
            },
        }
        agent = {
            "apiVersion": "kubeopencode.io/v1alpha1",
            "kind": "Agent",
            "metadata": {
                "name": agent_name,
                "namespace": namespace,
                "labels": {"appliance.magicstick.dev/appinstance": metadata.get("name", "")},
            },
            "spec": {
                "templateRef": {"name": template_name},
                "profile": params.get("profile") or "AI Appliance coding agent managed by Magic Stick.",
                "maxConcurrentTasks": positive_int(params.get("maxConcurrentTasks")) or 1,
                "suspend": False,
            },
        }
        ingress = managed_ingress(
            metadata.get("name") or derived_resource_name(agent_name or "kubeopencode", "ingress"),
            namespace,
            [host, local_host],
            agent_name,
            "http",
            dashboard_ingress_annotations(
                "KubeOpenCode",
                "Browser-accessible OpenCode agent managed by the KubeOpenCode operator.",
                "KO",
                "AI",
                "50",
                local_name,
                {
                    "nginx.ingress.kubernetes.io/proxy-read-timeout": "3600",
                    "nginx.ingress.kubernetes.io/proxy-send-timeout": "3600",
                    "nginx.ingress.kubernetes.io/proxy-http-version": "1.1",
                },
            ),
            {"app": "kubeopencode", "appliance.magicstick.dev/appinstance": metadata.get("name", "")},
        )
        return [template, ingress, agent], "http://" + host + "/"


    def build_odysseus(instance):
        metadata = instance.get("metadata") or {}
        spec = instance.get("spec") or {}
        params = spec.get("parameters") or {}
        name = metadata.get("name")
        namespace = spec.get("targetNamespace") or "ai"
        host = ((params.get("ingress") or {}).get("host") or params.get("host") or "odysseus.example.local")
        local_host = app_instance_local_host(instance, "odysseus")
        local_name = local_mdns_name(local_host)
        ingress_host = local_host if host == "odysseus.example.local" else host
        image = params.get("image") or {}
        image_repository = image.get("repository") or params.get("imageRepository") or "ghcr.io/pewdiepie-archdaemon/odysseus"
        image_tag = image.get("tag") or params.get("imageTag") or "latest"
        app_storage = ((params.get("storage") or {}).get("size") or params.get("storageSize") or "20Gi")
        chroma_params = params.get("chroma") or {}
        chroma_storage_params = chroma_params.get("storage") or {}
        chroma_storage = chroma_storage_params.get("size") or chroma_params.get("storageSize") or params.get("chromaStorage") or "5Gi"
        searxng_params = params.get("searxng") or {}
        searxng_storage_params = searxng_params.get("storage") or {}
        searxng_storage = searxng_storage_params.get("size") or searxng_params.get("storageSize") or params.get("searxngStorage") or "1Gi"
        ntfy_params = params.get("ntfy") or {}
        ntfy_storage_params = ntfy_params.get("storage") or {}
        ntfy_storage = ntfy_storage_params.get("size") or ntfy_params.get("storageSize") or params.get("ntfyStorage") or "1Gi"
        model, _ = select_catalog_chat_model(namespace, params.get("model"))
        base_name = name or "odysseus"
        data_pvc = derived_resource_name(base_name, "data")
        chroma_name = derived_resource_name(base_name, "chroma")
        chroma_pvc = derived_resource_name(base_name, "chroma-data")
        searxng_name = derived_resource_name(base_name, "searxng")
        searxng_pvc = derived_resource_name(base_name, "searxng-data")
        searxng_config = derived_resource_name(base_name, "searxng-config")
        ntfy_name = derived_resource_name(base_name, "ntfy")
        ntfy_pvc = derived_resource_name(base_name, "ntfy-data")
        litellm_alias = derived_resource_name(base_name, "litellm")
        litellm_base_url = "http://litellm.ai.svc.cluster.local:4000"
        litellm_api_base = litellm_base_url + "/v1"
        common_labels = {
            "app": "odysseus",
            "app.kubernetes.io/name": "odysseus",
            "app.kubernetes.io/instance": base_name,
            "appliance.magicstick.dev/appinstance": metadata.get("name", ""),
        }

        def labels(component):
            result = dict(common_labels)
            result["app.kubernetes.io/component"] = component
            return result

        def pvc(pvc_name, size):
            return {
                "apiVersion": "v1",
                "kind": "PersistentVolumeClaim",
                "metadata": {"name": pvc_name, "namespace": namespace, "labels": labels("storage")},
                "spec": {
                    "accessModes": ["ReadWriteOnce"],
                    "resources": {"requests": {"storage": size}},
                },
            }

        def service(service_name, selector, port, target_port=None):
            return {
                "apiVersion": "v1",
                "kind": "Service",
                "metadata": {"name": service_name, "namespace": namespace, "labels": selector},
                "spec": {
                    "type": "ClusterIP",
                    "selector": selector,
                    "ports": [{
                        "name": "http",
                        "port": port,
                        "targetPort": target_port or port,
                        "protocol": "TCP",
                    }],
                },
            }

        def deployment(deployment_name, component, image_ref, port, env=None, volumes=None, volume_mounts=None, args=None, command=None, resources=None, annotations=None, init_containers=None):
            return {
                "apiVersion": "apps/v1",
                "kind": "Deployment",
                "metadata": {"name": deployment_name, "namespace": namespace, "labels": labels(component)},
                "spec": {
                    "replicas": 1,
                    "selector": {"matchLabels": labels(component)},
                    "strategy": {"type": "Recreate"},
                    "template": {
                        "metadata": {"labels": labels(component), "annotations": annotations or {}},
                        "spec": {
                            **({"initContainers": init_containers} if init_containers else {}),
                            "containers": [{
                                "name": component,
                                "image": image_ref,
                                "imagePullPolicy": "IfNotPresent",
                                **({"command": command} if command else {}),
                                **({"args": args} if args else {}),
                                "ports": [{"name": "http", "containerPort": port, "protocol": "TCP"}],
                                "env": env or [],
                                "resources": resources or {
                                    "requests": {"cpu": "100m", "memory": "256Mi"},
                                    "limits": {"cpu": "1", "memory": "1Gi"},
                                },
                                "volumeMounts": volume_mounts or [],
                            }],
                            "volumes": volumes or [],
                        },
                    },
                },
            }

        searxng_secret = hashlib.sha256(((metadata.get("uid") or base_name) + "|searxng").encode("utf-8")).hexdigest()
        searxng_settings = textwrap.dedent(f"""\
            use_default_settings: true

            server:
              secret_key: "{searxng_secret}"

            search:
              formats:
                - html
                - json
        """)
        allowed_origins = params.get("allowedOrigins") or [
            "http://" + ingress_host,
            "http://" + local_host,
            "http://localhost",
            "http://127.0.0.1",
        ]
        admin = params.get("admin") or {}
        admin_user = admin.get("user") or params.get("adminUser") or "admin"
        admin_password_ref = admin.get("passwordSecretRef") or {}
        admin_secret_name = (
            admin_password_ref.get("name")
            or admin.get("passwordSecretName")
            or params.get("adminPasswordSecretName")
            or derived_resource_name(base_name, "admin")
        )
        admin_secret_key = (
            admin_password_ref.get("key")
            or admin.get("passwordSecretKey")
            or params.get("adminPasswordSecretKey")
            or "password"
        )

        odysseus_env = [
            {"name": "LLM_HOST", "value": litellm_alias},
            {"name": "LLM_HOSTS", "value": litellm_alias},
            {"name": "OPENAI_API_KEY", "valueFrom": {"secretKeyRef": {"name": "litellm-masterkey-secret", "key": "LITELLM_MASTER_KEY"}}},
            {"name": "OPENAI_BASE_URL", "value": litellm_api_base},
            {"name": "OPENAI_API_BASE", "value": litellm_api_base},
            {"name": "LITELLM_BASE_URL", "value": litellm_base_url},
            {"name": "LITELLM_API_BASE", "value": litellm_api_base},
            {"name": "AI_MODEL_CATALOG_PATH", "value": "/catalog/catalog.json"},
            {"name": "AI_MODEL_CATALOG_CHAT_PATH", "value": "/catalog/chat-models.json"},
            {"name": "AI_MODEL_CATALOG_DEFAULTS_PATH", "value": "/catalog/defaults.env"},
            {"name": "AI_APPLIANCE_MODEL_CATALOG_HASH", "valueFrom": {"configMapKeyRef": {"name": "ai-model-catalog", "key": "AI_APPLIANCE_MODEL_CATALOG_HASH"}}},
            {"name": "RESEARCH_LLM_ENDPOINT", "value": f"http://{litellm_alias}:8000/v1/chat/completions"},
            {"name": "ODYSSEUS_DEFAULT_MODEL", "value": model},
            {"name": "SEARXNG_INSTANCE", "value": f"http://{searxng_name}:8080"},
            {"name": "CHROMADB_HOST", "value": chroma_name},
            {"name": "CHROMADB_PORT", "value": "8000"},
            {"name": "DATABASE_URL", "value": "sqlite:///./data/app.db"},
            {"name": "AUTH_ENABLED", "value": str(params.get("authEnabled", True)).lower()},
            {"name": "LOCALHOST_BYPASS", "value": "false"},
            {"name": "ODYSSEUS_ADMIN_USER", "value": admin_user},
            {"name": "ODYSSEUS_ADMIN_PASSWORD", "valueFrom": {"secretKeyRef": {"name": admin_secret_name, "key": admin_secret_key}}},
            {"name": "ALLOWED_ORIGINS", "value": ",".join(allowed_origins)},
            {"name": "SECURE_COOKIES", "value": str(params.get("secureCookies", False)).lower()},
            {"name": "NTFY_BASE_URL", "value": f"http://{ntfy_name}:80"},
            {"name": "PUID", "value": "1000"},
            {"name": "PGID", "value": "1000"},
        ]

        admin_secret = None
        if not admin_password_ref.get("name"):
            admin_secret = {
                "apiVersion": "v1",
                "kind": "Secret",
                "metadata": {
                    "name": admin_secret_name,
                    "namespace": namespace,
                    "labels": labels("credentials"),
                    "annotations": {
                        "secret-generator.v1.mittwald.de/autogenerate": admin_secret_key,
                        "secret-generator.v1.mittwald.de/encoding": "hex",
                    },
                },
                "type": "Opaque",
                "data": {},
            }
        admin_bootstrap_script = textwrap.dedent("""\
            import hashlib
            import json
            import os
            import pathlib
            import tempfile

            import bcrypt

            data_dir = pathlib.Path("/app/data")
            auth_path = data_dir / "auth.json"
            marker_path = data_dir / ".magicstick-admin-credentials"
            username = os.environ.get("ODYSSEUS_ADMIN_USER", "admin").strip().lower() or "admin"
            password = os.environ.get("ODYSSEUS_ADMIN_PASSWORD", "").strip()
            if not password:
                raise SystemExit("ODYSSEUS_ADMIN_PASSWORD is empty")

            data_dir.mkdir(parents=True, exist_ok=True)
            fingerprint = hashlib.sha256((username + "\\0" + password).encode("utf-8")).hexdigest()
            if auth_path.exists() and marker_path.exists() and marker_path.read_text(encoding="utf-8").strip() == fingerprint:
                print("Magicstick Odysseus admin credentials already synchronized.")
                raise SystemExit(0)

            auth_data = {"users": {}}
            if auth_path.exists():
                with auth_path.open("r", encoding="utf-8") as handle:
                    auth_data = json.load(handle)
            users = auth_data.setdefault("users", {})
            entry = users.get(username) or {}
            entry["password_hash"] = bcrypt.hashpw(password.encode("utf-8"), bcrypt.gensalt()).decode("utf-8")
            entry["is_admin"] = True
            users[username] = entry

            with tempfile.NamedTemporaryFile("w", encoding="utf-8", dir=str(data_dir), delete=False) as handle:
                json.dump(auth_data, handle, indent=2)
                handle.write("\\n")
                tmp_name = handle.name
            os.replace(tmp_name, auth_path)
            marker_path.write_text(fingerprint + "\\n", encoding="utf-8")
            print("Magicstick Odysseus admin credentials synchronized.")
        """)
        admin_bootstrap_init = {
            "name": "admin-credentials",
            "image": image_repository + ":" + image_tag,
            "imagePullPolicy": "IfNotPresent",
            "command": ["python", "-c"],
            "args": [admin_bootstrap_script],
            "env": [
                {"name": "ODYSSEUS_ADMIN_USER", "value": admin_user},
                {"name": "ODYSSEUS_ADMIN_PASSWORD", "valueFrom": {"secretKeyRef": {"name": admin_secret_name, "key": admin_secret_key}}},
            ],
            "volumeMounts": [{"name": "data", "mountPath": "/app/data", "subPath": "data"}],
            "resources": {
                "requests": {"cpu": "25m", "memory": "64Mi"},
                "limits": {"cpu": "250m", "memory": "256Mi"},
            },
        }
        runtime_patch_script = textwrap.dedent("""\
            import pathlib

            source_path = pathlib.Path("/app/routes/chat_routes.py")
            target_path = pathlib.Path("/patches/chat_routes.py")
            source = source_path.read_text(encoding="utf-8")
            needle = "        _tool_intent = _classify_tool_intent(message) if isinstance(message, str) else None\\n"
            insert = needle + "        _explicit_web_intent = bool(_tool_intent and _tool_intent.category == \\"web\\")\\n"
            if "_explicit_web_intent =" not in source:
                if needle not in source:
                    raise SystemExit("Could not patch Odysseus chat_routes.py: anchor not found")
                source = source.replace(needle, insert, 1)
            target_path.write_text(source, encoding="utf-8")
            print("Patched Odysseus chat_routes.py for missing _explicit_web_intent.")
        """)
        runtime_patch_init = {
            "name": "odysseus-runtime-patches",
            "image": image_repository + ":" + image_tag,
            "imagePullPolicy": "IfNotPresent",
            "command": ["python", "-c"],
            "args": [runtime_patch_script],
            "volumeMounts": [{"name": "runtime-patches", "mountPath": "/patches"}],
            "resources": {
                "requests": {"cpu": "25m", "memory": "64Mi"},
                "limits": {"cpu": "250m", "memory": "256Mi"},
            },
        }
        model_catalog_bootstrap_script = textwrap.dedent("""\
            import json
            import os
            import pathlib
            import sys
            import time

            os.chdir("/app")
            if "/app" not in sys.path:
                sys.path.insert(0, "/app")

            catalog_dir = pathlib.Path("/catalog")
            defaults_path = catalog_dir / "defaults.env"
            for attempt in range(1, 121):
                try:
                    defaults = defaults_path.read_text(encoding="utf-8")
                    if "AI_APPLIANCE_MODEL_CATALOG_READY=true" in defaults.splitlines():
                        break
                except FileNotFoundError:
                    pass
                print(f"Waiting for ai-model-catalog ({attempt}/120)", flush=True)
                time.sleep(5)
            else:
                raise SystemExit("ai-model-catalog did not become ready")

            chat_catalog_path = pathlib.Path(os.environ.get("AI_MODEL_CATALOG_CHAT_PATH", "/catalog/chat-models.json"))
            chat_catalog = json.loads(chat_catalog_path.read_text(encoding="utf-8"))
            catalog_models = chat_catalog.get("models") or []
            model_ids = []
            for item in catalog_models:
                model_id = item.get("id") if isinstance(item, dict) else str(item or "")
                model_id = model_id.strip()
                if model_id and model_id not in model_ids:
                    model_ids.append(model_id)
            if not model_ids:
                raise SystemExit("ai-model-catalog has no chat models for Odysseus")

            preferred_model = os.environ.get("ODYSSEUS_DEFAULT_MODEL", "").strip()
            catalog_default = str(chat_catalog.get("defaultModel") or "").strip()
            if preferred_model in model_ids:
                selected_model = preferred_model
            elif catalog_default in model_ids:
                selected_model = catalog_default
            else:
                selected_model = model_ids[0]

            api_key = os.environ.get("OPENAI_API_KEY", "").strip()
            if not api_key:
                raise SystemExit("OPENAI_API_KEY is empty")

            endpoint_id = "magicstick-litellm"
            endpoint_name = "Magic Stick LiteLLM"
            litellm_api_base = os.environ.get("LITELLM_API_BASE", "http://litellm.ai.svc.cluster.local:4000/v1").rstrip("/")

            from core.database import ModelEndpoint, SessionLocal, init_db
            from src.settings import load_settings, save_settings

            init_db()
            db = SessionLocal()
            try:
                endpoint = db.query(ModelEndpoint).filter(ModelEndpoint.id == endpoint_id).first()
                if endpoint is None:
                    endpoint = ModelEndpoint(id=endpoint_id, name=endpoint_name, base_url=litellm_api_base)
                    db.add(endpoint)
                endpoint.name = endpoint_name
                endpoint.base_url = litellm_api_base
                endpoint.api_key = api_key
                endpoint.is_enabled = True
                endpoint.model_type = "llm"
                endpoint.endpoint_kind = "proxy"
                endpoint.model_refresh_mode = "manual"
                endpoint.cached_models = json.dumps(model_ids)
                endpoint.pinned_models = json.dumps(model_ids)
                endpoint.supports_tools = True
                endpoint.owner = None
                db.commit()
                enabled_ids = {
                    row.id
                    for row in db.query(ModelEndpoint).filter(ModelEndpoint.is_enabled == True).all()
                }
            finally:
                db.close()

            settings = load_settings()

            def needs_assignment(endpoint_key, model_key):
                current_endpoint = str(settings.get(endpoint_key) or "").strip()
                current_model = str(settings.get(model_key) or "").strip()
                if not current_endpoint or current_endpoint not in enabled_ids:
                    return True
                if current_endpoint == endpoint_id and current_model not in model_ids:
                    return True
                return False

            for endpoint_key, model_key in (
                ("default_endpoint_id", "default_model"),
                ("utility_endpoint_id", "utility_model"),
                ("research_endpoint_id", "research_model"),
                ("task_endpoint_id", "task_model"),
            ):
                if needs_assignment(endpoint_key, model_key):
                    settings[endpoint_key] = endpoint_id
                    settings[model_key] = selected_model

            save_settings(settings)
            print(
                "Configured Odysseus from ai-model-catalog with "
                + str(len(model_ids))
                + " chat models; default="
                + selected_model,
                flush=True,
            )
        """)
        model_catalog_bootstrap_init = {
            "name": "litellm-model-catalog",
            "image": image_repository + ":" + image_tag,
            "imagePullPolicy": "IfNotPresent",
            "command": ["python", "-c"],
            "args": [model_catalog_bootstrap_script],
            "env": [
                {"name": "DATABASE_URL", "value": "sqlite:///./data/app.db"},
                {"name": "ODYSSEUS_DEFAULT_MODEL", "value": model},
                {"name": "LITELLM_API_BASE", "value": litellm_api_base},
                {"name": "AI_MODEL_CATALOG_CHAT_PATH", "value": "/catalog/chat-models.json"},
                {"name": "OPENAI_API_KEY", "valueFrom": {"secretKeyRef": {"name": "litellm-masterkey-secret", "key": "LITELLM_MASTER_KEY"}}},
            ],
            "volumeMounts": [
                {"name": "data", "mountPath": "/app/data", "subPath": "data"},
                {"name": "ai-model-catalog", "mountPath": "/catalog", "readOnly": True},
            ],
            "resources": {
                "requests": {"cpu": "50m", "memory": "128Mi"},
                "limits": {"cpu": "500m", "memory": "512Mi"},
            },
        }

        resources = [
            *([admin_secret] if admin_secret else []),
            pvc(data_pvc, app_storage),
            pvc(chroma_pvc, chroma_storage),
            pvc(searxng_pvc, searxng_storage),
            pvc(ntfy_pvc, ntfy_storage),
            {
                "apiVersion": "v1",
                "kind": "ConfigMap",
                "metadata": {"name": searxng_config, "namespace": namespace, "labels": labels("searxng")},
                "data": {"settings.yml": searxng_settings},
            },
            service(base_name, labels("app"), 7000),
            service(chroma_name, labels("chroma"), 8000),
            service(searxng_name, labels("searxng"), 8080),
            service(ntfy_name, labels("ntfy"), 80),
            {
                "apiVersion": "v1",
                "kind": "Service",
                "metadata": {"name": litellm_alias, "namespace": namespace, "labels": labels("litellm")},
                "spec": {
                    "type": "ClusterIP",
                    "selector": {"app": "litellm"},
                    "ports": [{"name": "http", "port": 8000, "targetPort": 4000, "protocol": "TCP"}],
                },
            },
            deployment(
                chroma_name,
                "chroma",
                "docker.io/chromadb/chroma:latest",
                8000,
                env=[{"name": "ANONYMIZED_TELEMETRY", "value": "FALSE"}],
                volumes=[{"name": "data", "persistentVolumeClaim": {"claimName": chroma_pvc}}],
                volume_mounts=[{"name": "data", "mountPath": "/chroma/chroma"}],
                resources={"requests": {"cpu": "100m", "memory": "512Mi"}, "limits": {"cpu": "1", "memory": "1Gi"}},
            ),
            deployment(
                searxng_name,
                "searxng",
                "docker.io/searxng/searxng:2026.5.31-7159b8aed",
                8080,
                env=[{"name": "SEARXNG_BASE_URL", "value": f"http://{searxng_name}:8080/"}],
                volumes=[
                    {"name": "settings", "configMap": {"name": searxng_config}},
                    {"name": "cache", "persistentVolumeClaim": {"claimName": searxng_pvc}},
                ],
                volume_mounts=[
                    {"name": "settings", "mountPath": "/etc/searxng/settings.yml", "subPath": "settings.yml", "readOnly": True},
                    {"name": "cache", "mountPath": "/var/cache/searxng"},
                ],
                resources={"requests": {"cpu": "50m", "memory": "256Mi"}, "limits": {"cpu": "500m", "memory": "512Mi"}},
            ),
            deployment(
                ntfy_name,
