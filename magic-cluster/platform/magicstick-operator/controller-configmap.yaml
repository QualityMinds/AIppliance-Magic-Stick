                80,
                args=["serve"],
                env=[{"name": "NTFY_BASE_URL", "value": f"http://{ntfy_name}:80"}],
                volumes=[{"name": "cache", "persistentVolumeClaim": {"claimName": ntfy_pvc}}],
                volume_mounts=[{"name": "cache", "mountPath": "/var/cache/ntfy"}],
                resources={"requests": {"cpu": "25m", "memory": "64Mi"}, "limits": {"cpu": "250m", "memory": "256Mi"}},
            ),
            managed_ingress(
                base_name,
