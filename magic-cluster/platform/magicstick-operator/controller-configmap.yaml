            const fs = require("fs");
            fs.writeFileSync("/tmp/signup-payload.json", JSON.stringify({
              name: process.env.ADMIN_NAME,
              email: process.env.ADMIN_EMAIL,
              password: process.env.ADMIN_PASSWORD,
            }));
            fs.writeFileSync("/tmp/signin-payload.json", JSON.stringify({
              email: process.env.ADMIN_EMAIL,
              password: process.env.ADMIN_PASSWORD,
            }));
            NODE

            echo "Creating or signing in admin account..."
            signup_status="$(curl -sS -o /tmp/signup.json -w '%{http_code}' \
              -c "$COOKIE_JAR" -b "$COOKIE_JAR" \
              -H "Content-Type: application/json" \
              -H "Origin: $PUBLIC_URL" \
              -X POST "$SVC_URL/api/auth/sign-up/email" \
              --data-binary @/tmp/signup-payload.json)" || true

            if echo "$signup_status" | grep -q '^2'; then
              echo "Admin account created."
            else
              echo "Sign-up returned HTTP $signup_status, trying sign-in..."
              signin_status="$(curl -sS -o /tmp/signin.json -w '%{http_code}' \
                -c "$COOKIE_JAR" -b "$COOKIE_JAR" \
                -H "Content-Type: application/json" \
