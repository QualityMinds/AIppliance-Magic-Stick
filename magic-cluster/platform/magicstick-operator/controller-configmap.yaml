              port: 3100,
            };
            const publicHost = new URL(publicUrl).hostname.toLowerCase();
            const allowed = new Set([...(config.server.allowedHostnames || []), publicHost, "localhost", "127.0.0.1"]);
            config.server.allowedHostnames = Array.from(allowed);
            config.auth = {
              ...(config.auth || {}),
              baseUrlMode: "explicit",
              publicBaseUrl: publicUrl,
            };
            fs.writeFileSync(configPath, JSON.stringify(config, null, 2) + String.fromCharCode(10), { mode: 0o600 });
            NODE
        """).replace("__PUBLIC_URL__", public_url)
        job_suffix = hashlib.sha256(((name or "paperclip") + "|auth-v2|" + public_url).encode("utf-8")).hexdigest()[:8]
        job_base = (name or "paperclip")[:42].rstrip("-") or "paperclip"
        auth_config_job = {
            "apiVersion": "batch/v1",
            "kind": "Job",
            "metadata": {
                "name": job_base + "-auth-" + job_suffix,
                "namespace": namespace,
