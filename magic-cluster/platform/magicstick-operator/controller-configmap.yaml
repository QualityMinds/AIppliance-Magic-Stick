        managed_database = database.get("managed") or {}
        postgres_storage = managed_database.get("storageSize") or params.get("postgresStorage") or params.get("postgresStorageSize") or "10Gi"
        auth_secret_name = params.get("authSecretName") or "paperclip-auth"
        auth_config_patch = textwrap.dedent("""\
            set -eu
            CONFIG="/paperclip/instances/default/config.json"
            PUBLIC_URL="__PUBLIC_URL__"
            for attempt in $(seq 1 120); do
              if [ -f "$CONFIG" ]; then
                break
              fi
              echo "Waiting for Paperclip config ($attempt/120)"
