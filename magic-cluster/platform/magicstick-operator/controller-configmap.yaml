                    {"name": "data", "mountPath": "/app/data", "subPath": "data"},
                    {"name": "data", "mountPath": "/app/logs", "subPath": "logs"},
                    {"name": "data", "mountPath": "/app/.ssh", "subPath": "ssh"},
                    {"name": "data", "mountPath": "/app/.cache/huggingface", "subPath": "huggingface"},
                    {"name": "data", "mountPath": "/app/.local", "subPath": "local"},
