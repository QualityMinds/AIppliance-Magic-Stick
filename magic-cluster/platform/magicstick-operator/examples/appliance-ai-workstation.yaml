apiVersion: appliance.magicstick.dev/v1alpha1
kind: Appliance
metadata:
  name: local
  namespace: ai-system
spec:
  profile: ai-workstation
  source:
    kind: GitRepository
    name: magicstick-public
    namespace: flux-system
  modules:
    basis:
      enabled: true
    dashboard:
      enabled: true
    litellm:
      enabled: true
    modelCatalog:
      enabled: true
    anythingLlm:
      enabled: true
    kubeopencode:
      enabled: true
    openclawOperator:
      enabled: false
    hermesOperator:
      enabled: false
    paperclipOperator:
      enabled: false
    observability:
      enabled: false
    gpu:
      enabled: false
  instances:
    openclaw: []
    hermes: []
    paperclip: []
    kubeopencode:
      - name: default
        enabled: true
        namespace: ai
        model: CHANGEME_MODEL
        server:
          enabled: true
          ingress:
            enabled: true
            host: kubeopencode.example.local
        agentTemplates:
          - name: default-coder
            description: Default coding agent template
