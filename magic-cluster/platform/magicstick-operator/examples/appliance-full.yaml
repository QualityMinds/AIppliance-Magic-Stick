apiVersion: appliance.magicstick.dev/v1alpha1
kind: Appliance
metadata:
  name: local
  namespace: ai-system
spec:
  profile: full
  source:
    kind: GitRepository
    name: magicstick-public
    namespace: flux-system
  modules:
    basis:
      enabled: true
    dashboard:
      enabled: true
    gpu:
      enabled: true
    kubeai:
      enabled: true
    litellm:
      enabled: true
    model-catalog:
      enabled: true
---
apiVersion: appliance.magicstick.dev/v1alpha1
kind: ModuleActivation
metadata:
  name: anything-llm
  namespace: ai-system
spec:
  module: anything-llm
  enabled: true
---
apiVersion: appliance.magicstick.dev/v1alpha1
kind: ModuleActivation
metadata:
  name: observability
  namespace: ai-system
spec:
  module: observability
  enabled: true
---
apiVersion: appliance.magicstick.dev/v1alpha1
kind: AppInstance
metadata:
  name: openclaw-default
  namespace: ai-system
spec:
  type: openclaw
  enabled: true
  targetNamespace: ai
  parameters:
    name: default
    model: CHANGEME_MODEL
    storage:
      size: 20Gi
    ingress:
      enabled: true
      host: openclaw.example.local
---
apiVersion: appliance.magicstick.dev/v1alpha1
kind: AppInstance
metadata:
  name: hermes-team-agent
  namespace: ai-system
spec:
  type: hermes
  enabled: true
  targetNamespace: ai
  parameters:
    name: team-agent
    model: CHANGEME_MODEL
    storage:
      size: 10Gi
    ingress:
      enabled: true
      host: hermes.example.local
---
apiVersion: appliance.magicstick.dev/v1alpha1
kind: AppInstance
metadata:
  name: paperclip-default
  namespace: ai-system
spec:
  type: paperclip
  enabled: true
  targetNamespace: ai
  parameters:
    name: default
    storage:
      size: 10Gi
    ingress:
      enabled: true
      host: paperclip.example.local
---
apiVersion: appliance.magicstick.dev/v1alpha1
kind: AppInstance
metadata:
  name: kubeopencode-default
  namespace: ai-system
spec:
  type: kubeopencode
  enabled: true
  targetNamespace: ai
  parameters:
    name: default
    model: CHANGEME_MODEL
    server:
      enabled: true
      ingress:
        enabled: true
        host: kubeopencode.example.local
    agentTemplates:
      - name: default-coder
        description: Default coding agent template
