apiVersion: v1
kind: ConfigMap
metadata:
  name: magicstick-module-catalog
  namespace: ai-system
  labels:
    app.kubernetes.io/name: magicstick-operator
    app.kubernetes.io/component: module-catalog
data:
  modules.json: |
    {
      "groups": {
        "core": {"displayName": "Core", "order": 10},
        "runtime": {"displayName": "AI Runtime", "order": 20},
        "apps": {"displayName": "Apps", "order": 30},
        "operators": {"displayName": "Operators", "order": 40},
        "other": {"displayName": "Other", "order": 1000}
      },
      "modules": {
        "basis": {
          "displayName": "Basis",
          "group": "core",
          "activationMode": "static",
          "order": 10,
          "path": "magic-cluster/platform/basis",
          "kustomizationName": "platform-basis",
          "requires": [],
          "requiredCrds": [],
          "default": true,
          "uninstallPolicy": "keep-data"
        },
        "dashboard": {
          "displayName": "Dashboard",
          "group": "core",
          "activationMode": "static",
          "order": 20,
          "path": "magic-cluster/apps/dashboard",
          "kustomizationName": "app-dashboard",
          "requires": ["basis"],
          "requiredCrds": [],
          "default": true,
          "uninstallPolicy": "remove",
          "postBuildSubstitution": true
        },
        "litellm": {
          "displayName": "LiteLLM",
          "group": "runtime",
          "activationMode": "moduleactivation",
          "order": 50,
          "path": "magic-cluster/apps/ai/litellm/base",
          "kustomizationName": "app-litellm",
          "requires": ["basis"],
          "requiredCrds": [],
          "default": true,
          "uninstallPolicy": "keep-data",
          "postBuildSubstitution": true,
          "parameters": [
            {"name": "postgresStorage", "label": "Postgres Storage", "placeholder": "1Gi", "substitution": "AI_APPLIANCE_LITELLM_POSTGRES_STORAGE"}
          ]
        },
        "model-catalog": {
          "displayName": "Model Catalog",
          "group": "runtime",
          "aliases": ["modelCatalog"],
          "activationMode": "moduleactivation",
          "order": 60,
          "path": "magic-cluster/apps/ai/model-catalog",
          "kustomizationName": "app-model-catalog",
          "requires": ["litellm"],
          "requiredCrds": [],
          "default": true,
          "uninstallPolicy": "keep-data",
          "postBuildSubstitution": true
        },
        "anything-llm": {
          "displayName": "AnythingLLM",
          "group": "apps",
          "aliases": ["anythingllm", "anythingLlm"],
          "activationMode": "moduleactivation",
          "order": 70,
          "path": "magic-cluster/apps/ai/anything-llm/base",
          "kustomizationName": "app-anything-llm",
          "requires": ["litellm", "model-catalog"],
          "requiredCrds": [],
          "default": false,
          "uninstallPolicy": "keep-data",
          "postBuildSubstitution": true,
          "parameters": [
            {"name": "storage", "label": "Storage", "placeholder": "1Gi", "substitution": "AI_APPLIANCE_ANYTHING_LLM_STORAGE"},
            {"name": "qdrantStorage", "label": "Qdrant Storage", "placeholder": "1Gi", "substitution": "AI_APPLIANCE_QDRANT_STORAGE"}
          ]
        },
        "gpu": {
          "displayName": "GPU",
          "group": "runtime",
          "activationMode": "moduleactivation",
          "order": 30,
          "path": "magic-cluster/platform/gpu",
          "kustomizationName": "platform-gpu",
          "requires": ["basis"],
          "requiredCrds": ["clusterpolicies.nvidia.com"],
          "default": true,
          "uninstallPolicy": "keep-data"
        },
        "kubeai": {
          "displayName": "KubeAI",
          "group": "runtime",
          "activationMode": "moduleactivation",
          "order": 40,
          "path": "magic-cluster/platform/ai/kubeai",
          "kustomizationName": "platform-kubeai",
          "requires": ["basis", "gpu"],
          "requiredCrds": ["models.kubeai.org"],
          "default": true,
          "uninstallPolicy": "keep-data"
        },
        "openclaw-operator": {
          "displayName": "OpenClaw Operator",
          "group": "operators",
          "aliases": ["openclawOperator"],
          "activationMode": "moduleactivation",
          "order": 80,
          "path": "magic-cluster/platform/ai/openclaw-operator",
          "kustomizationName": "operator-openclaw",
          "requires": ["basis"],
          "requiredCrds": ["openclawinstances.openclaw.rocks"],
          "default": false,
          "uninstallPolicy": "keep-data"
        },
        "hermes-operator": {
          "displayName": "Hermes Operator",
          "group": "operators",
          "aliases": ["hermesOperator"],
          "activationMode": "moduleactivation",
          "order": 90,
          "path": "magic-cluster/platform/ai/hermes-operator",
          "kustomizationName": "operator-hermes",
          "requires": ["basis"],
          "requiredCrds": ["hermesinstances.hermes.agent"],
          "default": false,
          "uninstallPolicy": "keep-data"
        },
        "paperclip-operator": {
          "displayName": "Paperclip Operator",
          "group": "operators",
          "aliases": ["paperclipOperator"],
          "activationMode": "moduleactivation",
          "order": 100,
          "path": "magic-cluster/platform/ai/paperclip-operator",
          "kustomizationName": "operator-paperclip",
          "requires": ["basis"],
          "requiredCrds": ["instances.paperclip.inc"],
          "default": false,
          "uninstallPolicy": "keep-data"
        },
        "agent-sandbox": {
          "displayName": "Agent Sandbox",
          "group": "operators",
          "activationMode": "moduleactivation",
          "order": 105,
          "path": "magic-cluster/platform/ai/agent-sandbox",
          "kustomizationName": "platform-agent-sandbox",
          "requires": ["basis"],
          "requiredCrds": ["sandboxes.agents.x-k8s.io"],
          "default": false,
          "uninstallPolicy": "keep-data"
        },
        "kubeopencode": {
          "displayName": "KubeOpenCode",
          "group": "apps",
          "activationMode": "moduleactivation",
          "order": 110,
          "path": "magic-cluster/apps/ai/kubeopencode",
          "kustomizationName": "app-kubeopencode",
          "requires": ["litellm", "model-catalog"],
          "requiredCrds": [
            "agenttemplates.kubeopencode.io",
            "agents.kubeopencode.io",
            "tasks.kubeopencode.io",
            "crontasks.kubeopencode.io",
            "registries.kubeopencode.io",
            "kubeopencodeconfigs.kubeopencode.io"
          ],
          "default": false,
          "uninstallPolicy": "keep-data",
          "postBuildSubstitution": true
        },
        "odysseus": {
          "displayName": "Odysseus",
          "group": "apps",
          "activationMode": "moduleactivation",
          "order": 115,
          "path": "magic-cluster/apps/ai/odysseus",
          "kustomizationName": "app-odysseus",
          "requires": ["basis", "litellm", "model-catalog"],
          "requiredCrds": [],
          "default": false,
          "uninstallPolicy": "keep-data"
        }
      }
    }
