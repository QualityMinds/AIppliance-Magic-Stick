apiVersion: apps/v1
kind: Deployment
metadata:
  name: magicstick-operator
  namespace: ai-system
  labels:
    app.kubernetes.io/name: magicstick-operator
    app.kubernetes.io/component: controller
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: magicstick-operator
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: magicstick-operator
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: magicstick-operator
      containers:
        - name: controller
          image: ghcr.io/example/magicstick-operator:CHANGEME
          imagePullPolicy: IfNotPresent
          args:
            - --module-catalog-namespace=ai-system
            - --module-catalog-name=magicstick-module-catalog
          env:
            - name: MAGICSTICK_OPERATOR_MODE
              value: mvp-contract-only
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
