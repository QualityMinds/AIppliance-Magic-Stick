apiVersion: appliance.magicstick.dev/v1alpha1
kind: Appliance
metadata:
  name: local
  namespace: ai-system
  labels:
    app.kubernetes.io/name: magicstick-operator
    appliance.magicstick.dev/profile: ai-workstation
spec:
  profile: ai-workstation
  source:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  modules:
    basis:
      enabled: true
    dashboard:
      enabled: true
    gpu:
      enabled: true
    kubeai:
      enabled: true
    litellm:
      enabled: true
    model-catalog:
      enabled: true
