apiVersion: v1
kind: ConfigMap
metadata:
  name: magicstick-model-presets
  namespace: ai-system
  labels:
    app.kubernetes.io/name: magicstick-operator
    app.kubernetes.io/component: model-presets
data:
  presets.json: |
    {
      "presets": {
        "qwen3635b": {
          "title": "Qwen3.6 35B A3B AWQ",
          "type": "chat",
          "url": "hf://cyankiwi/Qwen3.6-35B-A3B-AWQ-4bit",
          "features": ["TextGeneration"],
          "engine": "VLLM",
          "resourceProfile": "magicstick-nvidia-gpu:1",
          "vram": "15Gi",
          "vramMi": 15360,
          "contextWindow": 8192,
          "args": [
            "--tensor-parallel-size=1",
            "--max-model-len=8192",
            "--max-num-seqs=128",
            "--reasoning-parser=qwen3",
            "--enable-auto-tool-choice",
            "--tool-call-parser=qwen3_coder"
          ]
        },
        "qwen359b": {
          "title": "Qwen3.5 9B AWQ",
          "type": "chat",
          "url": "hf://cyankiwi/Qwen3.5-9B-AWQ-4bit",
          "features": ["TextGeneration"],
          "engine": "VLLM",
          "resourceProfile": "magicstick-nvidia-gpu:1",
          "vram": "16Gi",
          "vramMi": 16384,
          "contextWindow": 8192,
          "args": [
            "--tensor-parallel-size=1",
            "--max-num-seqs=32",
            "--reasoning-parser=qwen3",
            "--enable-auto-tool-choice",
            "--tool-call-parser=qwen3_coder"
          ]
        },
        "qwen352bvlembedding": {
          "title": "Qwen3 VL Embedding 2B AWQ",
          "type": "embedding",
          "url": "hf://LifetimeMistake/Qwen3-VL-Embedding-2B-AWQ-4bit",
          "features": ["TextEmbedding"],
          "engine": "VLLM",
          "resourceProfile": "magicstick-nvidia-gpu:1",
          "vram": "5Gi",
          "vramMi": 5120,
          "contextWindow": 4096,
          "args": [
            "--runner=pooling",
            "--convert=embed",
            "--trust-remote-code",
            "--quantization=compressed-tensors",
            "--limit-mm-per-prompt",
            "{\"image\":1}",
            "--max-model-len=4096"
          ]
        }
      }
    }
