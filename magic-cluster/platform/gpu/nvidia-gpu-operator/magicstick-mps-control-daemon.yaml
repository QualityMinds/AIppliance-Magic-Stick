apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: magicstick-mps-control-daemon
  namespace: gpu-operator
  labels:
    app: magicstick-mps-control-daemon
spec:
  selector:
    matchLabels:
      app: magicstick-mps-control-daemon
  template:
    metadata:
      labels:
        app: magicstick-mps-control-daemon
    spec:
      hostPID: true
      runtimeClassName: nvidia
      priorityClassName: system-node-critical
      nodeSelector:
        nvidia.com/gpu.deploy.device-plugin: "true"
        nvidia.com/gpu.present: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: toolkit-validation
          image: nvcr.io/nvidia/gpu-operator:v26.3.2
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
          args:
            - until [ -f /run/nvidia/validations/toolkit-ready ]; do echo waiting for nvidia container stack to be setup; sleep 5; done
          securityContext:
            privileged: true
            runAsUser: 0
          volumeMounts:
            - name: run-nvidia
              mountPath: /run/nvidia
              mountPropagation: HostToContainer
        - name: mps-control-daemon-mounts
          image: nvcr.io/nvidia/k8s-device-plugin:v0.19.2
          imagePullPolicy: IfNotPresent
          command:
            - mps-control-daemon
            - mount-shm
          securityContext:
            privileged: true
          volumeMounts:
            - name: mps-root
              mountPath: /mps
              mountPropagation: Bidirectional
      containers:
        - name: mps-control-daemon
          image: nvcr.io/nvidia/k8s-device-plugin:v0.19.2
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu
              export CUDA_MPS_PIPE_DIRECTORY=/mps/nvidia.com/gpu/pipe
              export CUDA_MPS_LOG_DIRECTORY=/mps/nvidia.com/gpu/log
              mkdir -p "${CUDA_MPS_PIPE_DIRECTORY}" "${CUDA_MPS_LOG_DIRECTORY}"
              nvidia-cuda-mps-control -d
              echo "MagicStick CUDA MPS control daemon started with pipe directory ${CUDA_MPS_PIPE_DIRECTORY}"
              term() {
                echo quit | nvidia-cuda-mps-control || true
                exit 0
              }
              trap term INT TERM
              while true; do
                sleep 3600 &
                wait $!
              done
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: compute,utility
          securityContext:
            privileged: true
          volumeMounts:
            - name: mps-shm
              mountPath: /dev/shm
            - name: mps-root
              mountPath: /mps
      volumes:
        - name: run-nvidia
          hostPath:
            path: /run/nvidia
            type: Directory
        - name: mps-root
          hostPath:
            path: /run/nvidia/mps
            type: DirectoryOrCreate
        - name: mps-shm
          hostPath:
            path: /run/nvidia/mps/shm
