apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-client-sync-v1
  namespace: identity-system
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: client-migration
spec:
  activeDeadlineSeconds: 300
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/component: client-migration
    spec:
      restartPolicy: OnFailure
      containers:
        - name: sync-client
          image: quay.io/keycloak/keycloak:26.6.3
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              attempt=0
              until /opt/keycloak/bin/kcadm.sh config credentials \
                --server http://keycloak.identity-system.svc.cluster.local:8080 \
                --realm master \
                --user "$KC_BOOTSTRAP_ADMIN_USERNAME" \
                --password "$KC_BOOTSTRAP_ADMIN_PASSWORD" >/dev/null; do
                attempt=$((attempt + 1))
                if [ "$attempt" -ge 36 ]; then
                  echo "Keycloak administration login did not become available" >&2
                  exit 1
                fi
                sleep 5
              done

              client_uuid="$(
                /opt/keycloak/bin/kcadm.sh get clients \
                  --realm magicstick \
                  --query clientId=magicstick-human-gateway-local \
                  --fields id \
                  --format csv \
                  --noquotes | tail -n 1 | tr -d '\r'
              )"
              test -n "$client_uuid"

              /opt/keycloak/bin/kcadm.sh update "clients/$client_uuid" \
                --realm magicstick \
                -s 'redirectUris=["https://auth-pilot.${AI_APPLIANCE_MDNS_DOMAIN:=magicstick.local}/oauth2/callback","https://${AI_APPLIANCE_MDNS_DOMAIN:=magicstick.local}/oauth2/callback","https://${AI_APPLIANCE_MDNS_DOMAIN:=magicstick.local}/oauth2/callback/*","https://${AI_APPLIANCE_DASHBOARD_HOST:=magicstick.example.com}/oauth2/callback","https://${AI_APPLIANCE_DASHBOARD_HOST:=magicstick.example.com}/oauth2/callback/*"]' \
                -s 'webOrigins=["https://auth-pilot.${AI_APPLIANCE_MDNS_DOMAIN:=magicstick.local}","https://${AI_APPLIANCE_MDNS_DOMAIN:=magicstick.local}","https://${AI_APPLIANCE_DASHBOARD_HOST:=magicstick.example.com}"]'
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-bootstrap-admin
                  key: KC_BOOTSTRAP_ADMIN_USERNAME
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-bootstrap-admin
                  key: KC_BOOTSTRAP_ADMIN_PASSWORD
