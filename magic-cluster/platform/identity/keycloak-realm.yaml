apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm
  namespace: identity-system
data:
  magicstick-realm.json: |
    {
      "realm": "magicstick",
      "enabled": true,
      "displayName": "Magic Stick",
      "registrationAllowed": false,
      "resetPasswordAllowed": true,
      "rememberMe": true,
      "loginWithEmailAllowed": true,
      "roles": {
        "realm": [
          {"name": "magicstick-user"},
          {"name": "magicstick-viewer"},
          {"name": "magicstick-operator"},
          {"name": "magicstick-admin"}
        ]
      },
      "clients": [
        {
          "clientId": "magicstick-human-gateway-local",
          "name": "Magic Stick human gateway (local)",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "secret": "$${MAGICSTICK_HUMAN_GATEWAY_CLIENT_SECRET}",
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "serviceAccountsEnabled": false,
          "publicClient": false,
          "redirectUris": [
            "https://auth-pilot.${AI_APPLIANCE_MDNS_DOMAIN:=magicstick.local}/oauth2/callback",
            "https://${AI_APPLIANCE_MDNS_DOMAIN:=magicstick.local}/oauth2/callback",
            "https://${AI_APPLIANCE_MDNS_DOMAIN:=magicstick.local}/oauth2/callback/*",
            "https://${AI_APPLIANCE_DASHBOARD_HOST:=magicstick.example.com}/oauth2/callback",
            "https://${AI_APPLIANCE_DASHBOARD_HOST:=magicstick.example.com}/oauth2/callback/*"
          ],
          "webOrigins": [
            "https://auth-pilot.${AI_APPLIANCE_MDNS_DOMAIN:=magicstick.local}",
            "https://${AI_APPLIANCE_MDNS_DOMAIN:=magicstick.local}",
            "https://${AI_APPLIANCE_DASHBOARD_HOST:=magicstick.example.com}"
          ],
          "protocol": "openid-connect"
        },
        {
          "clientId": "magicstick-setup",
          "name": "Magicstick appliance setup controller",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "secret": "$${MAGICSTICK_SETUP_CLIENT_SECRET}",
          "standardFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "serviceAccountsEnabled": true,
          "publicClient": false,
          "protocol": "openid-connect"
        }
      ],
      "users": [
        {
          "username": "service-account-magicstick-setup",
          "enabled": true,
          "serviceAccountClientId": "magicstick-setup",
          "clientRoles": {
            "realm-management": [
              "manage-clients",
              "view-clients",
              "manage-users",
              "query-users",
              "view-users",
              "view-realm"
            ]
          }
        }
      ]
    }
