apiVersion: v1
kind: ServiceAccount
metadata:
  name: magicstick-setup
  namespace: identity-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: magicstick-setup
rules:
  - apiGroups: ["appliance.magicstick.dev"]
    resources: ["appliancesetups"]
    verbs: ["get", "list"]
  - apiGroups: ["appliance.magicstick.dev"]
    resources: ["appliancesetups/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["magicstick-setup-claim", "magicstick-setup-session", "magicstick-setup-tls"]
    verbs: ["get", "patch", "update", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["ai-appliance-settings"]
    verbs: ["get", "patch", "update"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways", "httproutes"]
    verbs: ["get", "create", "patch", "update", "delete"]
  - apiGroups: ["gateway.envoyproxy.io"]
    resources: ["envoyproxies", "securitypolicies"]
    verbs: ["get", "create", "patch", "update", "delete"]
  - apiGroups: ["cert-manager.io"]
    resources: ["issuers", "certificates"]
    verbs: ["get", "create", "patch", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: magicstick-setup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: magicstick-setup
subjects:
  - kind: ServiceAccount
    name: magicstick-setup
    namespace: identity-system
