apiVersion: v1
kind: Service
metadata:
  name: magicstick-setup
  namespace: identity-system
spec:
  selector:
    app.kubernetes.io/name: magicstick-setup
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: magicstick-setup
  namespace: identity-system
  annotations:
    configmap.reloader.stakater.com/reload: magicstick-setup
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: magicstick-setup
  template:
    metadata:
      labels:
        app.kubernetes.io/name: magicstick-setup
    spec:
      serviceAccountName: magicstick-setup
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      containers:
        - name: setup
          image: python:3.13-alpine
          imagePullPolicy: IfNotPresent
          command: ["python", "/app/server.py"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: SETUP_NAMESPACE
              value: identity-system
            - name: SETTINGS_NAMESPACE
              value: flux-system
            - name: KEYCLOAK_URL
              value: http://keycloak.identity-system.svc.cluster.local:8080
            - name: KEYCLOAK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: magicstick-setup-client
                  key: client-id
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: magicstick-setup-client
                  key: client-secret
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
          readinessProbe:
            httpGet:
              path: /setup/api/status
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /setup/api/status
              port: http
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 48Mi
            limits:
              cpu: 250m
              memory: 192Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: app
              mountPath: /app/server.py
              subPath: server.py
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: app
          configMap:
            name: magicstick-setup
            defaultMode: 0555
        - name: tmp
          emptyDir: {}
