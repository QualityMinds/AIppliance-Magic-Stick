{{- $instance := required "instance is required" .Values.instance -}}
{{- $values := default dict $instance.values -}}
{{- $model := trimPrefix "litellm/" (trimPrefix "openai/" (default "CHANGEME_MODEL" $values.model)) -}}
apiVersion: hermes.agent/v1
kind: HermesInstance
metadata:
  name: {{ $instance.name }}
  namespace: {{ $instance.namespace }}
  labels:
    app.kubernetes.io/name: hermes
    app.kubernetes.io/instance: {{ $instance.name }}
    appliance.magicstick.dev/appinstance: {{ $instance.name }}
spec:
  image:
    repository: {{ dig "image" "repository" "ghcr.io/paperclipinc/hermes-agent" $values | quote }}
    tag: {{ dig "image" "tag" "v2026.5.29.2" $values | quote }}
  config:
    raw:
      model: {{ $model | quote }}
      base_url: http://litellm.ai.svc.cluster.local:4000/v1
  env:
    - name: OPENAI_API_KEY
      valueFrom:
        secretKeyRef:
          name: litellm-masterkey-secret
          key: LITELLM_MASTER_KEY
  storage:
    persistence:
      enabled: true
      size: {{ dig "storage" "size" "10Gi" $values | quote }}
  resources:
    requests: {cpu: 250m, memory: 512Mi}
    limits: {cpu: "1", memory: 2Gi}
  security:
    networkPolicy:
      enabled: true
      allowedIngressNamespaces: [ai, envoy-gateway-system]
  networking:
    service:
      type: ClusterIP
    ingress:
      enabled: false
