{{- $instance := required "instance is required" .Values.instance -}}
{{- $values := default dict $instance.values -}}
{{- $ingress := default dict $values.ingress -}}
{{- $admin := default dict $values.admin -}}
{{- $name := $instance.name -}}
{{- $model := trimPrefix "litellm/" (trimPrefix "openai/" (default "CHANGEME_MODEL" $values.model)) -}}
{{- $components := dict "chroma" 8000 "searxng" 8080 "ntfy" 80 -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}-admin
  namespace: {{ $instance.namespace }}
  annotations:
    secret-generator.v1.mittwald.de/autogenerate: password
    secret-generator.v1.mittwald.de/encoding: hex
type: Opaque
stringData:
  username: {{ default "admin" $admin.user | quote }}
---
{{- range $suffix, $size := dict "data" (dig "storage" "size" "20Gi" $values) "chroma-data" (dig "chroma" "storage" "size" "5Gi" $values) "searxng-data" (dig "searxng" "storage" "size" "1Gi" $values) "ntfy-data" (dig "ntfy" "storage" "size" "1Gi" $values) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $name }}-{{ $suffix }}
  namespace: {{ $instance.namespace }}
  labels:
    app.kubernetes.io/name: odysseus
    app.kubernetes.io/instance: {{ $name }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ $size | quote }}
---
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-searxng-config
  namespace: {{ $instance.namespace }}
data:
  settings.yml: |
    use_default_settings: true
    search:
      formats: [html, json]
---
{{- range $component, $port := $components }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}-{{ $component }}
  namespace: {{ $instance.namespace }}
spec:
  selector:
    app.kubernetes.io/name: odysseus
    app.kubernetes.io/instance: {{ $name }}
    app.kubernetes.io/component: {{ $component }}
  ports:
    - name: http
      port: {{ $port }}
      targetPort: http
---
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ $instance.namespace }}
spec:
  selector:
    app.kubernetes.io/name: odysseus
    app.kubernetes.io/instance: {{ $name }}
    app.kubernetes.io/component: app
  ports:
    - name: http
      port: 7000
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}-litellm
  namespace: {{ $instance.namespace }}
spec:
  selector:
    app: litellm
  ports:
    - name: http
      port: 8000
      targetPort: 4000
---
{{- range $component, $port := $components }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}-{{ $component }}
  namespace: {{ $instance.namespace }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: odysseus
      app.kubernetes.io/instance: {{ $name }}
      app.kubernetes.io/component: {{ $component }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: odysseus
        app.kubernetes.io/instance: {{ $name }}
        app.kubernetes.io/component: {{ $component }}
    spec:
      containers:
        - name: {{ $component }}
          {{- if eq $component "chroma" }}
          image: docker.io/chromadb/chroma:latest
          {{- else if eq $component "searxng" }}
          image: docker.io/searxng/searxng:2026.5.31-7159b8aed
          {{- else }}
          image: docker.io/binwiederhier/ntfy:latest
          args: [serve]
          {{- end }}
          ports:
            - name: http
              containerPort: {{ $port }}
          {{- if eq $component "searxng" }}
          env:
            - name: SEARXNG_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}-admin
                  key: password
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ if eq $component "chroma" }}/chroma/chroma{{ else if eq $component "searxng" }}/var/cache/searxng{{ else }}/var/cache/ntfy{{ end }}
          {{- if eq $component "searxng" }}
            - name: settings
              mountPath: /etc/searxng/settings.yml
              subPath: settings.yml
              readOnly: true
          {{- end }}
          resources:
            requests: {cpu: 50m, memory: 128Mi}
            limits: {cpu: "1", memory: 1Gi}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ $name }}-{{ $component }}-data
        {{- if eq $component "searxng" }}
        - name: settings
          configMap:
            name: {{ $name }}-searxng-config
        {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $instance.namespace }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: odysseus
      app.kubernetes.io/instance: {{ $name }}
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: odysseus
        app.kubernetes.io/instance: {{ $name }}
        app.kubernetes.io/component: app
      annotations:
        ai-appliance.io/model-catalog-consumer: "true"
    spec:
      containers:
        - name: app
          image: {{ printf "%s:%s" (dig "image" "repository" "ghcr.io/pewdiepie-archdaemon/odysseus" $values) (dig "image" "tag" "latest" $values) | quote }}
          ports:
            - name: http
              containerPort: 7000
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-masterkey-secret
                  key: LITELLM_MASTER_KEY
            - name: OPENAI_BASE_URL
              value: http://litellm.ai.svc.cluster.local:4000/v1
            - name: ODYSSEUS_DEFAULT_MODEL
              value: {{ $model | quote }}
            - name: SEARXNG_INSTANCE
              value: http://{{ $name }}-searxng:8080
            - name: CHROMADB_HOST
              value: {{ $name }}-chroma
            - name: CHROMADB_PORT
              value: "8000"
            - name: NTFY_BASE_URL
              value: http://{{ $name }}-ntfy:80
            - name: ODYSSEUS_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}-admin
                  key: username
            - name: ODYSSEUS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}-admin
                  key: password
          volumeMounts:
            - name: data
              mountPath: /app/data
              subPath: data
            - name: catalog
              mountPath: /catalog
              readOnly: true
          resources:
            requests: {cpu: 250m, memory: 1Gi}
            limits: {cpu: "2", memory: 4Gi}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ $name }}-data
        - name: catalog
          configMap:
            name: ai-model-catalog
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $name }}
  namespace: {{ $instance.namespace }}
  annotations:
    dashboard.ai-appliance.io/title: Odysseus
    dashboard.ai-appliance.io/category: AI
    lab42.io/mdns.enabled: "true"
    lab42.io/mdns.name: {{ $instance.localName | quote }}
spec:
  ingressClassName: nginx
  rules:
    - host: {{ $ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $name }}
                port:
                  name: http
