apiVersion: paperclip.inc/v1alpha1
kind: Instance
metadata:
  name: paperclip
  namespace: ai
  labels:
    app: paperclip
spec:
  podAnnotations:
    ai-appliance.io/model-catalog-consumer: "true"
  image:
    repository: ghcr.io/paperclipai/paperclip
    tag: sha-e59eb10
  deployment:
    mode: authenticated
    exposure: public
    publicURL: "http://paperclip.${AI_APPLIANCE_DOMAIN:=example.local}"
    allowedHostnames:
      - "paperclip.${AI_APPLIANCE_DOMAIN:=example.local}"
  database:
    mode: managed
    managed:
      storageSize: "${AI_APPLIANCE_PAPERCLIP_POSTGRES_STORAGE:=10Gi}"
  auth:
    secretRef:
      name: paperclip-auth
      key: BETTER_AUTH_SECRET
  env:
    - name: PAPERCLIP_AUTH_BASE_URL_MODE
      value: explicit
    - name: PAPERCLIP_AUTH_PUBLIC_BASE_URL
      value: "http://paperclip.${AI_APPLIANCE_DOMAIN:=example.local}"
    - name: BETTER_AUTH_TRUSTED_ORIGINS
      value: "${AI_APPLIANCE_PAPERCLIP_TRUSTED_ORIGINS:=*}"
    - name: OPENAI_BASE_URL
      value: "http://litellm.ai.svc.cluster.local:4000/v1"
    - name: OPENAI_API_KEY
      valueFrom:
        secretKeyRef:
          name: litellm-masterkey-secret
          key: LITELLM_MASTER_KEY
    - name: LITELLM_BASE_URL
      value: "http://litellm.ai.svc.cluster.local:4000/v1"
    - name: LITELLM_API_KEY
      valueFrom:
        secretKeyRef:
          name: litellm-masterkey-secret
          key: LITELLM_MASTER_KEY
    - name: AI_APPLIANCE_DEFAULT_MODEL
      valueFrom:
        configMapKeyRef:
          name: ai-model-catalog
          key: AI_APPLIANCE_DEFAULT_CHAT_MODEL
  initContainers:
    - name: paperclip-auth-config
      image: ghcr.io/paperclipai/paperclip:sha-e59eb10
      imagePullPolicy: IfNotPresent
      command:
        - /bin/sh
        - -c
      args:
        - |
          set -eu
          CONFIG="/paperclip/instances/default/config.json"
          PUBLIC_URL="http://paperclip.${AI_APPLIANCE_DOMAIN:=example.local}"
          if [ ! -f "$CONFIG" ]; then
            echo "Paperclip config does not exist yet, skipping auth config patch."
            exit 0
          fi
          CONFIG_PATH="$CONFIG" PUBLIC_URL="$PUBLIC_URL" node <<'NODE'
          const fs = require("fs");
          const configPath = process.env.CONFIG_PATH;
          const publicUrl = process.env.PUBLIC_URL;
          const config = JSON.parse(fs.readFileSync(configPath, "utf8"));
          config.server = {
            ...(config.server || {}),
            deploymentMode: "authenticated",
            exposure: "public",
            bind: "custom",
            customBindHost: "0.0.0.0",
            host: "0.0.0.0",
            port: 3100,
          };
          const host = new URL(publicUrl).hostname.toLowerCase();
          const allowed = new Set([...(config.server.allowedHostnames || []), host]);
          config.server.allowedHostnames = Array.from(allowed);
          config.auth = {
            ...(config.auth || {}),
            baseUrlMode: "explicit",
            publicBaseUrl: publicUrl,
          };
          fs.writeFileSync(configPath, JSON.stringify(config, null, 2) + "\n", { mode: 0o600 });
          NODE
      volumeMounts:
        - name: paperclip-data
          mountPath: /paperclip
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
  storage:
    persistence:
      enabled: true
      size: "${AI_APPLIANCE_PAPERCLIP_STORAGE:=5Gi}"
  security:
    networkPolicy:
      enabled: true
      extraEgress:
        - to:
            - podSelector:
                matchLabels:
                  app: litellm
          ports:
            - protocol: TCP
              port: 4000
    rbac:
      create: true
  networking:
    service:
      type: ClusterIP
      port: 3100
    ingress:
      enabled: true
      ingressClassName: nginx
      hosts:
        - "paperclip.${AI_APPLIANCE_DOMAIN:=example.local}"
      annotations:
        dashboard.ai-appliance.io/title: "Paperclip"
        dashboard.ai-appliance.io/description: "AI agent company control plane managed by the Paperclip operator."
        dashboard.ai-appliance.io/icon: "PC"
        dashboard.ai-appliance.io/category: "AI"
        dashboard.ai-appliance.io/order: "40"
        lab42.io/mdns.enabled: "true"
        lab42.io/mdns.name: "paperclip"
        nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
  observability:
    logging:
      level: info
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
