    logoutPath: /logout
    cookieDomain: "${AI_APPLIANCE_DOMAIN:=magicstick.example.com}"
    cookieNames:
      accessToken: MagicStickAccessToken
      idToken: MagicStickIDToken
    forwardAccessToken: true
  jwt:
    providers:
      - name: keycloak
        issuer: "https://id.${AI_APPLIANCE_MDNS_DOMAIN:=magicstick.local}/realms/magicstick"
        remoteJWKS:
          uri: http://keycloak.identity-system.svc.cluster.local:8080/realms/magicstick/protocol/openid-connect/certs
          backendRefs:
            - name: keycloak
              port: 8080
        extractFrom:
