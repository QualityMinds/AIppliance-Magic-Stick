apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-identity-litellm
  namespace: ai
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: identity-system
  to:
    - group: ""
      kind: Service
      name: litellm
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: static-litellm-local
  namespace: identity-system
  annotations:
    lab42.io/mdns.enabled: "true"
spec:
  parentRefs:
    - name: identity-pilot
      sectionName: https
  hostnames:
    - "litellm.${AI_APPLIANCE_MDNS_DOMAIN:=magicstick.local}"
  rules:
    - backendRefs:
        - name: litellm
          namespace: ai
          port: 4000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: static-litellm-local-callback
  namespace: identity-system
spec:
  parentRefs:
    - name: identity-pilot
      sectionName: https
  hostnames:
    - "${AI_APPLIANCE_MDNS_DOMAIN:=magicstick.local}"
  rules:
    - matches:
        - path:
            type: Exact
            value: /oauth2/callback/static-litellm-local
      backendRefs:
        - name: litellm
          namespace: ai
          port: 4000
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: static-litellm-local-sso
  namespace: identity-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: static-litellm-local
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: static-litellm-local-callback
  oidc:
    provider:
      issuer: "https://id.${AI_APPLIANCE_MDNS_DOMAIN:=magicstick.local}/realms/magicstick"
      authorizationEndpoint: "https://id.${AI_APPLIANCE_MDNS_DOMAIN:=magicstick.local}/realms/magicstick/protocol/openid-connect/auth"
      tokenEndpoint: http://keycloak.identity-system.svc.cluster.local:8080/realms/magicstick/protocol/openid-connect/token
      endSessionEndpoint: "https://id.${AI_APPLIANCE_MDNS_DOMAIN:=magicstick.local}/realms/magicstick/protocol/openid-connect/logout"
    clientID: magicstick-human-gateway-local
    clientSecret:
      name: magicstick-human-gateway-client
    redirectURL: "https://${AI_APPLIANCE_MDNS_DOMAIN:=magicstick.local}/oauth2/callback/static-litellm-local"
    logoutPath: /logout
    cookieDomain: "${AI_APPLIANCE_MDNS_DOMAIN:=magicstick.local}"
    cookieNames:
      accessToken: MagicStickAccessToken
      idToken: MagicStickIDToken
    forwardAccessToken: true
  jwt:
    providers:
      - name: keycloak
        issuer: "https://id.${AI_APPLIANCE_MDNS_DOMAIN:=magicstick.local}/realms/magicstick"
        remoteJWKS:
          uri: http://keycloak.identity-system.svc.cluster.local:8080/realms/magicstick/protocol/openid-connect/certs
          backendRefs:
            - name: keycloak
              port: 8080
        extractFrom:
          cookies:
            - MagicStickAccessToken
  authorization:
    defaultAction: Deny
    rules:
      - name: required-magicstick-user
        action: Allow
        principal:
          jwt:
            provider: keycloak
            claims:
              - name: realm_access.roles
                valueType: StringArray
                values:
                  - magicstick-user
                  - magicstick-viewer
                  - magicstick-operator
                  - magicstick-admin
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: static-litellm-public
  namespace: identity-system
spec:
  parentRefs:
    - name: identity-pilot
      sectionName: https
  hostnames:
    - "litellm.${AI_APPLIANCE_DOMAIN:=magicstick.example.com}"
  rules:
    - backendRefs:
        - name: litellm
          namespace: ai
          port: 4000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: static-litellm-public-callback
  namespace: identity-system
spec:
  parentRefs:
    - name: identity-pilot
      sectionName: https
  hostnames:
    - "${AI_APPLIANCE_DASHBOARD_HOST:=magicstick.example.com}"
  rules:
    - matches:
        - path:
            type: Exact
            value: /oauth2/callback/static-litellm-public
      backendRefs:
        - name: litellm
          namespace: ai
          port: 4000
---
