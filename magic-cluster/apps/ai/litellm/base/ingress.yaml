apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: litellm
  namespace: ai
  labels:
    app: litellm
  annotations:
    lab42.io/mdns.enabled: "true"
    lab42.io/mdns.name: "litellm.${AI_APPLIANCE_MDNS_NAME:=magicstick}"
    lab42.io/mdns.host: "litellm.${AI_APPLIANCE_MDNS_NAME:=magicstick}"
spec:
  ingressClassName: nginx
  rules:
    - host: "litellm.${AI_APPLIANCE_DOMAIN:=magicstick.example.com}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: litellm
                port:
                  number: 4000
    - host: "litellm.${AI_APPLIANCE_MDNS_DOMAIN:=magicstick.local}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: litellm
                port:
                  number: 4000
