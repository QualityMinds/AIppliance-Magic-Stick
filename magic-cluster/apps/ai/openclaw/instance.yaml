apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: openclaw
  namespace: ai
  labels:
    app: openclaw
spec:
  config:
    mergeMode: merge
  env:
    - name: OPENAI_API_KEY
      valueFrom:
        secretKeyRef:
          name: litellm-masterkey-secret
          key: LITELLM_MASTER_KEY
    - name: OPENAI_BASE_URL
      value: "http://litellm.ai.svc.cluster.local:4000/v1"
  initContainers:
    - name: openclaw-litellm-models
      image: node:22-alpine
      imagePullPolicy: IfNotPresent
      command:
        - /bin/sh
        - -c
      args:
        - |
          set -eu
          node <<'NODE'
          const fs = require("fs");
          const configPath = "/data/openclaw.json";
          const baseUrl = process.env.OPENAI_BASE_URL.replace(/\/+$/, "");
          const modelsUrl = process.env.LITELLM_MODELS_URL || `${baseUrl}/models`;
          const apiKey = process.env.OPENAI_API_KEY || "";
          const preferredModel = process.env.OPENCLAW_DEFAULT_MODEL || "";
          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

          async function fetchModels() {
            let lastError = "no response";
            for (let attempt = 1; attempt <= 60; attempt += 1) {
              try {
                const response = await fetch(modelsUrl, {
                  headers: apiKey ? { Authorization: `Bearer ${apiKey}` } : {},
                });
                if (response.ok) {
                  return response.json();
                }
                lastError = `${response.status} ${response.statusText}`;
              } catch (error) {
                lastError = error.message;
              }
              console.log(`Waiting for LiteLLM models (${attempt}/60): ${lastError}`);
              await sleep(5000);
            }
            throw new Error(`${modelsUrl} did not become ready: ${lastError}`);
          }

          function normalizeModels(payload) {
            const rawModels = Array.isArray(payload)
              ? payload
              : Array.isArray(payload.data)
                ? payload.data
                : Array.isArray(payload.models)
                  ? payload.models
                  : [];

            function normalizeModelId(value) {
              return value.replace(/^(openai|litellm)\//, "");
            }

            return rawModels
              .map((model) => {
                if (typeof model === "string") {
                  const id = normalizeModelId(model);
                  return { id, name: id };
                }
                const rawId = model.id || model.name || model.model_name;
                if (!rawId) {
                  return null;
                }
                const id = normalizeModelId(rawId);
                const normalized = {
                  id,
                  name: model.name || id,
                };
                const contextWindow = model.contextWindow || model.context_window;
                if (contextWindow) {
                  normalized.contextWindow = contextWindow;
                }
                return normalized;
              })
              .filter(Boolean);
          }

          function normalizePreferredModel(value) {
            return value.replace(/^(openai|litellm)\//, "");
          }

          async function main() {
            const payload = await fetchModels();
            const models = normalizeModels(payload);
            if (models.length === 0) {
              throw new Error("LiteLLM /models returned no usable models");
            }

            const ids = new Set(models.map((model) => model.id));
            const normalizedPreferredModel = normalizePreferredModel(preferredModel);
            const selectedModel = normalizedPreferredModel && ids.has(normalizedPreferredModel)
              ? normalizedPreferredModel
              : models[0].id;

            const config = fs.existsSync(configPath)
              ? JSON.parse(fs.readFileSync(configPath, "utf8"))
              : {};

            config.models = {
              ...(config.models || {}),
              providers: {
                ...((config.models || {}).providers || {}),
                openai: {
                  baseUrl,
                  apiKey: "${OPENAI_API_KEY}",
                  api: "openai-completions",
                  models,
                },
                litellm: {
                  baseUrl,
                  apiKey: "${OPENAI_API_KEY}",
                  api: "openai-completions",
                  models,
                },
              },
            };
            config.agents = {
              ...(config.agents || {}),
              defaults: {
                ...((config.agents || {}).defaults || {}),
                model: {
                  ...(((config.agents || {}).defaults || {}).model || {}),
                  primary: `openai/${selectedModel}`,
                },
              },
            };

            fs.writeFileSync(configPath, `${JSON.stringify(config, null, 2)}\n`);
            console.log(`Configured OpenClaw LiteLLM-backed OpenAI provider with ${models.length} models; primary=openai/${selectedModel}`);
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
      env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-masterkey-secret
              key: LITELLM_MASTER_KEY
        - name: OPENAI_BASE_URL
          value: "http://litellm.ai.svc.cluster.local:4000/v1"
        - name: LITELLM_MODELS_URL
          value: "http://litellm.ai.svc.cluster.local:4000/models"
        - name: OPENCLAW_DEFAULT_MODEL
          value: "${AI_APPLIANCE_OPENCLAW_MODEL:=qwen3635b}"
      volumeMounts:
        - name: data
          mountPath: /data
  storage:
    persistence:
      enabled: true
      size: "${AI_APPLIANCE_OPENCLAW_STORAGE:=10Gi}"
  security:
    networkPolicy:
      enabled: true
      additionalEgress:
        - to:
            - podSelector:
                matchLabels:
                  app: litellm
          ports:
            - protocol: TCP
              port: 4000
  networking:
    service:
      type: ClusterIP
    ingress:
      enabled: true
      className: nginx
      annotations:
        dashboard.ai-appliance.io/title: "OpenClaw"
        dashboard.ai-appliance.io/description: "Self-hosted OpenClaw AI agent managed by the OpenClaw operator."
        dashboard.ai-appliance.io/icon: "OC"
        dashboard.ai-appliance.io/category: "AI"
        dashboard.ai-appliance.io/order: "45"
        lab42.io/mdns.enabled: "true"
        lab42.io/mdns.name: "openclaw"
        nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
      hosts:
        - host: "openclaw.${AI_APPLIANCE_DOMAIN:=example.local}"
          paths:
            - path: /
              pathType: Prefix
