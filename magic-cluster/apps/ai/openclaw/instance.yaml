apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: openclaw
  namespace: ai
  labels:
    app: openclaw
spec:
  config:
    raw:
      agents:
        defaults:
          model:
            primary: "${AI_APPLIANCE_OPENCLAW_MODEL:=qwen359b}"
  env:
    - name: OPENAI_API_KEY
      valueFrom:
        secretKeyRef:
          name: litellm-masterkey-secret
          key: LITELLM_MASTER_KEY
    - name: OPENAI_BASE_URL
      value: "http://litellm.ai.svc.cluster.local:4000/v1"
  storage:
    persistence:
      enabled: true
      size: "${AI_APPLIANCE_OPENCLAW_STORAGE:=10Gi}"
  security:
    networkPolicy:
      enabled: true
      additionalEgress:
        - to:
            - podSelector:
                matchLabels:
                  app: litellm
          ports:
            - protocol: TCP
              port: 4000
  networking:
    service:
      type: ClusterIP
    ingress:
      enabled: true
      className: nginx
      annotations:
        dashboard.ai-appliance.io/title: "OpenClaw"
        dashboard.ai-appliance.io/description: "Self-hosted OpenClaw AI agent managed by the OpenClaw operator."
        dashboard.ai-appliance.io/icon: "OC"
        dashboard.ai-appliance.io/category: "AI"
        dashboard.ai-appliance.io/order: "45"
        lab42.io/mdns.enabled: "true"
        lab42.io/mdns.name: "openclaw"
        nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
      hosts:
        - host: "openclaw.${AI_APPLIANCE_DOMAIN:=example.local}"
          paths:
            - path: /
              pathType: Prefix
