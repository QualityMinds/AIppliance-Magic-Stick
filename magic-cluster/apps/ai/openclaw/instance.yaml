apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: openclaw
  namespace: ai
  labels:
    app: openclaw
spec:
  podAnnotations:
    ai-appliance.io/model-catalog-consumer: "true"
  config:
    mergeMode: merge
  env:
    - name: OPENAI_API_KEY
      valueFrom:
        secretKeyRef:
          name: litellm-masterkey-secret
          key: LITELLM_MASTER_KEY
    - name: OPENAI_BASE_URL
      value: "http://litellm.ai.svc.cluster.local:4000/v1"
  initContainers:
    - name: openclaw-litellm-models
      image: node:22-alpine
      imagePullPolicy: IfNotPresent
      command:
        - /bin/sh
        - -c
      args:
        - |
          set -eu
          for attempt in $(seq 1 120); do
            if [ -f /catalog/defaults.env ] && grep -q '^AI_APPLIANCE_MODEL_CATALOG_READY=true$' /catalog/defaults.env; then
              break
            fi
            echo "Waiting for ai-model-catalog ($attempt/120)"
            sleep 5
          done
          grep -q '^AI_APPLIANCE_MODEL_CATALOG_READY=true$' /catalog/defaults.env
          node <<'NODE'
          const fs = require("fs");
          const configPath = "/data/openclaw.json";
          const catalogPath = process.env.AI_MODEL_CATALOG_OPENCLAW_PATH || "/catalog/openclaw.json";
          const preferredModel = process.env.OPENCLAW_DEFAULT_MODEL || "";

          function normalizePreferredModel(value) {
            return value.replace(/^(openai|litellm)\//, "");
          }

          function deepMerge(base, overlay) {
            const result = { ...base };
            for (const [key, value] of Object.entries(overlay)) {
              if (
                value &&
                typeof value === "object" &&
                !Array.isArray(value) &&
                result[key] &&
                typeof result[key] === "object" &&
                !Array.isArray(result[key])
              ) {
                result[key] = deepMerge(result[key], value);
              } else {
                result[key] = value;
              }
            }
            return result;
          }

          const overlay = JSON.parse(fs.readFileSync(catalogPath, "utf8"));
          const provider = (((overlay.models || {}).providers || {}).litellm || {});
          provider.baseUrl = process.env.OPENAI_BASE_URL.replace(/\/+$/, "");
          provider.apiKey = "$" + "{OPENAI_API_KEY}";
          const models = Array.isArray(provider.models) ? provider.models : [];
          if (models.length === 0) {
            throw new Error("ai-model-catalog has no OpenClaw chat models");
          }

          const ids = new Set(models.map((model) => model.id));
          const normalizedPreferredModel = normalizePreferredModel(preferredModel);
          const selectedModel = normalizedPreferredModel && ids.has(normalizedPreferredModel)
            ? normalizedPreferredModel
            : normalizePreferredModel(((((overlay.agents || {}).defaults || {}).model || {}).primary || "")) || models[0].id;

          overlay.models = {
            ...(overlay.models || {}),
            providers: {
              ...((overlay.models || {}).providers || {}),
              litellm: provider,
            },
          };
          overlay.agents = {
            ...(overlay.agents || {}),
            defaults: {
              ...((overlay.agents || {}).defaults || {}),
              model: {
                ...(((overlay.agents || {}).defaults || {}).model || {}),
                primary: "litellm/" + selectedModel,
              },
            },
          };

          const existing = fs.existsSync(configPath)
            ? JSON.parse(fs.readFileSync(configPath, "utf8"))
            : {};
          const config = deepMerge(existing, overlay);

          fs.writeFileSync(configPath, JSON.stringify(config, null, 2) + "\n");
          console.log("Configured OpenClaw from ai-model-catalog with " + models.length + " models; primary=litellm/" + selectedModel);
          NODE
      env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-masterkey-secret
              key: LITELLM_MASTER_KEY
        - name: OPENAI_BASE_URL
          value: "http://litellm.ai.svc.cluster.local:4000/v1"
        - name: AI_MODEL_CATALOG_OPENCLAW_PATH
          value: /catalog/openclaw.json
        - name: OPENCLAW_DEFAULT_MODEL
          value: "${AI_APPLIANCE_OPENCLAW_MODEL:=qwen3635b}"
      volumeMounts:
        - name: data
          mountPath: /data
        - name: ai-model-catalog
          mountPath: /catalog
          readOnly: true
  extraVolumes:
    - name: ai-model-catalog
      configMap:
        name: ai-model-catalog
  storage:
    persistence:
      enabled: true
      size: "${AI_APPLIANCE_OPENCLAW_STORAGE:=10Gi}"
  security:
    networkPolicy:
      enabled: true
      additionalEgress:
        - to:
            - podSelector:
                matchLabels:
                  app: litellm
          ports:
            - protocol: TCP
              port: 4000
  networking:
    service:
      type: ClusterIP
    ingress:
      enabled: true
      className: nginx
      security:
        enableHSTS: false
        forceHTTPS: false
      annotations:
        dashboard.ai-appliance.io/title: "OpenClaw"
        dashboard.ai-appliance.io/description: "Self-hosted OpenClaw AI agent managed by the OpenClaw operator."
        dashboard.ai-appliance.io/icon: "OC"
        dashboard.ai-appliance.io/category: "AI"
        dashboard.ai-appliance.io/order: "45"
        lab42.io/mdns.enabled: "true"
        lab42.io/mdns.name: "openclaw"
        nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
      hosts:
        - host: "openclaw.${AI_APPLIANCE_DOMAIN:=example.local}"
          paths:
            - path: /
              pathType: Prefix
