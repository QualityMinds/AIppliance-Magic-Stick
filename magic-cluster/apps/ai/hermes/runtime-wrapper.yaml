apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-runtime-wrapper
  namespace: ai
data:
  hermes-entrypoint: |
    #!/bin/sh
    set -eu

    # The operator-managed GHCR image currently does not contain the
    # hermes-agent Python package. Keep that container alive while the
    # official Hermes sidecar serves the web UI on the shared pod port.
    exec sleep infinity
