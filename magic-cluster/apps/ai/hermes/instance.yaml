apiVersion: hermes.agent/v1
kind: HermesInstance
metadata:
  name: hermes
  namespace: ai
  labels:
    app: hermes
spec:
  # The official Hermes dashboard image uses s6-overlay and must run its
  # entrypoint as PID 1.
  shareProcessNamespace: false
  image:
    repository: ghcr.io/paperclipinc/hermes-agent
    tag: "v2026.5.29.2"
  storage:
    persistence:
      enabled: true
      size: "${AI_APPLIANCE_HERMES_STORAGE:=10Gi}"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
  security:
    networkPolicy:
      enabled: true
      additionalEgress:
        - to:
            - podSelector:
                matchLabels:
                  app: litellm
          ports:
            - protocol: TCP
              port: 4000
  runtime:
    uv:
      # The operator-managed GHCR image does not ship /opt/venv-template, so the
      # built-in init-uv container fails before the workload can start.
      enabled: false
  initContainers:
    - name: hermes-litellm-models
      image: nousresearch/hermes-agent:v2026.5.29.2
      imagePullPolicy: IfNotPresent
      command:
        - /bin/sh
        - -c
      args:
        - |
          set -eu
          /opt/hermes/.venv/bin/python3 <<'PY'
          import os
          import time
          import urllib.error
          import urllib.request
          from pathlib import Path

          import yaml

          config_path = Path("/home/hermes/.hermes/config.yaml")
          base_url = os.environ["OPENAI_BASE_URL"].rstrip("/")
          models_url = os.environ.get("LITELLM_MODELS_URL", "").strip() or base_url.rstrip("/") + "/models"
          api_key = os.environ.get("OPENAI_API_KEY", "")
          preferred_model = os.environ.get("HERMES_DEFAULT_MODEL", "").strip()

          def fetch_models():
              last_error = "no response"
              headers = {"Authorization": "Bearer " + api_key} if api_key else {}
              for attempt in range(1, 61):
                  try:
                      req = urllib.request.Request(models_url, headers=headers)
                      with urllib.request.urlopen(req, timeout=10) as response:
                          return yaml.safe_load(response.read().decode("utf-8"))
                  except Exception as exc:
                      last_error = str(exc)
                      print(f"Waiting for LiteLLM models ({attempt}/60): {last_error}", flush=True)
                      time.sleep(5)
              raise RuntimeError(f"{models_url} did not become ready: {last_error}")

          def raw_models(payload):
              if isinstance(payload, list):
                  return payload
              if isinstance(payload, dict):
                  for key in ("data", "models"):
                      value = payload.get(key)
                      if isinstance(value, list):
                          return value
              return []

          def normalize_model(model):
              if isinstance(model, str):
                  model_id = model.strip()
                  return {"id": model_id, "name": model_id} if model_id else None
              if not isinstance(model, dict):
                  return None
              raw_id = model.get("id") or model.get("name") or model.get("model_name")
              if not raw_id:
                  return None
              model_id = str(raw_id).strip()
              if not model_id:
                  return None
              normalized = {
                  "id": model_id,
                  "name": str(model.get("name") or model_id),
              }
              for key in ("context_length", "contextWindow", "context_window", "max_context_length", "max_input_tokens"):
                  value = model.get(key)
                  if isinstance(value, int) and value > 0:
                      normalized["context_length"] = value
                      break
              return normalized

          def strip_provider_prefix(value):
              return value.removeprefix("openai/").removeprefix("litellm/")

          def select_model(models):
              if preferred_model:
                  preferred = strip_provider_prefix(preferred_model)
                  for model in models:
                      if model["id"] == preferred_model or strip_provider_prefix(model["id"]) == preferred:
                          return model["id"]
              return models[0]["id"]

          def deep_merge(base, overlay):
              result = dict(base)
              for key, value in overlay.items():
                  if isinstance(value, dict) and isinstance(result.get(key), dict):
                      result[key] = deep_merge(result[key], value)
                  else:
                      result[key] = value
              return result

          payload = fetch_models()
          models = [m for m in (normalize_model(item) for item in raw_models(payload)) if m]
          if not models:
              raise RuntimeError("LiteLLM /models returned no usable models")

          selected_model = select_model(models)
          model_catalog = {}
          for model in models:
              entry = {"name": model["name"]}
              if "context_length" in model:
                  entry["context_length"] = model["context_length"]
              model_catalog[model["id"]] = entry

          existing = {}
          if config_path.exists():
              loaded = yaml.safe_load(config_path.read_text()) or {}
              if isinstance(loaded, dict):
                  existing = loaded

          overlay = {
              "model": {
                  "default": selected_model,
                  "provider": "litellm",
                  "base_url": base_url,
                  "api_mode": "chat_completions",
              },
              "providers": {
                  "litellm": {
                      "name": "LiteLLM",
                      "base_url": base_url,
                      "key_env": "OPENAI_API_KEY",
                      "api_mode": "chat_completions",
                      "default_model": selected_model,
                      "discover_models": True,
                      "models": model_catalog,
                  },
              },
          }

          config_path.parent.mkdir(parents=True, exist_ok=True)
          config_path.write_text(yaml.safe_dump(deep_merge(existing, overlay), sort_keys=False))
          print(f"Configured Hermes LiteLLM provider with {len(models)} models; default={selected_model}", flush=True)
          PY
      env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-masterkey-secret
              key: LITELLM_MASTER_KEY
        - name: OPENAI_BASE_URL
          value: "http://litellm.ai.svc.cluster.local:4000/v1"
        - name: LITELLM_MODELS_URL
          value: "http://litellm.ai.svc.cluster.local:4000/models"
        - name: HERMES_DEFAULT_MODEL
          value: "${AI_APPLIANCE_HERMES_MODEL:=qwen3635b}"
        - name: HOME
          value: /home/hermes
        - name: HERMES_HOME
          value: /home/hermes/.hermes
        - name: XDG_CACHE_HOME
          value: /tmp/.cache
      volumeMounts:
        - name: data
          mountPath: /home/hermes/.hermes
        - name: tmp
          mountPath: /tmp
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        readOnlyRootFilesystem: false
  extraVolumes:
    - name: hermes-runtime-wrapper
      configMap:
        name: hermes-runtime-wrapper
        defaultMode: 0555
  extraVolumeMounts:
    - name: hermes-runtime-wrapper
      mountPath: /usr/local/bin/hermes-entrypoint
      subPath: hermes-entrypoint
      readOnly: true
  sidecars:
    - name: hermes-dashboard
      image: nousresearch/hermes-agent:v2026.5.29.2
      imagePullPolicy: IfNotPresent
      args:
        - dashboard
        - --host
        - 0.0.0.0
        - --port
        - "8443"
        - --no-open
        - --insecure
      env:
        - name: HERMES_HOME
          value: /home/hermes/.hermes
        - name: HERMES_UID
          value: "1000"
        - name: HERMES_GID
          value: "1000"
        - name: HOME
          value: /home/hermes
        - name: XDG_CACHE_HOME
          value: /tmp/.cache
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-masterkey-secret
              key: LITELLM_MASTER_KEY
      ports:
        - name: dashboard
          containerPort: 8443
          protocol: TCP
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 2Gi
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        readOnlyRootFilesystem: false
      volumeMounts:
        - name: data
          mountPath: /home/hermes/.hermes
        - name: tmp
          mountPath: /tmp
  networking:
    service:
      type: ClusterIP
    ingress:
      enabled: true
      className: nginx
      host: "hermes.${AI_APPLIANCE_DOMAIN:=example.local}"
      annotations:
        dashboard.ai-appliance.io/title: "Hermes"
        dashboard.ai-appliance.io/description: "Self-improving AI agent managed by the Hermes operator."
        dashboard.ai-appliance.io/icon: "HE"
        dashboard.ai-appliance.io/category: "AI"
        dashboard.ai-appliance.io/order: "45"
        lab42.io/mdns.enabled: "true"
        lab42.io/mdns.name: "hermes"
        nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
  observability:
    logging:
      level: info
