apiVersion: hermes.agent/v1
kind: HermesInstance
metadata:
  name: hermes
  namespace: ai
  labels:
    app: hermes
spec:
  image:
    repository: ghcr.io/paperclipinc/hermes-agent
    tag: "v2026.5.29.2"
  storage:
    persistence:
      enabled: true
      size: "${AI_APPLIANCE_HERMES_STORAGE:=10Gi}"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
  security:
    networkPolicy:
      enabled: true
  runtime:
    uv:
      # The published operator-built agent image already contains /opt/venv and
      # does not ship /opt/venv-template, so skip the operator's uv sync init.
      enabled: false
  networking:
    service:
      type: ClusterIP
    ingress:
      enabled: true
      className: nginx
      host: "hermes.${AI_APPLIANCE_DOMAIN:=example.local}"
      annotations:
        dashboard.ai-appliance.io/title: "Hermes"
        dashboard.ai-appliance.io/description: "Self-improving AI agent managed by the Hermes operator."
        dashboard.ai-appliance.io/icon: "HE"
        dashboard.ai-appliance.io/category: "AI"
        dashboard.ai-appliance.io/order: "45"
        lab42.io/mdns.enabled: "true"
        lab42.io/mdns.name: "hermes"
        nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
  observability:
    logging:
      level: info
