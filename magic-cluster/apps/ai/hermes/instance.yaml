apiVersion: hermes.agent/v1
kind: HermesInstance
metadata:
  name: hermes
  namespace: ai
  labels:
    app: hermes
spec:
  # The official Hermes dashboard image uses s6-overlay and must run its
  # entrypoint as PID 1.
  shareProcessNamespace: false
  image:
    repository: ghcr.io/paperclipinc/hermes-agent
    tag: "v2026.5.29.2"
  storage:
    persistence:
      enabled: true
      size: "${AI_APPLIANCE_HERMES_STORAGE:=10Gi}"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
  security:
    networkPolicy:
      enabled: true
      additionalEgress:
        - to:
            - podSelector:
                matchLabels:
                  app: litellm
          ports:
            - protocol: TCP
              port: 4000
  runtime:
    uv:
      # The operator-managed GHCR image does not ship /opt/venv-template, so the
      # built-in init-uv container fails before the workload can start.
      enabled: false
  initContainers:
    - name: hermes-litellm-models
      image: nousresearch/hermes-agent:v2026.5.29.2
      imagePullPolicy: IfNotPresent
      command:
        - /bin/sh
        - -c
      args:
        - |
          set -eu
          for attempt in $(seq 1 120); do
            if [ -f /catalog/defaults.env ] && grep -q '^AI_APPLIANCE_MODEL_CATALOG_READY=true$' /catalog/defaults.env; then
              break
            fi
            echo "Waiting for ai-model-catalog ($attempt/120)"
            sleep 5
          done
          grep -q '^AI_APPLIANCE_MODEL_CATALOG_READY=true$' /catalog/defaults.env
          /opt/hermes/.venv/bin/python3 <<'PY'
          import os
          from pathlib import Path

          import yaml

          config_path = Path("/home/hermes/.hermes/config.yaml")
          catalog_path = Path(os.environ.get("AI_MODEL_CATALOG_HERMES_PATH", "/catalog/hermes.yaml"))
          preferred_model = os.environ.get("HERMES_DEFAULT_MODEL", "").strip()

          def strip_provider_prefix(value):
              return value.removeprefix("openai/").removeprefix("litellm/")

          def deep_merge(base, overlay):
              result = dict(base)
              for key, value in overlay.items():
                  if isinstance(value, dict) and isinstance(result.get(key), dict):
                      result[key] = deep_merge(result[key], value)
                  else:
                      result[key] = value
              return result

          overlay = yaml.safe_load(catalog_path.read_text()) or {}
          provider = (overlay.get("providers") or {}).get("litellm") or {}
          models = provider.get("models") or {}
          if not models:
              raise RuntimeError("ai-model-catalog has no Hermes chat models")

          selected_model = ((overlay.get("model") or {}).get("default") or "").strip()
          if preferred_model:
              preferred = strip_provider_prefix(preferred_model)
              for model_id in models:
                  if model_id == preferred_model or strip_provider_prefix(model_id) == preferred:
                      selected_model = model_id
                      break
          if not selected_model:
              selected_model = next(iter(models))

          overlay.setdefault("model", {})["default"] = selected_model
          overlay.setdefault("providers", {}).setdefault("litellm", {})["default_model"] = selected_model

          existing = {}
          if config_path.exists():
              loaded = yaml.safe_load(config_path.read_text()) or {}
              if isinstance(loaded, dict):
                  existing = loaded

          config_path.parent.mkdir(parents=True, exist_ok=True)
          config_path.write_text(yaml.safe_dump(deep_merge(existing, overlay), sort_keys=False))
          print(f"Configured Hermes from ai-model-catalog with {len(models)} models; default={selected_model}", flush=True)
          PY
      env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-masterkey-secret
              key: LITELLM_MASTER_KEY
        - name: OPENAI_BASE_URL
          value: "http://litellm.ai.svc.cluster.local:4000/v1"
        - name: AI_MODEL_CATALOG_HERMES_PATH
          value: /catalog/hermes.yaml
        - name: HERMES_DEFAULT_MODEL
          value: "${AI_APPLIANCE_HERMES_MODEL:=qwen3635b}"
        - name: HOME
          value: /home/hermes
        - name: HERMES_HOME
          value: /home/hermes/.hermes
        - name: XDG_CACHE_HOME
          value: /tmp/.cache
      volumeMounts:
        - name: data
          mountPath: /home/hermes/.hermes
        - name: tmp
          mountPath: /tmp
        - name: ai-model-catalog
          mountPath: /catalog
          readOnly: true
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        readOnlyRootFilesystem: false
  extraVolumes:
    - name: hermes-runtime-wrapper
      configMap:
        name: hermes-runtime-wrapper
        defaultMode: 0555
    - name: ai-model-catalog
      configMap:
        name: ai-model-catalog
  extraVolumeMounts:
    - name: hermes-runtime-wrapper
      mountPath: /usr/local/bin/hermes-entrypoint
      subPath: hermes-entrypoint
      readOnly: true
  sidecars:
    - name: hermes-dashboard
      image: nousresearch/hermes-agent:v2026.5.29.2
      imagePullPolicy: IfNotPresent
      args:
        - dashboard
        - --host
        - 0.0.0.0
        - --port
        - "8443"
        - --no-open
        - --tui
        - --insecure
      env:
        - name: HERMES_HOME
          value: /home/hermes/.hermes
        - name: HERMES_UID
          value: "1000"
        - name: HERMES_GID
          value: "1000"
        - name: HOME
          value: /home/hermes
        - name: XDG_CACHE_HOME
          value: /tmp/.cache
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-masterkey-secret
              key: LITELLM_MASTER_KEY
      ports:
        - name: dashboard
          containerPort: 8443
          protocol: TCP
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 2Gi
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        readOnlyRootFilesystem: false
      volumeMounts:
        - name: data
          mountPath: /home/hermes/.hermes
        - name: tmp
          mountPath: /tmp
  networking:
    service:
      type: ClusterIP
    ingress:
      enabled: true
      className: nginx
      host: "hermes.${AI_APPLIANCE_DOMAIN:=example.local}"
      annotations:
        dashboard.ai-appliance.io/title: "Hermes"
        dashboard.ai-appliance.io/description: "Self-improving AI agent managed by the Hermes operator."
        dashboard.ai-appliance.io/icon: "HE"
        dashboard.ai-appliance.io/category: "AI"
        dashboard.ai-appliance.io/order: "45"
        lab42.io/mdns.enabled: "true"
        lab42.io/mdns.name: "hermes"
        nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
  observability:
    logging:
      level: info
