apiVersion: hermes.agent/v1
kind: HermesInstance
metadata:
  name: hermes
  namespace: ai
  labels:
    app: hermes
spec:
  image:
    repository: ghcr.io/paperclipinc/hermes-agent
    tag: "v2026.5.29.2"
  storage:
    persistence:
      enabled: true
      size: "${AI_APPLIANCE_HERMES_STORAGE:=10Gi}"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
  security:
    networkPolicy:
      enabled: true
  runtime:
    uv:
      # The operator-managed GHCR image does not ship /opt/venv-template, so the
      # built-in init-uv container fails before the workload can start.
      enabled: false
  extraVolumes:
    - name: hermes-runtime-wrapper
      configMap:
        name: hermes-runtime-wrapper
        defaultMode: 0555
  extraVolumeMounts:
    - name: hermes-runtime-wrapper
      mountPath: /usr/local/bin/hermes-entrypoint
      subPath: hermes-entrypoint
      readOnly: true
  sidecars:
    - name: hermes-dashboard
      image: nousresearch/hermes-agent:v2026.5.29.2
      imagePullPolicy: IfNotPresent
      args:
        - dashboard
        - --host
        - 0.0.0.0
        - --port
        - "8443"
        - --no-open
        - --insecure
      env:
        - name: HERMES_HOME
          value: /home/hermes/.hermes
        - name: HERMES_UID
          value: "1000"
        - name: HERMES_GID
          value: "1000"
        - name: HOME
          value: /home/hermes
        - name: XDG_CACHE_HOME
          value: /tmp/.cache
      ports:
        - name: dashboard
          containerPort: 8443
          protocol: TCP
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 2Gi
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        readOnlyRootFilesystem: false
      volumeMounts:
        - name: data
          mountPath: /home/hermes/.hermes
        - name: config
          mountPath: /home/hermes/.hermes/config.yaml
          subPath: config.yaml
          readOnly: true
        - name: tmp
          mountPath: /tmp
  networking:
    service:
      type: ClusterIP
    ingress:
      enabled: true
      className: nginx
      host: "hermes.${AI_APPLIANCE_DOMAIN:=example.local}"
      annotations:
        dashboard.ai-appliance.io/title: "Hermes"
        dashboard.ai-appliance.io/description: "Self-improving AI agent managed by the Hermes operator."
        dashboard.ai-appliance.io/icon: "HE"
        dashboard.ai-appliance.io/category: "AI"
        dashboard.ai-appliance.io/order: "45"
        lab42.io/mdns.enabled: "true"
        lab42.io/mdns.name: "hermes"
        nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
  observability:
    logging:
      level: info
