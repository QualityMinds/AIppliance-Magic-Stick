apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubeopencode
  namespace: flux-system
spec:
  interval: 10m0s
  targetNamespace: ai
  chart:
    spec:
      chart: kubeopencode
      version: "0.1.6"
      sourceRef:
        kind: HelmRepository
        name: kubeopencode
        namespace: flux-system
  install:
    createNamespace: false
  values:
    server:
      enabled: true
      service:
        port: 2746
      ingress:
        enabled: true
        className: nginx
        annotations:
          lab42.io/mdns.enabled: "true"
          lab42.io/mdns.name: "kubeopencode.${AI_APPLIANCE_MDNS_NAME:=magicstick}"
          lab42.io/mdns.host: "kubeopencode.${AI_APPLIANCE_MDNS_NAME:=magicstick}"
        hosts:
          - host: "kubeopencode.${AI_APPLIANCE_DOMAIN:=magicstick.example.com}"
            paths:
              - path: /
                pathType: Prefix
          - host: "kubeopencode.${AI_APPLIANCE_MDNS_DOMAIN:=magicstick.local}"
            paths:
              - path: /
                pathType: Prefix
