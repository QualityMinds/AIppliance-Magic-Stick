apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubeopencode
  namespace: flux-system
spec:
  interval: 10m0s
  targetNamespace: ai
  chart:
    spec:
      chart: kubeopencode
      version: "0.1.6"
      sourceRef:
        kind: HelmRepository
        name: kubeopencode
        namespace: flux-system
  install:
    createNamespace: false
  values:
    server:
      enabled: true
      service:
        port: 2746
      ingress:
        enabled: false
