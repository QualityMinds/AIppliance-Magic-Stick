apiVersion: apps/v1
kind: Deployment
metadata:
  name: anything-llm
  namespace: ai
  annotations:
    configmap.reloader.stakater.com/reload: anything-llm-config
    secret.reloader.stakater.com/reload: qdrant-auth-secret,litellm-masterkey-secret
  labels:
    app: anything-llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: anything-llm
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        ai-appliance.io/model-catalog-consumer: "true"
      labels:
        app: anything-llm
    spec:
      initContainers:
        - name: wait-model-catalog
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu
              for attempt in $(seq 1 120); do
                if [ -f /catalog/defaults.env ] && grep -q '^AI_APPLIANCE_MODEL_CATALOG_READY=true$' /catalog/defaults.env; then
                  exit 0
                fi
                echo "Waiting for ai-model-catalog ($attempt/120)"
                sleep 5
              done
              echo "ai-model-catalog did not become ready" >&2
              exit 1
          volumeMounts:
            - name: ai-model-catalog
              mountPath: /catalog
              readOnly: true
      containers:
        - name: anything-llm
          image: mintplexlabs/anythingllm:1.12.1
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: anything-llm-config
            - secretRef:
                name: qdrant-auth-secret
          env:
            - name: LITE_LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-masterkey-secret
                  key: LITELLM_MASTER_KEY
            - name: EMBEDDING_MODEL_PREF
              valueFrom:
                configMapKeyRef:
                  name: ai-model-catalog
                  key: AI_APPLIANCE_DEFAULT_EMBEDDING_MODEL
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            capabilities:
              add:
                - SYS_ADMIN
          volumeMounts:
            - name: anything-llm-storage
              mountPath: /app/server/storage
      volumes:
        - name: ai-model-catalog
          configMap:
            name: ai-model-catalog
        - name: anything-llm-storage
          persistentVolumeClaim:
            claimName: anything-llm-storage
