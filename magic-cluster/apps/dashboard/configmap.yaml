apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-appliance-dashboard-renderer
  namespace: dashboard
data:
  render.sh: |
    #!/bin/sh
    set -eu

    html_escape() {
      printf '%s' "$1" \
        | sed -e 's/&/\&amp;/g' \
              -e 's/</\&lt;/g' \
              -e 's/>/\&gt;/g' \
              -e 's/"/\&quot;/g' \
              -e "s/'/\&#39;/g"
    }

    while true; do
      tmp="$(mktemp /html/index.XXXXXX)"

      rendered_at="$(date -u '+%Y-%m-%d %H:%M:%SZ')"

      cat <<'HTML' > "$tmp"
    <!doctype html>
    <html lang="en">
    <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>AI Appliance Dashboard</title>
      <style>
        :root {
          color-scheme: dark;
          --bg: #050910;
          --panel: rgba(17, 24, 39, 0.82);
          --panel-strong: rgba(10, 16, 30, 0.95);
          --text: #e2e8f0;
          --muted: #9fb0c8;
          --line: rgba(148, 163, 184, 0.2);
          --accent: #7dd3fc;
          --accent-strong: #22d3ee;
          --good: #86efac;
        }

        * { box-sizing: border-box; }

        body {
          margin: 0;
          font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
          background: radial-gradient(circle at top, #0f1a31, #050910 60%);
          color: var(--text);
          min-height: 100vh;
        }

        .page {
          width: min(1120px, 100% - 2.5rem);
          margin: 2rem auto 3rem;
          display: grid;
          gap: 1.5rem;
        }

        .hero {
          background: linear-gradient(130deg, rgba(34, 211, 238, 0.18), rgba(15, 23, 42, 0.92));
          border: 1px solid rgba(125, 211, 252, 0.25);
          border-radius: 24px;
          padding: clamp(1.3rem, 2vw, 2rem);
          box-shadow: 0 18px 50px rgba(2, 8, 23, 0.45);
        }

        .eyebrow {
          margin: 0;
          text-transform: uppercase;
          letter-spacing: 0.09em;
          font-size: 0.75rem;
          color: var(--accent);
          font-weight: 700;
        }

        h1 {
          margin: 0.35rem 0 0;
          font-size: clamp(1.8rem, 3.6vw, 2.6rem);
          line-height: 1.2;
        }

        .subtitle {
          margin: 0.8rem 0 0;
          color: var(--muted);
          max-width: 62ch;
        }

        .helper {
          margin: 0.65rem 0 0;
          color: var(--muted);
          font-size: 0.9rem;
        }

        .hero-meta {
          margin-top: 1rem;
          display: flex;
          flex-wrap: wrap;
          gap: 0.65rem;
          color: #dbeafe;
          font-size: 0.88rem;
        }

        .chip {
          border: 1px solid var(--line);
          border-radius: 999px;
          padding: 0.35rem 0.7rem;
          background: rgba(15, 23, 42, 0.45);
        }

        .controls {
          margin-top: 1rem;
          display: grid;
          gap: 0.9rem;
        }

        .control-panel {
          background: rgba(8, 13, 24, 0.9);
          border: 1px solid rgba(125, 211, 252, 0.22);
          border-radius: 18px;
          padding: 1rem;
          display: grid;
          grid-template-columns: minmax(150px, 210px) minmax(0, 1fr);
          align-items: start;
          gap: 1rem;
        }

        .panel-heading {
          grid-column: 1 / -1;
          display: flex;
          align-items: baseline;
          justify-content: space-between;
          gap: 1rem;
          flex-wrap: wrap;
        }

        .panel-heading h2 {
          margin: 0;
          font-size: 1.2rem;
        }

        .tabs {
          grid-column: 1;
          grid-row: 2;
          display: grid;
          gap: 0.45rem;
          align-content: start;
        }

        .tab-button,
        .control-button {
          border: 1px solid rgba(125, 211, 252, 0.3);
          border-radius: 10px;
          background: rgba(15, 23, 42, 0.9);
          color: var(--text);
          cursor: pointer;
          font: inherit;
          padding: 0.45rem 0.7rem;
        }

        .tab-button {
          width: 100%;
          text-align: left;
        }

        .tab-button[aria-selected="true"],
        .control-button.primary {
          background: rgba(14, 116, 144, 0.65);
          border-color: rgba(125, 211, 252, 0.85);
        }

        .control-button.danger {
          border-color: rgba(248, 113, 113, 0.45);
          color: #fecaca;
        }

        .tab-button:disabled,
        .control-button:disabled,
        .field select:disabled {
          cursor: not-allowed;
          opacity: 0.55;
        }

        .tab-panel {
          grid-column: 2;
          grid-row: 2;
          min-width: 0;
        }

        .dashboard-grid {
          display: grid;
          gap: 0.85rem;
          grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
        }

        .dashboard-card {
          border: 1px solid rgba(100, 116, 139, 0.3);
          border-radius: 12px;
          background: rgba(15, 23, 42, 0.78);
          padding: 0.9rem;
          display: grid;
          gap: 0.65rem;
        }

        .dashboard-card h3 {
          margin: 0;
          font-size: 1rem;
        }

        .dashboard-card p {
          margin: 0;
          color: var(--muted);
          font-size: 0.88rem;
        }

        .overview-workspace {
          display: grid;
          gap: 1rem;
        }

        .overview-metrics {
          display: grid;
          gap: 0.75rem;
          grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
        }

        .overview-metric p {
          color: var(--text);
          font-size: 1rem;
          font-weight: 700;
        }

        .overview-panel {
          display: grid;
          gap: 0.75rem;
        }

        .overview-app-list {
          display: grid;
          gap: 0.55rem;
        }

        .overview-app-row {
          border: 1px solid rgba(148, 163, 184, 0.22);
          border-radius: 10px;
          padding: 0.7rem;
          display: grid;
          grid-template-columns: minmax(0, 1fr) auto;
          align-items: center;
          gap: 0.75rem;
          background: rgba(2, 6, 23, 0.32);
        }

        .overview-app-title {
          display: grid;
          gap: 0.18rem;
          min-width: 0;
        }

        .overview-app-title strong {
          overflow-wrap: anywhere;
        }

        .overview-app-title span {
          color: var(--muted);
          font-size: 0.8rem;
          overflow-wrap: anywhere;
        }

        .overview-app-actions {
          display: flex;
          flex-wrap: wrap;
          justify-content: flex-end;
          gap: 0.4rem;
        }

        .model-workspace {
          display: grid;
          gap: 1rem;
        }

        .model-vram-card {
          align-content: start;
        }

        .model-section {
          display: grid;
          gap: 0.7rem;
        }

        .model-create-panel,
        .instance-create-panel {
          display: grid;
          gap: 0.75rem;
        }

        .model-create-summary,
        .instance-create-summary {
          border: 1px solid rgba(125, 211, 252, 0.3);
          border-radius: 10px;
          background: rgba(15, 23, 42, 0.82);
          cursor: pointer;
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 0.75rem;
          list-style: none;
          padding: 0.7rem 0.85rem;
        }

        .model-create-summary::-webkit-details-marker,
        .instance-create-summary::-webkit-details-marker {
          display: none;
        }

        .model-create-summary span:first-child,
        .instance-create-summary span:first-child {
          display: grid;
          gap: 0.12rem;
        }

        .model-create-summary small,
        .instance-create-summary small {
          color: var(--muted);
          font-size: 0.78rem;
        }

        .model-create-grid,
        .instance-create-grid {
          display: grid;
          gap: 0.85rem;
          grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
          padding-top: 0.75rem;
        }

        .model-form {
          align-content: start;
        }

        .model-meta {
          display: flex;
          flex-wrap: wrap;
          gap: 0.45rem;
        }

        .model-meta-item {
          border: 1px solid rgba(148, 163, 184, 0.2);
          border-radius: 999px;
          color: var(--muted);
          font-size: 0.76rem;
          padding: 0.18rem 0.5rem;
          overflow-wrap: anywhere;
        }

        .model-meta-item strong {
          color: var(--text);
          font-weight: 600;
        }

        [hidden] {
          display: none !important;
        }

        .module-list {
          display: grid;
          gap: 1rem;
        }

        .module-group {
          display: grid;
          gap: 0.7rem;
        }

        .module-group-heading {
          display: flex;
          align-items: baseline;
          justify-content: space-between;
          gap: 0.7rem;
        }

        .module-group-heading h3 {
          margin: 0;
          font-size: 0.95rem;
        }

        .module-group-heading span {
          color: var(--muted);
          font-size: 0.78rem;
        }

        .module-grid {
          display: grid;
          gap: 0.75rem;
          grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        }

        .module-card {
          border: 1px solid rgba(148, 163, 184, 0.22);
          border-radius: 12px;
          padding: 0.8rem;
          display: grid;
          gap: 0.65rem;
          background: rgba(2, 6, 23, 0.38);
          min-width: 0;
        }

        .module-card-header {
          display: flex;
          align-items: flex-start;
          justify-content: space-between;
          gap: 0.65rem;
        }

        .module-card-title {
          display: grid;
          gap: 0.18rem;
          min-width: 0;
        }

        .module-card-title strong {
          overflow-wrap: anywhere;
        }

        .module-card-title span,
        .module-phase,
        .module-message {
          color: var(--muted);
          font-size: 0.8rem;
        }

        .module-message {
          min-height: 1rem;
          overflow-wrap: anywhere;
        }

        .resource-links {
          display: flex;
          flex-wrap: wrap;
          gap: 0.4rem;
        }

        .resource-link {
          border: 1px solid rgba(125, 211, 252, 0.32);
          border-radius: 999px;
          color: var(--accent);
          font-size: 0.78rem;
          overflow-wrap: anywhere;
          padding: 0.22rem 0.55rem;
          text-decoration: none;
        }

        .resource-link:hover,
        .resource-link:focus-visible {
          background: rgba(14, 116, 144, 0.25);
          border-color: rgba(125, 211, 252, 0.75);
          color: var(--text);
        }

        .credential-panel {
          border: 1px solid rgba(125, 211, 252, 0.24);
          border-radius: 10px;
          display: grid;
          gap: 0.55rem;
          padding: 0.65rem;
          background: rgba(15, 23, 42, 0.48);
        }

        .credential-heading,
        .credential-row {
          display: grid;
          gap: 0.35rem;
        }

        .credential-heading span,
        .credential-row label {
          color: var(--muted);
          font-size: 0.76rem;
        }

        .credential-value {
          display: grid;
          grid-template-columns: minmax(0, 1fr) auto;
          gap: 0.45rem;
        }

        .credential-value input {
          border: 1px solid var(--line);
          border-radius: 10px;
          background: rgba(2, 6, 23, 0.45);
          color: var(--text);
          font: inherit;
          min-width: 0;
          padding: 0.48rem 0.55rem;
        }

        .module-progress {
          display: grid;
          gap: 0.35rem;
        }

        .module-progress-row {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 0.65rem;
          color: var(--muted);
          font-size: 0.78rem;
        }

        .module-progress-track {
          height: 0.48rem;
          overflow: hidden;
          border-radius: 999px;
          background: rgba(15, 23, 42, 0.92);
          border: 1px solid rgba(148, 163, 184, 0.2);
        }

        .module-progress-value {
          height: 100%;
          width: var(--module-progress, 0%);
          border-radius: inherit;
          background: linear-gradient(90deg, rgba(34, 211, 238, 0.72), rgba(134, 239, 172, 0.82));
          transition: width 0.25s ease;
        }

        .module-progress.degraded .module-progress-value {
          background: linear-gradient(90deg, rgba(248, 113, 113, 0.72), rgba(251, 191, 36, 0.82));
        }

        .mini-list {
          display: grid;
          gap: 0.55rem;
        }

        .module-item,
        .mini-item {
          border: 1px solid rgba(148, 163, 184, 0.22);
          border-radius: 10px;
          padding: 0.65rem;
          display: grid;
          gap: 0.5rem;
          background: rgba(2, 6, 23, 0.38);
        }

        .module-row,
        .action-row {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 0.65rem;
          flex-wrap: wrap;
        }

        .module-advanced summary {
          color: var(--muted);
          cursor: pointer;
          font-size: 0.82rem;
        }

        .module-advanced .form-grid {
          margin-top: 0.55rem;
        }

        .status-pill {
          border-radius: 999px;
          border: 1px solid rgba(148, 163, 184, 0.32);
          padding: 0.2rem 0.55rem;
          color: #cbd5e1;
          font-size: 0.75rem;
          white-space: nowrap;
        }

        .status-pill.ready,
        .status-pill.enabled {
          border-color: rgba(134, 239, 172, 0.45);
          color: #bbf7d0;
        }

        .status-pill.waiting,
        .status-pill.disabled {
          border-color: rgba(251, 191, 36, 0.42);
          color: #fde68a;
        }

        .status-pill.degraded {
          border-color: rgba(248, 113, 113, 0.5);
          color: #fecaca;
        }

        .form-grid {
          display: grid;
          gap: 0.65rem;
          grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        }

        .field {
          display: grid;
          gap: 0.28rem;
          color: var(--muted);
          font-size: 0.8rem;
        }

        .field input,
        .field select,
        .field textarea {
          border: 1px solid var(--line);
          border-radius: 10px;
          background: rgba(15, 23, 42, 0.82);
          color: var(--text);
          font: inherit;
          padding: 0.55rem 0.65rem;
        }

        .field textarea {
          min-height: 5.5rem;
          resize: vertical;
        }

        .vram-estimate {
          border: 1px solid rgba(148, 163, 184, 0.22);
          border-radius: 10px;
          padding: 0.75rem;
          display: grid;
          gap: 0.7rem;
          background: rgba(2, 6, 23, 0.32);
        }

        .vram-estimate-header,
        .vram-estimate-row {
          display: flex;
          align-items: baseline;
          justify-content: space-between;
          gap: 0.65rem;
          flex-wrap: wrap;
        }

        .vram-estimate-header span,
        .vram-estimate-row span,
        .vram-estimate-meta {
          color: var(--muted);
          font-size: 0.8rem;
        }

        .vram-summary-grid {
          display: grid;
          gap: 0.55rem;
          grid-template-columns: repeat(auto-fit, minmax(125px, 1fr));
        }

        .vram-summary-grid div {
          border: 1px solid rgba(148, 163, 184, 0.2);
          border-radius: 10px;
          display: grid;
          gap: 0.16rem;
          padding: 0.6rem;
          background: rgba(15, 23, 42, 0.5);
        }

        .vram-summary-grid span {
          color: var(--muted);
          font-size: 0.74rem;
        }

        .vram-summary-grid strong {
          font-size: 1rem;
        }

        .vram-breakdown {
          display: grid;
          gap: 0.45rem;
          grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        }

        .vram-breakdown div {
          border: 1px solid rgba(148, 163, 184, 0.18);
          border-radius: 10px;
          padding: 0.55rem;
          display: grid;
          gap: 0.2rem;
          background: rgba(15, 23, 42, 0.5);
        }

        .vram-breakdown span {
          color: var(--muted);
          font-size: 0.76rem;
        }

        .vram-breakdown strong {
          font-size: 0.95rem;
        }

        .vram-estimate input[type="range"] {
          width: 100%;
          accent-color: #22d3ee;
        }

        .segmented-control {
          display: flex;
          flex-wrap: wrap;
          gap: 0.4rem;
        }

        .segmented-control .control-button {
          flex: 1 1 8rem;
          text-align: center;
        }

        .vram-breakdown-details summary {
          color: var(--muted);
          cursor: pointer;
          font-size: 0.82rem;
        }

        .vram-breakdown-details[open] summary {
          margin-bottom: 0.55rem;
        }

        .estimate-callouts {
          display: grid;
          gap: 0.4rem;
        }

        .estimate-callout {
          border: 1px solid rgba(125, 211, 252, 0.24);
          border-radius: 10px;
          color: var(--muted);
          font-size: 0.8rem;
          padding: 0.5rem 0.6rem;
          background: rgba(14, 116, 144, 0.12);
        }

        .estimate-callout.warning {
          border-color: rgba(251, 191, 36, 0.35);
          background: rgba(120, 53, 15, 0.18);
          color: #fde68a;
        }

        .vram-estimate .action-row {
          justify-content: flex-start;
        }

        .api-output {
          min-height: 1.3rem;
          color: var(--muted);
          font-size: 0.84rem;
        }

        footer {
          color: var(--muted);
          text-align: center;
          font-size: 0.82rem;
        }

        @media (max-width: 780px) {
          .control-panel {
            grid-template-columns: 1fr;
          }

          .tabs,
          .tab-panel {
            grid-column: 1;
            grid-row: auto;
          }

          .overview-app-row {
            grid-template-columns: 1fr;
          }

          .overview-app-actions {
            justify-content: flex-start;
          }
        }

        @media (max-width: 680px) {
          .page {
            width: min(1120px, 100% - 1.1rem);
            margin-top: 1rem;
          }

          .hero {
            border-radius: 18px;
          }
        }
      </style>
    </head>
    <body>
      <main class="page">
        <header class="hero">
          <p class="eyebrow">AI Appliance Platform</p>
          <h1>AI Appliance Dashboard</h1>
          <p class="subtitle">Manage the MagicStick appliance runtime from one place.</p>
          <div class="hero-meta">
            <span class="chip">Last updated: <strong>
    HTML
      printf '%s' "$(html_escape "$rendered_at")" >> "$tmp"
      cat <<'HTML' >> "$tmp"
            </strong></span>
            <span class="chip">Refresh cadence: every 30s</span>
          </div>
        </header>

        <section class="control-panel" aria-label="Appliance management">
          <div class="panel-heading">
            <h2>Appliance Control</h2>
            <span id="api-state" class="status-pill waiting">Connecting</span>
          </div>
          <nav class="tabs" aria-label="Dashboard pages">
            <button class="tab-button" type="button" aria-selected="true" data-tab="overview">Overview</button>
            <button class="tab-button" type="button" aria-selected="false" data-tab="modules">Modules</button>
            <button class="tab-button" type="button" aria-selected="false" data-tab="instances">Instances</button>
            <button class="tab-button" type="button" aria-selected="false" data-tab="models">Models</button>
            <button class="tab-button" type="button" aria-selected="false" data-tab="settings">Settings</button>
            <button class="tab-button" type="button" aria-selected="false" data-tab="system">System Status</button>
          </nav>

          <section id="tab-overview" class="tab-panel">
            <div class="overview-workspace">
              <div class="overview-metrics">
                <article class="dashboard-card overview-metric">
                  <h3>Appliance</h3>
                  <p id="appliance-summary">Loading</p>
                </article>
                <article class="dashboard-card overview-metric">
                  <h3>Modules</h3>
                  <p id="module-summary">Loading</p>
                </article>
                <article class="dashboard-card overview-metric">
                  <h3>Instances</h3>
                  <p id="instance-summary">Loading</p>
                </article>
                <article class="dashboard-card overview-metric">
                  <h3>Models</h3>
                  <p id="model-summary">Loading</p>
                </article>
              </div>
              <section class="dashboard-card overview-panel">
                <div class="module-group-heading">
                  <h3>Available Apps</h3>
                  <span id="overview-app-count">Loading</span>
                </div>
                <div id="overview-app-list" class="overview-app-list"></div>
              </section>
              <section class="dashboard-card overview-panel">
                <div class="module-group-heading">
                  <h3>Attention</h3>
                  <span id="overview-attention-count">Loading</span>
                </div>
                <div id="overview-attention-list" class="mini-list"></div>
              </section>
            </div>
          </section>

          <section id="tab-modules" class="tab-panel" hidden>
            <div id="module-list" class="module-list"></div>
            <p id="module-output" class="api-output"></p>
          </section>

          <section id="tab-instances" class="tab-panel" hidden>
            <article class="dashboard-card" id="instance-form-empty" hidden>
              <h3>No installed instance modules</h3>
            </article>
            <details class="instance-create-panel" id="instance-create-panel">
              <summary class="instance-create-summary">
                <span>
                  <strong>Create Instance</strong>
                  <small>Only installed instance modules are shown</small>
                </span>
                <span class="status-pill">Create</span>
              </summary>
              <div class="instance-create-grid">
              <form class="dashboard-card instance-form" data-instance-type="openclaw">
                <h3>OpenClaw</h3>
                <div class="form-grid">
                  <label class="field">Name<input name="name" value="default" /></label>
                  <label class="field">Model<select name="model" data-model-select="chat" data-model-fallback="CHANGEME_MODEL"><option value="">Loading models</option></select></label>
                </div>
                <details class="module-advanced">
                  <summary>Configure</summary>
                  <div class="form-grid">
                    <label class="field">Storage<input name="storage" value="20Gi" /></label>
                  </div>
                </details>
                <button class="control-button primary" type="submit">Create OpenClaw</button>
              </form>
              <form class="dashboard-card instance-form" data-instance-type="hermes">
                <h3>Hermes</h3>
                <div class="form-grid">
                  <label class="field">Name<input name="name" value="default" /></label>
                  <label class="field">Model<select name="model" data-model-select="chat" data-model-fallback="qwen3635b"><option value="">Loading models</option></select></label>
                </div>
                <details class="module-advanced">
                  <summary>Configure</summary>
                  <div class="form-grid">
                    <label class="field">Storage<input name="storage" value="10Gi" /></label>
                  </div>
                </details>
                <button class="control-button primary" type="submit">Create Hermes</button>
