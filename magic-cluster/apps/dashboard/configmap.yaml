apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-appliance-dashboard-renderer
  namespace: dashboard
data:
  render.sh: |
    #!/bin/sh
    set -eu

    html_escape() {
      printf '%s' "$1" \
        | sed -e 's/&/\&amp;/g' \
              -e 's/</\&lt;/g' \
              -e 's/>/\&gt;/g' \
              -e 's/"/\&quot;/g' \
              -e "s/'/\&#39;/g"
    }

    normalize_whitespace() {
      printf '%s' "$1" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//'
    }

    title_case() {
      printf '%s' "$1" | awk '{ for (i = 1; i <= NF; i++) { $i = toupper(substr($i,1,1)) tolower(substr($i,2)) } print }'
    }

    prettify_name() {
      raw="$(printf '%s' "$1" | tr '._-' '   ')"
      title_case "$(normalize_whitespace "$raw")"
    }

    classify_category() {
      category="$(normalize_whitespace "$1")"
      lower="$(printf '%s' "$category" | tr '[:upper:]' '[:lower:]')"
      case "$lower" in
        ai|ml|llm)
          printf '1\tAI'
          ;;
        observability|monitoring|metrics)
          printf '2\tObservability'
          ;;
        infrastructure|platform|ops)
          printf '3\tInfrastructure'
          ;;
        other|misc)
          printf '90\tOther'
          ;;
        "")
          printf '90\tOther'
          ;;
        *)
          printf '50\t%s' "$(title_case "$category")"
          ;;
      esac
    }

    category_from_host() {
      host_lower="$(printf '%s' "$1" | tr '[:upper:]' '[:lower:]')"
      case "$host_lower" in
        litellm.*|anythingllm.*|openwebui.*|ollama.*)
          printf 'AI'
          ;;
        grafana.*|prometheus.*|alertmanager.*|loki.*)
          printf 'Observability'
          ;;
        argocd.*|flux.*)
          printf 'Infrastructure'
          ;;
        *)
          printf 'Other'
          ;;
      esac
    }

    icon_from_host() {
      host_lower="$(printf '%s' "$1" | tr '[:upper:]' '[:lower:]')"
      case "$host_lower" in
        anythingllm.*)
          printf '💬'
          ;;
        litellm.*)
          printf '🧠'
          ;;
        grafana.*)
          printf '📊'
          ;;
        prometheus.*)
          printf '📈'
          ;;
        alertmanager.*)
          printf '🚨'
          ;;
        *)
          printf ''
          ;;
      esac
    }

    title_from_host() {
      host="$1"
      namespace="$2"
      ingress="$3"
      host_prefix="$(printf '%s' "$host" | cut -d . -f 1)"
      host_lower="$(printf '%s' "$host_prefix" | tr '[:upper:]' '[:lower:]')"
      case "$host_lower" in
        litellm)
          printf 'LiteLLM'
          ;;
        anythingllm)
          printf 'AnythingLLM'
          ;;
        grafana)
          printf 'Grafana'
          ;;
        prometheus)
          printf 'Prometheus'
          ;;
        alertmanager)
          printf 'Alertmanager'
          ;;
        *)
          if [ -n "$host_prefix" ] && [ "$host_prefix" != "<none>" ]; then
            prettify_name "$host_prefix"
          elif [ -n "$ingress" ]; then
            prettify_name "$ingress"
          else
            prettify_name "$namespace"
          fi
          ;;
      esac
    }

    description_from_host() {
      host_lower="$(printf '%s' "$1" | tr '[:upper:]' '[:lower:]')"
      namespace="$2"
      case "$host_lower" in
        litellm.*)
          printf 'OpenAI-compatible gateway for model routing and API access.'
          ;;
        anythingllm.*)
          printf 'Chat and agent workspace for retrieval-augmented AI workflows.'
          ;;
        grafana.*)
          printf 'Dashboards and visualizations for platform telemetry.'
          ;;
        prometheus.*)
          printf 'Metrics explorer and rule evaluation for the cluster.'
          ;;
        alertmanager.*)
          printf 'Alert routing, grouping, and silencing management.'
          ;;
        *)
          printf 'Auto-discovered ingress endpoint in namespace "%s".' "$namespace"
          ;;
      esac
    }

    slugify() {
      printf '%s' "$1" \
        | tr '[:upper:]' '[:lower:]' \
        | sed -e 's/[^a-z0-9]/-/g' -e 's/-\{2,\}/-/g' -e 's/^-//' -e 's/-$//'
    }

    normalize_order() {
      value="$(normalize_whitespace "$1")"
      if printf '%s' "$value" | grep -Eq '^-?[0-9]+$'; then
        printf '%s' "$value"
      else
        printf '1000'
      fi
    }

    while true; do
      tmp="$(mktemp /html/index.XXXXXX)"
      entries_raw="$(mktemp /tmp/dashboard-entries.XXXXXX)"
      entries_sorted="$(mktemp /tmp/dashboard-sorted.XXXXXX)"
      sections_tmp="$(mktemp /tmp/dashboard-sections.XXXXXX)"
      links_tmp="$(mktemp /tmp/dashboard-links.XXXXXX)"

      rendered_at="$(date -u '+%Y-%m-%d %H:%M:%SZ')"

      kubectl get ingresses.networking.k8s.io -A -o jsonpath='{range .items[*]}{.metadata.namespace}{"|"}{.metadata.name}{"|"}{.metadata.annotations.dashboard\.ai-appliance\.io/title}{"|"}{.metadata.annotations.dashboard\.ai-appliance\.io/description}{"|"}{.metadata.annotations.dashboard\.ai-appliance\.io/icon}{"|"}{.metadata.annotations.dashboard\.ai-appliance\.io/category}{"|"}{.metadata.annotations.dashboard\.ai-appliance\.io/order}{"|"}{range .spec.rules[*]}{.host}{","}{end}{"\n"}{end}' \
        | while IFS='|' read -r namespace ingress ann_title ann_description ann_icon ann_category ann_order hosts; do
            [ -z "$hosts" ] && continue
            for host in $(printf '%s' "$hosts" | tr ',' ' '); do
              [ -z "$host" ] && continue
              [ "$host" = "<none>" ] && continue
              [ "$host" = "${AI_APPLIANCE_DASHBOARD_HOST:=dashboard.example.local}" ] && continue

              title="$(normalize_whitespace "$ann_title")"
              [ -n "$title" ] || title="$(title_from_host "$host" "$namespace" "$ingress")"

              description="$(normalize_whitespace "$ann_description")"
              [ -n "$description" ] || description="$(description_from_host "$host" "$namespace")"

              icon="$(normalize_whitespace "$ann_icon")"
              [ -n "$icon" ] || icon="$(icon_from_host "$host")"

              category="$(normalize_whitespace "$ann_category")"
              [ -n "$category" ] || category="$(category_from_host "$host")"

              rank_and_label="$(classify_category "$category")"
              category_rank="$(printf '%s' "$rank_and_label" | cut -f1)"
              category_label="$(printf '%s' "$rank_and_label" | cut -f2-)"
              category_slug="$(slugify "$category_label")"

              order="$(normalize_order "$ann_order")"

              printf '%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\n' \
                "$category_rank" "$category_label" "$order" "$title" "$host" "$description" "$namespace" "$ingress" "$icon" "$category_slug" >> "$entries_raw"
            done
          done

      LC_ALL=C sort -t "$(printf '\t')" -k1,1n -k2,2f -k3,3n -k4,4f -k5,5f "$entries_raw" > "$entries_sorted"

      cat <<'HTML' > "$tmp"
    <!doctype html>
    <html lang="en">
    <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>AI Appliance Dashboard</title>
      <style>
        :root {
          color-scheme: dark;
          --bg: #050910;
          --panel: rgba(17, 24, 39, 0.82);
          --panel-strong: rgba(10, 16, 30, 0.95);
          --text: #e2e8f0;
          --muted: #9fb0c8;
          --line: rgba(148, 163, 184, 0.2);
          --accent: #7dd3fc;
          --accent-strong: #22d3ee;
          --good: #86efac;
        }

        * { box-sizing: border-box; }

        body {
          margin: 0;
          font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
          background: radial-gradient(circle at top, #0f1a31, #050910 60%);
          color: var(--text);
          min-height: 100vh;
        }

        .page {
          width: min(1120px, 100% - 2.5rem);
          margin: 2rem auto 3rem;
          display: grid;
          gap: 1.5rem;
        }

        .hero {
          background: linear-gradient(130deg, rgba(34, 211, 238, 0.18), rgba(15, 23, 42, 0.92));
          border: 1px solid rgba(125, 211, 252, 0.25);
          border-radius: 24px;
          padding: clamp(1.3rem, 2vw, 2rem);
          box-shadow: 0 18px 50px rgba(2, 8, 23, 0.45);
        }

        .eyebrow {
          margin: 0;
          text-transform: uppercase;
          letter-spacing: 0.09em;
          font-size: 0.75rem;
          color: var(--accent);
          font-weight: 700;
        }

        h1 {
          margin: 0.35rem 0 0;
          font-size: clamp(1.8rem, 3.6vw, 2.6rem);
          line-height: 1.2;
        }

        .subtitle {
          margin: 0.8rem 0 0;
          color: var(--muted);
          max-width: 62ch;
        }

        .helper {
          margin: 0.65rem 0 0;
          color: var(--muted);
          font-size: 0.9rem;
        }

        .hero-meta {
          margin-top: 1rem;
          display: flex;
          flex-wrap: wrap;
          gap: 0.65rem;
          color: #dbeafe;
          font-size: 0.88rem;
        }

        .chip {
          border: 1px solid var(--line);
          border-radius: 999px;
          padding: 0.35rem 0.7rem;
          background: rgba(15, 23, 42, 0.45);
        }

        .controls {
          margin-top: 1rem;
          display: grid;
          gap: 0.9rem;
        }

        .control-panel {
          background: rgba(8, 13, 24, 0.9);
          border: 1px solid rgba(125, 211, 252, 0.22);
          border-radius: 18px;
          padding: 1rem;
          display: grid;
          gap: 1rem;
        }

        .panel-heading {
          display: flex;
          align-items: baseline;
          justify-content: space-between;
          gap: 1rem;
          flex-wrap: wrap;
        }

        .panel-heading h2 {
          margin: 0;
          font-size: 1.2rem;
        }

        .tabs {
          display: flex;
          gap: 0.45rem;
          flex-wrap: wrap;
        }

        .tab-button,
        .control-button {
          border: 1px solid rgba(125, 211, 252, 0.3);
          border-radius: 10px;
          background: rgba(15, 23, 42, 0.9);
          color: var(--text);
          cursor: pointer;
          font: inherit;
          padding: 0.45rem 0.7rem;
        }

        .tab-button[aria-selected="true"],
        .control-button.primary {
          background: rgba(14, 116, 144, 0.65);
          border-color: rgba(125, 211, 252, 0.85);
        }

        .control-button.danger {
          border-color: rgba(248, 113, 113, 0.45);
          color: #fecaca;
        }

        .dashboard-grid {
          display: grid;
          gap: 0.85rem;
          grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
        }

        .dashboard-card {
          border: 1px solid rgba(100, 116, 139, 0.3);
          border-radius: 12px;
          background: rgba(15, 23, 42, 0.78);
          padding: 0.9rem;
          display: grid;
          gap: 0.65rem;
        }

        .dashboard-card h3 {
          margin: 0;
          font-size: 1rem;
        }

        .dashboard-card p {
          margin: 0;
          color: var(--muted);
          font-size: 0.88rem;
        }

        .tab-panel[hidden] {
          display: none;
        }

        .module-list,
        .mini-list {
          display: grid;
          gap: 0.55rem;
        }

        .module-item,
        .mini-item {
          border: 1px solid rgba(148, 163, 184, 0.22);
          border-radius: 10px;
          padding: 0.65rem;
          display: grid;
          gap: 0.5rem;
          background: rgba(2, 6, 23, 0.38);
        }

        .module-row,
        .action-row {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 0.65rem;
          flex-wrap: wrap;
        }

        .status-pill {
          border-radius: 999px;
          border: 1px solid rgba(148, 163, 184, 0.32);
          padding: 0.2rem 0.55rem;
          color: #cbd5e1;
          font-size: 0.75rem;
          white-space: nowrap;
        }

        .status-pill.ready,
        .status-pill.enabled {
          border-color: rgba(134, 239, 172, 0.45);
          color: #bbf7d0;
        }

        .status-pill.waiting,
        .status-pill.disabled {
          border-color: rgba(251, 191, 36, 0.42);
          color: #fde68a;
        }

        .form-grid {
          display: grid;
          gap: 0.65rem;
          grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        }

        .field {
          display: grid;
          gap: 0.28rem;
          color: var(--muted);
          font-size: 0.8rem;
        }

        .field input,
        .field select,
        .field textarea {
          border: 1px solid var(--line);
          border-radius: 10px;
          background: rgba(15, 23, 42, 0.82);
          color: var(--text);
          font: inherit;
          padding: 0.55rem 0.65rem;
        }

        .field textarea {
          min-height: 5.5rem;
          resize: vertical;
        }

        .api-output {
          min-height: 1.3rem;
          color: var(--muted);
          font-size: 0.84rem;
        }

        .search {
          width: 100%;
          border: 1px solid var(--line);
          border-radius: 12px;
          background: rgba(15, 23, 42, 0.75);
          color: var(--text);
          font-size: 0.96rem;
          padding: 0.72rem 0.88rem;
          transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .search:focus {
          outline: none;
          border-color: rgba(34, 211, 238, 0.75);
          box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.18);
        }

        .quick-links {
          display: flex;
          flex-wrap: wrap;
          gap: 0.5rem;
        }

        .quick-links a {
          display: inline-block;
          border-radius: 999px;
          text-decoration: none;
          padding: 0.36rem 0.7rem;
          border: 1px solid var(--line);
          color: #dbeafe;
          background: rgba(15, 23, 42, 0.6);
          transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
        }

        .quick-links a:hover {
          transform: translateY(-1px);
          border-color: rgba(34, 211, 238, 0.9);
          background: rgba(15, 23, 42, 0.95);
        }

        .category {
          background: var(--panel);
          border: 1px solid var(--line);
          border-radius: 18px;
          padding: 1.1rem;
          backdrop-filter: blur(6px);
        }

        .category-head {
          display: flex;
          align-items: baseline;
          justify-content: space-between;
          gap: 0.75rem;
          margin-bottom: 0.95rem;
        }

        .category h2 {
          margin: 0;
          font-size: 1.1rem;
        }

        .count {
          color: var(--muted);
          font-size: 0.84rem;
        }

        .cards {
          display: grid;
          gap: 0.85rem;
          grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        }

        .app-card {
          display: grid;
          gap: 0.7rem;
          padding: 1rem;
          border-radius: 14px;
          border: 1px solid rgba(100, 116, 139, 0.28);
          background: var(--panel-strong);
          transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .app-card:hover {
          transform: translateY(-3px);
          border-color: rgba(34, 211, 238, 0.82);
          box-shadow: 0 16px 32px rgba(0, 0, 0, 0.35);
        }

        .title-row {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 0.65rem;
        }

        .app-title {
          margin: 0;
          font-size: 1.03rem;
          line-height: 1.3;
        }

        .icon {
          font-size: 1.3rem;
        }

        .description {
          margin: 0;
          color: var(--muted);
          font-size: 0.9rem;
          min-height: 2.2rem;
        }

        .app-url {
          color: var(--accent);
          text-decoration: none;
          font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
          font-size: 0.82rem;
          overflow-wrap: anywhere;
        }

        .app-url:hover {
          color: var(--accent-strong);
          text-decoration: underline;
        }

        .meta {
          display: flex;
          flex-wrap: wrap;
          gap: 0.45rem;
        }

        .badge {
          border-radius: 999px;
          border: 1px solid rgba(125, 211, 252, 0.3);
          background: rgba(30, 41, 59, 0.85);
          color: #cbd5e1;
          font-size: 0.75rem;
          padding: 0.2rem 0.55rem;
          white-space: nowrap;
        }

        .badge.category {
          border-color: rgba(34, 211, 238, 0.45);
          color: #99f6e4;
        }

        .badge.namespace {
          color: var(--good);
        }

        .empty,
        .search-empty {
          border: 1px dashed rgba(148, 163, 184, 0.35);
          border-radius: 14px;
          padding: 1rem;
          color: var(--muted);
          text-align: center;
          background: rgba(15, 23, 42, 0.5);
        }

        footer {
          color: var(--muted);
          text-align: center;
          font-size: 0.82rem;
        }

        @media (max-width: 680px) {
          .page {
            width: min(1120px, 100% - 1.1rem);
            margin-top: 1rem;
          }

          .hero {
            border-radius: 18px;
          }

          .category {
            border-radius: 14px;
            padding: 0.9rem;
          }
        }
      </style>
    </head>
    <body>
      <main class="page">
        <header class="hero">
          <p class="eyebrow">AI Appliance Platform</p>
          <h1>AI Appliance Dashboard</h1>
          <p class="subtitle">Discover platform applications from Kubernetes Ingress resources in one polished landing page.</p>
          <p class="helper">Entries are auto-discovered from ingresses and can be curated with <code>dashboard.ai-appliance.io/*</code> annotations.</p>
          <div class="hero-meta">
            <span class="chip">Last updated: <strong>
    HTML
      printf '%s' "$(html_escape "$rendered_at")" >> "$tmp"
      cat <<'HTML' >> "$tmp"
            </strong></span>
            <span class="chip">Refresh cadence: every 30s</span>
          </div>
          <div class="controls">
            <input id="search" class="search" type="search" placeholder="Search applications, namespace, ingress, or URL" aria-label="Search applications" />
            <nav class="quick-links" aria-label="Jump to category">
    HTML

      if [ -s "$entries_sorted" ]; then
        current_category=''
        current_slug=''
        current_count=0

        while IFS="$(printf '\t')" read -r category_rank category_label order title host description namespace ingress icon category_slug; do
          [ -n "$host" ] || continue

          if [ "$category_label" != "$current_category" ]; then
            if [ -n "$current_category" ]; then
              printf '          </div>\n        </section>\n' >> "$sections_tmp"
            fi
            current_category="$category_label"
            current_slug="$category_slug"
            current_count=0

            printf '              <a href="#category-%s">%s</a>\n' \
              "$(html_escape "$current_slug")" "$(html_escape "$current_category")" >> "$links_tmp"

            printf '        <section class="category" id="category-%s">\n          <div class="category-head">\n            <h2>%s</h2>\n            <span class="count">\n' \
              "$(html_escape "$current_slug")" "$(html_escape "$current_category")" >> "$sections_tmp"
            printf 'Apps discovered in this section</span>\n          </div>\n          <div class="cards">\n' >> "$sections_tmp"
          fi

          current_count=$((current_count + 1))

          search_data="$(printf '%s %s %s %s %s %s' "$title" "$host" "$description" "$namespace" "$ingress" "$category_label" | tr '[:upper:]' '[:lower:]')"
          url="http://$host/"
          escaped_icon="$(html_escape "$icon")"

          printf '            <article class="app-card" data-search="%s">\n' "$(html_escape "$search_data")" >> "$sections_tmp"
          printf '              <div class="title-row">\n                <h3 class="app-title">%s</h3>\n' "$(html_escape "$title")" >> "$sections_tmp"
          if [ -n "$icon" ]; then
            printf '                <span class="icon" aria-hidden="true">%s</span>\n' "$escaped_icon" >> "$sections_tmp"
          fi
          printf '              </div>\n' >> "$sections_tmp"
          printf '              <p class="description">%s</p>\n' "$(html_escape "$description")" >> "$sections_tmp"
          printf '              <a class="app-url" data-host="%s" href="%s">%s</a>\n' "$(html_escape "$host")" "$(html_escape "$url")" "$(html_escape "$url")" >> "$sections_tmp"
          printf '              <div class="meta">\n' >> "$sections_tmp"
          printf '                <span class="badge category">%s</span>\n' "$(html_escape "$category_label")" >> "$sections_tmp"
          printf '                <span class="badge namespace">namespace: %s</span>\n' "$(html_escape "$namespace")" >> "$sections_tmp"
          printf '                <span class="badge">ingress: %s</span>\n' "$(html_escape "$ingress")" >> "$sections_tmp"
          printf '              </div>\n' >> "$sections_tmp"
          printf '            </article>\n' >> "$sections_tmp"
        done < "$entries_sorted"

        if [ -n "$current_category" ]; then
          printf '          </div>\n        </section>\n' >> "$sections_tmp"
        fi

        cat "$links_tmp" >> "$tmp"
      else
        printf '              <a href="#applications">Applications</a>\n' >> "$tmp"
      fi

      cat <<'HTML' >> "$tmp"
            </nav>
          </div>
        </header>

        <section class="control-panel" aria-label="Appliance management">
          <div class="panel-heading">
            <h2>Appliance Control</h2>
            <span id="api-state" class="status-pill waiting">Connecting</span>
          </div>
          <nav class="tabs" aria-label="Dashboard pages">
            <button class="tab-button" type="button" aria-selected="true" data-tab="overview">Overview</button>
            <button class="tab-button" type="button" aria-selected="false" data-tab="modules">Modules</button>
            <button class="tab-button" type="button" aria-selected="false" data-tab="instances">Instances</button>
            <button class="tab-button" type="button" aria-selected="false" data-tab="models">Models</button>
            <button class="tab-button" type="button" aria-selected="false" data-tab="system">System Status</button>
          </nav>

          <section id="tab-overview" class="tab-panel">
            <div class="dashboard-grid">
              <article class="dashboard-card">
                <h3>Appliance</h3>
                <p id="appliance-summary">Loading</p>
                <div id="appliance-conditions" class="mini-list"></div>
              </article>
              <article class="dashboard-card">
                <h3>Modules</h3>
                <p id="module-summary">Loading</p>
              </article>
              <article class="dashboard-card">
                <h3>Instances</h3>
                <p id="instance-summary">Loading</p>
              </article>
            </div>
          </section>

          <section id="tab-modules" class="tab-panel" hidden>
            <div id="module-list" class="module-list"></div>
            <p id="module-output" class="api-output"></p>
          </section>

          <section id="tab-instances" class="tab-panel" hidden>
            <div class="dashboard-grid">
              <form class="dashboard-card instance-form" data-instance-type="openclaw">
                <h3>OpenClaw</h3>
                <div class="form-grid">
                  <label class="field">Name<input name="name" value="default" /></label>
                  <label class="field">Model<input name="model" value="CHANGEME_MODEL" /></label>
                  <label class="field">Host<input name="host" value="openclaw.example.local" /></label>
                  <label class="field">Storage<input name="storage" value="20Gi" /></label>
                </div>
                <button class="control-button primary" type="submit">Create OpenClaw</button>
              </form>
              <form class="dashboard-card instance-form" data-instance-type="kubeopencode">
                <h3>KubeOpenCode</h3>
                <div class="form-grid">
                  <label class="field">Name<input name="name" value="default" /></label>
                  <label class="field">Model<input name="model" value="CHANGEME_MODEL" /></label>
                  <label class="field">Host<input name="host" value="kubeopencode.example.local" /></label>
                  <label class="field">Template<input name="template" value="default-coder" /></label>
                </div>
                <button class="control-button primary" type="submit">Create KubeOpenCode</button>
              </form>
            </div>
            <div id="instance-list" class="mini-list"></div>
            <p id="instance-output" class="api-output"></p>
          </section>

          <section id="tab-models" class="tab-panel" hidden>
            <div class="dashboard-grid">
              <article class="dashboard-card">
                <h3>Model Catalog</h3>
                <p id="model-summary">Waiting for model status.</p>
                <div id="model-stack" class="mini-list"></div>
              </article>
              <article class="dashboard-card">
                <h3>VRAM</h3>
                <p id="vram-summary">Waiting for GPU metrics.</p>
                <div id="vram-list" class="mini-list"></div>
              </article>
            </div>
            <div class="dashboard-grid">
              <form class="dashboard-card" id="local-model-form">
                <h3>Add Local Model</h3>
                <div class="form-grid">
                  <label class="field">Name<input name="name" value="qwen352bvlembedding" /></label>
                  <label class="field">Preset<select name="preset" id="local-model-preset"><option value="qwen352bvlembedding">qwen352bvlembedding</option><option value="qwen3635b">qwen3635b</option><option value="qwen359b">qwen359b</option><option value="custom">Custom</option></select></label>
                  <label class="field">Type<select name="modelType"><option value="chat">chat</option><option value="embedding">embedding</option></select></label>
                  <label class="field">VRAM<input name="vram" value="5Gi" /></label>
                  <label class="field">HF URL<input name="url" placeholder="hf://example/model" /></label>
                  <label class="field">Context<input name="contextWindow" value="4096" /></label>
                </div>
                <button class="control-button primary" type="submit">Add Local Model</button>
              </form>
              <form class="dashboard-card" id="external-model-form">
                <h3>Add External Model</h3>
                <div class="form-grid">
                  <label class="field">Name<input name="name" value="example-openai-gpt-4o-mini" /></label>
                  <label class="field">Provider Model<input name="model" value="openai/gpt-4o-mini" /></label>
                  <label class="field">API Base<input name="apiBase" value="https://api.openai.com/v1" /></label>
                  <label class="field">Type<select name="modelType"><option value="chat">chat</option><option value="embedding">embedding</option></select></label>
                  <label class="field">Context<input name="contextWindow" value="128000" /></label>
                  <label class="field">API Key<input name="apiKey" type="password" placeholder="CHANGEME" /></label>
                </div>
                <button class="control-button primary" type="submit">Add External Model</button>
              </form>
            </div>
            <div class="dashboard-card">
              <h3>Models</h3>
              <div id="model-list" class="mini-list"></div>
            </div>
            <p id="model-output" class="api-output"></p>
          </section>

          <section id="tab-system" class="tab-panel" hidden>
            <div class="dashboard-grid">
              <article class="dashboard-card"><h3>Flux</h3><div id="flux-list" class="mini-list"></div></article>
              <article class="dashboard-card"><h3>Pods</h3><p id="pod-summary">Loading</p></article>
              <article class="dashboard-card"><h3>Ingresses</h3><div id="ingress-list" class="mini-list"></div></article>
            </div>
          </section>
        </section>

        <section id="applications">
          <div id="search-empty" class="search-empty" hidden>No applications match your search.</div>
    HTML

      if [ -s "$entries_sorted" ]; then
        cat "$sections_tmp" >> "$tmp"
      else
        cat <<'HTML' >> "$tmp"
          <div class="empty">
            <strong>No applications discovered yet.</strong><br />
            Add an Ingress resource and it will appear here automatically.
          </div>
    HTML
      fi

      cat <<'HTML' >> "$tmp"
        </section>

        <footer>
          Generated by the dashboard renderer using cluster ingress discovery.
        </footer>
      </main>
      <script>
        (() => {
          const moduleNames = [
            ['litellm', 'LiteLLM'],
            ['model-catalog', 'Model Catalog'],
            ['kubeai', 'KubeAI'],
            ['anything-llm', 'AnythingLLM'],
            ['openclaw-operator', 'OpenClaw Operator'],
            ['hermes-operator', 'Hermes Operator'],
            ['paperclip-operator', 'Paperclip Operator'],
            ['kubeopencode', 'KubeOpenCode'],
            ['observability', 'Observability'],
            ['gpu', 'GPU']
          ];
          const $ = (id) => document.getElementById(id);
          const apiState = $('api-state');

          const setApiState = (text, ok = false) => {
            if (!apiState) { return; }
            apiState.textContent = text;
            apiState.className = ok ? 'status-pill ready' : 'status-pill waiting';
          };

          const request = async (path, options = {}) => {
            const response = await fetch(path, {
              headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
              ...options
            });
            const payload = await response.json().catch(() => ({}));
            if (!response.ok) {
              throw new Error(payload.error || response.statusText);
            }
            return payload;
          };

          const moduleSpec = (modulePayload, name) => {
            const modules = ((modulePayload || {}).modules || {});
            return modules[name] || {};
          };

          const renderConditions = (conditions) => {
            const target = $('appliance-conditions');
            if (!target) { return; }
            target.innerHTML = '';
            (conditions || []).slice(0, 5).forEach((condition) => {
              const item = document.createElement('div');
              item.className = 'mini-item';
              item.textContent = (condition.type || 'Condition') + ': ' + (condition.status || 'Unknown') + ' ' + (condition.reason || '');
              target.appendChild(item);
            });
          };

          const renderModules = (modulePayload) => {
            const list = $('module-list');
            if (!list) { return; }
            list.innerHTML = '';
            moduleNames.forEach(([name, title]) => {
              const spec = moduleSpec(modulePayload, name);
              const enabled = spec.enabled === true;
              const phase = (((spec.status || {}).phase) || (enabled ? 'Requested' : 'Disabled'));
              const item = document.createElement('div');
              item.className = 'module-item';
              item.innerHTML =
                '<div class="module-row">' +
                  '<strong>' + title + '</strong>' +
                  '<span class="status-pill ' + (enabled ? 'enabled' : 'disabled') + '">' + (enabled ? 'Enabled' : 'Disabled') + '</span>' +
                '</div>' +
                '<div class="mini-item">' + phase + '</div>' +
                '<div class="action-row">' +
                  '<button class="control-button primary" type="button" data-module-enable="' + name + '">Enable</button>' +
                  '<button class="control-button danger" type="button" data-module-disable="' + name + '">Disable</button>' +
                '</div>';
              list.appendChild(item);
            });
          };

          const renderInstances = (instancePayload) => {
            const list = $('instance-list');
            if (!list) { return; }
            list.innerHTML = '';
            const instances = ((instancePayload || {}).instances || {});
            Object.keys(instances).forEach((type) => {
              (instances[type] || []).forEach((instance) => {
                const metadata = instance.metadata || {};
                const spec = instance.spec || {};
                const status = instance.status || {};
                const item = document.createElement('div');
                item.className = 'mini-item';
                item.textContent = type + '/' + (metadata.name || 'unnamed') + ' in ' + (spec.targetNamespace || 'ai') + ' - ' + (status.phase || 'Requested');
                list.appendChild(item);
              });
            });
            if (!list.childElementCount) {
              const item = document.createElement('div');
              item.className = 'mini-item';
              item.textContent = 'No instances requested.';
              list.appendChild(item);
            }
          };

          const formatMi = (value) => {
            const number = Number(value || 0);
            if (number >= 1024) {
              return (number / 1024).toFixed(number >= 10240 ? 0 : 1) + ' GiB';
            }
            return number + ' MiB';
          };

          const renderModelStack = (modelPayload) => {
            const target = $('model-stack');
            if (!target) { return; }
            target.innerHTML = '';
            const modules = (modelPayload || {}).modules || {};
            [['gpu', 'GPU'], ['kubeai', 'KubeAI'], ['litellm', 'LiteLLM'], ['model-catalog', 'Model Catalog'], ['anything-llm', 'AnythingLLM']].forEach(([name, title]) => {
              const spec = modules[name] || {};
              const enabled = spec.enabled === true;
              const status = (spec.status || {}).phase || (enabled ? 'Requested' : 'Disabled');
              const item = document.createElement('div');
              item.className = 'mini-item';
              const row = document.createElement('div');
              row.className = 'module-row';
              const label = document.createElement('strong');
              label.textContent = title;
              const pill = document.createElement('span');
              pill.className = 'status-pill ' + (enabled ? 'enabled' : 'disabled');
              pill.textContent = status;
              row.append(label, pill);
              const actions = document.createElement('div');
              actions.className = 'action-row';
              const enable = document.createElement('button');
              enable.className = 'control-button primary';
              enable.type = 'button';
              enable.dataset.moduleEnable = name;
              enable.textContent = 'Enable';
              const disable = document.createElement('button');
              disable.className = 'control-button danger';
              disable.type = 'button';
              disable.dataset.moduleDisable = name;
              disable.textContent = 'Disable';
              actions.append(enable, disable);
              item.append(row, actions);
              if (name === 'anything-llm' && (modelPayload.anythingLlm || {}).url) {
                const link = document.createElement('a');
                link.href = modelPayload.anythingLlm.url;
                link.textContent = modelPayload.anythingLlm.url;
                item.appendChild(link);
              }
              target.appendChild(item);
            });
          };

          const renderVram = (modelPayload) => {
            const summary = $('vram-summary');
            const list = $('vram-list');
            if (!summary || !list) { return; }
            const vram = (modelPayload || {}).vram || {};
            list.innerHTML = '';
            if (!vram.available) {
              summary.textContent = 'Live GPU metrics unavailable. Planned VRAM: ' + formatMi(vram.plannedMi || 0);
              const item = document.createElement('div');
              item.className = 'mini-item';
              item.textContent = vram.error || 'DCGM metrics are not available.';
              list.appendChild(item);
              return;
            }
            summary.textContent = 'Free ' + formatMi(vram.freeMi) + ' of ' + formatMi(vram.totalMi) + '; planned ' + formatMi(vram.plannedMi);
            (vram.gpus || []).forEach((gpu) => {
              const item = document.createElement('div');
              item.className = 'mini-item';
              item.textContent = (gpu.modelName || gpu.device || gpu.id || 'GPU') + ': ' + formatMi(gpu.freeMi) + ' free, ' + formatMi(gpu.usedMi) + ' used';
              list.appendChild(item);
            });
          };

          const renderModels = (modelPayload) => {
            const list = $('model-list');
            if (!list) { return; }
            list.innerHTML = '';
            const catalogModels = new Map(((modelPayload || {}).models || []).map((model) => [model.id, model]));
            const activations = (modelPayload || {}).activations || [];
            activations.forEach((activation) => {
              const metadata = activation.metadata || {};
              const spec = activation.spec || {};
              const status = activation.status || {};
              const catalog = catalogModels.get(metadata.name) || {};
              const item = document.createElement('div');
              item.className = 'mini-item';
              const row = document.createElement('div');
              row.className = 'module-row';
              const title = document.createElement('strong');
              title.textContent = metadata.name || 'unnamed';
              const pill = document.createElement('span');
              pill.className = 'status-pill ' + (status.phase === 'Ready' ? 'ready' : 'waiting');
              pill.textContent = status.phase || 'Requested';
              row.append(title, pill);
              const details = document.createElement('div');
              details.textContent = (spec.type || 'model') + ' - ' + (catalog.type || (spec.external || {}).modelType || (spec.local || {}).modelType || 'chat') + ' - ' + (status.modelRef || catalog.modelRef || 'pending') + (status.vramRequiredMi ? ' - ' + formatMi(status.vramRequiredMi) : '');
              const actions = document.createElement('div');
              actions.className = 'action-row';
              const remove = document.createElement('button');
              remove.className = 'control-button danger';
              remove.type = 'button';
              remove.dataset.modelDelete = metadata.name;
              remove.textContent = 'Remove';
              actions.appendChild(remove);
              item.append(row, details, actions);
              list.appendChild(item);
            });
            ((modelPayload || {}).models || []).forEach((model) => {
              if (activations.some((activation) => (activation.metadata || {}).name === model.id)) {
                return;
              }
              const item = document.createElement('div');
              item.className = 'mini-item';
              item.textContent = model.id + ' - ' + (model.type || 'model') + ' - ' + (model.modelRef || 'catalog');
              list.appendChild(item);
            });
            if (!list.childElementCount) {
              const item = document.createElement('div');
              item.className = 'mini-item';
              item.textContent = 'No models registered yet.';
              list.appendChild(item);
            }
          };

          const renderStatus = (status) => {
            const fluxList = $('flux-list');
            if (fluxList) {
              fluxList.innerHTML = '';
              (status.fluxKustomizations || []).slice(0, 8).forEach((item) => {
                const ready = (item.conditions || []).find((condition) => condition.type === 'Ready');
                const node = document.createElement('div');
                node.className = 'mini-item';
                node.textContent = item.name + ': ' + ((ready || {}).status || item.phase || 'Unknown');
                fluxList.appendChild(node);
              });
            }
            const podSummary = $('pod-summary');
            if (podSummary) {
              const pods = status.pods || [];
              const running = pods.filter((pod) => pod.phase === 'Running').length;
              podSummary.textContent = running + '/' + pods.length + ' pods running';
            }
            const ingressList = $('ingress-list');
            if (ingressList) {
              ingressList.innerHTML = '';
              (status.ingresses || []).slice(0, 8).forEach((ingress) => {
                const node = document.createElement('div');
                node.className = 'mini-item';
                node.textContent = ingress.namespace + '/' + ingress.name + ': ' + ((ingress.hosts || []).join(', ') || 'no host');
                ingressList.appendChild(node);
              });
            }
          };

          const refresh = async () => {
            try {
              const appliance = await request('/api/appliance');
              const modulePayload = await request('/api/modules');
              const instancePayload = await request('/api/instances');
              const modelPayload = await request('/api/models');
              const status = await request('/api/status');
              const phase = ((appliance.status || {}).phase || 'Pending');
              $('appliance-summary').textContent = appliance.metadata.namespace + '/' + appliance.metadata.name + ' is ' + phase;
              const modules = ((modulePayload || {}).modules || {});
              const enabledModules = Object.values(modules).filter((item) => item && item.enabled === true).length;
              $('module-summary').textContent = enabledModules + ' modules enabled';
              const instances = ((instancePayload || {}).instances || {});
              const instanceCount = Object.values(instances).reduce((count, items) => count + (Array.isArray(items) ? items.length : 0), 0);
              $('instance-summary').textContent = instanceCount + ' instances requested';
              const catalogReady = moduleSpec(modulePayload, 'model-catalog').enabled ? 'Model catalog requested' : 'Model catalog not enabled';
              $('model-summary').textContent = catalogReady + '; ' + (((modelPayload || {}).models || []).length) + ' models in catalog';
              renderConditions((appliance.status || {}).conditions || []);
              renderModules(modulePayload);
              renderInstances(instancePayload);
              renderModelStack(modelPayload);
              renderVram(modelPayload);
              renderModels(modelPayload);
              renderStatus(status);
              setApiState('Connected', true);
            } catch (error) {
              setApiState(error.message || 'API unavailable', false);
            }
          };

          document.querySelectorAll('.tab-button').forEach((button) => {
            button.addEventListener('click', () => {
              document.querySelectorAll('.tab-button').forEach((item) => item.setAttribute('aria-selected', item === button ? 'true' : 'false'));
              document.querySelectorAll('.tab-panel').forEach((panel) => { panel.hidden = panel.id !== ('tab-' + button.dataset.tab); });
            });
          });

          document.addEventListener('click', async (event) => {
            const enable = event.target.closest('[data-module-enable]');
            const disable = event.target.closest('[data-module-disable]');
            const action = enable ? 'enable' : (disable ? 'disable' : null);
            const name = enable ? enable.dataset.moduleEnable : (disable ? disable.dataset.moduleDisable : null);
            if (!action || !name) { return; }
            try {
              await request('/api/modules/' + name + '/' + action, { method: 'POST', body: '{}' });
              const message = name + ' ' + action + ' requested through ModuleActivation.';
              if ($('module-output')) { $('module-output').textContent = message; }
              if ($('model-output')) { $('model-output').textContent = message; }
              await refresh();
            } catch (error) {
              if ($('module-output')) { $('module-output').textContent = error.message; }
              if ($('model-output')) { $('model-output').textContent = error.message; }
            }
          });

          document.addEventListener('click', async (event) => {
            const remove = event.target.closest('[data-model-delete]');
            if (!remove) { return; }
            const name = remove.dataset.modelDelete;
            try {
              await request('/api/models/' + encodeURIComponent(name), { method: 'DELETE' });
              $('model-output').textContent = name + ' remove requested.';
              await refresh();
            } catch (error) {
              $('model-output').textContent = error.message;
            }
          });

          const localModelForm = $('local-model-form');
          if (localModelForm) {
            localModelForm.addEventListener('submit', async (event) => {
              event.preventDefault();
              const data = new FormData(localModelForm);
              const preset = data.get('preset') || 'custom';
              const payload = {
                name: data.get('name') || preset,
                enabled: true,
                targetNamespace: 'ai',
                local: {
                  modelType: data.get('modelType') || 'chat',
                  vram: data.get('vram') || '5Gi'
                }
              };
              if (preset !== 'custom') {
                payload.local.preset = preset;
              }
              if ((data.get('url') || '').trim()) {
                payload.local.url = data.get('url').trim();
              }
              if ((data.get('contextWindow') || '').trim()) {
                payload.local.contextWindow = Number(data.get('contextWindow'));
              }
              try {
                await request('/api/models/local', { method: 'POST', body: JSON.stringify(payload) });
                $('model-output').textContent = payload.name + ' local model requested.';
                await refresh();
              } catch (error) {
                $('model-output').textContent = error.message;
              }
            });
          }

          const externalModelForm = $('external-model-form');
          if (externalModelForm) {
            externalModelForm.addEventListener('submit', async (event) => {
              event.preventDefault();
              const data = new FormData(externalModelForm);
              const payload = {
                name: data.get('name') || 'example-external-model',
                enabled: true,
                targetNamespace: 'ai',
                external: {
                  model: data.get('model') || 'openai/gpt-4o-mini',
                  apiBase: data.get('apiBase') || 'https://api.openai.com/v1',
                  modelType: data.get('modelType') || 'chat'
                }
              };
              if ((data.get('contextWindow') || '').trim()) {
                payload.external.contextWindow = Number(data.get('contextWindow'));
              }
              if ((data.get('apiKey') || '').trim()) {
                payload.apiKey = data.get('apiKey').trim();
              }
              try {
                await request('/api/models/external', { method: 'POST', body: JSON.stringify(payload) });
                $('model-output').textContent = payload.name + ' external model requested.';
                externalModelForm.reset();
                await refresh();
              } catch (error) {
                $('model-output').textContent = error.message;
              }
            });
          }

          document.querySelectorAll('.instance-form').forEach((form) => {
            form.addEventListener('submit', async (event) => {
              event.preventDefault();
              const data = new FormData(form);
              const type = form.dataset.instanceType;
              const payload = {
                name: data.get('name') || 'default',
                enabled: true,
                namespace: 'ai',
                model: data.get('model') || 'CHANGEME_MODEL'
              };
              if (type === 'openclaw') {
                payload.storage = { size: data.get('storage') || '20Gi' };
                payload.ingress = { enabled: true, host: data.get('host') || 'openclaw.example.local' };
              }
              if (type === 'kubeopencode') {
                payload.server = { enabled: true, ingress: { enabled: true, host: data.get('host') || 'kubeopencode.example.local' } };
                payload.agentTemplates = [{ name: data.get('template') || 'default-coder', description: 'Default coding agent template' }];
              }
              try {
                await request('/api/instances/' + type, { method: 'POST', body: JSON.stringify(payload) });
                $('instance-output').textContent = type + '/' + payload.name + ' requested through AppInstance.';
                await refresh();
              } catch (error) {
                $('instance-output').textContent = error.message;
              }
            });
          });

          refresh();
          setInterval(refresh, 30000);
        })();

        (() => {
          const searchInput = document.getElementById('search');
          const cards = Array.from(document.querySelectorAll('.app-card'));
          const sections = Array.from(document.querySelectorAll('.category'));
          const searchEmpty = document.getElementById('search-empty');

          if (!searchInput || cards.length === 0) {
            return;
          }

          const applyFilter = () => {
            const query = searchInput.value.trim().toLowerCase();
            let visibleCards = 0;

            cards.forEach((card) => {
              const haystack = card.dataset.search || '';
              const matches = query === '' || haystack.includes(query);
              card.style.display = matches ? '' : 'none';
              if (matches) {
                visibleCards += 1;
              }
            });

            sections.forEach((section) => {
              const hasVisible = Array.from(section.querySelectorAll('.app-card')).some((card) => card.style.display !== 'none');
              section.style.display = hasVisible ? '' : 'none';
            });

            if (searchEmpty) {
              searchEmpty.hidden = visibleCards !== 0;
            }
          };

          searchInput.addEventListener('input', applyFilter);
        })();

        (() => {
          const port = window.location.port;
          const proto = window.location.protocol;
          const isDefault = !port
            || (proto === 'http:' && port === '80')
            || (proto === 'https:' && port === '443');
          if (isDefault) { return; }
          document.querySelectorAll('a.app-url[data-host]').forEach((a) => {
            const url = proto + '//' + a.dataset.host + ':' + port + '/';
            a.href = url;
            a.textContent = url;
          });
        })();
      </script>
    </body>
    </html>
    HTML

      mv "$tmp" /html/index.html
      rm -f "$entries_raw" "$entries_sorted" "$sections_tmp" "$links_tmp"
      sleep 30
    done
