apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-appliance-dashboard-renderer
  namespace: dashboard
data:
  render.sh: |
    #!/bin/sh
    set -eu

    html_escape() {
      printf '%s' "$1" \
        | sed -e 's/&/\&amp;/g' \
              -e 's/</\&lt;/g' \
              -e 's/>/\&gt;/g' \
              -e 's/"/\&quot;/g' \
              -e "s/'/\&#39;/g"
    }

    while true; do
      tmp="$(mktemp /html/index.XXXXXX)"

      rendered_at="$(date -u '+%Y-%m-%d %H:%M:%SZ')"

      cat <<'HTML' > "$tmp"
    <!doctype html>
    <html lang="en">
    <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>AI Appliance Dashboard</title>
      <style>
        :root {
          color-scheme: dark;
          --bg: #050910;
          --panel: rgba(17, 24, 39, 0.82);
          --panel-strong: rgba(10, 16, 30, 0.95);
          --text: #e2e8f0;
          --muted: #9fb0c8;
          --line: rgba(148, 163, 184, 0.2);
          --accent: #7dd3fc;
          --accent-strong: #22d3ee;
          --good: #86efac;
        }

        * { box-sizing: border-box; }

        body {
          margin: 0;
          font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
          background: radial-gradient(circle at top, #0f1a31, #050910 60%);
          color: var(--text);
          min-height: 100vh;
        }

        .page {
          width: min(1120px, 100% - 2.5rem);
          margin: 2rem auto 3rem;
          display: grid;
          gap: 1.5rem;
        }

        .hero {
          background: linear-gradient(130deg, rgba(34, 211, 238, 0.18), rgba(15, 23, 42, 0.92));
          border: 1px solid rgba(125, 211, 252, 0.25);
          border-radius: 24px;
          padding: clamp(1.3rem, 2vw, 2rem);
          box-shadow: 0 18px 50px rgba(2, 8, 23, 0.45);
        }

        .eyebrow {
          margin: 0;
          text-transform: uppercase;
          letter-spacing: 0.09em;
          font-size: 0.75rem;
          color: var(--accent);
          font-weight: 700;
        }

        h1 {
          margin: 0.35rem 0 0;
          font-size: clamp(1.8rem, 3.6vw, 2.6rem);
          line-height: 1.2;
        }

        .subtitle {
          margin: 0.8rem 0 0;
          color: var(--muted);
          max-width: 62ch;
        }

        .helper {
          margin: 0.65rem 0 0;
          color: var(--muted);
          font-size: 0.9rem;
        }

        .hero-meta {
          margin-top: 1rem;
          display: flex;
          flex-wrap: wrap;
          gap: 0.65rem;
          color: #dbeafe;
          font-size: 0.88rem;
        }

        .chip {
          border: 1px solid var(--line);
          border-radius: 999px;
          padding: 0.35rem 0.7rem;
          background: rgba(15, 23, 42, 0.45);
        }

        .controls {
          margin-top: 1rem;
          display: grid;
          gap: 0.9rem;
        }

        .control-panel {
          background: rgba(8, 13, 24, 0.9);
          border: 1px solid rgba(125, 211, 252, 0.22);
          border-radius: 18px;
          padding: 1rem;
          display: grid;
          grid-template-columns: minmax(150px, 210px) minmax(0, 1fr);
          align-items: start;
          gap: 1rem;
        }

        .panel-heading {
          grid-column: 1 / -1;
          display: flex;
          align-items: baseline;
          justify-content: space-between;
          gap: 1rem;
          flex-wrap: wrap;
        }

        .panel-heading h2 {
          margin: 0;
          font-size: 1.2rem;
        }

        .tabs {
          grid-column: 1;
          grid-row: 2;
          display: grid;
          gap: 0.45rem;
          align-content: start;
        }

        .tab-button,
        .control-button {
          border: 1px solid rgba(125, 211, 252, 0.3);
          border-radius: 10px;
          background: rgba(15, 23, 42, 0.9);
          color: var(--text);
          cursor: pointer;
          font: inherit;
          padding: 0.45rem 0.7rem;
        }

        .tab-button {
          width: 100%;
          text-align: left;
        }

        .tab-button[aria-selected="true"],
        .control-button.primary {
          background: rgba(14, 116, 144, 0.65);
          border-color: rgba(125, 211, 252, 0.85);
        }

        .control-button.danger {
          border-color: rgba(248, 113, 113, 0.45);
          color: #fecaca;
        }

        .tab-button:disabled,
        .control-button:disabled,
        .field select:disabled {
          cursor: not-allowed;
          opacity: 0.55;
        }

        .tab-panel {
          grid-column: 2;
          grid-row: 2;
          min-width: 0;
        }

        .dashboard-grid {
          display: grid;
          gap: 0.85rem;
          grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
        }

        .dashboard-card {
          border: 1px solid rgba(100, 116, 139, 0.3);
          border-radius: 12px;
          background: rgba(15, 23, 42, 0.78);
          padding: 0.9rem;
          display: grid;
          gap: 0.65rem;
        }

        .dashboard-card h3 {
          margin: 0;
          font-size: 1rem;
        }

        .dashboard-card p {
          margin: 0;
          color: var(--muted);
          font-size: 0.88rem;
        }

        [hidden] {
          display: none !important;
        }

        .module-list,
        .mini-list {
          display: grid;
          gap: 0.55rem;
        }

        .module-item,
        .mini-item {
          border: 1px solid rgba(148, 163, 184, 0.22);
          border-radius: 10px;
          padding: 0.65rem;
          display: grid;
          gap: 0.5rem;
          background: rgba(2, 6, 23, 0.38);
        }

        .module-row,
        .action-row {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 0.65rem;
          flex-wrap: wrap;
        }

        .module-advanced summary {
          color: var(--muted);
          cursor: pointer;
          font-size: 0.82rem;
        }

        .module-advanced .form-grid {
          margin-top: 0.55rem;
        }

        .status-pill {
          border-radius: 999px;
          border: 1px solid rgba(148, 163, 184, 0.32);
          padding: 0.2rem 0.55rem;
          color: #cbd5e1;
          font-size: 0.75rem;
          white-space: nowrap;
        }

        .status-pill.ready,
        .status-pill.enabled {
          border-color: rgba(134, 239, 172, 0.45);
          color: #bbf7d0;
        }

        .status-pill.waiting,
        .status-pill.disabled {
          border-color: rgba(251, 191, 36, 0.42);
          color: #fde68a;
        }

        .form-grid {
          display: grid;
          gap: 0.65rem;
          grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        }

        .field {
          display: grid;
          gap: 0.28rem;
          color: var(--muted);
          font-size: 0.8rem;
        }

        .field input,
        .field select,
        .field textarea {
          border: 1px solid var(--line);
          border-radius: 10px;
          background: rgba(15, 23, 42, 0.82);
          color: var(--text);
          font: inherit;
          padding: 0.55rem 0.65rem;
        }

        .field textarea {
          min-height: 5.5rem;
          resize: vertical;
        }

        .api-output {
          min-height: 1.3rem;
          color: var(--muted);
          font-size: 0.84rem;
        }

        footer {
          color: var(--muted);
          text-align: center;
          font-size: 0.82rem;
        }

        @media (max-width: 780px) {
          .control-panel {
            grid-template-columns: 1fr;
          }

          .tabs,
          .tab-panel {
            grid-column: 1;
            grid-row: auto;
          }
        }

        @media (max-width: 680px) {
          .page {
            width: min(1120px, 100% - 1.1rem);
            margin-top: 1rem;
          }

          .hero {
            border-radius: 18px;
          }
        }
      </style>
    </head>
    <body>
      <main class="page">
        <header class="hero">
          <p class="eyebrow">AI Appliance Platform</p>
          <h1>AI Appliance Dashboard</h1>
          <p class="subtitle">Manage the MagicStick appliance runtime from one place.</p>
          <div class="hero-meta">
            <span class="chip">Last updated: <strong>
    HTML
      printf '%s' "$(html_escape "$rendered_at")" >> "$tmp"
      cat <<'HTML' >> "$tmp"
            </strong></span>
            <span class="chip">Refresh cadence: every 30s</span>
          </div>
        </header>

        <section class="control-panel" aria-label="Appliance management">
          <div class="panel-heading">
            <h2>Appliance Control</h2>
            <span id="api-state" class="status-pill waiting">Connecting</span>
          </div>
          <nav class="tabs" aria-label="Dashboard pages">
            <button class="tab-button" type="button" aria-selected="true" data-tab="overview">Overview</button>
            <button class="tab-button" type="button" aria-selected="false" data-tab="modules">Modules</button>
            <button class="tab-button" type="button" aria-selected="false" data-tab="instances">Instances</button>
            <button class="tab-button" type="button" aria-selected="false" data-tab="models">Models</button>
            <button class="tab-button" type="button" aria-selected="false" data-tab="settings">Settings</button>
            <button class="tab-button" type="button" aria-selected="false" data-tab="system">System Status</button>
          </nav>

          <section id="tab-overview" class="tab-panel">
            <div class="dashboard-grid">
              <article class="dashboard-card">
                <h3>Appliance</h3>
                <p id="appliance-summary">Loading</p>
                <div id="appliance-conditions" class="mini-list"></div>
              </article>
              <article class="dashboard-card">
                <h3>Modules</h3>
                <p id="module-summary">Loading</p>
              </article>
              <article class="dashboard-card">
                <h3>Instances</h3>
                <p id="instance-summary">Loading</p>
              </article>
              <article class="dashboard-card">
                <h3>Models</h3>
                <p id="model-summary">Loading</p>
              </article>
            </div>
          </section>

          <section id="tab-modules" class="tab-panel" hidden>
            <div id="module-list" class="module-list"></div>
            <p id="module-output" class="api-output"></p>
          </section>

          <section id="tab-instances" class="tab-panel" hidden>
            <div class="dashboard-grid">
              <article class="dashboard-card" id="instance-form-empty" hidden>
                <h3>No installed instance modules</h3>
              </article>
              <form class="dashboard-card instance-form" data-instance-type="openclaw">
                <h3>OpenClaw</h3>
                <div class="form-grid">
                  <label class="field">Name<input name="name" value="default" /></label>
                  <label class="field">Model<select name="model" data-model-select="chat" data-model-fallback="CHANGEME_MODEL"><option value="">Loading models</option></select></label>
                  <label class="field">Host<input name="host" value="openclaw.magicstick.example.com" data-host-prefix="openclaw" /></label>
                  <label class="field">Storage<input name="storage" value="20Gi" /></label>
                </div>
                <button class="control-button primary" type="submit">Create OpenClaw</button>
              </form>
              <form class="dashboard-card instance-form" data-instance-type="hermes">
                <h3>Hermes</h3>
                <div class="form-grid">
                  <label class="field">Name<input name="name" value="default" /></label>
                  <label class="field">Model<select name="model" data-model-select="chat" data-model-fallback="qwen3635b"><option value="">Loading models</option></select></label>
                  <label class="field">Host<input name="host" value="hermes.magicstick.example.com" data-host-prefix="hermes" /></label>
                  <label class="field">Storage<input name="storage" value="10Gi" /></label>
                </div>
                <button class="control-button primary" type="submit">Create Hermes</button>
              </form>
              <form class="dashboard-card instance-form" data-instance-type="paperclip">
                <h3>Paperclip</h3>
                <div class="form-grid">
                  <label class="field">Name<input name="name" value="default" /></label>
                  <label class="field">Admin Email<input name="adminEmail" value="admin@example.com" /></label>
                  <label class="field">Host<input name="host" value="paperclip.magicstick.example.com" data-host-prefix="paperclip" /></label>
                  <label class="field">Storage<input name="storage" value="5Gi" /></label>
                  <label class="field">Postgres<input name="postgresStorage" value="10Gi" /></label>
                </div>
                <button class="control-button primary" type="submit">Create Paperclip</button>
              </form>
              <form class="dashboard-card instance-form" data-instance-type="kubeopencode">
                <h3>KubeOpenCode</h3>
                <div class="form-grid">
                  <label class="field">Name<input name="name" value="default" /></label>
                  <label class="field">Model<select name="model" data-model-select="chat" data-model-fallback="CHANGEME_MODEL"><option value="">Loading models</option></select></label>
                  <label class="field">Host<input name="host" value="kubeopencode.magicstick.example.com" data-host-prefix="kubeopencode" /></label>
                  <label class="field">Template<input name="template" value="default-coder" /></label>
                </div>
                <button class="control-button primary" type="submit">Create KubeOpenCode</button>
              </form>
            </div>
            <div id="instance-list" class="mini-list"></div>
            <p id="instance-output" class="api-output"></p>
          </section>

          <section id="tab-models" class="tab-panel" hidden>
            <div class="dashboard-grid">
              <article class="dashboard-card">
                <h3>VRAM</h3>
                <p id="vram-summary">Waiting for GPU metrics.</p>
                <div id="vram-list" class="mini-list"></div>
              </article>
            </div>
            <div class="dashboard-grid">
              <form class="dashboard-card" id="local-model-form">
                <h3>Add Local Model</h3>
                <div class="form-grid">
                  <label class="field">Name<input name="name" value="qwen352bvlembedding" /></label>
                  <label class="field">Preset<select name="preset" id="local-model-preset"><option value="qwen352bvlembedding">qwen352bvlembedding</option><option value="qwen3635b">qwen3635b</option><option value="qwen359b">qwen359b</option><option value="custom">Custom</option></select></label>
                  <label class="field">Type<select name="modelType"><option value="chat">chat</option><option value="embedding">embedding</option></select></label>
                  <label class="field">VRAM Limit<input name="vram" value="5Gi" /></label>
                  <label class="field">HF URL<input name="url" placeholder="hf://example/model" /></label>
                  <label class="field">Context Size<input name="contextWindow" value="4096" /></label>
                  <label class="field">Max Num Seqs<input name="maxNumSeqs" placeholder="32" /></label>
                </div>
                <button class="control-button primary" type="submit">Add Local Model</button>
              </form>
              <form class="dashboard-card" id="external-model-form">
                <h3>Add External Model</h3>
                <div class="form-grid">
                  <label class="field">Name<input name="name" value="example-openai-gpt-4o-mini" /></label>
                  <label class="field">Provider Model<input name="model" value="openai/gpt-4o-mini" /></label>
                  <label class="field">API Base<input name="apiBase" value="https://api.openai.com/v1" /></label>
                  <label class="field">Type<select name="modelType"><option value="chat">chat</option><option value="embedding">embedding</option></select></label>
                  <label class="field">Context<input name="contextWindow" value="128000" /></label>
                  <label class="field">API Key<input name="apiKey" type="password" placeholder="CHANGEME" /></label>
                </div>
                <button class="control-button primary" type="submit">Add External Model</button>
              </form>
            </div>
            <div class="dashboard-card">
              <h3>Models</h3>
              <div id="model-list" class="mini-list"></div>
            </div>
            <p id="model-output" class="api-output"></p>
          </section>

          <section id="tab-settings" class="tab-panel" hidden>
            <div class="dashboard-grid">
              <form class="dashboard-card" id="settings-form">
                <h3>Domains</h3>
                <div class="form-grid">
                  <label class="field">Public Domain<input name="publicDomain" value="magicstick.example.com" /></label>
                  <label class="field">mDNS Domain<input name="mdnsDomain" value="magicstick.local" /></label>
                  <label class="field">Dashboard Public Host<input name="dashboardHost" value="magicstick.example.com" /></label>
                </div>
                <button class="control-button primary" type="submit">Save Domains</button>
              </form>
              <article class="dashboard-card">
                <h3>Addresses</h3>
                <div class="mini-list">
                  <div class="mini-item" id="settings-dashboard-public">Dashboard public: loading</div>
                  <div class="mini-item" id="settings-dashboard-local">Dashboard local: loading</div>
                  <div class="mini-item" id="settings-anythingllm-public">AnythingLLM public: loading</div>
                  <div class="mini-item" id="settings-anythingllm-local">AnythingLLM local: loading</div>
                </div>
              </article>
            </div>
            <p id="settings-output" class="api-output"></p>
          </section>

          <section id="tab-system" class="tab-panel" hidden>
            <div class="dashboard-grid">
              <article class="dashboard-card"><h3>Flux</h3><div id="flux-list" class="mini-list"></div></article>
              <article class="dashboard-card"><h3>Pods</h3><p id="pod-summary">Loading</p></article>
              <article class="dashboard-card"><h3>Ingresses</h3><div id="ingress-list" class="mini-list"></div></article>
            </div>
          </section>
        </section>

        <footer>
          Generated by the dashboard renderer.
        </footer>
      </main>
      <script>
        (() => {
          const $ = (id) => document.getElementById(id);
          const apiState = $('api-state');
          let latestModelPayload = {};
          let latestModulePayload = {};
          let latestSettings = {
            publicDomain: 'magicstick.example.com',
            dashboardHost: 'magicstick.example.com',
            mdnsDomain: 'magicstick.local',
            mdnsName: 'magicstick'
          };
          let renderedPresetSignature = '';
          let localPresetLastApplied = '';

          const setApiState = (text, ok = false) => {
            if (!apiState) { return; }
            apiState.textContent = text;
            apiState.className = ok ? 'status-pill ready' : 'status-pill waiting';
          };

          const request = async (path, options = {}) => {
            const response = await fetch(path, {
              headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
              ...options
            });
            const payload = await response.json().catch(() => ({}));
            if (!response.ok) {
              throw new Error(payload.error || response.statusText);
            }
            return payload;
          };

          const titleFromKey = (name) => String(name || '')
            .replace(/([a-z0-9])([A-Z])/g, '$1 $2')
            .replace(/[-_]+/g, ' ')
            .split(/\s+/)
            .filter(Boolean)
            .map((word) => word.charAt(0).toUpperCase() + word.slice(1))
            .join(' ') || 'Module';

          const moduleCatalog = (modulePayload) => (((modulePayload || {}).catalogJson || {}).modules || {});

          const moduleSpec = (modulePayload, name) => {
            const modules = ((modulePayload || {}).modules || {});
            return modules[name] || {};
          };

          const INSTANCE_REQUIRED_MODULES = {
            openclaw: ['openclaw-operator', 'litellm', 'model-catalog'],
            hermes: ['hermes-operator', 'litellm', 'model-catalog'],
            paperclip: ['paperclip-operator', 'litellm', 'model-catalog'],
            kubeopencode: ['kubeopencode', 'litellm', 'model-catalog']
          };

          const instanceMappings = (modulePayload) => (((modulePayload || {}).catalogJson || {}).instanceMappings || {});

          const requiredModulesForInstance = (modulePayload, type) => {
            const mapping = instanceMappings(modulePayload)[type] || {};
            return Array.isArray(mapping.requiredModules) && mapping.requiredModules.length
              ? mapping.requiredModules
              : (INSTANCE_REQUIRED_MODULES[type] || []);
          };

          const moduleInstalled = (modulePayload, name) => {
            const spec = moduleSpec(modulePayload, name);
            const status = spec.status || {};
            const phase = String(status.phase || '').toLowerCase();
            const activationMode = spec.activationMode || ((spec.catalog || {}).activationMode);
            if (spec.enabled !== true) { return false; }
            if (activationMode === 'static' && !phase) { return true; }
            return phase === 'ready';
          };

          const instanceTypeInstalled = (modulePayload, type) => {
            const requiredModules = requiredModulesForInstance(modulePayload, type);
            return requiredModules.length > 0 && requiredModules.every((name) => moduleInstalled(modulePayload, name));
          };

          const renderInstanceForms = (modulePayload) => {
            let visibleCount = 0;
            document.querySelectorAll('.instance-form[data-instance-type]').forEach((form) => {
              const installed = instanceTypeInstalled(modulePayload, form.dataset.instanceType);
              form.hidden = !installed;
              if (installed) {
                visibleCount += 1;
              }
            });
            const empty = $('instance-form-empty');
            if (empty) {
              empty.hidden = visibleCount !== 0;
            }
          };

          const moduleCatalogSpec = (modulePayload, name, spec = {}) => {
            return spec.catalog || moduleCatalog(modulePayload)[name] || {};
          };

          const moduleDisplayName = (name, catalogSpec = {}, spec = {}) => {
            return spec.displayName || catalogSpec.displayName || titleFromKey(name);
          };

          const moduleOrder = (name, catalogSpec = {}) => {
            const value = Number(catalogSpec.order);
            return Number.isFinite(value) ? value : 10000;
          };

          const orderedModules = (modulePayload) => {
            const catalog = moduleCatalog(modulePayload);
            const modules = ((modulePayload || {}).modules || {});
            const names = new Set([...Object.keys(catalog), ...Object.keys(modules)]);
            return Array.from(names).map((name) => {
              const spec = modules[name] || {};
              const catalogSpec = moduleCatalogSpec(modulePayload, name, spec);
              return { name, spec, catalogSpec, title: moduleDisplayName(name, catalogSpec, spec) };
            }).sort((left, right) => {
              const orderDelta = moduleOrder(left.name, left.catalogSpec) - moduleOrder(right.name, right.catalogSpec);
              if (orderDelta !== 0) { return orderDelta; }
              return left.title.localeCompare(right.title) || left.name.localeCompare(right.name);
            });
          };

          const parameterDisplayValue = (value) => {
            if (!value) { return ''; }
            if (typeof value === 'object') {
              return value.size || value.storageSize || '';
            }
            return String(value);
          };

          const renderModuleAdvanced = (item, name, spec, modulePayload) => {
            const fields = moduleCatalogSpec(modulePayload, name, spec).parameters || [];
            if (!fields.length) { return; }
            const parameters = (spec || {}).parameters || {};
            const details = document.createElement('details');
            details.className = 'module-advanced';
            details.open = fields.some((field) => parameterDisplayValue(parameters[field.name]) !== '');
            const summary = document.createElement('summary');
            summary.textContent = 'Advanced';
            const grid = document.createElement('div');
            grid.className = 'form-grid';
            fields.forEach((field) => {
              const label = document.createElement('label');
              label.className = 'field';
              label.textContent = field.label;
              const input = document.createElement('input');
              input.name = field.name;
              input.placeholder = field.placeholder;
              input.type = field.type || 'text';
              input.value = parameterDisplayValue(parameters[field.name]);
              input.dataset.moduleParameter = field.name;
              label.appendChild(input);
              grid.appendChild(label);
            });
            details.append(summary, grid);
            item.appendChild(details);
          };

          const moduleParametersFromItem = (item) => {
            const parameters = {};
            if (!item) { return parameters; }
            item.querySelectorAll('[data-module-parameter]').forEach((input) => {
              const value = String(input.value || '').trim();
              if (value) {
                parameters[input.dataset.moduleParameter] = value;
              }
            });
            return parameters;
          };

          const renderConditions = (conditions) => {
            const target = $('appliance-conditions');
            if (!target) { return; }
            target.innerHTML = '';
            (conditions || []).slice(0, 5).forEach((condition) => {
              const item = document.createElement('div');
              item.className = 'mini-item';
              item.textContent = (condition.type || 'Condition') + ': ' + (condition.status || 'Unknown') + ' ' + (condition.reason || '');
              target.appendChild(item);
            });
          };

          const renderModules = (modulePayload) => {
            const list = $('module-list');
            if (!list) { return; }
            list.innerHTML = '';
            orderedModules(modulePayload).forEach(({ name, spec, catalogSpec, title }) => {
              const enabled = spec.enabled === true;
              const activationMode = spec.activationMode || catalogSpec.activationMode || 'moduleactivation';
              const phase = (((spec.status || {}).phase) || (enabled ? 'Requested' : 'Disabled'));
              const item = document.createElement('div');
              item.className = 'module-item';
              const row = document.createElement('div');
              row.className = 'module-row';
              const label = document.createElement('strong');
              label.textContent = title;
              const pill = document.createElement('span');
              pill.className = 'status-pill ' + (enabled ? 'enabled' : 'disabled');
              pill.textContent = enabled ? 'Enabled' : 'Disabled';
              row.append(label, pill);
              const phaseItem = document.createElement('div');
              phaseItem.className = 'mini-item';
              phaseItem.textContent = phase;
              const actions = document.createElement('div');
              actions.className = 'action-row';
              item.append(row, phaseItem);
              renderModuleAdvanced(item, name, spec, modulePayload);
              if (activationMode === 'moduleactivation') {
                const enable = document.createElement('button');
                enable.className = 'control-button primary';
                enable.type = 'button';
                enable.dataset.moduleEnable = name;
                enable.textContent = 'Enable';
                const disable = document.createElement('button');
                disable.className = 'control-button danger';
                disable.type = 'button';
                disable.dataset.moduleDisable = name;
                disable.textContent = 'Disable';
                actions.append(enable, disable);
                item.appendChild(actions);
              }
              list.appendChild(item);
            });
          };

          const renderInstances = (instancePayload) => {
            const list = $('instance-list');
            if (!list) { return; }
            list.innerHTML = '';
            const instances = ((instancePayload || {}).instances || {});
            Object.keys(instances).forEach((type) => {
              (instances[type] || []).forEach((instance) => {
                const metadata = instance.metadata || {};
                const spec = instance.spec || {};
                const status = instance.status || {};
                const item = document.createElement('div');
                item.className = 'mini-item';
                const row = document.createElement('div');
                row.className = 'module-row';
                const title = document.createElement('strong');
                title.textContent = type + '/' + (metadata.name || 'unnamed');
                const pill = document.createElement('span');
                pill.className = 'status-pill ' + (status.phase === 'Ready' ? 'ready' : 'waiting');
                pill.textContent = status.phase || 'Requested';
                row.append(title, pill);
                const details = document.createElement('div');
                details.textContent = 'namespace: ' + (spec.targetNamespace || 'ai') + (status.url ? ' - ' + status.url : '');
                const actions = document.createElement('div');
                actions.className = 'action-row';
                const remove = document.createElement('button');
                remove.className = 'control-button danger';
                remove.type = 'button';
                remove.dataset.instanceDelete = metadata.name || '';
                remove.textContent = 'Remove';
                if (!metadata.name) {
                  remove.disabled = true;
                }
                actions.appendChild(remove);
                item.append(row, details, actions);
                list.appendChild(item);
              });
            });
            if (!list.childElementCount) {
              const item = document.createElement('div');
              item.className = 'mini-item';
              item.textContent = 'No instances requested.';
              list.appendChild(item);
            }
          };

          const formatMi = (value) => {
            const number = Number(value || 0);
            if (number >= 1024) {
              return (number / 1024).toFixed(number >= 10240 ? 0 : 1) + ' GiB';
            }
            return number + ' MiB';
          };

          const orderedPresetKeys = (presets) => {
            const preferred = ['qwen352bvlembedding', 'qwen3635b', 'qwen359b'];
            const keys = Object.keys(presets || {});
            return [
              ...preferred.filter((key) => keys.includes(key)),
              ...keys.filter((key) => !preferred.includes(key)).sort()
            ];
          };

          const renderLocalPresetOptions = (modelPayload) => {
            const select = $('local-model-preset');
            if (!select) { return; }
            const presets = (modelPayload || {}).presets || {};
            const keys = orderedPresetKeys(presets);
            const signature = keys.join('|');
            if (!keys.length || signature === renderedPresetSignature) { return; }
            const selected = select.value || 'qwen352bvlembedding';
            select.innerHTML = '';
            keys.forEach((key) => {
              const option = document.createElement('option');
              option.value = key;
              option.textContent = key;
              select.appendChild(option);
            });
            const custom = document.createElement('option');
            custom.value = 'custom';
            custom.textContent = 'Custom';
            select.appendChild(custom);
            select.value = keys.includes(selected) || selected === 'custom' ? selected : keys[0];
            renderedPresetSignature = signature;
          };

          const modelIdentifier = (model) => String(((model || {}).id || (model || {}).name || '')).trim();

          const modelLabel = (model) => {
            const id = modelIdentifier(model);
            const name = String(((model || {}).name || '')).trim();
            return name && name !== id ? name + ' (' + id + ')' : id;
          };

          const modelType = (model) => String(((model || {}).type || (model || {}).modelType || '')).trim().toLowerCase();

          const deployedModels = (modelPayload, type = 'chat') => {
            const seen = new Set();
            return (((modelPayload || {}).models || []) || [])
              .filter((model) => {
                const id = modelIdentifier(model);
                if (!id) { return false; }
                if (type === 'chat') {
                  return modelType(model) === 'chat';
                }
                return modelType(model) === type;
              })
              .filter((model) => {
                const id = modelIdentifier(model);
                if (seen.has(id)) { return false; }
                seen.add(id);
                return true;
              })
              .sort((left, right) => modelLabel(left).localeCompare(modelLabel(right)));
          };

          const catalogDefaultChatModel = (modelPayload) => {
            const catalog = (modelPayload || {}).catalog || {};
            const models = deployedModels(modelPayload, 'chat');
            const available = new Set(models.map(modelIdentifier));
            const wanted = String(catalog.defaultChatModel || '').trim();
            if (wanted && available.has(wanted)) {
              return wanted;
            }
            return models.length ? modelIdentifier(models[0]) : '';
          };

          const renderInstanceModelOptions = (modelPayload) => {
            const defaultChatModel = catalogDefaultChatModel(modelPayload);
            document.querySelectorAll('select[data-model-select]').forEach((select) => {
              const type = select.dataset.modelSelect || 'chat';
              const models = deployedModels(modelPayload, type);
              const previous = String(select.value || '').trim();
              select.innerHTML = '';

              if (!models.length) {
                const option = document.createElement('option');
                option.value = '';
                option.textContent = type === 'chat' ? 'No deployed chat models' : 'No deployed models';
                select.appendChild(option);
                select.disabled = true;
                select.dataset.modelsAvailable = 'false';
                return;
              }

              const available = new Set();
              models.forEach((model) => {
                const id = modelIdentifier(model);
                available.add(id);
                const option = document.createElement('option');
                option.value = id;
                option.textContent = modelLabel(model);
                select.appendChild(option);
              });

              const fallback = String(select.dataset.modelFallback || '').trim();
              select.value = available.has(previous)
                ? previous
                : (available.has(defaultChatModel) ? defaultChatModel : (available.has(fallback) ? fallback : modelIdentifier(models[0])));
              select.disabled = false;
              select.dataset.modelsAvailable = 'true';
            });

            document.querySelectorAll('.instance-form').forEach((form) => {
              const select = form.querySelector('select[data-model-select]');
              const button = form.querySelector('button[type="submit"]');
              if (!select || !button) { return; }
              const disabled = select.dataset.modelsAvailable === 'false';
              button.disabled = disabled;
              button.title = disabled ? 'No deployed chat models available' : '';
            });
          };

          const setFormValue = (form, name, value) => {
            if (!form) { return; }
            const field = form.elements[name];
            if (field) {
              field.value = value === undefined || value === null ? '' : String(value);
            }
          };

          const appHost = (prefix, domain) => {
            const cleanPrefix = String(prefix || '').trim().replace(/\.$/, '');
            const cleanDomain = String(domain || '').trim().replace(/^\./, '').replace(/\.$/, '');
            return cleanPrefix && cleanDomain ? cleanPrefix + '.' + cleanDomain : cleanDomain;
          };

          const setText = (id, value) => {
            const node = $(id);
            if (node) {
              node.textContent = value;
            }
          };

          const renderSettings = (settings, options = {}) => {
            latestSettings = {
              publicDomain: settings.publicDomain || 'magicstick.example.com',
              dashboardHost: settings.dashboardHost || settings.publicDomain || 'magicstick.example.com',
              mdnsDomain: settings.mdnsDomain || 'magicstick.local',
              mdnsName: settings.mdnsName || 'magicstick'
            };
            const form = $('settings-form');
            if (form && (options.force || form.dataset.dirty !== 'true')) {
              setFormValue(form, 'publicDomain', latestSettings.publicDomain);
              setFormValue(form, 'mdnsDomain', latestSettings.mdnsDomain);
              setFormValue(form, 'dashboardHost', latestSettings.dashboardHost);
              form.dataset.dirty = 'false';
            }
            setText('settings-dashboard-public', 'Dashboard public: http://' + latestSettings.dashboardHost + '/');
            setText('settings-dashboard-local', 'Dashboard local: http://' + latestSettings.mdnsDomain + '/');
            setText('settings-anythingllm-public', 'AnythingLLM public: http://' + appHost('anythingllm', latestSettings.publicDomain) + '/');
            setText('settings-anythingllm-local', 'AnythingLLM local: http://' + appHost('anythingllm', latestSettings.mdnsDomain) + '/');
          };

          const setInstanceHostDefaults = (settings) => {
            const domain = (settings || latestSettings).publicDomain || 'magicstick.example.com';
            document.querySelectorAll('input[data-host-prefix]').forEach((input) => {
              const next = appHost(input.dataset.hostPrefix, domain);
              const current = String(input.value || '').trim();
              if (!input.dataset.hostDefault) {
                input.dataset.hostDefault = current;
              }
              const previous = input.dataset.hostDefault || '';
              const shouldUpdate = !current || current === previous || current.endsWith('.example.local') || current.endsWith('.magicstick.example.com');
              if (shouldUpdate) {
                input.value = next;
                input.dataset.hostDefault = next;
              }
            });
          };

          const presetArgValue = (preset, flag) => {
            const args = (preset || {}).args || [];
            for (let index = 0; index < args.length; index += 1) {
              const arg = String(args[index]);
              if (arg === flag && args[index + 1] !== undefined) {
                return String(args[index + 1]);
              }
              if (arg.startsWith(flag + '=')) {
                return arg.slice(flag.length + 1);
              }
            }
            return '';
          };

          const presetMaxNumSeqs = (preset) => {
            return preset.maxNumSeqs || preset.max_num_seqs || presetArgValue(preset, '--max-num-seqs') || presetArgValue(preset, '--max_num_seqs');
          };

          const applyLocalPresetFields = (presetName, options = {}) => {
            const form = $('local-model-form');
            if (!form || !presetName || presetName === 'custom') { return; }
            const preset = ((latestModelPayload || {}).presets || {})[presetName];
            if (!preset) { return; }
            const marker = [
              presetName,
              preset.vram || '',
              preset.vramMi || '',
              preset.contextWindow || '',
              presetMaxNumSeqs(preset) || '',
              preset.url || '',
              preset.type || preset.modelType || ''
            ].join('|');
            if (!options.force && localPresetLastApplied === marker) { return; }
            setFormValue(form, 'name', presetName);
            setFormValue(form, 'modelType', preset.type || preset.modelType);
            setFormValue(form, 'vram', preset.vram || (preset.vramMi ? preset.vramMi + 'Mi' : ''));
            setFormValue(form, 'url', preset.url);
            setFormValue(form, 'contextWindow', preset.contextWindow);
            setFormValue(form, 'maxNumSeqs', presetMaxNumSeqs(preset));
            localPresetLastApplied = marker;
          };

          const renderVram = (modelPayload) => {
            const summary = $('vram-summary');
            const list = $('vram-list');
            if (!summary || !list) { return; }
            const vram = (modelPayload || {}).vram || {};
            list.innerHTML = '';
            if (!vram.available) {
              summary.textContent = 'Live GPU metrics unavailable. Planned VRAM: ' + formatMi(vram.plannedMi || 0);
              const item = document.createElement('div');
              item.className = 'mini-item';
              item.textContent = vram.error || 'DCGM metrics are not available.';
              list.appendChild(item);
              return;
            }
            summary.textContent = 'Free ' + formatMi(vram.freeMi) + ' of ' + formatMi(vram.totalMi) + '; planned ' + formatMi(vram.plannedMi);
            (vram.gpus || []).forEach((gpu) => {
              const item = document.createElement('div');
              item.className = 'mini-item';
              item.textContent = (gpu.modelName || gpu.device || gpu.id || 'GPU') + ': ' + formatMi(gpu.freeMi) + ' free, ' + formatMi(gpu.usedMi) + ' used';
              list.appendChild(item);
            });
          };

          const renderModels = (modelPayload) => {
            const list = $('model-list');
            if (!list) { return; }
            list.innerHTML = '';
            const catalogModels = new Map(((modelPayload || {}).models || []).map((model) => [model.id, model]));
            const activations = (modelPayload || {}).activations || [];
            activations.forEach((activation) => {
              const metadata = activation.metadata || {};
              const spec = activation.spec || {};
              const status = activation.status || {};
              const catalog = catalogModels.get(metadata.name) || {};
              const item = document.createElement('div');
              item.className = 'mini-item';
              const row = document.createElement('div');
              row.className = 'module-row';
              const title = document.createElement('strong');
              title.textContent = metadata.name || 'unnamed';
              const pill = document.createElement('span');
              pill.className = 'status-pill ' + (status.phase === 'Ready' ? 'ready' : 'waiting');
              pill.textContent = status.phase || 'Requested';
              row.append(title, pill);
              const details = document.createElement('div');
              details.textContent = (spec.type || 'model') + ' - ' + (catalog.type || (spec.external || {}).modelType || (spec.local || {}).modelType || 'chat') + ' - ' + (status.modelRef || catalog.modelRef || 'pending') + (status.vramRequiredMi ? ' - ' + formatMi(status.vramRequiredMi) : '');
              const actions = document.createElement('div');
              actions.className = 'action-row';
              const remove = document.createElement('button');
              remove.className = 'control-button danger';
              remove.type = 'button';
              remove.dataset.modelDelete = metadata.name;
              remove.textContent = 'Remove';
              actions.appendChild(remove);
              item.append(row, details, actions);
              list.appendChild(item);
            });
            ((modelPayload || {}).models || []).forEach((model) => {
              if (activations.some((activation) => (activation.metadata || {}).name === model.id)) {
                return;
              }
              const item = document.createElement('div');
              item.className = 'mini-item';
              item.textContent = model.id + ' - ' + (model.type || 'model') + ' - ' + (model.modelRef || 'catalog');
              list.appendChild(item);
            });
            if (!list.childElementCount) {
              const item = document.createElement('div');
              item.className = 'mini-item';
              item.textContent = 'No models registered yet.';
              list.appendChild(item);
            }
          };

          const renderStatus = (status) => {
            const fluxList = $('flux-list');
            if (fluxList) {
              fluxList.innerHTML = '';
              (status.fluxKustomizations || []).slice(0, 8).forEach((item) => {
                const ready = (item.conditions || []).find((condition) => condition.type === 'Ready');
                const node = document.createElement('div');
                node.className = 'mini-item';
                node.textContent = item.name + ': ' + ((ready || {}).status || item.phase || 'Unknown');
                fluxList.appendChild(node);
              });
            }
            const podSummary = $('pod-summary');
            if (podSummary) {
              const pods = status.pods || [];
              const running = pods.filter((pod) => pod.phase === 'Running').length;
              podSummary.textContent = running + '/' + pods.length + ' pods running';
            }
            const ingressList = $('ingress-list');
            if (ingressList) {
              ingressList.innerHTML = '';
              (status.ingresses || []).slice(0, 8).forEach((ingress) => {
                const node = document.createElement('div');
                node.className = 'mini-item';
                node.textContent = ingress.namespace + '/' + ingress.name + ': ' + ((ingress.hosts || []).join(', ') || 'no host');
                ingressList.appendChild(node);
              });
            }
          };

          const refresh = async () => {
            try {
              const settings = await request('/api/settings');
              const appliance = await request('/api/appliance');
              const modulePayload = await request('/api/modules');
              const instancePayload = await request('/api/instances');
              const modelPayload = await request('/api/models');
              const status = await request('/api/status');
              renderSettings(settings);
              setInstanceHostDefaults(settings);
              latestModulePayload = modulePayload || {};
              latestModelPayload = modelPayload || {};
              renderLocalPresetOptions(latestModelPayload);
              renderInstanceForms(latestModulePayload);
              renderInstanceModelOptions(latestModelPayload);
              if (!localPresetLastApplied) {
                const presetSelect = $('local-model-preset');
                applyLocalPresetFields(presetSelect ? presetSelect.value : '', { force: true });
              }
              const phase = ((appliance.status || {}).phase || 'Pending');
              $('appliance-summary').textContent = appliance.metadata.namespace + '/' + appliance.metadata.name + ' is ' + phase;
              const modules = ((modulePayload || {}).modules || {});
              const enabledModules = Object.values(modules).filter((item) => item && item.enabled === true).length;
              $('module-summary').textContent = enabledModules + ' modules enabled';
              const instances = ((instancePayload || {}).instances || {});
              const instanceCount = Object.values(instances).reduce((count, items) => count + (Array.isArray(items) ? items.length : 0), 0);
              $('instance-summary').textContent = instanceCount + ' instances requested';
              const installedModelIds = new Set(((modelPayload || {}).models || []).map(modelIdentifier).filter(Boolean));
              $('model-summary').textContent = installedModelIds.size + (installedModelIds.size === 1 ? ' model installed' : ' models installed');
              renderConditions((appliance.status || {}).conditions || []);
              renderModules(modulePayload);
              renderInstances(instancePayload);
              renderVram(modelPayload);
              renderModels(modelPayload);
              renderStatus(status);
              setApiState('Connected', true);
            } catch (error) {
              setApiState(error.message || 'API unavailable', false);
            }
          };

          document.querySelectorAll('.tab-button').forEach((button) => {
            button.addEventListener('click', () => {
              document.querySelectorAll('.tab-button').forEach((item) => item.setAttribute('aria-selected', item === button ? 'true' : 'false'));
              document.querySelectorAll('.tab-panel').forEach((panel) => { panel.hidden = panel.id !== ('tab-' + button.dataset.tab); });
            });
          });

          document.addEventListener('click', async (event) => {
            const enable = event.target.closest('[data-module-enable]');
            const disable = event.target.closest('[data-module-disable]');
            const action = enable ? 'enable' : (disable ? 'disable' : null);
            const name = enable ? enable.dataset.moduleEnable : (disable ? disable.dataset.moduleDisable : null);
            if (!action || !name) { return; }
            try {
              const item = (enable || disable).closest('.module-item, .mini-item');
              const hasAdvancedFields = item && item.querySelector('[data-module-parameter]');
              const body = {};
              if (enable && hasAdvancedFields) {
                body.parameters = moduleParametersFromItem(item);
              }
              await request('/api/modules/' + encodeURIComponent(name) + '/' + action, { method: 'POST', body: JSON.stringify(body) });
              const message = name + ' ' + action + ' requested through ModuleActivation.';
              if ($('module-output')) { $('module-output').textContent = message; }
              if ($('model-output')) { $('model-output').textContent = message; }
              await refresh();
            } catch (error) {
              if ($('module-output')) { $('module-output').textContent = error.message; }
              if ($('model-output')) { $('model-output').textContent = error.message; }
            }
          });

          document.addEventListener('click', async (event) => {
            const remove = event.target.closest('[data-model-delete]');
            if (!remove) { return; }
            const name = remove.dataset.modelDelete;
            try {
              await request('/api/models/' + encodeURIComponent(name), { method: 'DELETE' });
              $('model-output').textContent = name + ' remove requested.';
              await refresh();
            } catch (error) {
              $('model-output').textContent = error.message;
            }
          });

          document.addEventListener('click', async (event) => {
            const remove = event.target.closest('[data-instance-delete]');
            if (!remove) { return; }
            const name = remove.dataset.instanceDelete;
            if (!name) { return; }
            try {
              await request('/api/instances/' + encodeURIComponent(name), { method: 'DELETE' });
              $('instance-output').textContent = name + ' remove requested.';
              await refresh();
            } catch (error) {
              $('instance-output').textContent = error.message;
            }
          });

          const localModelForm = $('local-model-form');
          if (localModelForm) {
            const localPresetSelect = $('local-model-preset');
            if (localPresetSelect) {
              localPresetSelect.addEventListener('change', () => {
                applyLocalPresetFields(localPresetSelect.value, { force: true });
              });
            }
            localModelForm.addEventListener('submit', async (event) => {
              event.preventDefault();
              const data = new FormData(localModelForm);
              const preset = data.get('preset') || 'custom';
              const payload = {
                name: data.get('name') || preset,
                enabled: true,
                targetNamespace: 'ai',
                local: {
                  modelType: data.get('modelType') || 'chat',
                  vram: data.get('vram') || '5Gi'
                }
              };
              if (preset !== 'custom') {
                payload.local.preset = preset;
              }
              if ((data.get('url') || '').trim()) {
                payload.local.url = data.get('url').trim();
              }
              if ((data.get('contextWindow') || '').trim()) {
                payload.local.contextWindow = Number(data.get('contextWindow'));
              }
              if ((data.get('maxNumSeqs') || '').trim()) {
                payload.local.maxNumSeqs = Number(data.get('maxNumSeqs'));
              }
              try {
                await request('/api/models/local', { method: 'POST', body: JSON.stringify(payload) });
                $('model-output').textContent = payload.name + ' local model requested.';
                await refresh();
              } catch (error) {
                $('model-output').textContent = error.message;
              }
            });
          }

          const externalModelForm = $('external-model-form');
          if (externalModelForm) {
            externalModelForm.addEventListener('submit', async (event) => {
              event.preventDefault();
              const data = new FormData(externalModelForm);
              const payload = {
                name: data.get('name') || 'example-external-model',
                enabled: true,
                targetNamespace: 'ai',
                external: {
                  model: data.get('model') || 'openai/gpt-4o-mini',
                  apiBase: data.get('apiBase') || 'https://api.openai.com/v1',
                  modelType: data.get('modelType') || 'chat'
                }
              };
              if ((data.get('contextWindow') || '').trim()) {
                payload.external.contextWindow = Number(data.get('contextWindow'));
              }
              if ((data.get('apiKey') || '').trim()) {
                payload.apiKey = data.get('apiKey').trim();
              }
              try {
                await request('/api/models/external', { method: 'POST', body: JSON.stringify(payload) });
                $('model-output').textContent = payload.name + ' external model requested.';
                externalModelForm.reset();
                await refresh();
              } catch (error) {
                $('model-output').textContent = error.message;
              }
            });
          }

          document.querySelectorAll('.instance-form').forEach((form) => {
            form.addEventListener('submit', async (event) => {
              event.preventDefault();
              const data = new FormData(form);
              const type = form.dataset.instanceType;
              if (!instanceTypeInstalled(latestModulePayload, type)) {
                $('instance-output').textContent = 'Install the required modules before creating this instance.';
                return;
              }
              const selectedModel = String(data.get('model') || '').trim();
              if (form.querySelector('select[data-model-select]') && !selectedModel) {
                $('instance-output').textContent = 'Select a deployed model before creating this instance.';
                return;
              }
              const payload = {
                name: data.get('name') || 'default',
                enabled: true,
                namespace: 'ai',
                model: selectedModel || 'CHANGEME_MODEL'
              };
              if (type === 'openclaw') {
                payload.storage = { size: data.get('storage') || '20Gi' };
                payload.ingress = { enabled: true, host: data.get('host') || appHost('openclaw', latestSettings.publicDomain) };
              }
              if (type === 'hermes') {
                payload.model = selectedModel || 'qwen3635b';
                payload.storage = { size: data.get('storage') || '10Gi' };
                payload.ingress = { enabled: true, host: data.get('host') || appHost('hermes', latestSettings.publicDomain) };
              }
              if (type === 'paperclip') {
                delete payload.model;
                payload.storage = { size: data.get('storage') || '5Gi' };
                payload.database = { managed: { storageSize: data.get('postgresStorage') || '10Gi' } };
                payload.ingress = { enabled: true, host: data.get('host') || appHost('paperclip', latestSettings.publicDomain) };
                payload.admin = { email: data.get('adminEmail') || 'admin@example.com', name: 'Admin' };
              }
              if (type === 'kubeopencode') {
                payload.server = { enabled: true, ingress: { enabled: true, host: data.get('host') || appHost('kubeopencode', latestSettings.publicDomain) } };
                payload.agentTemplates = [{ name: data.get('template') || 'default-coder', description: 'Default coding agent template' }];
              }
              try {
                await request('/api/instances/' + type, { method: 'POST', body: JSON.stringify(payload) });
                $('instance-output').textContent = type + '/' + payload.name + ' requested through AppInstance.';
                await refresh();
              } catch (error) {
                $('instance-output').textContent = error.message;
              }
            });
          });

          const settingsForm = $('settings-form');
          if (settingsForm) {
            settingsForm.addEventListener('input', () => {
              settingsForm.dataset.dirty = 'true';
            });
            settingsForm.addEventListener('submit', async (event) => {
              event.preventDefault();
              const data = new FormData(settingsForm);
              const payload = {
                publicDomain: data.get('publicDomain'),
                mdnsDomain: data.get('mdnsDomain'),
                dashboardHost: data.get('dashboardHost')
              };
              try {
                const settings = await request('/api/settings', { method: 'PATCH', body: JSON.stringify(payload) });
                settingsForm.dataset.dirty = 'false';
                renderSettings(settings, { force: true });
                setInstanceHostDefaults(settings);
                $('settings-output').textContent = 'Domain settings saved.';
                await refresh();
              } catch (error) {
                $('settings-output').textContent = error.message;
              }
            });
          }

          refresh();
          setInterval(refresh, 30000);
        })();
      </script>
    </body>
