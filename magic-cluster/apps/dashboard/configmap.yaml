        <footer>
          Generated by the dashboard renderer.
        </footer>
      </main>
      <script>
        (() => {
          const $ = (id) => document.getElementById(id);
          const apiState = $('api-state');
          let latestModelPayload = {};
          let latestModulePayload = {};
          let latestSettings = {
            publicDomain: 'magicstick.example.com',
            dashboardHost: 'magicstick.example.com',
            mdnsDomain: 'magicstick.local',
            mdnsName: 'magicstick'
          };
          let renderedPresetSignature = '';
          let localPresetLastApplied = '';
          const pendingModuleActions = {};
          const pendingModelDeletes = {};
          let vramEstimateTimer = null;
          let vramEstimateRequest = 0;
          let latestVramEstimate = null;
          let latestVramEstimateSignature = '';

          const setApiState = (text, ok = false) => {
            if (!apiState) { return; }
            apiState.textContent = text;
            apiState.className = ok ? 'status-pill ready' : 'status-pill waiting';
          };

          const request = async (path, options = {}) => {
            const response = await fetch(path, {
              headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
              ...options
            });
            const payload = await response.json().catch(() => ({}));
            if (!response.ok) {
              throw new Error(payload.error || response.statusText);
            }
            return payload;
          };

          const titleFromKey = (name) => String(name || '')
            .replace(/([a-z0-9])([A-Z])/g, '$1 $2')
            .replace(/[-_]+/g, ' ')
            .split(/\s+/)
            .filter(Boolean)
            .map((word) => word.charAt(0).toUpperCase() + word.slice(1))
            .join(' ') || 'Module';

          const moduleCatalog = (modulePayload) => (((modulePayload || {}).catalogJson || {}).modules || {});

          const moduleGroups = (modulePayload) => (((modulePayload || {}).catalogJson || {}).groups || {});

          const moduleSpec = (modulePayload, name) => {
            const modules = ((modulePayload || {}).modules || {});
            return modules[name] || {};
          };

          const INSTANCE_REQUIRED_MODULES = {
            openclaw: ['openclaw-operator', 'litellm', 'model-catalog'],
            hermes: ['hermes-operator', 'litellm', 'model-catalog'],
            odysseus: ['odysseus', 'litellm', 'model-catalog'],
            paperclip: ['paperclip-operator', 'litellm', 'model-catalog'],
            kubeopencode: ['kubeopencode', 'litellm', 'model-catalog']
          };

          const instanceMappings = (modulePayload) => (((modulePayload || {}).catalogJson || {}).instanceMappings || {});

          const requiredModulesForInstance = (modulePayload, type) => {
            const mapping = instanceMappings(modulePayload)[type] || {};
            return Array.isArray(mapping.requiredModules) && mapping.requiredModules.length
              ? mapping.requiredModules
              : (INSTANCE_REQUIRED_MODULES[type] || []);
          };

          const moduleInstalled = (modulePayload, name) => {
            const spec = moduleSpec(modulePayload, name);
            const status = spec.status || {};
            const phase = String(status.phase || '').toLowerCase();
            const activationMode = spec.activationMode || ((spec.catalog || {}).activationMode);
            if (spec.enabled !== true) { return false; }
            if (activationMode === 'static' && !phase) { return true; }
            return phase === 'ready';
          };

          const instanceTypeInstalled = (modulePayload, type) => {
            const requiredModules = requiredModulesForInstance(modulePayload, type);
            return requiredModules.length > 0 && requiredModules.every((name) => moduleInstalled(modulePayload, name));
          };

          const renderInstanceForms = (modulePayload) => {
            let visibleCount = 0;
            document.querySelectorAll('.instance-form[data-instance-type]').forEach((form) => {
              const installed = instanceTypeInstalled(modulePayload, form.dataset.instanceType);
              form.hidden = !installed;
              if (installed) {
                visibleCount += 1;
              }
            });
            const empty = $('instance-form-empty');
            if (empty) {
              empty.hidden = visibleCount !== 0;
            }
            const createPanel = $('instance-create-panel');
            if (createPanel) {
              createPanel.hidden = visibleCount === 0;
            }
          };

          const moduleCatalogSpec = (modulePayload, name, spec = {}) => {
            return spec.catalog || moduleCatalog(modulePayload)[name] || {};
          };

          const moduleDisplayName = (name, catalogSpec = {}, spec = {}) => {
            return spec.displayName || catalogSpec.displayName || titleFromKey(name);
          };

          const moduleOrder = (name, catalogSpec = {}) => {
            const value = Number(catalogSpec.order);
            return Number.isFinite(value) ? value : 10000;
          };

          const moduleGroupKey = (catalogSpec = {}) => {
            const key = String(catalogSpec.group || 'other').trim().toLowerCase();
            return key || 'other';
          };

          const moduleGroupSpec = (modulePayload, key) => {
            const groups = moduleGroups(modulePayload);
            const spec = groups[key] || {};
            return {
              displayName: spec.displayName || titleFromKey(key),
              order: Number.isFinite(Number(spec.order)) ? Number(spec.order) : 10000
            };
          };

          const moduleProgress = (phase, enabled, status = {}) => {
            const normalized = String(phase || '').toLowerCase();
            if (normalized === 'ready') {
              return { value: 100, label: 'Ready', className: 'ready' };
            }
            if (normalized === 'waitingformodules') {
              return { value: 35, label: 'Waiting for dependencies', className: 'waiting' };
            }
            if (normalized === 'waitingforcrds') {
              return { value: 45, label: 'Waiting for CRDs', className: 'waiting' };
            }
            if (normalized === 'reconciling') {
              return { value: 70, label: 'Reconciling', className: 'waiting' };
            }
            if (normalized === 'removing') {
              return { value: 65, label: 'Removing', className: 'waiting' };
            }
            if (normalized === 'degraded') {
              return { value: 100, label: status.message || 'Needs attention', className: 'degraded' };
            }
            if (normalized === 'disabled' || normalized === 'suspended' || !enabled) {
              return { value: 0, label: normalized === 'suspended' ? 'Suspended' : 'Disabled', className: 'disabled' };
            }
            return { value: 20, label: 'Requested', className: 'waiting' };
          };

          const phaseInProgress = (phase) => {
            return ['requested', 'waitingformodules', 'waitingforcrds', 'reconciling', 'removing'].includes(String(phase || '').toLowerCase());
          };

          const moduleGenerationPending = (spec = {}) => {
            const generation = Number(spec.generation || 0);
            const observed = Number(spec.observedGeneration || ((spec.status || {}).observedGeneration) || 0);
            return generation > 0 && observed < generation;
          };

          const moduleActionProgress = (action) => {
            if (action === 'disable') {
              return { value: 65, label: 'Disable requested', className: 'waiting' };
            }
            return { value: 20, label: 'Enable requested', className: 'waiting' };
          };

          const progressPillClass = (progress) => {
            return ['ready', 'waiting', 'disabled', 'degraded'].includes(progress.className) ? progress.className : 'waiting';
          };

          const createProgressBox = (progress) => {
            const progressBox = document.createElement('div');
            progressBox.className = 'module-progress ' + progress.className;
            const progressRow = document.createElement('div');
            progressRow.className = 'module-progress-row';
            const progressLabel = document.createElement('span');
            progressLabel.textContent = progress.label;
            const progressValue = document.createElement('span');
            progressValue.textContent = progress.value + '%';
            progressRow.append(progressLabel, progressValue);
            const track = document.createElement('div');
            track.className = 'module-progress-track';
            const value = document.createElement('div');
            value.className = 'module-progress-value';
            value.style.setProperty('--module-progress', progress.value + '%');
            track.appendChild(value);
            progressBox.append(progressRow, track);
            return progressBox;
          };

          const orderedModules = (modulePayload) => {
            const catalog = moduleCatalog(modulePayload);
            const modules = ((modulePayload || {}).modules || {});
            const names = new Set([...Object.keys(catalog), ...Object.keys(modules)]);
            return Array.from(names).map((name) => {
              const spec = modules[name] || {};
              const catalogSpec = moduleCatalogSpec(modulePayload, name, spec);
              return { name, spec, catalogSpec, title: moduleDisplayName(name, catalogSpec, spec) };
            }).sort((left, right) => {
              const orderDelta = moduleOrder(left.name, left.catalogSpec) - moduleOrder(right.name, right.catalogSpec);
              if (orderDelta !== 0) { return orderDelta; }
              return left.title.localeCompare(right.title) || left.name.localeCompare(right.name);
            });
          };

          const groupedModules = (modulePayload) => {
            const groups = new Map();
            orderedModules(modulePayload).forEach((module) => {
              const key = moduleGroupKey(module.catalogSpec);
              if (!groups.has(key)) {
                groups.set(key, { key, spec: moduleGroupSpec(modulePayload, key), modules: [] });
              }
              groups.get(key).modules.push(module);
            });
            return Array.from(groups.values()).sort((left, right) => {
              const orderDelta = left.spec.order - right.spec.order;
              if (orderDelta !== 0) { return orderDelta; }
              return left.spec.displayName.localeCompare(right.spec.displayName) || left.key.localeCompare(right.key);
            });
          };

          const parameterDisplayValue = (value) => {
            if (!value) { return ''; }
            if (typeof value === 'object') {
              return value.size || value.storageSize || '';
            }
            return String(value);
          };

          const renderModuleAdvanced = (item, name, spec, modulePayload) => {
            const fields = moduleCatalogSpec(modulePayload, name, spec).parameters || [];
            if (!fields.length) { return; }
            const parameters = (spec || {}).parameters || {};
            const details = document.createElement('details');
            details.className = 'module-advanced';
            details.open = fields.some((field) => parameterDisplayValue(parameters[field.name]) !== '');
            const summary = document.createElement('summary');
            summary.textContent = 'Configure';
            const grid = document.createElement('div');
            grid.className = 'form-grid';
            fields.forEach((field) => {
              const label = document.createElement('label');
              label.className = 'field';
              label.textContent = field.label;
              const input = document.createElement('input');
              input.name = field.name;
              input.placeholder = field.placeholder;
              input.type = field.type || 'text';
              input.value = parameterDisplayValue(parameters[field.name]);
              input.dataset.moduleParameter = field.name;
              label.appendChild(input);
              grid.appendChild(label);
            });
            details.append(summary, grid);
            item.appendChild(details);
          };

          const moduleParametersFromItem = (item) => {
            const parameters = {};
            if (!item) { return parameters; }
            item.querySelectorAll('[data-module-parameter]').forEach((input) => {
              const value = String(input.value || '').trim();
              if (value) {
                parameters[input.dataset.moduleParameter] = value;
              }
            });
            return parameters;
          };

          const ensureHttpUrl = (value) => {
            const raw = String(value || '').trim();
            if (!raw) { return ''; }
            if (/^https?:\/\//i.test(raw)) { return raw; }
            return 'http://' + raw.replace(/^\/+/, '').replace(/\/?$/, '/');
          };

          const urlHost = (value) => {
            const url = ensureHttpUrl(value);
            if (!url) { return ''; }
            try {
              return new URL(url).host;
            } catch (error) {
              return String(value || '').replace(/^https?:\/\//i, '').replace(/\/.*$/, '');
            }
          };

          const urlHostname = (value) => {
            const url = ensureHttpUrl(value);
            if (!url) { return ''; }
            try {
              return new URL(url).hostname;
            } catch (error) {
              return String(urlHost(value) || '').replace(/:\d+$/, '');
            }
          };

          const normalizedKey = (value) => {
            return String(value || '').toLowerCase().replace(/[^a-z0-9]/g, '');
          };

          const linkFromUrl = (value) => {
            const url = ensureHttpUrl(value);
            if (!url) { return null; }
            return { url, label: urlHost(url) || url };
          };

          const linksFromIngress = (ingress) => {
            return ((ingress || {}).hosts || []).map(linkFromUrl).filter(Boolean);
          };

          const uniqueLinks = (links) => {
            const seen = new Set();
            return (links || []).filter((link) => {
              const key = String((link || {}).url || '').replace(/\/$/, '');
              if (!key || seen.has(key)) { return false; }
              seen.add(key);
              return true;
            });
          };

          const createResourceLinks = (links) => {
            const unique = uniqueLinks(links);
            if (!unique.length) { return null; }
            const wrapper = document.createElement('div');
            wrapper.className = 'resource-links';
            unique.forEach((link) => {
              const anchor = document.createElement('a');
              anchor.className = 'resource-link';
              anchor.href = link.url;
              anchor.target = '_blank';
              anchor.rel = 'noreferrer';
              anchor.textContent = link.label;
              wrapper.appendChild(anchor);
            });
            return wrapper;
          };

          const moduleIngressLookupKeys = (name, catalogSpec = {}) => {
            const values = [name].concat(catalogSpec.aliases || []);
            return new Set(values.map(normalizedKey).filter(Boolean));
          };

          const moduleIngressLinks = (name, catalogSpec = {}, status = {}) => {
            const keys = moduleIngressLookupKeys(name, catalogSpec);
            const allowNameContains = (catalogSpec.activationMode || '') === 'static';
            const matches = (ingress) => {
              const labels = (ingress || {}).labels || {};
              const annotations = (ingress || {}).annotations || {};
              const labeledKeys = [
                labels.app,
                labels['app.kubernetes.io/name'],
                labels['appliance.magicstick.dev/module'],
                annotations['dashboard.ai-appliance.io/title']
              ].map(normalizedKey).filter(Boolean);
              if (labeledKeys.some((key) => keys.has(key))) { return true; }
              const ingressName = normalizedKey((ingress || {}).name);
              if (keys.has(ingressName)) { return true; }
              if (allowNameContains && Array.from(keys).some((key) => key && ingressName.includes(key))) { return true; }
              return ((ingress || {}).hosts || []).some((host) => {
                const hostname = String(urlHost(host) || host || '');
                const hostLabels = hostname.split('.').map(normalizedKey).filter(Boolean);
                return hostLabels.some((label) => keys.has(label));
              });
            };
            return uniqueLinks(((status || {}).ingresses || []).filter(matches).flatMap(linksFromIngress));
          };

          const instanceConfiguredHosts = (instance) => {
            const spec = (instance || {}).spec || {};
            const params = spec.parameters || {};
            const status = (instance || {}).status || {};
            const server = params.server || {};
            const hosts = [
              status.url,
              ((params.ingress || {}).host),
              ((server.ingress || {}).host),
              params.host
            ].map(urlHost).filter(Boolean);
            return new Set(hosts);
          };

          const instanceIngressLinks = (instance, status = {}) => {
            const metadata = (instance || {}).metadata || {};
            const instanceName = String(metadata.name || '').toLowerCase();
            const expectedHosts = instanceConfiguredHosts(instance);
            const matches = (ingress) => {
              const ingressName = String((ingress || {}).name || '').toLowerCase();
              const labels = (ingress || {}).labels || {};
              const appInstanceName = String(labels['appliance.magicstick.dev/appinstance'] || '').toLowerCase();
              if (instanceName && (ingressName === instanceName || ingressName.startsWith(instanceName + '-') || appInstanceName === instanceName)) { return true; }
              return ((ingress || {}).hosts || []).some((host) => expectedHosts.has(urlHost(host)));
            };
            const ingressLinks = ((status || {}).ingresses || []).filter(matches).flatMap(linksFromIngress);
            const statusLink = linkFromUrl(((instance || {}).status || {}).url);
            return uniqueLinks(statusLink ? ingressLinks.concat(statusLink) : ingressLinks);
          };

          const overviewLinkScope = (link) => {
            const hostname = urlHostname((link || {}).url || (link || {}).label);
            if (/^\d{1,3}(\.\d{1,3}){3}$/.test(hostname) || hostname === 'localhost') {
              return { key: 'direct', label: 'Open direct', order: 30 };
            }
            if (hostname.endsWith('.local')) {
              return { key: 'local', label: 'Open local', order: 10 };
            }
            return { key: 'public', label: 'Open public', order: 20 };
          };

          const overviewActionLinks = (links) => {
            const picked = new Map();
            uniqueLinks(links).forEach((link) => {
              const scope = overviewLinkScope(link);
              if (!picked.has(scope.key)) {
                picked.set(scope.key, { link, scope });
              }
            });
            return Array.from(picked.values()).sort((left, right) => left.scope.order - right.scope.order);
          };

          const createOverviewAppActions = (links) => {
            const actions = overviewActionLinks(links);
            if (!actions.length) { return null; }
            const wrapper = document.createElement('div');
            wrapper.className = 'overview-app-actions';
            actions.forEach(({ link, scope }) => {
              const anchor = document.createElement('a');
              anchor.className = 'resource-link';
              anchor.href = link.url;
              anchor.target = '_blank';
              anchor.rel = 'noreferrer';
              anchor.title = link.label;
              anchor.textContent = scope.label;
              wrapper.appendChild(anchor);
            });
            return wrapper;
          };

          const copyText = async (value, input) => {
            if (navigator.clipboard && navigator.clipboard.writeText) {
              try {
                await navigator.clipboard.writeText(value);
                return true;
              } catch (error) {
                // Fall back to selecting the readonly field below.
              }
            }
            if (input) {
              input.focus();
              input.select();
              return document.execCommand && document.execCommand('copy');
            }
            return false;
          };

          const showInstanceCredentials = (card, payload) => {
            if (!card) { return; }
            const existing = card.querySelector('.credential-panel');
            if (existing) {
              existing.remove();
            }
            const panel = document.createElement('div');
            panel.className = 'credential-panel';
            const heading = document.createElement('div');
            heading.className = 'credential-heading';
            const title = document.createElement('strong');
            title.textContent = (payload.title || titleFromKey(payload.type || 'instance')) + ' credentials';
            const meta = document.createElement('span');
            meta.textContent = [payload.namespace, payload.secretName].filter(Boolean).join('/');
            heading.append(title, meta);
            panel.appendChild(heading);
            const credentials = Array.isArray(payload.credentials) && payload.credentials.length
              ? payload.credentials
              : [{ key: 'token', value: payload.token || '' }];
            credentials.filter((credential) => credential && credential.value).forEach((credential) => {
              const row = document.createElement('div');
              row.className = 'credential-row';
              const label = document.createElement('label');
              label.textContent = credential.key || 'token';
              const valueRow = document.createElement('div');
              valueRow.className = 'credential-value';
              const input = document.createElement('input');
              input.readOnly = true;
              input.value = credential.value || '';
              const copy = document.createElement('button');
              copy.type = 'button';
              copy.className = 'control-button';
              copy.textContent = 'Copy';
              copy.addEventListener('click', async () => {
                try {
                  await copyText(input.value, input);
                  copy.textContent = 'Copied';
                  window.setTimeout(() => { copy.textContent = 'Copy'; }, 1200);
                } catch (error) {
                  copy.textContent = 'Select';
                  input.focus();
                  input.select();
                }
              });
              valueRow.append(input, copy);
              row.append(label, valueRow);
              panel.appendChild(row);
            });
            card.appendChild(panel);
          };

          const instanceOverviewTitle = (type, instance) => {
            const metadata = (instance || {}).metadata || {};
            const rawName = metadata.name || '';
            const prefix = type + '-';
            const shortName = rawName.startsWith(prefix) ? rawName.slice(prefix.length) : rawName;
            return titleFromKey(type) + (shortName && shortName !== type ? ' ' + shortName : '');
          };

          const createOverviewAppRow = ({ title, subtitle, phase, links }) => {
            const row = document.createElement('article');
            row.className = 'overview-app-row';
            const titleBlock = document.createElement('div');
            titleBlock.className = 'overview-app-title';
            const name = document.createElement('strong');
            name.textContent = title;
            const meta = document.createElement('span');
            meta.textContent = [subtitle, phase].filter(Boolean).join(' - ');
            titleBlock.append(name, meta);
            const actions = createOverviewAppActions(links);
            row.appendChild(titleBlock);
            if (actions) {
              row.appendChild(actions);
            }
            return row;
          };

          const addOverviewRow = (target, rows, seenLinks, row) => {
            const links = uniqueLinks(row.links || []);
            const freshLinks = links.filter((link) => {
              const key = String(link.url || '').replace(/\/$/, '');
              return key && !seenLinks.has(key);
            });
            if (!freshLinks.length) { return; }
            freshLinks.forEach((link) => seenLinks.add(String(link.url || '').replace(/\/$/, '')));
            target.appendChild(createOverviewAppRow({ ...row, links: freshLinks }));
            rows.push(row);
          };

          const renderOverviewApps = (modulePayload, instancePayload, status) => {
            const target = $('overview-app-list');
            const count = $('overview-app-count');
            if (!target) { return; }
            target.innerHTML = '';
            const rows = [];
            const seenLinks = new Set();
            const instances = ((instancePayload || {}).instances || {});
            Object.keys(instances).sort().forEach((type) => {
              (instances[type] || []).forEach((instance) => {
                const spec = instance.spec || {};
                const statusSpec = instance.status || {};
                const enabled = spec.enabled !== false;
                const phase = statusSpec.phase || (enabled ? 'Requested' : 'Suspended');
                addOverviewRow(target, rows, seenLinks, {
                  title: instanceOverviewTitle(type, instance),
                  subtitle: 'Instance',
                  phase,
                  links: instanceIngressLinks(instance, status)
                });
              });
            });
            orderedModules(modulePayload).forEach(({ name, spec, catalogSpec, title }) => {
              const enabled = spec.enabled === true;
              const activationMode = spec.activationMode || catalogSpec.activationMode || 'moduleactivation';
              const phase = (spec.status || {}).phase || (activationMode === 'static' && enabled ? 'Ready' : (enabled ? 'Requested' : 'Disabled'));
              addOverviewRow(target, rows, seenLinks, {
                title,
                subtitle: 'Module',
                phase,
                links: moduleIngressLinks(name, catalogSpec, status)
              });
            });
            if (!target.childElementCount) {
              const item = document.createElement('div');
              item.className = 'mini-item';
              item.textContent = 'No app ingresses discovered yet.';
              target.appendChild(item);
            }
            if (count) {
              count.textContent = rows.length + (rows.length === 1 ? ' app' : ' apps');
            }
          };

          const attentionItem = (target, items, label, detail) => {
            if (!target) { return; }
            const item = document.createElement('div');
            item.className = 'mini-item';
            const strong = document.createElement('strong');
            strong.textContent = label;
            item.appendChild(strong);
            if (detail) {
              const text = document.createElement('span');
              text.textContent = detail;
              item.appendChild(text);
            }
            target.appendChild(item);
            items.push(label);
          };

          const phaseNeedsOverviewAttention = (phase) => {
            const normalized = String(phase || '').toLowerCase();
            return normalized === 'degraded' || phaseInProgress(normalized);
          };

          const renderOverviewAttention = (appliance, modulePayload, instancePayload, modelPayload, statusPayload) => {
            const target = $('overview-attention-list');
            const count = $('overview-attention-count');
            if (!target) { return; }
            target.innerHTML = '';
            const items = [];
            (((appliance || {}).status || {}).conditions || []).forEach((condition) => {
              if (condition.status && condition.status !== 'True') {
                attentionItem(target, items, 'Appliance ' + (condition.type || 'Condition'), (condition.reason || condition.message || condition.status || '').trim());
              }
            });
            orderedModules(modulePayload).forEach(({ name, spec, catalogSpec, title }) => {
              const enabled = spec.enabled === true;
              const activationMode = spec.activationMode || catalogSpec.activationMode || 'moduleactivation';
              const moduleStatus = spec.status || {};
              const phase = moduleStatus.phase || (activationMode === 'static' && enabled ? 'Ready' : (enabled ? 'Requested' : 'Disabled'));
              if (phaseNeedsOverviewAttention(phase)) {
                attentionItem(target, items, 'Module ' + title, moduleStatus.message || phase);
              }
            });
            const instances = ((instancePayload || {}).instances || {});
            Object.keys(instances).sort().forEach((type) => {
              (instances[type] || []).forEach((instance) => {
                const spec = instance.spec || {};
                const status = instance.status || {};
                const enabled = spec.enabled !== false;
                const phase = status.phase || (enabled ? 'Requested' : 'Suspended');
                if (phaseNeedsOverviewAttention(phase)) {
                  attentionItem(target, items, 'Instance ' + (instanceOverviewTitle(type, instance)), status.message || phase);
                }
              });
            });
            ((modelPayload || {}).activations || []).forEach((activation) => {
              const metadata = activation.metadata || {};
              const spec = activation.spec || {};
              const status = activation.status || {};
              const enabled = spec.enabled !== false;
              const phase = status.phase || (enabled ? 'Requested' : 'Disabled');
              if (phaseNeedsOverviewAttention(phase) || metadata.deletionTimestamp || pendingModelDeletes[metadata.name]) {
                attentionItem(target, items, 'Model ' + (metadata.name || 'unnamed'), status.message || (metadata.deletionTimestamp ? 'Removing' : phase));
              }
            });
            ((statusPayload || {}).fluxKustomizations || []).forEach((item) => {
              const ready = (item.conditions || []).find((condition) => condition.type === 'Ready');
              if (ready && ready.status && ready.status !== 'True') {
                attentionItem(target, items, 'Flux ' + (item.name || 'Kustomization'), ready.reason || ready.message || ready.status);
              }
            });
            if (!target.childElementCount) {
              const item = document.createElement('div');
              item.className = 'mini-item';
              item.textContent = 'No issues detected.';
              target.appendChild(item);
            }
            if (count) {
              count.textContent = items.length ? (items.length + (items.length === 1 ? ' item' : ' items')) : 'No issues';
            }
          };

          const renderModules = (modulePayload, statusPayload = {}) => {
            const list = $('module-list');
            if (!list) { return; }
            list.innerHTML = '';
            groupedModules(modulePayload).forEach((group) => {
              const section = document.createElement('section');
              section.className = 'module-group';
              const heading = document.createElement('div');
              heading.className = 'module-group-heading';
              const title = document.createElement('h3');
              title.textContent = group.spec.displayName;
              const count = document.createElement('span');
              count.textContent = group.modules.length + (group.modules.length === 1 ? ' module' : ' modules');
              heading.append(title, count);
              const grid = document.createElement('div');
              grid.className = 'module-grid';

              group.modules.forEach(({ name, spec, catalogSpec, title: moduleTitle }) => {
                const enabled = spec.enabled === true;
                const status = spec.status || {};
                const activationMode = spec.activationMode || catalogSpec.activationMode || 'moduleactivation';
                const phase = status.phase || (activationMode === 'static' && enabled ? 'Ready' : (enabled ? 'Requested' : 'Disabled'));
                const pendingAction = pendingModuleActions[name];
                const runtimeInProgress = phaseInProgress(phase) || moduleGenerationPending(spec);
                if (pendingAction && !runtimeInProgress) {
                  delete pendingModuleActions[name];
                }
                const activePendingAction = pendingModuleActions[name];
                const progress = activePendingAction
                  ? moduleActionProgress(activePendingAction)
                  : (moduleGenerationPending(spec) ? moduleActionProgress(enabled ? 'enable' : 'disable') : moduleProgress(phase, enabled, status));
                const item = document.createElement('article');
                item.className = 'module-card';
                const header = document.createElement('div');
                header.className = 'module-card-header';
                const titleBlock = document.createElement('div');
                titleBlock.className = 'module-card-title';
                const label = document.createElement('strong');
                label.textContent = moduleTitle;
                const key = document.createElement('span');
                key.textContent = name;
                titleBlock.append(label, key);
                const pill = document.createElement('span');
                pill.className = 'status-pill ' + progressPillClass(progress);
                pill.textContent = phase;
                header.append(titleBlock, pill);

                const progressBox = createProgressBox(progress);

                const message = document.createElement('div');
                message.className = 'module-message';
                message.textContent = status.message || ((catalogSpec.requires || []).length ? 'Requires: ' + catalogSpec.requires.join(', ') : '');
                const links = createResourceLinks(moduleIngressLinks(name, catalogSpec, statusPayload));

                const actions = document.createElement('div');
                actions.className = 'action-row';
                item.append(header, progressBox, message);
                if (links) {
                  item.appendChild(links);
                }
                if (!enabled) {
                  renderModuleAdvanced(item, name, spec, modulePayload);
                }
                if (activationMode === 'moduleactivation') {
                  const action = document.createElement('button');
                  action.type = 'button';
                  if (enabled) {
                    action.className = 'control-button danger';
                    action.dataset.moduleDisable = name;
                    action.textContent = 'Disable';
                  } else {
                    action.className = 'control-button primary';
                    action.dataset.moduleEnable = name;
                    action.textContent = 'Enable';
                  }
                  action.disabled = runtimeInProgress || Boolean(activePendingAction);
                  if (action.disabled) {
                    action.title = progress.label;
                  }
                  actions.appendChild(action);
                  item.appendChild(actions);
                }
                grid.appendChild(item);
              });

              section.append(heading, grid);
              list.appendChild(section);
            });
          };

          const renderInstances = (instancePayload, statusPayload = {}) => {
            const list = $('instance-list');
            if (!list) { return; }
            list.innerHTML = '';
            const instances = ((instancePayload || {}).instances || {});
            Object.keys(instances).sort().forEach((type) => {
              const items = instances[type] || [];
              if (!items.length) { return; }
              const section = document.createElement('section');
              section.className = 'module-group';
              const heading = document.createElement('div');
              heading.className = 'module-group-heading';
              const title = document.createElement('h3');
              title.textContent = titleFromKey(type);
              const count = document.createElement('span');
              count.textContent = items.length + (items.length === 1 ? ' instance' : ' instances');
              heading.append(title, count);
              const grid = document.createElement('div');
              grid.className = 'module-grid';
              items.forEach((instance) => {
                const metadata = instance.metadata || {};
                const spec = instance.spec || {};
                const status = instance.status || {};
                const enabled = spec.enabled !== false;
                const phase = status.phase || (enabled ? 'Requested' : 'Suspended');
                const progress = moduleProgress(phase, enabled, status);
                const item = document.createElement('article');
                item.className = 'module-card';
                const header = document.createElement('div');
                header.className = 'module-card-header';
                const titleBlock = document.createElement('div');
                titleBlock.className = 'module-card-title';
                const label = document.createElement('strong');
                label.textContent = metadata.name || 'unnamed';
                const key = document.createElement('span');
                key.textContent = type + ' / ' + (spec.targetNamespace || 'ai');
                titleBlock.append(label, key);
                const pill = document.createElement('span');
                pill.className = 'status-pill ' + progressPillClass(progress);
                pill.textContent = phase;
                header.append(titleBlock, pill);
                const details = document.createElement('div');
                details.className = 'module-message';
                details.textContent = status.message || ('namespace: ' + (spec.targetNamespace || 'ai') + (status.url ? ' - ' + status.url : ''));
                const actions = document.createElement('div');
                actions.className = 'action-row';
                item.append(header, createProgressBox(progress), details);
                const links = createResourceLinks(instanceIngressLinks(instance, statusPayload));
                if (links) {
                  item.appendChild(links);
                }
                if (['openclaw', 'odysseus'].includes(type) && metadata.name && String(phase).toLowerCase() !== 'removing') {
                  const credentials = document.createElement('button');
                  credentials.className = 'control-button';
                  credentials.type = 'button';
                  credentials.dataset.instanceCredentials = metadata.name;
                  credentials.textContent = 'Credentials';
                  actions.appendChild(credentials);
                }
                if (metadata.name && String(phase).toLowerCase() !== 'removing') {
                  const remove = document.createElement('button');
                  remove.className = 'control-button danger';
                  remove.type = 'button';
                  remove.dataset.instanceDelete = metadata.name;
                  remove.textContent = 'Remove';
                  actions.appendChild(remove);
                }
                if (actions.childElementCount) {
                  item.appendChild(actions);
                }
                grid.appendChild(item);
              });
              section.append(heading, grid);
              list.appendChild(section);
            });
            if (!list.childElementCount) {
              const item = document.createElement('div');
              item.className = 'mini-item';
              item.textContent = 'No instances requested.';
              list.appendChild(item);
            }
          };

          const formatMi = (value) => {
            const number = Number(value || 0);
            if (number >= 1024) {
              return (number / 1024).toFixed(number >= 10240 ? 0 : 1) + ' GiB';
            }
            return number + ' MiB';
          };

          const formatVramInput = (value) => {
            const number = Math.max(0, Math.round(Number(value || 0)));
            return number % 1024 === 0 ? (number / 1024) + 'Gi' : number + 'Mi';
          };

          const formNumber = (form, name) => {
            const value = String((form.elements[name] || {}).value || '').trim();
            return /^\d+$/.test(value) ? Number(value) : 0;
          };

          const localPreset = (form) => {
            const presetName = String((form.elements.preset || {}).value || '').trim();
            return ((latestModelPayload || {}).presets || {})[presetName] || {};
          };

          const vramEstimatePayload = (form) => {
            const preset = localPreset(form);
            const modelTypeValue = String((form.elements.modelType || {}).value || preset.modelType || preset.type || 'chat').trim().toLowerCase();
            return {
              url: String((form.elements.url || {}).value || preset.url || '').trim(),
              contextWindow: formNumber(form, 'contextWindow') || Number(preset.contextWindow || 0) || null,
              maxNumSeqs: formNumber(form, 'maxNumSeqs') || Number(presetMaxNumSeqs(preset) || 0) || (modelTypeValue === 'embedding' ? 8 : 32),
              modelType: modelTypeValue || 'chat'
            };
          };

          const setEstimateText = (id, value) => {
            const node = $(id);
            if (node) { node.textContent = value; }
          };

          const setVramEstimateControls = (enabled) => {
            const slider = $('vram-estimate-slider');
            if (slider) { slider.disabled = !enabled; }
            document.querySelectorAll('[data-vram-use]').forEach((button) => { button.disabled = !enabled; });
          };

          const setVramUseMode = (mode) => {
            document.querySelectorAll('[data-vram-use]').forEach((button) => {
              button.classList.toggle('primary', button.dataset.vramUse === mode);
            });
          };

          const renderVramEstimateWarnings = (warnings) => {
            const node = $('vram-estimate-warnings');
            if (!node) { return; }
            node.innerHTML = '';
            (warnings || []).forEach((warning) => {
              const item = document.createElement('div');
              item.className = 'estimate-callout ' + (/exceeds|unavailable|not available|could not/i.test(warning) ? 'warning' : '');
              item.textContent = warning;
              node.appendChild(item);
            });
          };

          const renderEmptyVramEstimate = (message) => {
            latestVramEstimate = null;
            setEstimateText('vram-estimate-status', message || 'Waiting for model metadata');
            ['weights', 'kv', 'reserve', 'minimum', 'recommended', 'maximum'].forEach((key) => {
              setEstimateText('vram-estimate-' + key, '-');
            });
            setEstimateText('vram-estimate-selected', 'Selected: -');
            setEstimateText('vram-estimate-meta', '-');
            renderVramEstimateWarnings([]);
            setVramUseMode('');
            setVramEstimateControls(false);
          };

          const applyVramLimitMi = (value, mode = '') => {
            const form = $('local-model-form');
            if (!form) { return; }
            setFormValue(form, 'vram', formatVramInput(value));
            setEstimateText('vram-estimate-selected', 'Selected: ' + formatMi(value));
            setVramUseMode(mode);
          };

          const renderVramEstimate = (estimate, options = {}) => {
            latestVramEstimate = estimate || null;
            if (!estimate) {
              renderEmptyVramEstimate('Waiting for model metadata');
              return;
            }
            const minimum = Number(estimate.minimumMi || 0);
            const recommended = Number(estimate.recommendedMi || minimum);
            const maximum = estimate.maximumMi === null || estimate.maximumMi === undefined ? 0 : Number(estimate.maximumMi || 0);
            const effectiveMax = estimate.gpuAvailable ? Math.max(minimum, maximum) : Math.max(minimum, recommended);
            const selected = Math.min(effectiveMax, Math.max(minimum, recommended));
            setEstimateText('vram-estimate-status', estimate.confidence === 'high' ? 'High confidence' : 'Estimated');
            setEstimateText('vram-estimate-weights', formatMi(estimate.weightsMi));
            setEstimateText('vram-estimate-kv', formatMi(estimate.kvCacheMi));
            setEstimateText('vram-estimate-reserve', formatMi((estimate.reserveMi || 0) + (estimate.recommendedReserveMi || 0)));
            setEstimateText('vram-estimate-minimum', formatMi(minimum));
            setEstimateText('vram-estimate-recommended', formatMi(recommended));
            setEstimateText('vram-estimate-maximum', estimate.gpuAvailable ? formatMi(maximum) : 'Unknown');
            setEstimateText('vram-estimate-meta', 'Context ' + estimate.contextWindow + ', max seqs ' + estimate.maxNumSeqs);
            renderVramEstimateWarnings(estimate.warnings || []);
            const slider = $('vram-estimate-slider');
            if (slider) {
              slider.min = String(minimum);
              slider.max = String(effectiveMax);
              slider.step = '256';
              slider.value = String(selected);
            }
            setVramEstimateControls(true);
            if (options.applyRecommended !== false) {
              applyVramLimitMi(selected, 'recommended');
            }
          };

          const runVramEstimate = async () => {
            const form = $('local-model-form');
            if (!form) { return; }
            const payload = vramEstimatePayload(form);
            if (!payload.url) {
              latestVramEstimateSignature = '';
              renderEmptyVramEstimate('Waiting for HF URL');
              return;
            }
            const signature = JSON.stringify(payload);
            if (signature === latestVramEstimateSignature && latestVramEstimate) {
              renderVramEstimate(latestVramEstimate, { applyRecommended: false });
              return;
            }
            const requestId = ++vramEstimateRequest;
            setEstimateText('vram-estimate-status', 'Estimating');
            renderVramEstimateWarnings([]);
            setVramEstimateControls(false);
            try {
              const estimate = await request('/api/models/estimate-vram', { method: 'POST', body: JSON.stringify(payload) });
              if (requestId !== vramEstimateRequest) { return; }
              latestVramEstimateSignature = signature;
              renderVramEstimate(estimate);
            } catch (error) {
              if (requestId !== vramEstimateRequest) { return; }
              latestVramEstimateSignature = '';
              renderEmptyVramEstimate('Estimate unavailable');
              renderVramEstimateWarnings([error.message || 'Could not estimate VRAM.']);
            }
          };

          const scheduleVramEstimate = () => {
            clearTimeout(vramEstimateTimer);
            vramEstimateTimer = setTimeout(runVramEstimate, 450);
          };

          const orderedPresetKeys = (presets) => {
            const preferred = ['qwen352bvlembedding', 'qwen3635b', 'qwen359b'];
            const keys = Object.keys(presets || {});
            return [
              ...preferred.filter((key) => keys.includes(key)),
              ...keys.filter((key) => !preferred.includes(key)).sort()
            ];
          };

          const renderLocalPresetOptions = (modelPayload) => {
            const select = $('local-model-preset');
            if (!select) { return; }
            const presets = (modelPayload || {}).presets || {};
            const keys = orderedPresetKeys(presets);
            const signature = keys.join('|');
            if (!keys.length || signature === renderedPresetSignature) { return; }
            const selected = select.value || 'qwen352bvlembedding';
            select.innerHTML = '';
            keys.forEach((key) => {
              const option = document.createElement('option');
              option.value = key;
              option.textContent = key;
              select.appendChild(option);
            });
            const custom = document.createElement('option');
            custom.value = 'custom';
            custom.textContent = 'Custom';
            select.appendChild(custom);
            select.value = keys.includes(selected) || selected === 'custom' ? selected : keys[0];
            renderedPresetSignature = signature;
          };

          const modelIdentifier = (model) => String(((model || {}).id || (model || {}).name || '')).trim();

          const modelLabel = (model) => {
            const id = modelIdentifier(model);
            const name = String(((model || {}).name || '')).trim();
            return name && name !== id ? name + ' (' + id + ')' : id;
          };

          const modelType = (model) => String(((model || {}).type || (model || {}).modelType || '')).trim().toLowerCase();

          const deployedModels = (modelPayload, type = 'chat') => {
            const seen = new Set();
            return (((modelPayload || {}).models || []) || [])
              .filter((model) => {
                const id = modelIdentifier(model);
                if (!id) { return false; }
                if (type === 'chat') {
                  return modelType(model) === 'chat';
                }
                return modelType(model) === type;
              })
              .filter((model) => {
                const id = modelIdentifier(model);
                if (seen.has(id)) { return false; }
                seen.add(id);
                return true;
              })
              .sort((left, right) => modelLabel(left).localeCompare(modelLabel(right)));
          };

          const catalogDefaultChatModel = (modelPayload) => {
            const catalog = (modelPayload || {}).catalog || {};
            const models = deployedModels(modelPayload, 'chat');
            const available = new Set(models.map(modelIdentifier));
            const wanted = String(catalog.defaultChatModel || '').trim();
            if (wanted && available.has(wanted)) {
              return wanted;
            }
            return models.length ? modelIdentifier(models[0]) : '';
          };

          const renderInstanceModelOptions = (modelPayload) => {
            const defaultChatModel = catalogDefaultChatModel(modelPayload);
            document.querySelectorAll('select[data-model-select]').forEach((select) => {
              const type = select.dataset.modelSelect || 'chat';
              const models = deployedModels(modelPayload, type);
              const previous = String(select.value || '').trim();
              select.innerHTML = '';

              if (!models.length) {
                const option = document.createElement('option');
                option.value = '';
                option.textContent = type === 'chat' ? 'No deployed chat models' : 'No deployed models';
                select.appendChild(option);
                select.disabled = true;
                select.dataset.modelsAvailable = 'false';
                return;
              }

              const available = new Set();
              models.forEach((model) => {
                const id = modelIdentifier(model);
                available.add(id);
                const option = document.createElement('option');
                option.value = id;
                option.textContent = modelLabel(model);
                select.appendChild(option);
              });

              const fallback = String(select.dataset.modelFallback || '').trim();
              select.value = available.has(previous)
                ? previous
                : (available.has(defaultChatModel) ? defaultChatModel : (available.has(fallback) ? fallback : modelIdentifier(models[0])));
              select.disabled = false;
              select.dataset.modelsAvailable = 'true';
            });

            document.querySelectorAll('.instance-form').forEach((form) => {
              const select = form.querySelector('select[data-model-select]');
              const button = form.querySelector('button[type="submit"]');
              if (!select || !button) { return; }
              const disabled = select.dataset.modelsAvailable === 'false';
              button.disabled = disabled;
              button.title = disabled ? 'No deployed chat models available' : '';
            });
          };

          const setFormValue = (form, name, value) => {
            if (!form) { return; }
            const field = form.elements[name];
            if (field) {
              field.value = value === undefined || value === null ? '' : String(value);
            }
          };

          const appHost = (prefix, domain) => {
            const cleanPrefix = String(prefix || '').trim().replace(/\.$/, '');
            const cleanDomain = String(domain || '').trim().replace(/^\./, '').replace(/\.$/, '');
            return cleanPrefix && cleanDomain ? cleanPrefix + '.' + cleanDomain : cleanDomain;
          };

          const dnsLabelPart = (value, fallback) => {
            const clean = String(value || '')
              .trim()
              .toLowerCase()
              .replace(/[^a-z0-9-]+/g, '-')
              .replace(/^-+|-+$/g, '')
              .replace(/--+/g, '-');
            return clean || fallback;
          };

          const instanceHostPrefix = (form) => {
            const type = dnsLabelPart((form || {}).dataset ? form.dataset.instanceType : '', 'instance');
            const field = form && form.elements ? form.elements.name : null;
            let name = dnsLabelPart(field ? field.value : '', 'default');
            if (name.startsWith(type + '-')) {
              name = name.slice(type.length + 1) || 'default';
            }
            return name + '.' + type;
          };

          const instanceHostDefault = (form, settings) => {
            const domain = (settings || latestSettings).publicDomain || 'magicstick.example.com';
            return appHost(instanceHostPrefix(form), domain);
          };

          const setText = (id, value) => {
            const node = $(id);
            if (node) {
              node.textContent = value;
            }
          };

          const renderSettings = (settings, options = {}) => {
            latestSettings = {
              publicDomain: settings.publicDomain || 'magicstick.example.com',
              dashboardHost: settings.dashboardHost || settings.publicDomain || 'magicstick.example.com',
              mdnsDomain: settings.mdnsDomain || 'magicstick.local',
              mdnsName: settings.mdnsName || 'magicstick'
            };
            const form = $('settings-form');
            if (form && (options.force || form.dataset.dirty !== 'true')) {
              setFormValue(form, 'publicDomain', latestSettings.publicDomain);
              setFormValue(form, 'mdnsDomain', latestSettings.mdnsDomain);
              setFormValue(form, 'dashboardHost', latestSettings.dashboardHost);
              form.dataset.dirty = 'false';
            }
            setText('settings-dashboard-public', 'Dashboard public: http://' + latestSettings.dashboardHost + '/');
            setText('settings-dashboard-local', 'Dashboard local: http://' + latestSettings.mdnsDomain + '/');
            setText('settings-anythingllm-public', 'AnythingLLM public: http://' + appHost('anythingllm', latestSettings.publicDomain) + '/');
            setText('settings-anythingllm-local', 'AnythingLLM local: http://' + appHost('anythingllm', latestSettings.mdnsDomain) + '/');
          };

          const presetArgValue = (preset, flag) => {
            const args = (preset || {}).args || [];
            for (let index = 0; index < args.length; index += 1) {
              const arg = String(args[index]);
              if (arg === flag && args[index + 1] !== undefined) {
                return String(args[index + 1]);
              }
              if (arg.startsWith(flag + '=')) {
                return arg.slice(flag.length + 1);
              }
            }
            return '';
          };

          const presetMaxNumSeqs = (preset) => {
            return preset.maxNumSeqs || preset.max_num_seqs || presetArgValue(preset, '--max-num-seqs') || presetArgValue(preset, '--max_num_seqs');
          };

          const applyLocalPresetFields = (presetName, options = {}) => {
            const form = $('local-model-form');
            if (!form || !presetName || presetName === 'custom') { return; }
            const preset = ((latestModelPayload || {}).presets || {})[presetName];
            if (!preset) { return; }
            const marker = [
              presetName,
              preset.vram || '',
              preset.vramMi || '',
              preset.contextWindow || '',
              presetMaxNumSeqs(preset) || '',
              preset.url || '',
              preset.type || preset.modelType || ''
            ].join('|');
            if (!options.force && localPresetLastApplied === marker) { return; }
            setFormValue(form, 'name', presetName);
            setFormValue(form, 'modelType', preset.type || preset.modelType);
            setFormValue(form, 'vram', preset.vram || (preset.vramMi ? preset.vramMi + 'Mi' : ''));
            setFormValue(form, 'url', preset.url);
            setFormValue(form, 'contextWindow', preset.contextWindow);
            setFormValue(form, 'maxNumSeqs', presetMaxNumSeqs(preset) || ((preset.type || preset.modelType) === 'embedding' ? 8 : 32));
            localPresetLastApplied = marker;
            scheduleVramEstimate();
          };

          const renderVram = (modelPayload) => {
            const summary = $('vram-summary');
            const list = $('vram-list');
            if (!summary || !list) { return; }
            const vram = (modelPayload || {}).vram || {};
            list.innerHTML = '';
            if (!vram.available) {
              summary.textContent = 'Live GPU metrics unavailable. Planned VRAM: ' + formatMi(vram.plannedMi || 0);
              const item = document.createElement('div');
              item.className = 'mini-item';
              item.textContent = vram.error || 'DCGM metrics are not available.';
              list.appendChild(item);
              return;
            }
            summary.textContent = 'Free ' + formatMi(vram.freeMi) + ' of ' + formatMi(vram.totalMi) + '; planned ' + formatMi(vram.plannedMi);
            (vram.gpus || []).forEach((gpu) => {
              const item = document.createElement('div');
              item.className = 'mini-item';
              item.textContent = (gpu.modelName || gpu.device || gpu.id || 'GPU') + ': ' + formatMi(gpu.freeMi) + ' free, ' + formatMi(gpu.usedMi) + ' used';
              list.appendChild(item);
            });
          };

          const appendModelMeta = (container, label, value) => {
            const text = value === undefined || value === null ? '' : String(value).trim();
            if (!text) { return; }
            const item = document.createElement('span');
            item.className = 'model-meta-item';
            const strong = document.createElement('strong');
            strong.textContent = label + ': ';
            item.append(strong, text);
            container.appendChild(item);
          };

          const renderModels = (modelPayload) => {
            const list = $('model-list');
            if (!list) { return; }
            list.innerHTML = '';
            const catalogModels = new Map(((modelPayload || {}).models || []).map((model) => [model.id, model]));
            const activations = (modelPayload || {}).activations || [];
            const activationNames = new Set(activations.map((activation) => (activation.metadata || {}).name).filter(Boolean));
            const registeredModels = ((modelPayload || {}).models || []).filter((model) => !activationNames.has(model.id));
            const countNode = $('model-list-count');
            if (countNode) {
              const total = activations.length + registeredModels.length;
              countNode.textContent = total + (total === 1 ? ' model' : ' models');
            }
            Object.keys(pendingModelDeletes).forEach((name) => {
              if (!activationNames.has(name)) {
                delete pendingModelDeletes[name];
              }
            });
            if (activations.length) {
              const section = document.createElement('section');
              section.className = 'module-group';
              const grid = document.createElement('div');
              grid.className = 'module-grid';
              activations.forEach((activation) => {
                const metadata = activation.metadata || {};
                const spec = activation.spec || {};
                const status = activation.status || {};
                const local = spec.local || {};
                const external = spec.external || {};
                const enabled = spec.enabled !== false;
                const basePhase = status.phase || (enabled ? 'Requested' : 'Disabled');
                const deleting = Boolean(metadata.name && pendingModelDeletes[metadata.name]) || Boolean(metadata.deletionTimestamp) || String(basePhase).toLowerCase() === 'removing';
                const phase = deleting ? 'Removing' : basePhase;
                const progress = moduleProgress(phase, enabled, status);
                const catalog = catalogModels.get(metadata.name) || {};
                const item = document.createElement('article');
                item.className = 'module-card';
                const header = document.createElement('div');
                header.className = 'module-card-header';
                const titleBlock = document.createElement('div');
                titleBlock.className = 'module-card-title';
                const label = document.createElement('strong');
                label.textContent = metadata.name || 'unnamed';
                const key = document.createElement('span');
                key.textContent = (spec.type || 'model') + ' / ' + (catalog.type || (spec.external || {}).modelType || (spec.local || {}).modelType || 'chat');
                titleBlock.append(label, key);
                const pill = document.createElement('span');
                pill.className = 'status-pill ' + progressPillClass(progress);
                pill.textContent = phase;
                header.append(titleBlock, pill);
                const meta = document.createElement('div');
                meta.className = 'model-meta';
                appendModelMeta(meta, 'VRAM', status.vramRequiredMi ? formatMi(status.vramRequiredMi) : (local.vram || (local.vramMi ? formatMi(local.vramMi) : '')));
                appendModelMeta(meta, 'Context', local.contextWindow || external.contextWindow || '');
                appendModelMeta(meta, 'Max seqs', local.maxNumSeqs || '');
                appendModelMeta(meta, 'Target', spec.targetNamespace || '');
                const details = document.createElement('div');
                details.className = 'module-message';
                details.textContent = status.message || status.modelRef || catalog.modelRef || 'pending';
                const actions = document.createElement('div');
                actions.className = 'action-row';
                item.append(header);
                if (meta.childElementCount) {
                  item.appendChild(meta);
                }
                item.append(createProgressBox(progress), details);
                if (metadata.name) {
                  const remove = document.createElement('button');
                  remove.className = 'control-button danger';
                  remove.type = 'button';
                  remove.dataset.modelDelete = metadata.name;
                  remove.textContent = deleting ? 'Removing' : 'Remove';
                  remove.disabled = deleting;
                  if (deleting) {
                    remove.title = 'Remove requested';
                  }
                  actions.appendChild(remove);
                  item.appendChild(actions);
                }
                grid.appendChild(item);
              });
              section.appendChild(grid);
              list.appendChild(section);
            }
            if (registeredModels.length) {
              const section = document.createElement('section');
              section.className = 'module-group';
              const heading = document.createElement('div');
              heading.className = 'module-group-heading';
              const title = document.createElement('h3');
              title.textContent = 'Registered Models';
              const count = document.createElement('span');
              count.textContent = registeredModels.length + (registeredModels.length === 1 ? ' model' : ' models');
              heading.append(title, count);
              const grid = document.createElement('div');
              grid.className = 'module-grid';
              registeredModels.forEach((model) => {
                const item = document.createElement('article');
                item.className = 'module-card';
                const header = document.createElement('div');
                header.className = 'module-card-header';
                const titleBlock = document.createElement('div');
                titleBlock.className = 'module-card-title';
                const label = document.createElement('strong');
                label.textContent = model.id || model.name || 'unnamed';
                const key = document.createElement('span');
                key.textContent = (model.type || 'model') + ' / ' + (model.provider || model.source || 'catalog');
                titleBlock.append(label, key);
                const pill = document.createElement('span');
                pill.className = 'status-pill ready';
                pill.textContent = 'Registered';
                header.append(titleBlock, pill);
                const details = document.createElement('div');
                details.className = 'module-message';
                details.textContent = model.modelRef || 'catalog';
                item.append(header, createProgressBox({ value: 100, label: 'Registered', className: 'ready' }), details);
                grid.appendChild(item);
              });
              section.append(heading, grid);
              list.appendChild(section);
            }
            if (!list.childElementCount) {
              const item = document.createElement('div');
              item.className = 'mini-item';
              item.textContent = 'No models registered yet.';
              list.appendChild(item);
            }
          };

          const renderStatus = (status) => {
            const fluxList = $('flux-list');
            if (fluxList) {
              fluxList.innerHTML = '';
              (status.fluxKustomizations || []).slice(0, 8).forEach((item) => {
                const ready = (item.conditions || []).find((condition) => condition.type === 'Ready');
                const node = document.createElement('div');
                node.className = 'mini-item';
                node.textContent = item.name + ': ' + ((ready || {}).status || item.phase || 'Unknown');
                fluxList.appendChild(node);
              });
            }
            const podSummary = $('pod-summary');
            if (podSummary) {
              const pods = status.pods || [];
              const running = pods.filter((pod) => pod.phase === 'Running').length;
              podSummary.textContent = running + '/' + pods.length + ' pods running';
            }
            const ingressList = $('ingress-list');
            if (ingressList) {
              ingressList.innerHTML = '';
              (status.ingresses || []).slice(0, 8).forEach((ingress) => {
                const node = document.createElement('div');
                node.className = 'mini-item';
                const label = document.createElement('strong');
                label.textContent = ingress.namespace + '/' + ingress.name;
                node.appendChild(label);
                const links = createResourceLinks(linksFromIngress(ingress));
                if (links) {
                  node.appendChild(links);
                } else {
                  const empty = document.createElement('span');
                  empty.textContent = 'no host';
                  node.appendChild(empty);
                }
                ingressList.appendChild(node);
              });
            }
          };

          const refresh = async () => {
            try {
              const settings = await request('/api/settings');
              const appliance = await request('/api/appliance');
              const modulePayload = await request('/api/modules');
              const instancePayload = await request('/api/instances');
              const modelPayload = await request('/api/models');
              const status = await request('/api/status');
              renderSettings(settings);
              latestModulePayload = modulePayload || {};
              latestModelPayload = modelPayload || {};
              renderLocalPresetOptions(latestModelPayload);
              renderInstanceForms(latestModulePayload);
              renderInstanceModelOptions(latestModelPayload);
              if (!localPresetLastApplied) {
                const presetSelect = $('local-model-preset');
                applyLocalPresetFields(presetSelect ? presetSelect.value : '', { force: true });
              }
              const phase = ((appliance.status || {}).phase || 'Pending');
              $('appliance-summary').textContent = appliance.metadata.namespace + '/' + appliance.metadata.name + ' is ' + phase;
              const modules = ((modulePayload || {}).modules || {});
              const enabledModules = Object.values(modules).filter((item) => item && item.enabled === true).length;
              $('module-summary').textContent = enabledModules + ' modules enabled';
              const instances = ((instancePayload || {}).instances || {});
              const instanceCount = Object.values(instances).reduce((count, items) => count + (Array.isArray(items) ? items.length : 0), 0);
              $('instance-summary').textContent = instanceCount + ' instances requested';
              const installedModelIds = new Set(((modelPayload || {}).models || []).map(modelIdentifier).filter(Boolean));
              $('model-summary').textContent = installedModelIds.size + (installedModelIds.size === 1 ? ' model installed' : ' models installed');
              renderOverviewApps(modulePayload, instancePayload, status);
              renderOverviewAttention(appliance, modulePayload, instancePayload, modelPayload, status);
              renderModules(modulePayload, status);
              renderInstances(instancePayload, status);
              renderVram(modelPayload);
              renderModels(modelPayload);
              renderStatus(status);
              setApiState('Connected', true);
            } catch (error) {
              setApiState(error.message || 'API unavailable', false);
            }
          };

          document.querySelectorAll('.tab-button').forEach((button) => {
            button.addEventListener('click', () => {
              document.querySelectorAll('.tab-button').forEach((item) => item.setAttribute('aria-selected', item === button ? 'true' : 'false'));
              document.querySelectorAll('.tab-panel').forEach((panel) => { panel.hidden = panel.id !== ('tab-' + button.dataset.tab); });
            });
          });

          document.addEventListener('click', async (event) => {
            const enable = event.target.closest('[data-module-enable]');
            const disable = event.target.closest('[data-module-disable]');
            const action = enable ? 'enable' : (disable ? 'disable' : null);
            const name = enable ? enable.dataset.moduleEnable : (disable ? disable.dataset.moduleDisable : null);
            if (!action || !name) { return; }
            try {
              pendingModuleActions[name] = action;
              (enable || disable).disabled = true;
              const item = (enable || disable).closest('.module-card, .module-item, .mini-item');
              const hasAdvancedFields = item && item.querySelector('[data-module-parameter]');
              const body = {};
              if (enable && hasAdvancedFields) {
                body.parameters = moduleParametersFromItem(item);
              }
              await request('/api/modules/' + encodeURIComponent(name) + '/' + action, { method: 'POST', body: JSON.stringify(body) });
              const message = name + ' ' + action + ' requested through ModuleActivation.';
              if ($('module-output')) { $('module-output').textContent = message; }
              if ($('model-output')) { $('model-output').textContent = message; }
              await refresh();
            } catch (error) {
              delete pendingModuleActions[name];
              if ($('module-output')) { $('module-output').textContent = error.message; }
              if ($('model-output')) { $('model-output').textContent = error.message; }
            }
          });

          document.addEventListener('click', async (event) => {
            const remove = event.target.closest('[data-model-delete]');
            if (!remove) { return; }
            const name = remove.dataset.modelDelete;
            try {
              pendingModelDeletes[name] = true;
              remove.disabled = true;
              remove.textContent = 'Removing';
              remove.title = 'Remove requested';
              await request('/api/models/' + encodeURIComponent(name), { method: 'DELETE' });
              $('model-output').textContent = name + ' remove requested.';
              await refresh();
            } catch (error) {
              delete pendingModelDeletes[name];
              remove.disabled = false;
              remove.textContent = 'Remove';
              remove.removeAttribute('title');
              $('model-output').textContent = error.message;
            }
          });

          document.addEventListener('click', async (event) => {
            const credentials = event.target.closest('[data-instance-credentials]');
            if (!credentials) { return; }
            const name = credentials.dataset.instanceCredentials;
            const card = credentials.closest('.module-card');
            if (!name || !card) { return; }
            const existing = card.querySelector('.credential-panel');
            if (existing) {
              existing.remove();
              credentials.textContent = 'Credentials';
              return;
            }
            try {
              credentials.disabled = true;
              credentials.textContent = 'Loading';
              const payload = await request('/api/instances/' + encodeURIComponent(name) + '/credentials');
              showInstanceCredentials(card, payload);
              credentials.textContent = 'Hide credentials';
              $('instance-output').textContent = name + ' credentials loaded.';
            } catch (error) {
              credentials.textContent = 'Credentials';
              $('instance-output').textContent = error.message;
            } finally {
              credentials.disabled = false;
            }
          });

          document.addEventListener('click', async (event) => {
            const remove = event.target.closest('[data-instance-delete]');
            if (!remove) { return; }
            const name = remove.dataset.instanceDelete;
            if (!name) { return; }
            try {
              await request('/api/instances/' + encodeURIComponent(name), { method: 'DELETE' });
              $('instance-output').textContent = name + ' remove requested.';
              await refresh();
            } catch (error) {
              $('instance-output').textContent = error.message;
            }
          });

          const localModelForm = $('local-model-form');
          if (localModelForm) {
            const localPresetSelect = $('local-model-preset');
            if (localPresetSelect) {
              localPresetSelect.addEventListener('change', () => {
                applyLocalPresetFields(localPresetSelect.value, { force: true });
                if (localPresetSelect.value === 'custom') {
                  scheduleVramEstimate();
                }
              });
            }
            ['url', 'contextWindow', 'maxNumSeqs', 'modelType'].forEach((name) => {
              const field = localModelForm.elements[name];
              if (field) {
                field.addEventListener('input', scheduleVramEstimate);
                field.addEventListener('change', scheduleVramEstimate);
              }
            });
            const vramSlider = $('vram-estimate-slider');
            if (vramSlider) {
              vramSlider.addEventListener('input', () => {
                applyVramLimitMi(Number(vramSlider.value || 0));
              });
            }
            document.querySelectorAll('[data-vram-use]').forEach((button) => {
              button.addEventListener('click', () => {
                if (!latestVramEstimate) { return; }
                const mode = button.dataset.vramUse;
                const minimum = Number(latestVramEstimate.minimumMi || 0);
                const recommended = Number(latestVramEstimate.recommendedMi || minimum);
                const maximum = latestVramEstimate.maximumMi === null || latestVramEstimate.maximumMi === undefined ? recommended : Number(latestVramEstimate.maximumMi || recommended);
                const effectiveMax = latestVramEstimate.gpuAvailable ? Math.max(minimum, maximum) : Math.max(minimum, recommended);
                const requested = mode === 'minimum' ? minimum : (mode === 'maximum' ? effectiveMax : recommended);
                const value = Math.min(effectiveMax, Math.max(minimum, requested));
                const slider = $('vram-estimate-slider');
                if (slider) {
                  slider.max = String(effectiveMax);
                  slider.value = String(value);
                }
                applyVramLimitMi(value, mode);
              });
            });
            localModelForm.addEventListener('submit', async (event) => {
              event.preventDefault();
              const data = new FormData(localModelForm);
              const preset = data.get('preset') || 'custom';
              const payload = {
                name: data.get('name') || preset,
                enabled: true,
                targetNamespace: 'ai',
                local: {
                  modelType: data.get('modelType') || 'chat',
                  vram: data.get('vram') || '5Gi'
                }
              };
              if (preset !== 'custom') {
                payload.local.preset = preset;
              }
              if ((data.get('url') || '').trim()) {
                payload.local.url = data.get('url').trim();
              }
              if ((data.get('contextWindow') || '').trim()) {
                payload.local.contextWindow = Number(data.get('contextWindow'));
              }
              if ((data.get('maxNumSeqs') || '').trim()) {
                payload.local.maxNumSeqs = Number(data.get('maxNumSeqs'));
              }
              try {
                await request('/api/models/local', { method: 'POST', body: JSON.stringify(payload) });
                $('model-output').textContent = payload.name + ' local model requested.';
                await refresh();
              } catch (error) {
                $('model-output').textContent = error.message;
              }
            });
          }

          const externalModelForm = $('external-model-form');
          if (externalModelForm) {
            externalModelForm.addEventListener('submit', async (event) => {
              event.preventDefault();
              const data = new FormData(externalModelForm);
              const payload = {
                name: data.get('name') || 'example-external-model',
                enabled: true,
                targetNamespace: 'ai',
                external: {
                  model: data.get('model') || 'openai/gpt-4o-mini',
                  apiBase: data.get('apiBase') || 'https://api.openai.com/v1',
                  modelType: data.get('modelType') || 'chat'
                }
              };
              if ((data.get('contextWindow') || '').trim()) {
                payload.external.contextWindow = Number(data.get('contextWindow'));
              }
              if ((data.get('apiKey') || '').trim()) {
                payload.apiKey = data.get('apiKey').trim();
              }
              try {
                await request('/api/models/external', { method: 'POST', body: JSON.stringify(payload) });
                $('model-output').textContent = payload.name + ' external model requested.';
                externalModelForm.reset();
                await refresh();
              } catch (error) {
                $('model-output').textContent = error.message;
              }
            });
          }

          document.querySelectorAll('.instance-form').forEach((form) => {
            form.addEventListener('submit', async (event) => {
              event.preventDefault();
              const data = new FormData(form);
              const type = form.dataset.instanceType;
              if (!instanceTypeInstalled(latestModulePayload, type)) {
                $('instance-output').textContent = 'Install the required modules before creating this instance.';
                return;
              }
              const selectedModel = String(data.get('model') || '').trim();
              if (form.querySelector('select[data-model-select]') && !selectedModel) {
                $('instance-output').textContent = 'Select a deployed model before creating this instance.';
                return;
              }
              const payload = {
                name: data.get('name') || 'default',
                enabled: true,
                namespace: 'ai',
                model: selectedModel || 'CHANGEME_MODEL'
              };
              const host = instanceHostDefault(form, latestSettings);
              if (type === 'openclaw') {
                payload.storage = { size: data.get('storage') || '20Gi' };
                payload.ingress = { enabled: true, host };
              }
              if (type === 'hermes') {
                payload.model = selectedModel || 'qwen3635b';
                payload.storage = { size: data.get('storage') || '10Gi' };
                payload.ingress = { enabled: true, host };
              }
              if (type === 'paperclip') {
                delete payload.model;
                payload.storage = { size: data.get('storage') || '5Gi' };
                payload.database = { managed: { storageSize: data.get('postgresStorage') || '10Gi' } };
                payload.ingress = { enabled: true, host };
                payload.admin = { email: data.get('adminEmail') || 'admin@example.com', name: 'Admin' };
              }
              if (type === 'kubeopencode') {
                payload.server = { enabled: true, ingress: { enabled: true, host } };
                payload.agentTemplates = [{ name: data.get('template') || 'default-coder', description: 'Default coding agent template' }];
              }
              if (type === 'odysseus') {
                payload.storage = { size: data.get('storage') || '20Gi' };
                payload.chroma = { storage: { size: data.get('chromaStorage') || '5Gi' } };
                payload.searxng = { storage: { size: data.get('searxngStorage') || '1Gi' } };
                payload.ntfy = { storage: { size: data.get('ntfyStorage') || '1Gi' } };
                payload.ingress = { enabled: true, host };
              }
              try {
                await request('/api/instances/' + type, { method: 'POST', body: JSON.stringify(payload) });
                $('instance-output').textContent = type + '/' + payload.name + ' requested through AppInstance.';
                await refresh();
              } catch (error) {
                $('instance-output').textContent = error.message;
              }
            });
          });

          const settingsForm = $('settings-form');
          if (settingsForm) {
            settingsForm.addEventListener('input', () => {
              settingsForm.dataset.dirty = 'true';
            });
            settingsForm.addEventListener('submit', async (event) => {
              event.preventDefault();
              const data = new FormData(settingsForm);
              const payload = {
                publicDomain: data.get('publicDomain'),
                mdnsDomain: data.get('mdnsDomain'),
                dashboardHost: data.get('dashboardHost')
              };
              try {
                const settings = await request('/api/settings', { method: 'PATCH', body: JSON.stringify(payload) });
                settingsForm.dataset.dirty = 'false';
                renderSettings(settings, { force: true });
                $('settings-output').textContent = 'Domain settings saved.';
                await refresh();
              } catch (error) {
                $('settings-output').textContent = error.message;
              }
            });
          }

          refresh();
          setInterval(refresh, 30000);
        })();
      </script>
    </body>
