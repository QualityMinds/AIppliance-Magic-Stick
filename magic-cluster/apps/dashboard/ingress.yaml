apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-appliance-dashboard
  namespace: dashboard
  labels:
    app: ai-appliance-dashboard
  annotations:
    lab42.io/mdns.enabled: "true"
    lab42.io/mdns.name: "${AI_APPLIANCE_MDNS_NAME:=magicstick}"
    lab42.io/mdns.host: "${AI_APPLIANCE_MDNS_NAME:=magicstick}"
spec:
  ingressClassName: nginx
  defaultBackend:
    service:
      name: ai-appliance-dashboard
      port:
        number: 80
  rules:
    - host: "${AI_APPLIANCE_DASHBOARD_HOST:=magicstick.example.com}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-appliance-dashboard
                port:
                  number: 80
    - host: "${AI_APPLIANCE_MDNS_DOMAIN:=magicstick.local}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-appliance-dashboard
                port:
                  number: 80
