apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-appliance-dashboard-api
  namespace: dashboard
  labels:
    app: ai-appliance-dashboard
    app.kubernetes.io/component: api
data:
  server.py: |
    #!/usr/bin/env python3
    import base64
    import hashlib
    import json
    import os
    import re
    import ssl
    import time
    import urllib.error
    import urllib.parse
    import urllib.request
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    APPLIANCE_GROUP = "appliance.magicstick.dev"
    APPLIANCE_VERSION = "v1alpha1"
    APPLIANCE_NAMESPACE = os.environ.get("APPLIANCE_NAMESPACE", "ai-system")
    APPLIANCE_NAME = os.environ.get("APPLIANCE_NAME", "local")
    MODULE_CATALOG_NAMESPACE = os.environ.get("MODULE_CATALOG_NAMESPACE", "ai-system")
    MODULE_CATALOG_NAME = os.environ.get("MODULE_CATALOG_NAME", "magicstick-module-catalog")
    APP_CATALOG_NAMESPACE = os.environ.get("APP_CATALOG_NAMESPACE", "ai-system")
    APP_CATALOG_NAME = os.environ.get("APP_CATALOG_NAME", "magicstick-app-catalog")
    MODEL_PRESETS_NAMESPACE = os.environ.get("MODEL_PRESETS_NAMESPACE", "ai-system")
    MODEL_PRESETS_NAME = os.environ.get("MODEL_PRESETS_NAME", "magicstick-model-presets")
    MODEL_TARGET_NAMESPACE = os.environ.get("MODEL_TARGET_NAMESPACE", "ai")
    MODEL_CATALOG_NAME = os.environ.get("MODEL_CATALOG_NAME", "ai-model-catalog")
    DCGM_NAMESPACE = os.environ.get("DCGM_NAMESPACE", "gpu-operator")
    DCGM_SERVICE = os.environ.get("DCGM_SERVICE", "nvidia-dcgm-exporter")
    DCGM_PORT = os.environ.get("DCGM_PORT", "9400")
    SETTINGS_NAMESPACE = os.environ.get("SETTINGS_NAMESPACE", "flux-system")
    SETTINGS_CONFIGMAP_NAME = os.environ.get("SETTINGS_CONFIGMAP_NAME", "ai-appliance-settings")
    KUBE_API = os.environ.get("KUBERNETES_SERVICE_URL", "https://kubernetes.default.svc").rstrip("/")
    SA_TOKEN_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/token"
    SA_CA_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
    DNS_LABEL = re.compile(r"^[a-z0-9]([-a-z0-9]*[a-z0-9])?$")
    DEFAULT_PUBLIC_DOMAIN = "magicstick.example.com"
    DEFAULT_MDNS_DOMAIN = "magicstick.local"
    SETTINGS_WATCH_LABELS = {"reconcile.fluxcd.io/watch": "Enabled"}

    MODEL_SECRET_PREFIX = "ai-model-provider-"
    SSL_CONTEXT = ssl.create_default_context(cafile=SA_CA_PATH)
    PUBLIC_SSL_CONTEXT = ssl.create_default_context()
    HF_CACHE_TTL_SECONDS = 900
    HF_METADATA_CACHE = {}
    OIDC_USERINFO_URL = os.environ.get(
        "OIDC_USERINFO_URL",
        "http://keycloak.identity-system.svc.cluster.local:8080/realms/magicstick/protocol/openid-connect/userinfo",
    )
    OIDC_EXPECTED_ISSUER = os.environ.get(
        "OIDC_EXPECTED_ISSUER",
        "https://id.magicstick.local/realms/magicstick",
    ).rstrip("/")
    OIDC_EXPECTED_CLIENT_ID = os.environ.get(
        "OIDC_EXPECTED_CLIENT_ID",
        "magicstick-human-gateway-local",
    )
    AUTH_CACHE_TTL_SECONDS = 30
    AUTH_CACHE = {}
    ROLE_ACCESS = {
        "viewer": {"magicstick-viewer", "magicstick-operator", "magicstick-admin"},
        "operator": {"magicstick-operator", "magicstick-admin"},
        "admin": {"magicstick-admin"},
    }


    class AuthError(Exception):
        def __init__(self, status, message):
            super().__init__(message)
            self.status = status


    def jwt_payload(access_token):
        try:
            encoded = access_token.split(".")[1]
            encoded += "=" * (-len(encoded) % 4)
            return json.loads(base64.urlsafe_b64decode(encoded).decode("utf-8"))
        except (IndexError, ValueError, json.JSONDecodeError) as error:
            raise AuthError(401, "invalid access token") from error


    def authenticated_principal(authorization):
        scheme, separator, access_token = (authorization or "").partition(" ")
        if not separator or scheme.lower() != "bearer" or not access_token.strip():
            raise AuthError(401, "authentication required")
        access_token = access_token.strip()
        now = time.time()
        cache_key = hashlib.sha256(access_token.encode("utf-8")).hexdigest()
        cached = AUTH_CACHE.get(cache_key)
        if cached and cached[0] > now:
            return cached[1]

        request = urllib.request.Request(
            OIDC_USERINFO_URL,
            headers={
                "Accept": "application/json",
                "Authorization": "Bearer " + access_token,
            },
        )
        try:
            with urllib.request.urlopen(request, timeout=5) as response:
                userinfo = json.loads(response.read().decode("utf-8"))
        except urllib.error.HTTPError as error:
            if error.code in {400, 401, 403}:
                raise AuthError(401, "invalid or expired access token") from error
            raise AuthError(503, "identity provider unavailable") from error
        except (urllib.error.URLError, TimeoutError, json.JSONDecodeError) as error:
            raise AuthError(503, "identity provider unavailable") from error

        claims = jwt_payload(access_token)
        if str(claims.get("iss") or "").rstrip("/") != OIDC_EXPECTED_ISSUER:
            raise AuthError(401, "access token issuer is not trusted")
        if str(claims.get("azp") or "") != OIDC_EXPECTED_CLIENT_ID:
            raise AuthError(401, "access token client is not trusted")
        try:
            if float(claims.get("exp", 0)) <= now:
                raise AuthError(401, "access token has expired")
        except (TypeError, ValueError) as error:
            raise AuthError(401, "access token expiry is invalid") from error

        realm_access = claims.get("realm_access") or {}
        raw_roles = realm_access.get("roles", []) if isinstance(realm_access, dict) else []
        roles = {str(role) for role in raw_roles} if isinstance(raw_roles, list) else set()
        principal = {
            "subject": str(userinfo.get("sub") or claims.get("sub") or ""),
            "username": str(
                userinfo.get("preferred_username")
                or userinfo.get("email")
                or claims.get("preferred_username")
                or claims.get("sub")
                or "unknown"
            ),
            "roles": sorted(roles),
        }
        AUTH_CACHE[cache_key] = (min(now + AUTH_CACHE_TTL_SECONDS, float(claims["exp"])), principal)
        return principal


    def authorize(authorization, required_access):
        principal = authenticated_principal(authorization)
        allowed_roles = ROLE_ACCESS[required_access]
        if not allowed_roles.intersection(principal["roles"]):
            raise AuthError(403, f"{required_access} role required")
        return principal


    def token():
        with open(SA_TOKEN_PATH, "r", encoding="utf-8") as token_file:
            return token_file.read().strip()


    def request_json(method, path, body=None, content_type="application/json"):
        data = None
        headers = {
            "Accept": "application/json",
            "Authorization": "Bearer " + token(),
        }
        if body is not None:
            data = json.dumps(body).encode("utf-8")
            headers["Content-Type"] = content_type
        request = urllib.request.Request(KUBE_API + path, data=data, headers=headers, method=method)
        with urllib.request.urlopen(request, timeout=20, context=SSL_CONTEXT) as response:
            payload = response.read().decode("utf-8")
            return json.loads(payload) if payload else {}


    def request_text(method, path):
        request = urllib.request.Request(
            KUBE_API + path,
            headers={
                "Accept": "text/plain",
                "Authorization": "Bearer " + token(),
            },
            method=method,
        )
        with urllib.request.urlopen(request, timeout=20, context=SSL_CONTEXT) as response:
            return response.read().decode("utf-8", errors="replace")


    def delete_json(path):
        try:
            return request_json("DELETE", path)
        except urllib.error.HTTPError as error:
            if error.code == 404:
                return {}
            raise


    def appliance_path():
        return f"/apis/{APPLIANCE_GROUP}/{APPLIANCE_VERSION}/namespaces/{APPLIANCE_NAMESPACE}/appliances/{APPLIANCE_NAME}"


    def appliance():
        return request_json("GET", appliance_path())


    def list_resource(path):
        try:
            return request_json("GET", path).get("items", [])
        except urllib.error.HTTPError as error:
            if error.code == 404:
                return []
            raise


    def get_resource(path):
        try:
            return request_json("GET", path)
        except urllib.error.HTTPError as error:
            if error.code == 404:
                return None
            raise


    def create_or_patch(collection_path, item_path, resource, patch):
        if get_resource(item_path):
            return request_json("PATCH", item_path, patch, "application/merge-patch+json")
        return request_json("POST", collection_path, resource)


    def settings_path():
        return f"/api/v1/namespaces/{SETTINGS_NAMESPACE}/configmaps/{SETTINGS_CONFIGMAP_NAME}"


    def settings_configmap():
        return get_resource(settings_path())


    def normalize_hostname(value, field):
        hostname = str(value or "").strip().lower().strip(".")
        if not hostname:
            raise ValueError(field + " is required")
        if "://" in hostname or "/" in hostname or ":" in hostname:
            raise ValueError(field + " must be a hostname without scheme, path, or port")
        labels = hostname.split(".")
        if len(labels) < 2 or any(not DNS_LABEL.match(label) for label in labels):
            raise ValueError(field + " must be a valid DNS hostname")
        return hostname


    def mdns_name_from_domain(domain):
        return domain[:-6] if domain.endswith(".local") else domain


    def default_settings_data():
        mdns_name = mdns_name_from_domain(DEFAULT_MDNS_DOMAIN)
        return {
            "AI_APPLIANCE_DOMAIN": DEFAULT_PUBLIC_DOMAIN,
            "AI_APPLIANCE_DASHBOARD_HOST": DEFAULT_PUBLIC_DOMAIN,
            "AI_APPLIANCE_MDNS_DOMAIN": DEFAULT_MDNS_DOMAIN,
            "AI_APPLIANCE_MDNS_NAME": mdns_name,
            "AI_APPLIANCE_DASHBOARD_MDNS_NAME": mdns_name,
        }


    def settings_response(configmap=None):
        configmap = configmap if configmap is not None else settings_configmap()
        raw_data = ((configmap or {}).get("data") or {})
        data = default_settings_data()
        data.update(raw_data)
        raw_mdns_domain = raw_data.get("AI_APPLIANCE_MDNS_DOMAIN")
        raw_mdns_name = raw_data.get("AI_APPLIANCE_MDNS_NAME") or raw_data.get("AI_APPLIANCE_DASHBOARD_MDNS_NAME")
        if raw_mdns_domain:
            data["AI_APPLIANCE_MDNS_DOMAIN"] = raw_mdns_domain
        elif raw_mdns_name:
            data["AI_APPLIANCE_MDNS_DOMAIN"] = raw_mdns_name + ".local"
        elif not data.get("AI_APPLIANCE_MDNS_DOMAIN"):
            data["AI_APPLIANCE_MDNS_DOMAIN"] = DEFAULT_MDNS_DOMAIN
        if raw_mdns_name:
            data["AI_APPLIANCE_MDNS_NAME"] = raw_mdns_name
        else:
            data["AI_APPLIANCE_MDNS_NAME"] = mdns_name_from_domain(data["AI_APPLIANCE_MDNS_DOMAIN"])
        if not raw_data.get("AI_APPLIANCE_DASHBOARD_MDNS_NAME"):
            data["AI_APPLIANCE_DASHBOARD_MDNS_NAME"] = data["AI_APPLIANCE_MDNS_NAME"]
        if not raw_data.get("AI_APPLIANCE_DASHBOARD_HOST"):
            data["AI_APPLIANCE_DASHBOARD_HOST"] = data["AI_APPLIANCE_DOMAIN"]
        return {
            "namespace": SETTINGS_NAMESPACE,
            "name": SETTINGS_CONFIGMAP_NAME,
            "exists": configmap is not None,
            "data": data,
            "publicDomain": data["AI_APPLIANCE_DOMAIN"],
            "dashboardHost": data["AI_APPLIANCE_DASHBOARD_HOST"],
            "mdnsDomain": data["AI_APPLIANCE_MDNS_DOMAIN"],
            "mdnsName": data["AI_APPLIANCE_MDNS_NAME"],
        }


    def settings_patch(payload):
        current = settings_configmap()
        if not current:
            raise LookupError(f"{SETTINGS_NAMESPACE}/{SETTINGS_CONFIGMAP_NAME} ConfigMap not found")
        current_settings = settings_response(current)
        public_domain = normalize_hostname(
            payload.get("publicDomain") or payload.get("AI_APPLIANCE_DOMAIN") or current_settings.get("publicDomain") or DEFAULT_PUBLIC_DOMAIN,
            "public domain",
        )
        mdns_domain = normalize_hostname(
            payload.get("mdnsDomain") or payload.get("AI_APPLIANCE_MDNS_DOMAIN") or current_settings.get("mdnsDomain") or DEFAULT_MDNS_DOMAIN,
            "mDNS domain",
        )
        if not mdns_domain.endswith(".local"):
            raise ValueError("mDNS domain must end with .local")
        dashboard_host = normalize_hostname(
            payload.get("dashboardHost") or payload.get("AI_APPLIANCE_DASHBOARD_HOST") or current_settings.get("dashboardHost") or public_domain,
            "dashboard host",
        )
        mdns_name = mdns_name_from_domain(mdns_domain)
        patch = {
            "metadata": {"labels": SETTINGS_WATCH_LABELS},
            "data": {
                "AI_APPLIANCE_DOMAIN": public_domain,
                "AI_APPLIANCE_DASHBOARD_HOST": dashboard_host,
                "AI_APPLIANCE_MDNS_DOMAIN": mdns_domain,
                "AI_APPLIANCE_MDNS_NAME": mdns_name,
                "AI_APPLIANCE_DASHBOARD_MDNS_NAME": mdns_name,
            },
        }
        return settings_response(request_json("PATCH", settings_path(), patch, "application/merge-patch+json"))


    def title_from_key(name):
        words = re.sub(r"([a-z0-9])([A-Z])", r"\1 \2", str(name or "")).replace("-", " ").replace("_", " ").split()
        return " ".join(word[:1].upper() + word[1:] for word in words) or "Module"


    def normalize_aliases(value):
        if isinstance(value, str):
            raw_aliases = [value]
        elif isinstance(value, list):
            raw_aliases = value
        else:
            raw_aliases = []
        aliases = []
        for alias in raw_aliases:
            alias = str(alias or "").strip()
            if alias:
                aliases.append(alias)
        return aliases


    def normalize_parameter_fields(value):
        if not isinstance(value, list):
            return []
        fields = []
        for field in value:
            if not isinstance(field, dict):
                continue
            name = str(field.get("name") or "").strip()
            if not name:
                continue
            normalized = dict(field)
            normalized["name"] = name
            normalized["label"] = str(field.get("label") or title_from_key(name))
            normalized["placeholder"] = str(field.get("placeholder") or "")
            normalized["type"] = str(field.get("type") or "text")
            fields.append(normalized)
        return fields


    def module_activation_mode(module, spec):
        mode = str((spec or {}).get("activationMode") or "moduleactivation").strip().lower()
        return mode if mode in {"static", "moduleactivation"} else "moduleactivation"


    def catalog_module_metadata(module, spec):
        metadata = dict(spec or {})
        metadata["displayName"] = str(metadata.get("displayName") or title_from_key(module))
        metadata["aliases"] = normalize_aliases(metadata.get("aliases"))
        metadata["activationMode"] = module_activation_mode(module, metadata)
        metadata["parameters"] = normalize_parameter_fields(metadata.get("parameters"))
        if "order" in metadata:
            try:
                metadata["order"] = int(metadata["order"])
            except Exception:
                metadata.pop("order", None)
        return metadata


    def parse_catalog(configmap):
        raw = (configmap.get("data") or {}).get("modules.json", "{\"modules\":{}}")
        catalog = json.loads(raw)
        if not isinstance(catalog, dict):
            catalog = {"modules": {}}
        modules = {}
        for module, spec in ((catalog.get("modules") or {}).items()):
            module_name = str(module or "").strip()
            if module_name:
                modules[module_name] = catalog_module_metadata(module_name, spec if isinstance(spec, dict) else {})
        catalog["modules"] = modules
        return catalog


    def catalog_json():
        return parse_catalog(catalog_configmap())


    def canonical_module(name, catalog=None):
        module_name = urllib.parse.unquote(str(name or "")).strip()
        modules = ((catalog or catalog_json()).get("modules") or {})
        if module_name in modules:
            return module_name
        alias_map = {}
        folded_alias_map = {}
        for module, spec in modules.items():
            folded_alias_map.setdefault(module.lower(), module)
            for alias in spec.get("aliases") or []:
                alias_map[alias] = module
                folded_alias_map.setdefault(alias.lower(), module)
        if module_name in alias_map:
            return alias_map[module_name]
        folded = folded_alias_map.get(module_name.lower())
        if folded:
            return folded
        raise ValueError("unknown module: " + module_name)


    def read_body(handler):
        length = int(handler.headers.get("Content-Length", "0") or "0")
        if length == 0:
            return {}
        raw = handler.rfile.read(length).decode("utf-8")
        return json.loads(raw) if raw.strip() else {}


    def require_name(payload):
        name = str(payload.get("name", "")).strip()
        if not name or not DNS_LABEL.match(name):
            raise ValueError("name must be a DNS-1123 label")
        return name


    def catalog_configmap():
        return request_json("GET", f"/api/v1/namespaces/{MODULE_CATALOG_NAMESPACE}/configmaps/{MODULE_CATALOG_NAME}")


    def app_catalog_json():
        configmap = request_json("GET", f"/api/v1/namespaces/{APP_CATALOG_NAMESPACE}/configmaps/{APP_CATALOG_NAME}")
        raw = (configmap.get("data") or {}).get("applications.json", "{}")
        return json.loads(raw)


    def module_activations():
        return list_resource(f"/apis/{APPLIANCE_GROUP}/{APPLIANCE_VERSION}/namespaces/{APPLIANCE_NAMESPACE}/moduleactivations")


    def app_instances():
        return list_resource(f"/apis/{APPLIANCE_GROUP}/{APPLIANCE_VERSION}/namespaces/{APPLIANCE_NAMESPACE}/appinstances")


    def app_instance(name):
        return get_resource(f"/apis/{APPLIANCE_GROUP}/{APPLIANCE_VERSION}/namespaces/{APPLIANCE_NAMESPACE}/appinstances/{name}")


    def model_activations():
        return list_resource(f"/apis/{APPLIANCE_GROUP}/{APPLIANCE_VERSION}/namespaces/{APPLIANCE_NAMESPACE}/modelactivations")


    def model_activation(name):
        return get_resource(f"/apis/{APPLIANCE_GROUP}/{APPLIANCE_VERSION}/namespaces/{APPLIANCE_NAMESPACE}/modelactivations/{name}")


    def decode_secret_value(value):
        try:
            decoded = base64.b64decode(str(value or ""), validate=True).decode("utf-8")
        except Exception:
            return ""
        return decoded.strip()


    def dns_label_part(value, fallback="app"):
        clean = re.sub(r"[^a-z0-9-]+", "-", str(value or "").lower()).strip("-")
        clean = re.sub(r"-+", "-", clean)
        return (clean or fallback)[:63].strip("-") or fallback


    def derived_resource_name(name, suffix):
        clean_name = dns_label_part(name, "app")
        clean_suffix = dns_label_part(suffix, "managed")
        max_base = 63 - len(clean_suffix) - 1
        return clean_name[:max_base].rstrip("-") + "-" + clean_suffix


    def openclaw_target(instance):
        metadata = instance.get("metadata") or {}
        spec = instance.get("spec") or {}
        return {
            "name": metadata.get("name") or "",
            "namespace": spec.get("targetNamespace") or MODEL_TARGET_NAMESPACE,
        }


    def openclaw_instance_resource(namespace, name):
        return get_resource(f"/apis/openclaw.rocks/v1alpha1/namespaces/{namespace}/openclawinstances/{name}")


    def read_secret(namespace, secret_name, label):
        if not DNS_LABEL.match(secret_name):
            raise ValueError(label + " secret name is invalid")
        secret = get_resource(f"/api/v1/namespaces/{namespace}/secrets/{secret_name}")
        if not secret:
            raise LookupError(label + " secret was not found")
        return secret


    def openclaw_credentials(name):
        if not DNS_LABEL.match(name):
            raise ValueError("name must be a DNS-1123 label")
        instance = app_instance(name)
        if not instance:
            raise LookupError("AppInstance not found: " + name)
        spec = instance.get("spec") or {}
        if spec.get("application") != "openclaw":
            raise ValueError("credentials are only available for OpenClaw instances")
        target = openclaw_target(instance)
        target_name = target.get("name") or name
        namespace = target.get("namespace") or MODEL_TARGET_NAMESPACE
        openclaw = openclaw_instance_resource(namespace, target_name)
        if not openclaw:
            raise LookupError("OpenClaw target resource is not ready yet")
        status = openclaw.get("status") or {}
        managed = status.get("managedResources") or {}
        secret_name = managed.get("gatewayTokenSecret") or status.get("gatewayTokenSecret") or ""
        if not secret_name:
            raise LookupError("OpenClaw gateway token secret is not published yet")
        secret = read_secret(namespace, secret_name, "OpenClaw gateway token")
        fields = []
        for key, value in sorted(((secret.get("data") or {}).items())):
            decoded = decode_secret_value(value)
            if decoded:
                fields.append({"key": key, "value": decoded})
        if not fields:
            raise LookupError("OpenClaw gateway token secret has no readable token data")
        preferred_keys = ["token", "gateway-token", "gatewayToken", "GATEWAY_TOKEN", "OPENCLAW_GATEWAY_TOKEN", "auth-token"]
        token_value = ""
        for preferred in preferred_keys:
            match = next((field for field in fields if field["key"] == preferred), None)
            if match:
                token_value = match["value"]
                break
        if not token_value:
            token_value = fields[0]["value"]
        return {
            "instance": name,
            "type": "openclaw",
            "title": "OpenClaw",
            "namespace": namespace,
            "secretName": secret_name,
            "token": token_value,
            "credentials": fields,
        }


    def odysseus_credentials(name):
        if not DNS_LABEL.match(name):
            raise ValueError("name must be a DNS-1123 label")
        instance = app_instance(name)
        if not instance:
            raise LookupError("AppInstance not found: " + name)
        metadata = instance.get("metadata") or {}
        spec = instance.get("spec") or {}
        if spec.get("application") != "odysseus":
            raise ValueError("credentials are only available for Odysseus instances")
        params = spec.get("values") or {}
        admin = params.get("admin") or {}
        password_ref = admin.get("passwordSecretRef") or {}
        target_name = metadata.get("name") or name
        namespace = spec.get("targetNamespace") or MODEL_TARGET_NAMESPACE
        secret_name = (
            password_ref.get("name")
            or admin.get("passwordSecretName")
            or params.get("adminPasswordSecretName")
            or derived_resource_name(target_name, "admin")
        )
        secret_key = (
            password_ref.get("key")
            or admin.get("passwordSecretKey")
            or params.get("adminPasswordSecretKey")
            or "password"
        )
        secret = read_secret(namespace, secret_name, "Odysseus admin")
        data = secret.get("data") or {}
        username = decode_secret_value(data.get("username")) or admin.get("user") or params.get("adminUser") or "admin"
        password = decode_secret_value(data.get(secret_key))
        fields = [{"key": "username", "value": username}]
        if password:
            fields.append({"key": "password", "value": password})
        status = instance.get("status") or {}
        if status.get("url"):
            fields.append({"key": "url", "value": status.get("url")})
        if not password:
            raise LookupError("Odysseus admin password is not available yet")
        return {
            "instance": name,
            "type": "odysseus",
            "title": "Odysseus",
            "namespace": namespace,
            "secretName": secret_name,
            "credentials": fields,
        }


    def paperclip_credentials(name):
        if not DNS_LABEL.match(name):
            raise ValueError("name must be a DNS-1123 label")
        instance = app_instance(name)
        if not instance:
            raise LookupError("AppInstance not found: " + name)
        metadata = instance.get("metadata") or {}
        spec = instance.get("spec") or {}
        if spec.get("application") != "paperclip":
            raise ValueError("credentials are only available for Paperclip instances")
        params = spec.get("values") or {}
        admin = params.get("admin") or {}
        if admin.get("enabled", True) is False:
            raise LookupError("Paperclip admin credentials are disabled for this instance")
        password_ref = admin.get("passwordSecretRef") or {}
        target_name = metadata.get("name") or name
        namespace = spec.get("targetNamespace") or MODEL_TARGET_NAMESPACE
        secret_base = (target_name or "paperclip")[:56].rstrip("-") or "paperclip"
        secret_name = (
            password_ref.get("name")
            or admin.get("passwordSecretName")
            or params.get("adminPasswordSecretName")
            or secret_base + "-admin"
        )
        secret_key = (
            password_ref.get("key")
            or admin.get("passwordSecretKey")
            or params.get("adminPasswordSecretKey")
            or "PAPERCLIP_ADMIN_PASSWORD"
        )
        secret = read_secret(namespace, secret_name, "Paperclip admin")
        data = secret.get("data") or {}
        email = admin.get("email") or params.get("adminEmail") or "admin@example.com"
        display_name = admin.get("name") or params.get("adminName") or "Admin"
        password = decode_secret_value(data.get(secret_key))
        fields = [
            {"key": "email", "value": email},
            {"key": "name", "value": display_name},
        ]
        if password:
            fields.append({"key": "password", "value": password})
        status = instance.get("status") or {}
        if status.get("url"):
            fields.append({"key": "url", "value": status.get("url")})
        if not password:
            raise LookupError("Paperclip admin password is not available yet")
        return {
            "instance": name,
            "type": "paperclip",
            "title": "Paperclip",
            "namespace": namespace,
            "secretName": secret_name,
            "credentials": fields,
        }


    def instance_credentials(name):
        if not DNS_LABEL.match(name):
            raise ValueError("name must be a DNS-1123 label")
        instance = app_instance(name)
        if not instance:
            raise LookupError("AppInstance not found: " + name)
        instance_type = (instance.get("spec") or {}).get("application")
        if instance_type == "openclaw":
            return openclaw_credentials(name)
        if instance_type == "odysseus":
            return odysseus_credentials(name)
        if instance_type == "paperclip":
            return paperclip_credentials(name)
        raise ValueError("credentials are not available for " + str(instance_type or "unknown") + " instances")


