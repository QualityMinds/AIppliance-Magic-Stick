    def positive_int(value):
        if isinstance(value, bool):
            return None
        if isinstance(value, int) and value > 0:
            return value
        if isinstance(value, str) and value.strip().isdigit():
            parsed = int(value.strip())
            return parsed if parsed > 0 else None
        return None


    def parse_mib(value):
        if value is None or value == "":
            return None
        if isinstance(value, int):
            return value if value > 0 else None
        raw = str(value).strip()
        parsed = positive_int(raw)
        if parsed:
            return parsed
        match = re.fullmatch(r"(\d+(?:\.\d+)?)\s*([A-Za-z]+)", raw)
        if not match:
            return None
        factors = {"m": 1, "mb": 1, "mi": 1, "mib": 1, "g": 1024, "gb": 1024, "gi": 1024, "gib": 1024}
        unit = match.group(2).lower()
        if unit not in factors:
            return None
        return int(float(match.group(1)) * factors[unit])


    def ceil_mib(bytes_value):
        return int((int(bytes_value or 0) + 1024 * 1024 - 1) // (1024 * 1024))


    def hf_repo_id(value):
        raw = str(value or "").strip()
        if not raw:
            raise ValueError("HF URL is required")
        if raw.startswith("hf://"):
            repo = raw[5:].strip("/")
        elif raw.startswith("https://") or raw.startswith("http://"):
            parsed = urllib.parse.urlparse(raw)
            if parsed.scheme != "https" or parsed.netloc not in {"huggingface.co", "www.huggingface.co"}:
                raise ValueError("only public https://huggingface.co URLs are supported")
            parts = [part for part in parsed.path.split("/") if part]
            if len(parts) >= 4 and parts[2] in {"resolve", "blob", "tree"}:
                repo = "/".join(parts[:2])
            elif len(parts) >= 2:
                repo = "/".join(parts[:2])
            else:
                raise ValueError("HF URL must include namespace and model name")
        elif re.fullmatch(r"[A-Za-z0-9][A-Za-z0-9_.-]*/[A-Za-z0-9][A-Za-z0-9_.-]*", raw):
            repo = raw
        else:
            raise ValueError("HF URL must be hf://namespace/model or https://huggingface.co/namespace/model")
        parts = repo.split("/")
        if len(parts) != 2 or any(not re.fullmatch(r"[A-Za-z0-9][A-Za-z0-9_.-]*", part) for part in parts):
            raise ValueError("HF URL must reference a public namespace/model repository")
        return "/".join(parts)


    def hf_resolve_url(repo, filename):
        namespace, name = repo.split("/", 1)
        return "https://huggingface.co/" + urllib.parse.quote(namespace) + "/" + urllib.parse.quote(name) + "/resolve/main/" + filename


    def hf_model_api_url(repo):
        namespace, name = repo.split("/", 1)
        return "https://huggingface.co/api/models/" + urllib.parse.quote(namespace) + "/" + urllib.parse.quote(name)


    def fetch_public_json(url, required=True):
        request = urllib.request.Request(url, headers={
            "Accept": "application/json",
            "User-Agent": "magicstick-dashboard/0.1",
        })
        try:
            with urllib.request.urlopen(request, timeout=12, context=PUBLIC_SSL_CONTEXT) as response:
                return json.loads(response.read().decode("utf-8"))
        except urllib.error.HTTPError as error:
            if error.code == 404 and not required:
                return None
            if error.code in {401, 403}:
                raise ValueError("private or unauthorized HuggingFace models are not supported in this version")
            if not required:
                return None
            raise


    def hf_metadata(repo):
        now = time.time()
        cached = HF_METADATA_CACHE.get(repo)
        if cached and now - cached.get("fetchedAt", 0) < HF_CACHE_TTL_SECONDS:
            return cached
        model_api = fetch_public_json(hf_model_api_url(repo), required=False)
        config = fetch_public_json(hf_resolve_url(repo, "config.json"), required=False)
        if not config:
            config = (model_api or {}).get("config")
        if not config:
            raise ValueError("public HuggingFace config.json is not available for this model")
        safetensors_index = fetch_public_json(hf_resolve_url(repo, "model.safetensors.index.json"), required=False)
        cached = {
            "repo": repo,
            "config": config or {},
            "safetensorsIndex": safetensors_index or {},
            "modelApi": model_api or {},
            "fetchedAt": now,
        }
        HF_METADATA_CACHE[repo] = cached
        return cached


    def has_model_dimensions(config):
        config = config or {}
        has_layers = any(positive_int(config.get(key)) for key in ("num_hidden_layers", "n_layer", "num_layers"))
        has_hidden = any(positive_int(config.get(key)) for key in ("hidden_size", "n_embd", "d_model"))
        has_heads = any(positive_int(config.get(key)) for key in ("num_attention_heads", "n_head"))
        return has_layers and has_hidden and has_heads


    def model_dimension_config(config):
        config = config or {}
        if has_model_dimensions(config):
            return config
        for key in ("text_config", "language_config", "llm_config", "model_config"):
            nested = config.get(key)
            if isinstance(nested, dict) and has_model_dimensions(nested):
                merged = dict(config)
                merged.update(nested)
                return merged
        return config


    def config_int(config, *keys):
        for key in keys:
            value = positive_int((config or {}).get(key))
            if value:
                return value
        return None


    def quantization_bits(config):
        quant = (config or {}).get("quantization_config") or {}
        for key in ("bits", "weight_bits", "load_in_bits"):
            value = positive_int(quant.get(key))
            if value:
                return value
        if quant.get("load_in_4bit") is True:
            return 4
        if quant.get("load_in_8bit") is True:
            return 8
        method = str(quant.get("quant_method") or quant.get("quantization_method") or "").lower()
        if method in {"awq", "gptq", "aqlm"}:
            return 4
        return None


    def dtype_bytes(config):
        bits = quantization_bits(config)
        if bits:
            return max(0.5, bits / 8.0)
        raw = str((config or {}).get("torch_dtype") or (config or {}).get("dtype") or "").lower()
        if "float32" in raw or "fp32" in raw:
            return 4
        if "float8" in raw or "fp8" in raw or "int8" in raw:
            return 1
        if "int4" in raw:
            return 0.5
        return 2


    def safetensors_weight_mi(index):
        metadata = (index or {}).get("metadata") or {}
        total_size = positive_int(metadata.get("total_size"))
        return ceil_mib(total_size) if total_size else None


    def api_safetensors_weight_mi(model_api):
        safetensors = (model_api or {}).get("safetensors") or {}
        total_size = positive_int(safetensors.get("total"))
        return ceil_mib(total_size) if total_size else None


    def estimated_parameter_count(config):
        explicit = config_int(config, "num_parameters", "n_params", "parameter_count")
        if explicit:
            return explicit
        layers = config_int(config, "num_hidden_layers", "n_layer", "num_layers")
        hidden = config_int(config, "hidden_size", "n_embd", "d_model")
        heads = config_int(config, "num_attention_heads", "n_head")
        kv_heads = config_int(config, "num_key_value_heads", "num_kv_heads", "n_head_kv") or heads
        vocab = config_int(config, "vocab_size", "padded_vocab_size") or 0
        intermediate = config_int(config, "intermediate_size", "ffn_dim")
        if not layers or not hidden or not heads:
            return None
        head_dim = config_int(config, "head_dim", "qk_rope_head_dim") or max(1, hidden // heads)
        attention = hidden * (heads * head_dim + 2 * kv_heads * head_dim) + hidden * hidden
        if intermediate:
            mlp = 3 * hidden * intermediate
        else:
            mlp = 8 * hidden * hidden
        embeddings = vocab * hidden
        return int(embeddings + layers * (attention + mlp))


    def fallback_weight_mi(config):
        params = estimated_parameter_count(config)
        if not params:
            return None
        overhead = 1.12 if quantization_bits(config) else 1.0
        return ceil_mib(params * dtype_bytes(config) * overhead)


    def kv_cache_layer_count(config):
        layers = config_int(config, "num_hidden_layers", "n_layer", "num_layers")
        layer_types = (config or {}).get("layer_types")
        if isinstance(layer_types, list) and layer_types:
            full_attention_layers = sum(1 for layer_type in layer_types if str(layer_type).lower() == "full_attention")
            if full_attention_layers:
                return full_attention_layers, len(layer_types)
        return layers, layers


    def kv_cache_mi(config, context_window, max_num_seqs):
        layers, _total_layers = kv_cache_layer_count(config)
        hidden = config_int(config, "hidden_size", "n_embd", "d_model")
        heads = config_int(config, "num_attention_heads", "n_head")
        kv_heads = config_int(config, "num_key_value_heads", "num_kv_heads", "n_head_kv") or heads
        if not layers or not hidden or not heads or not kv_heads:
            return None
        head_dim = config_int(config, "head_dim", "qk_rope_head_dim") or max(1, hidden // heads)
        kv_dtype_bytes = 1 if "fp8" in str(config.get("kv_cache_dtype") or "").lower() else 2
        bytes_value = 2 * layers * kv_heads * head_dim * kv_dtype_bytes * int(context_window) * int(max_num_seqs)
        return ceil_mib(bytes_value)


    def estimate_model_vram(payload):
        payload = payload or {}
        repo = hf_repo_id(payload.get("url"))
        metadata = hf_metadata(repo)
        config = metadata.get("config") or {}
        dimensions = model_dimension_config(config)
        warnings = []
        model_type = str(payload.get("modelType") or dimensions.get("model_type") or config.get("model_type") or "chat").lower()
        context_window = positive_int(payload.get("contextWindow")) or config_int(dimensions, "max_position_embeddings", "model_max_length") or 4096
        if not positive_int(payload.get("contextWindow")):
            warnings.append("Context Size was missing; using model config or 4096 token fallback.")
        max_num_seqs = positive_int(payload.get("maxNumSeqs"))
        if not max_num_seqs:
            max_num_seqs = 8 if model_type == "embedding" else 32
            warnings.append("Max Num Seqs was missing; using " + str(max_num_seqs) + " for the estimate.")

        weights_mi = safetensors_weight_mi(metadata.get("safetensorsIndex"))
        confidence = "high"
        if not weights_mi:
            weights_mi = api_safetensors_weight_mi(metadata.get("modelApi"))
            if weights_mi:
                warnings.append("Safetensors index metadata unavailable; used HuggingFace model API safetensors total.")
            else:
                weights_mi = fallback_weight_mi(dimensions)
                confidence = "estimated"
                warnings.append("Safetensors index not available; estimated model weights from config.")
        if not weights_mi:
            weights_mi = 0
            confidence = "fallback"
            warnings.append("Could not estimate model weight size from HuggingFace metadata.")

        kv_mi = kv_cache_mi(dimensions, context_window, max_num_seqs)
        if kv_mi is None:
            kv_mi = 0
            confidence = "fallback"
            warnings.append("Could not estimate KV cache from model config.")
        else:
            kv_layers, total_layers = kv_cache_layer_count(dimensions)
            if kv_layers and total_layers and kv_layers < total_layers:
                warnings.append("Detected hybrid attention; KV cache uses " + str(kv_layers) + " full-attention layers out of " + str(total_layers) + ".")
        runtime_mi = max(2048, int((weights_mi + kv_mi) * 0.08))
        minimum_mi = weights_mi + kv_mi + runtime_mi
        reserve_mi = max(2048, int(minimum_mi * 0.15))
        recommended_mi = minimum_mi + reserve_mi

        vram = vram_summary(model_activations())
        maximum_mi = vram.get("plannedRemainingMi") if vram.get("available") else None
        if maximum_mi is None:
            warnings.append("Live GPU availability unavailable; max available cannot be verified.")
        elif maximum_mi < minimum_mi:
            warnings.append("Estimated minimum exceeds currently available unplanned VRAM.")

        return {
            "repo": repo,
            "sourceUrl": "https://huggingface.co/" + repo,
            "minimumMi": int(minimum_mi),
            "recommendedMi": int(recommended_mi),
            "maximumMi": None if maximum_mi is None else int(maximum_mi),
            "weightsMi": int(weights_mi),
            "kvCacheMi": int(kv_mi),
            "reserveMi": int(runtime_mi),
            "recommendedReserveMi": int(reserve_mi),
            "contextWindow": int(context_window),
            "maxNumSeqs": int(max_num_seqs),
            "confidence": confidence,
            "gpuAvailable": bool(vram.get("available")),
            "warnings": warnings,
        }


    def provider_secret_name(model_name):
        return MODEL_SECRET_PREFIX + model_name


    def create_provider_secret(model_name, api_key):
        if not api_key:
            return None
        secret_name = provider_secret_name(model_name)
        secret = {
            "apiVersion": "v1",
            "kind": "Secret",
            "metadata": {
                "name": secret_name,
                "namespace": MODEL_TARGET_NAMESPACE,
                "labels": {
                    "app.kubernetes.io/managed-by": "ai-appliance-dashboard",
                    "appliance.magicstick.dev/modelactivation": model_name,
                },
            },
            "type": "Opaque",
            "data": {
                "api-key": base64.b64encode(str(api_key).encode("utf-8")).decode("ascii"),
            },
        }
        collection = f"/api/v1/namespaces/{MODEL_TARGET_NAMESPACE}/secrets"
        item = collection + "/" + secret_name
        create_or_patch(collection, item, secret, {"metadata": secret["metadata"], "type": "Opaque", "data": secret["data"]})
        return {"name": secret_name, "key": "api-key"}


    def model_activation_payload(model_type, payload):
        name = require_name(payload)
        target_namespace = str(payload.get("namespace") or payload.get("targetNamespace") or MODEL_TARGET_NAMESPACE)
        spec = {
            "type": model_type,
            "enabled": payload.get("enabled", True) is not False,
            "targetNamespace": target_namespace,
            "applianceRef": {
                "name": APPLIANCE_NAME,
                "namespace": APPLIANCE_NAMESPACE,
            },
        }
        labels = {
            "app.kubernetes.io/managed-by": "ai-appliance-dashboard",
            "appliance.magicstick.dev/model-type": model_type,
        }
        if model_type == "local":
            local = dict(payload.get("local") or {})
            for key in ("preset", "url", "modelType", "features", "engine", "resourceProfile", "vram", "vramMi", "contextWindow", "maxNumSeqs", "args", "minReplicas", "maxReplicas", "env"):
                if key in payload and key not in local:
                    local[key] = payload[key]
            spec["local"] = local
        else:
            external = dict(payload.get("external") or {})
            for key in ("model", "apiBase", "modelType", "apiVersion", "customLlmProvider", "tpm", "rpm", "contextWindow"):
                if key in payload and key not in external:
                    external[key] = payload[key]
            if payload.get("apiKey"):
                external["apiKeySecretRef"] = create_provider_secret(name, payload.get("apiKey"))
            elif payload.get("apiKeySecretRef"):
                external["apiKeySecretRef"] = payload.get("apiKeySecretRef")
            spec["external"] = external
        return {
            "apiVersion": f"{APPLIANCE_GROUP}/{APPLIANCE_VERSION}",
            "kind": "ModelActivation",
            "metadata": {
                "name": name,
                "namespace": APPLIANCE_NAMESPACE,
                "labels": labels,
            },
            "spec": spec,
        }


    def summarized_modules():
        catalog = catalog_json()
        catalog_modules = catalog.get("modules") or {}
        modules = {}
        for module, catalog_spec in catalog_modules.items():
            modules[module] = {
                "enabled": False,
                "source": "catalog",
                "displayName": catalog_spec["displayName"],
                "activationMode": catalog_spec["activationMode"],
                "catalog": catalog_spec,
                "parameters": {},
                "status": {},
            }
        current = appliance()
        appliance_status_modules = ((current.get("status") or {}).get("modules") or {})
        for module, spec in ((current.get("spec") or {}).get("modules") or {}).items():
            try:
                canonical = canonical_module(module, catalog)
                catalog_spec = catalog_modules.get(canonical) or catalog_module_metadata(canonical, {})
            except ValueError:
                canonical = str(module or "").strip()
                catalog_spec = catalog_module_metadata(canonical, {"activationMode": "static"})
            if not canonical:
                continue
            modules.setdefault(canonical, {
                "enabled": False,
                "source": "catalog",
                "displayName": catalog_spec["displayName"],
                "activationMode": catalog_spec["activationMode"],
                "catalog": catalog_spec,
                "parameters": {},
                "status": {},
            })
            enabled = spec.get("enabled") is True
            status = appliance_status_modules.get(canonical) or {}
            if not status and catalog_spec["activationMode"] == "static":
                status = {
                    "phase": "Ready" if enabled else "Disabled",
                    "message": "Static module is managed by the cluster bootstrap.",
                }
            modules[canonical].update({"enabled": enabled, "source": "appliance", "status": status})
        for activation in module_activations():
            metadata = activation.get("metadata") or {}
            spec = activation.get("spec") or {}
            status = activation.get("status") or {}
            try:
                module = canonical_module(spec.get("module") or metadata.get("name"), catalog)
                catalog_spec = catalog_modules.get(module) or catalog_module_metadata(module, {})
            except ValueError:
                module = str(spec.get("module") or metadata.get("name") or "").strip()
                catalog_spec = catalog_module_metadata(module, {"activationMode": "static"})
            if not module:
                continue
            modules.setdefault(module, {
                "enabled": False,
                "source": "catalog",
                "displayName": catalog_spec["displayName"],
                "activationMode": catalog_spec["activationMode"],
                "catalog": catalog_spec,
                "parameters": {},
                "status": {},
            })
            modules[module] = {
                "enabled": spec.get("enabled", True) is not False,
                "source": "moduleactivation",
                "activation": metadata.get("name"),
                "generation": int(metadata.get("generation") or 0),
                "observedGeneration": int(status.get("observedGeneration") or 0),
                "displayName": catalog_spec["displayName"],
                "activationMode": catalog_spec["activationMode"],
                "catalog": catalog_spec,
                "parameters": spec.get("parameters") or {},
                "status": status,
            }
        return {
            "catalog": json.dumps(catalog, indent=2, sort_keys=True),
            "catalogJson": {**catalog, **app_catalog_json()},
            "modules": modules,
            "activations": module_activations(),
        }


    def summarized_instances():
        grouped = {}
        for instance in app_instances():
            spec = instance.get("spec") or {}
            instance_type = spec.get("application") or "unknown"
            grouped.setdefault(instance_type, []).append({
                "metadata": instance.get("metadata") or {},
                "spec": spec,
                "status": instance.get("status") or {},
            })
        return {"instances": grouped, "items": app_instances()}


    def dcgm_labels(raw):
        labels = {}
        for part in raw.split(","):
            if "=" not in part:
                continue
            key, value = part.split("=", 1)
            labels[key.strip()] = value.strip().strip('"')
        return labels


    def parse_dcgm_metrics(text):
        gpus = {}
        for line in text.splitlines():
            line = line.strip()
            if not line or line.startswith("#"):
                continue
            match = re.match(r"^(DCGM_FI_DEV_FB_FREE|DCGM_FI_DEV_FB_USED)\{([^}]*)\}\s+([0-9.]+)", line)
            if not match:
                continue
            metric, raw_labels, raw_value = match.groups()
            labels = dcgm_labels(raw_labels)
            key = labels.get("UUID") or labels.get("gpu") or labels.get("device") or "gpu"
            gpu = gpus.setdefault(key, {
                "id": labels.get("gpu") or key,
                "uuid": labels.get("UUID") or "",
                "device": labels.get("device") or "",
                "modelName": labels.get("modelName") or "",
                "hostname": labels.get("Hostname") or "",
                "freeMi": 0,
                "usedMi": 0,
                "totalMi": 0,
            })
            value = int(float(raw_value))
            if metric == "DCGM_FI_DEV_FB_FREE":
                gpu["freeMi"] = value
            if metric == "DCGM_FI_DEV_FB_USED":
                gpu["usedMi"] = value
        for gpu in gpus.values():
            gpu["totalMi"] = int(gpu.get("freeMi", 0)) + int(gpu.get("usedMi", 0))
        return sorted(gpus.values(), key=lambda item: str(item.get("id", "")))


    def vram_summary(activations):
        planned = 0
        for activation in activations:
            spec = activation.get("spec") or {}
            if spec.get("type") != "local" or spec.get("enabled", True) is False:
                continue
            status_vram = positive_int((activation.get("status") or {}).get("vramRequiredMi"))
            local = spec.get("local") or {}
            planned += status_vram or parse_mib(local.get("vram")) or positive_int(local.get("vramMi")) or 0
        try:
            metrics = request_text("GET", f"/api/v1/namespaces/{DCGM_NAMESPACE}/services/{DCGM_SERVICE}:{DCGM_PORT}/proxy/metrics")
            gpus = parse_dcgm_metrics(metrics)
            free = sum(int(gpu.get("freeMi") or 0) for gpu in gpus)
            used = sum(int(gpu.get("usedMi") or 0) for gpu in gpus)
            total = sum(int(gpu.get("totalMi") or 0) for gpu in gpus)
            return {
                "available": True,
                "gpus": gpus,
                "freeMi": free,
                "usedMi": used,
                "totalMi": total,
                "plannedMi": planned,
                "plannedRemainingMi": max(0, free - planned),
            }
        except Exception as error:
            return {
                "available": False,
                "error": str(error),
                "gpus": [],
                "freeMi": 0,
                "usedMi": 0,
                "totalMi": 0,
                "plannedMi": planned,
                "plannedRemainingMi": 0,
            }


    def module_state(modules_payload, name):
        return ((modules_payload or {}).get("modules") or {}).get(name) or {}


    def first_ingress_url(namespace, name):
        ingress = get_resource(f"/apis/networking.k8s.io/v1/namespaces/{namespace}/ingresses/{name}")
        if not ingress:
            return ""
        for rule in (ingress.get("spec") or {}).get("rules") or []:
            host = rule.get("host")
            if host:
                return "http://" + host + "/"
        return ""


    def summarized_models():
        activations = model_activations()
        modules_payload = summarized_modules()
        stack_names = ["gpu", "kubeai", "litellm", "model-catalog", "anything-llm"]
        stack = {
            name: module_state(modules_payload, name)
            for name in stack_names
        }
        anything = dict(stack.get("anything-llm") or {})
        anything["url"] = first_ingress_url(MODEL_TARGET_NAMESPACE, "anything-llm")
        return {
            "catalog": generated_model_catalog(),
            "models": (generated_model_catalog().get("models") or []),
            "activations": activations,
            "presets": model_presets(),
            "modules": stack,
            "anythingLlm": anything,
            "vram": vram_summary(activations),
        }


    def status_payload():
        current = appliance()
        flux = list_resource("/apis/kustomize.toolkit.fluxcd.io/v1/namespaces/flux-system/kustomizations")
        pods = list_resource("/api/v1/pods")
        services = list_resource("/api/v1/services")
        ingresses = list_resource("/apis/networking.k8s.io/v1/ingresses")
        return {
            "appliance": {
                "metadata": current.get("metadata", {}),
                "spec": current.get("spec", {}),
                "status": current.get("status", {}),
            },
            "moduleActivations": module_activations(),
            "appInstances": app_instances(),
            "fluxKustomizations": summarize_objects(flux),
            "pods": summarize_objects(pods),
            "services": summarize_objects(services),
            "ingresses": summarize_ingresses(ingresses),
        }


    def summarize_objects(items):
        return [
            {
                "namespace": (item.get("metadata") or {}).get("namespace", ""),
                "name": (item.get("metadata") or {}).get("name", ""),
                "phase": (item.get("status") or {}).get("phase", ""),
                "conditions": (item.get("status") or {}).get("conditions", []),
            }
            for item in items
        ]


    def summarize_ingresses(items):
        summarized = []
        for item in items:
            metadata = item.get("metadata") or {}
            annotations = metadata.get("annotations") or {}
            dashboard_annotations = {
                key: value
                for key, value in annotations.items()
                if key.startswith("dashboard.ai-appliance.io/")
            }
            hosts = []
            for rule in (item.get("spec") or {}).get("rules", []):
                host = rule.get("host")
                if host:
                    hosts.append(host)
            summarized.append({
                "namespace": metadata.get("namespace", ""),
                "name": metadata.get("name", ""),
                "labels": metadata.get("labels") or {},
                "annotations": dashboard_annotations,
                "hosts": hosts,
            })
        return summarized


    class Handler(BaseHTTPRequestHandler):
        server_version = "MagicStickDashboardAPI/0.4"

        def log_message(self, format, *args):
            print("%s - %s" % (self.address_string(), format % args), flush=True)

        def send_json(self, payload, status=200):
            data = json.dumps(payload, indent=2, sort_keys=True).encode("utf-8")
            self.send_response(status)
            self.send_header("Content-Type", "application/json")
            self.send_header("Cache-Control", "no-store")
            self.send_header("Content-Length", str(len(data)))
            self.end_headers()
            self.wfile.write(data)

        def send_error_json(self, status, message):
            self.send_json({"error": message}, status)

        def send_auth_error(self, error):
            if error.status == 401:
                data = json.dumps({"error": str(error)}, indent=2, sort_keys=True).encode("utf-8")
                self.send_response(401)
                self.send_header("Content-Type", "application/json")
                self.send_header("Cache-Control", "no-store")
                self.send_header("WWW-Authenticate", 'Bearer realm="magicstick"')
                self.send_header("Content-Length", str(len(data)))
                self.end_headers()
                self.wfile.write(data)
                return
            self.send_error_json(error.status, str(error))

        def require_access(self, required_access):
            return authorize(self.headers.get("Authorization", ""), required_access)

        def route(self):
            parsed = urllib.parse.urlparse(self.path)
            return parsed.path.rstrip("/") or "/"

        def do_GET(self):
            try:
                path = self.route()
                parts = path.strip("/").split("/")
                if path == "/healthz":
                    self.send_json({"ok": True})
                    return
                required_access = "operator" if len(parts) == 4 and parts[:2] == ["api", "instances"] and parts[3] == "credentials" else "viewer"
                principal = self.require_access(required_access)
                if path == "/api/session":
                    self.send_json(principal)
                elif path == "/api/appliance":
                    self.send_json(appliance())
                elif path == "/api/modules":
                    self.send_json(summarized_modules())
                elif path == "/api/instances":
                    self.send_json(summarized_instances())
                elif len(parts) == 4 and parts[:2] == ["api", "instances"] and parts[3] == "credentials":
                    self.send_json(instance_credentials(parts[2]))
                elif path == "/api/models":
                    self.send_json(summarized_models())
                elif path == "/api/status":
                    self.send_json(status_payload())
                elif path == "/api/settings":
                    self.send_json(settings_response())
                elif path == "/api/events":
                    core_events = list_resource("/api/v1/events")
                    new_events = list_resource("/apis/events.k8s.io/v1/events")
                    self.send_json({"events": summarize_objects(core_events + new_events)})
                else:
                    self.send_error_json(404, "not found")
            except AuthError as error:
                self.send_auth_error(error)
            except LookupError as error:
                self.send_error_json(404, str(error))
            except ValueError as error:
                self.send_error_json(400, str(error))
            except urllib.error.HTTPError as error:
                self.send_error_json(error.code, error.read().decode("utf-8", errors="replace"))
            except Exception as error:
                self.send_error_json(500, str(error))

        def do_PATCH(self):
            if self.route() == "/api/settings":
                try:
                    self.require_access("admin")
                    self.send_json(settings_patch(read_body(self)))
                except AuthError as error:
                    self.send_auth_error(error)
                except LookupError as error:
                    self.send_error_json(404, str(error))
                except urllib.error.HTTPError as error:
                    self.send_error_json(error.code, error.read().decode("utf-8", errors="replace"))
                except Exception as error:
                    self.send_error_json(400, str(error))
                return
            if self.route() == "/api/appliance":
                try:
                    self.require_access("admin")
                except AuthError as error:
                    self.send_auth_error(error)
                    return
                self.send_error_json(405, "Appliance spec is Git-owned; create ModuleActivation or AppInstance resources instead.")
                return
            self.send_error_json(404, "not found")

        def do_POST(self):
            try:
                path = self.route()
                parts = path.strip("/").split("/")
                if len(parts) == 4 and parts[0] == "api" and parts[1] == "modules":
                    self.require_access("operator")
                    catalog = catalog_json()
                    module = canonical_module(parts[2], catalog)
                    catalog_spec = ((catalog.get("modules") or {}).get(module) or {})
                    if catalog_spec.get("activationMode") != "moduleactivation":
                        self.send_error_json(400, "module is statically managed: " + module)
                        return
                    if parts[3] not in {"enable", "disable"}:
                        self.send_error_json(404, "not found")
                        return
                    enabled = parts[3] == "enable"
                    payload = read_body(self)
                    resource = module_activation_payload(module, enabled, payload)
                    name = resource["metadata"]["name"]
                    collection = f"/apis/{APPLIANCE_GROUP}/{APPLIANCE_VERSION}/namespaces/{APPLIANCE_NAMESPACE}/moduleactivations"
                    item = collection + "/" + name
                    self.send_json(create_or_patch(collection, item, resource, {"spec": resource["spec"], "metadata": {"labels": resource["metadata"]["labels"]}}))
                    return

                applications = app_catalog_json().get("applications") or {}
                if len(parts) == 3 and parts[:2] == ["api", "instances"] and parts[2] in applications:
                    self.require_access("operator")
                    instance_type = parts[2]
                    resource = app_instance_payload(instance_type, read_body(self))
                    name = resource["metadata"]["name"]
                    collection = f"/apis/{APPLIANCE_GROUP}/{APPLIANCE_VERSION}/namespaces/{APPLIANCE_NAMESPACE}/appinstances"
                    item = collection + "/" + name
                    self.send_json(create_or_patch(collection, item, resource, {"spec": resource["spec"], "metadata": {"labels": resource["metadata"]["labels"]}}))
                    return

                if len(parts) == 3 and parts[:2] == ["api", "models"] and parts[2] == "estimate-vram":
                    self.require_access("viewer")
                    self.send_json(estimate_model_vram(read_body(self)))
                    return

                if len(parts) == 3 and parts[:2] == ["api", "models"] and parts[2] in {"local", "external"}:
                    self.require_access("operator")
                    model_type = parts[2]
                    resource = model_activation_payload(model_type, read_body(self))
                    name = resource["metadata"]["name"]
                    collection = f"/apis/{APPLIANCE_GROUP}/{APPLIANCE_VERSION}/namespaces/{APPLIANCE_NAMESPACE}/modelactivations"
                    item = collection + "/" + name
                    self.send_json(create_or_patch(collection, item, resource, {"spec": resource["spec"], "metadata": {"labels": resource["metadata"]["labels"]}}))
                    return

                self.send_error_json(404, "not found")
            except AuthError as error:
                self.send_auth_error(error)
            except urllib.error.HTTPError as error:
                self.send_error_json(error.code, error.read().decode("utf-8", errors="replace"))
            except Exception as error:
                self.send_error_json(400, str(error))

        def do_DELETE(self):
            try:
                path = self.route()
                parts = path.strip("/").split("/")
                self.require_access("operator")
                if len(parts) == 3 and parts[:2] == ["api", "instances"]:
                    name = parts[2]
                    if not DNS_LABEL.match(name):
                        self.send_error_json(400, "name must be a DNS-1123 label")
                        return
                    delete_json(f"/apis/{APPLIANCE_GROUP}/{APPLIANCE_VERSION}/namespaces/{APPLIANCE_NAMESPACE}/appinstances/{name}")
                    self.send_json({"deleted": name})
                    return
                if len(parts) == 3 and parts[:2] == ["api", "models"]:
                    name = parts[2]
                    if not DNS_LABEL.match(name):
                        self.send_error_json(400, "name must be a DNS-1123 label")
                        return
                    activation = model_activation(name)
                    if activation:
                        spec = activation.get("spec") or {}
                        external = spec.get("external") or {}
                        ref = external.get("apiKeySecretRef") or {}
                        secret_name = ref.get("name") or ""
                        if secret_name.startswith(MODEL_SECRET_PREFIX):
                            secret = get_resource(f"/api/v1/namespaces/{MODEL_TARGET_NAMESPACE}/secrets/{secret_name}")
                            labels = ((secret or {}).get("metadata") or {}).get("labels") or {}
                            if labels.get("app.kubernetes.io/managed-by") == "ai-appliance-dashboard" and labels.get("appliance.magicstick.dev/modelactivation") == name:
                                delete_json(f"/api/v1/namespaces/{MODEL_TARGET_NAMESPACE}/secrets/{secret_name}")
                    delete_json(f"/apis/{APPLIANCE_GROUP}/{APPLIANCE_VERSION}/namespaces/{APPLIANCE_NAMESPACE}/modelactivations/{name}")
                    self.send_json({"deleted": name})
                    return
                self.send_error_json(404, "not found")
            except AuthError as error:
                self.send_auth_error(error)
            except urllib.error.HTTPError as error:
                self.send_error_json(error.code, error.read().decode("utf-8", errors="replace"))
            except Exception as error:
                self.send_error_json(400, str(error))


    if __name__ == "__main__":
        port = int(os.environ.get("PORT", "8080"))
        ThreadingHTTPServer(("0.0.0.0", port), Handler).serve_forever()
