apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-appliance-dashboard-api
  namespace: dashboard
  labels:
    app: ai-appliance-dashboard
    app.kubernetes.io/component: api
data:
  server.py: |
    #!/usr/bin/env python3
    import base64
    import json
    import os
    import re
    import ssl
    import urllib.error
    import urllib.parse
    import urllib.request
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    APPLIANCE_GROUP = "appliance.magicstick.dev"
    APPLIANCE_VERSION = "v1alpha1"
    APPLIANCE_NAMESPACE = os.environ.get("APPLIANCE_NAMESPACE", "ai-system")
    APPLIANCE_NAME = os.environ.get("APPLIANCE_NAME", "local")
    MODULE_CATALOG_NAMESPACE = os.environ.get("MODULE_CATALOG_NAMESPACE", "ai-system")
    MODULE_CATALOG_NAME = os.environ.get("MODULE_CATALOG_NAME", "magicstick-module-catalog")
    MODEL_PRESETS_NAMESPACE = os.environ.get("MODEL_PRESETS_NAMESPACE", "ai-system")
    MODEL_PRESETS_NAME = os.environ.get("MODEL_PRESETS_NAME", "magicstick-model-presets")
    MODEL_TARGET_NAMESPACE = os.environ.get("MODEL_TARGET_NAMESPACE", "ai")
    MODEL_CATALOG_NAME = os.environ.get("MODEL_CATALOG_NAME", "ai-model-catalog")
    DCGM_NAMESPACE = os.environ.get("DCGM_NAMESPACE", "gpu-operator")
    DCGM_SERVICE = os.environ.get("DCGM_SERVICE", "nvidia-dcgm-exporter")
    DCGM_PORT = os.environ.get("DCGM_PORT", "9400")
    SETTINGS_NAMESPACE = os.environ.get("SETTINGS_NAMESPACE", "flux-system")
    SETTINGS_CONFIGMAP_NAME = os.environ.get("SETTINGS_CONFIGMAP_NAME", "ai-appliance-settings")
    KUBE_API = os.environ.get("KUBERNETES_SERVICE_URL", "https://kubernetes.default.svc").rstrip("/")
    SA_TOKEN_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/token"
    SA_CA_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
    DNS_LABEL = re.compile(r"^[a-z0-9]([-a-z0-9]*[a-z0-9])?$")
    DEFAULT_PUBLIC_DOMAIN = "magicstick.example.com"
    DEFAULT_MDNS_DOMAIN = "magicstick.local"
    SETTINGS_WATCH_LABELS = {"reconcile.fluxcd.io/watch": "Enabled"}

    INSTANCE_TYPES = {"openclaw", "hermes", "paperclip", "kubeopencode"}
    MODEL_SECRET_PREFIX = "ai-model-provider-"
    SSL_CONTEXT = ssl.create_default_context(cafile=SA_CA_PATH)


    def token():
        with open(SA_TOKEN_PATH, "r", encoding="utf-8") as token_file:
            return token_file.read().strip()


    def request_json(method, path, body=None, content_type="application/json"):
        data = None
        headers = {
            "Accept": "application/json",
            "Authorization": "Bearer " + token(),
        }
        if body is not None:
            data = json.dumps(body).encode("utf-8")
            headers["Content-Type"] = content_type
        request = urllib.request.Request(KUBE_API + path, data=data, headers=headers, method=method)
        with urllib.request.urlopen(request, timeout=20, context=SSL_CONTEXT) as response:
            payload = response.read().decode("utf-8")
            return json.loads(payload) if payload else {}


    def request_text(method, path):
        request = urllib.request.Request(
            KUBE_API + path,
            headers={
                "Accept": "text/plain",
                "Authorization": "Bearer " + token(),
            },
            method=method,
        )
        with urllib.request.urlopen(request, timeout=20, context=SSL_CONTEXT) as response:
            return response.read().decode("utf-8", errors="replace")


    def delete_json(path):
        try:
            return request_json("DELETE", path)
        except urllib.error.HTTPError as error:
            if error.code == 404:
                return {}
            raise


    def appliance_path():
        return f"/apis/{APPLIANCE_GROUP}/{APPLIANCE_VERSION}/namespaces/{APPLIANCE_NAMESPACE}/appliances/{APPLIANCE_NAME}"


    def appliance():
        return request_json("GET", appliance_path())


    def list_resource(path):
        try:
            return request_json("GET", path).get("items", [])
        except urllib.error.HTTPError as error:
            if error.code == 404:
                return []
            raise


    def get_resource(path):
        try:
            return request_json("GET", path)
        except urllib.error.HTTPError as error:
            if error.code == 404:
                return None
            raise


    def create_or_patch(collection_path, item_path, resource, patch):
        if get_resource(item_path):
            return request_json("PATCH", item_path, patch, "application/merge-patch+json")
        return request_json("POST", collection_path, resource)


    def settings_path():
        return f"/api/v1/namespaces/{SETTINGS_NAMESPACE}/configmaps/{SETTINGS_CONFIGMAP_NAME}"


    def settings_configmap():
        return get_resource(settings_path())


    def normalize_hostname(value, field):
        hostname = str(value or "").strip().lower().strip(".")
        if not hostname:
            raise ValueError(field + " is required")
        if "://" in hostname or "/" in hostname or ":" in hostname:
            raise ValueError(field + " must be a hostname without scheme, path, or port")
        labels = hostname.split(".")
        if len(labels) < 2 or any(not DNS_LABEL.match(label) for label in labels):
            raise ValueError(field + " must be a valid DNS hostname")
        return hostname


    def mdns_name_from_domain(domain):
        return domain[:-6] if domain.endswith(".local") else domain


    def default_settings_data():
        mdns_name = mdns_name_from_domain(DEFAULT_MDNS_DOMAIN)
        return {
            "AI_APPLIANCE_DOMAIN": DEFAULT_PUBLIC_DOMAIN,
            "AI_APPLIANCE_DASHBOARD_HOST": DEFAULT_PUBLIC_DOMAIN,
            "AI_APPLIANCE_MDNS_DOMAIN": DEFAULT_MDNS_DOMAIN,
            "AI_APPLIANCE_MDNS_NAME": mdns_name,
            "AI_APPLIANCE_DASHBOARD_MDNS_NAME": mdns_name,
        }


    def settings_response(configmap=None):
        configmap = configmap if configmap is not None else settings_configmap()
        raw_data = ((configmap or {}).get("data") or {})
        data = default_settings_data()
        data.update(raw_data)
        raw_mdns_domain = raw_data.get("AI_APPLIANCE_MDNS_DOMAIN")
        raw_mdns_name = raw_data.get("AI_APPLIANCE_MDNS_NAME") or raw_data.get("AI_APPLIANCE_DASHBOARD_MDNS_NAME")
        if raw_mdns_domain:
            data["AI_APPLIANCE_MDNS_DOMAIN"] = raw_mdns_domain
        elif raw_mdns_name:
            data["AI_APPLIANCE_MDNS_DOMAIN"] = raw_mdns_name + ".local"
        elif not data.get("AI_APPLIANCE_MDNS_DOMAIN"):
            data["AI_APPLIANCE_MDNS_DOMAIN"] = DEFAULT_MDNS_DOMAIN
        if raw_mdns_name:
            data["AI_APPLIANCE_MDNS_NAME"] = raw_mdns_name
        else:
            data["AI_APPLIANCE_MDNS_NAME"] = mdns_name_from_domain(data["AI_APPLIANCE_MDNS_DOMAIN"])
        if not raw_data.get("AI_APPLIANCE_DASHBOARD_MDNS_NAME"):
            data["AI_APPLIANCE_DASHBOARD_MDNS_NAME"] = data["AI_APPLIANCE_MDNS_NAME"]
        if not raw_data.get("AI_APPLIANCE_DASHBOARD_HOST"):
            data["AI_APPLIANCE_DASHBOARD_HOST"] = data["AI_APPLIANCE_DOMAIN"]
        return {
            "namespace": SETTINGS_NAMESPACE,
            "name": SETTINGS_CONFIGMAP_NAME,
            "exists": configmap is not None,
            "data": data,
            "publicDomain": data["AI_APPLIANCE_DOMAIN"],
            "dashboardHost": data["AI_APPLIANCE_DASHBOARD_HOST"],
            "mdnsDomain": data["AI_APPLIANCE_MDNS_DOMAIN"],
            "mdnsName": data["AI_APPLIANCE_MDNS_NAME"],
        }


    def settings_patch(payload):
        current = settings_configmap()
        if not current:
            raise LookupError(f"{SETTINGS_NAMESPACE}/{SETTINGS_CONFIGMAP_NAME} ConfigMap not found")
        current_settings = settings_response(current)
        public_domain = normalize_hostname(
            payload.get("publicDomain") or payload.get("AI_APPLIANCE_DOMAIN") or current_settings.get("publicDomain") or DEFAULT_PUBLIC_DOMAIN,
            "public domain",
        )
        mdns_domain = normalize_hostname(
            payload.get("mdnsDomain") or payload.get("AI_APPLIANCE_MDNS_DOMAIN") or current_settings.get("mdnsDomain") or DEFAULT_MDNS_DOMAIN,
            "mDNS domain",
        )
        if not mdns_domain.endswith(".local"):
            raise ValueError("mDNS domain must end with .local")
        dashboard_host = normalize_hostname(
            payload.get("dashboardHost") or payload.get("AI_APPLIANCE_DASHBOARD_HOST") or current_settings.get("dashboardHost") or public_domain,
            "dashboard host",
        )
        mdns_name = mdns_name_from_domain(mdns_domain)
        patch = {
            "metadata": {"labels": SETTINGS_WATCH_LABELS},
            "data": {
                "AI_APPLIANCE_DOMAIN": public_domain,
                "AI_APPLIANCE_DASHBOARD_HOST": dashboard_host,
                "AI_APPLIANCE_MDNS_DOMAIN": mdns_domain,
                "AI_APPLIANCE_MDNS_NAME": mdns_name,
                "AI_APPLIANCE_DASHBOARD_MDNS_NAME": mdns_name,
            },
        }
        return settings_response(request_json("PATCH", settings_path(), patch, "application/merge-patch+json"))


    def title_from_key(name):
        words = re.sub(r"([a-z0-9])([A-Z])", r"\1 \2", str(name or "")).replace("-", " ").replace("_", " ").split()
        return " ".join(word[:1].upper() + word[1:] for word in words) or "Module"


    def normalize_aliases(value):
        if isinstance(value, str):
            raw_aliases = [value]
        elif isinstance(value, list):
            raw_aliases = value
        else:
            raw_aliases = []
        aliases = []
        for alias in raw_aliases:
            alias = str(alias or "").strip()
            if alias:
                aliases.append(alias)
        return aliases


    def normalize_parameter_fields(value):
        if not isinstance(value, list):
            return []
        fields = []
        for field in value:
            if not isinstance(field, dict):
                continue
            name = str(field.get("name") or "").strip()
            if not name:
                continue
            normalized = dict(field)
            normalized["name"] = name
            normalized["label"] = str(field.get("label") or title_from_key(name))
            normalized["placeholder"] = str(field.get("placeholder") or "")
            normalized["type"] = str(field.get("type") or "text")
            fields.append(normalized)
        return fields


    def module_activation_mode(module, spec):
        mode = str((spec or {}).get("activationMode") or "moduleactivation").strip().lower()
        return mode if mode in {"static", "moduleactivation"} else "moduleactivation"


    def catalog_module_metadata(module, spec):
        metadata = dict(spec or {})
        metadata["displayName"] = str(metadata.get("displayName") or title_from_key(module))
        metadata["aliases"] = normalize_aliases(metadata.get("aliases"))
        metadata["activationMode"] = module_activation_mode(module, metadata)
        metadata["parameters"] = normalize_parameter_fields(metadata.get("parameters"))
        if "order" in metadata:
            try:
                metadata["order"] = int(metadata["order"])
            except Exception:
                metadata.pop("order", None)
        return metadata


    def parse_catalog(configmap):
        raw = (configmap.get("data") or {}).get("modules.json", "{\"modules\":{}}")
        catalog = json.loads(raw)
        if not isinstance(catalog, dict):
            catalog = {"modules": {}}
        modules = {}
        for module, spec in ((catalog.get("modules") or {}).items()):
            module_name = str(module or "").strip()
            if module_name:
                modules[module_name] = catalog_module_metadata(module_name, spec if isinstance(spec, dict) else {})
        catalog["modules"] = modules
        return catalog


    def catalog_json():
        return parse_catalog(catalog_configmap())


    def canonical_module(name, catalog=None):
        module_name = urllib.parse.unquote(str(name or "")).strip()
        modules = ((catalog or catalog_json()).get("modules") or {})
        if module_name in modules:
            return module_name
        alias_map = {}
        folded_alias_map = {}
        for module, spec in modules.items():
            folded_alias_map.setdefault(module.lower(), module)
            for alias in spec.get("aliases") or []:
                alias_map[alias] = module
                folded_alias_map.setdefault(alias.lower(), module)
        if module_name in alias_map:
            return alias_map[module_name]
        folded = folded_alias_map.get(module_name.lower())
        if folded:
            return folded
        raise ValueError("unknown module: " + module_name)


    def read_body(handler):
        length = int(handler.headers.get("Content-Length", "0") or "0")
        if length == 0:
            return {}
        raw = handler.rfile.read(length).decode("utf-8")
        return json.loads(raw) if raw.strip() else {}


    def require_name(payload):
        name = str(payload.get("name", "")).strip()
        if not name or not DNS_LABEL.match(name):
            raise ValueError("name must be a DNS-1123 label")
        return name


    def catalog_configmap():
        return request_json("GET", f"/api/v1/namespaces/{MODULE_CATALOG_NAMESPACE}/configmaps/{MODULE_CATALOG_NAME}")


    def module_activations():
        return list_resource(f"/apis/{APPLIANCE_GROUP}/{APPLIANCE_VERSION}/namespaces/{APPLIANCE_NAMESPACE}/moduleactivations")


    def app_instances():
        return list_resource(f"/apis/{APPLIANCE_GROUP}/{APPLIANCE_VERSION}/namespaces/{APPLIANCE_NAMESPACE}/appinstances")


    def model_activations():
        return list_resource(f"/apis/{APPLIANCE_GROUP}/{APPLIANCE_VERSION}/namespaces/{APPLIANCE_NAMESPACE}/modelactivations")


    def model_activation(name):
        return get_resource(f"/apis/{APPLIANCE_GROUP}/{APPLIANCE_VERSION}/namespaces/{APPLIANCE_NAMESPACE}/modelactivations/{name}")


    def model_presets():
        configmap = get_resource(f"/api/v1/namespaces/{MODEL_PRESETS_NAMESPACE}/configmaps/{MODEL_PRESETS_NAME}") or {}
        raw = (configmap.get("data") or {}).get("presets.json", "{\"presets\":{}}")
        return json.loads(raw).get("presets") or {}


    def generated_model_catalog():
        configmap = get_resource(f"/api/v1/namespaces/{MODEL_TARGET_NAMESPACE}/configmaps/{MODEL_CATALOG_NAME}") or {}
        raw = (configmap.get("data") or {}).get("catalog.json", "{\"models\":[]}")
        try:
            return json.loads(raw)
        except Exception:
            return {"models": []}


    def module_activation_payload(module, enabled, payload=None):
        name = module
        payload = payload or {}
        spec = {
            "module": module,
            "enabled": enabled,
            "applianceRef": {
                "name": APPLIANCE_NAME,
                "namespace": APPLIANCE_NAMESPACE,
            },
        }
        if "parameters" in payload:
            spec["parameters"] = dict(payload.get("parameters") or {})
        return {
            "apiVersion": f"{APPLIANCE_GROUP}/{APPLIANCE_VERSION}",
            "kind": "ModuleActivation",
            "metadata": {
                "name": name,
                "namespace": APPLIANCE_NAMESPACE,
                "labels": {
                    "app.kubernetes.io/managed-by": "ai-appliance-dashboard",
                    "appliance.magicstick.dev/module": module,
                },
            },
            "spec": spec,
        }


    def app_instance_name(instance_type, requested_name):
        prefix = instance_type + "-"
        return requested_name if requested_name.startswith(prefix) else prefix + requested_name


    def app_instance_payload(instance_type, payload):
        requested_name = require_name(payload)
        name = app_instance_name(instance_type, requested_name)
        parameters = dict(payload)
        parameters.pop("enabled", None)
        parameters.pop("namespace", None)
        target_namespace = str(payload.get("namespace") or payload.get("targetNamespace") or "ai")
        return {
            "apiVersion": f"{APPLIANCE_GROUP}/{APPLIANCE_VERSION}",
            "kind": "AppInstance",
            "metadata": {
                "name": name,
                "namespace": APPLIANCE_NAMESPACE,
                "labels": {
                    "app.kubernetes.io/managed-by": "ai-appliance-dashboard",
                    "appliance.magicstick.dev/instance-type": instance_type,
                },
            },
            "spec": {
                "type": instance_type,
                "enabled": payload.get("enabled", True) is not False,
                "targetNamespace": target_namespace,
                "applianceRef": {
                    "name": APPLIANCE_NAME,
                    "namespace": APPLIANCE_NAMESPACE,
                },
                "parameters": parameters,
            },
        }


    def positive_int(value):
        if isinstance(value, bool):
            return None
        if isinstance(value, int) and value > 0:
            return value
        if isinstance(value, str) and value.strip().isdigit():
            parsed = int(value.strip())
            return parsed if parsed > 0 else None
        return None


    def parse_mib(value):
        if value is None or value == "":
            return None
        if isinstance(value, int):
            return value if value > 0 else None
        raw = str(value).strip()
        parsed = positive_int(raw)
        if parsed:
            return parsed
        match = re.fullmatch(r"(\d+(?:\.\d+)?)\s*([A-Za-z]+)", raw)
        if not match:
            return None
        factors = {"m": 1, "mb": 1, "mi": 1, "mib": 1, "g": 1024, "gb": 1024, "gi": 1024, "gib": 1024}
        unit = match.group(2).lower()
        if unit not in factors:
            return None
        return int(float(match.group(1)) * factors[unit])


    def provider_secret_name(model_name):
        return MODEL_SECRET_PREFIX + model_name


    def create_provider_secret(model_name, api_key):
        if not api_key:
            return None
        secret_name = provider_secret_name(model_name)
        secret = {
            "apiVersion": "v1",
            "kind": "Secret",
            "metadata": {
                "name": secret_name,
                "namespace": MODEL_TARGET_NAMESPACE,
                "labels": {
                    "app.kubernetes.io/managed-by": "ai-appliance-dashboard",
                    "appliance.magicstick.dev/modelactivation": model_name,
                },
            },
            "type": "Opaque",
            "data": {
                "api-key": base64.b64encode(str(api_key).encode("utf-8")).decode("ascii"),
            },
        }
        collection = f"/api/v1/namespaces/{MODEL_TARGET_NAMESPACE}/secrets"
        item = collection + "/" + secret_name
        create_or_patch(collection, item, secret, {"metadata": secret["metadata"], "type": "Opaque", "data": secret["data"]})
        return {"name": secret_name, "key": "api-key"}


    def model_activation_payload(model_type, payload):
        name = require_name(payload)
        target_namespace = str(payload.get("namespace") or payload.get("targetNamespace") or MODEL_TARGET_NAMESPACE)
        spec = {
            "type": model_type,
            "enabled": payload.get("enabled", True) is not False,
            "targetNamespace": target_namespace,
            "applianceRef": {
                "name": APPLIANCE_NAME,
                "namespace": APPLIANCE_NAMESPACE,
            },
        }
        labels = {
            "app.kubernetes.io/managed-by": "ai-appliance-dashboard",
            "appliance.magicstick.dev/model-type": model_type,
        }
        if model_type == "local":
            local = dict(payload.get("local") or {})
            for key in ("preset", "url", "modelType", "features", "engine", "resourceProfile", "vram", "vramMi", "contextWindow", "maxNumSeqs", "args", "minReplicas", "maxReplicas", "env"):
                if key in payload and key not in local:
                    local[key] = payload[key]
            spec["local"] = local
        else:
            external = dict(payload.get("external") or {})
            for key in ("model", "apiBase", "modelType", "apiVersion", "customLlmProvider", "tpm", "rpm", "contextWindow"):
                if key in payload and key not in external:
                    external[key] = payload[key]
            if payload.get("apiKey"):
                external["apiKeySecretRef"] = create_provider_secret(name, payload.get("apiKey"))
            elif payload.get("apiKeySecretRef"):
                external["apiKeySecretRef"] = payload.get("apiKeySecretRef")
            spec["external"] = external
        return {
            "apiVersion": f"{APPLIANCE_GROUP}/{APPLIANCE_VERSION}",
            "kind": "ModelActivation",
            "metadata": {
                "name": name,
                "namespace": APPLIANCE_NAMESPACE,
                "labels": labels,
            },
            "spec": spec,
        }


    def summarized_modules():
        catalog = catalog_json()
        catalog_modules = catalog.get("modules") or {}
        modules = {}
        for module, catalog_spec in catalog_modules.items():
            modules[module] = {
                "enabled": False,
                "source": "catalog",
                "displayName": catalog_spec["displayName"],
                "activationMode": catalog_spec["activationMode"],
                "catalog": catalog_spec,
                "parameters": {},
                "status": {},
            }
        current = appliance()
        appliance_status_modules = ((current.get("status") or {}).get("modules") or {})
        for module, spec in ((current.get("spec") or {}).get("modules") or {}).items():
            try:
                canonical = canonical_module(module, catalog)
                catalog_spec = catalog_modules.get(canonical) or catalog_module_metadata(canonical, {})
            except ValueError:
                canonical = str(module or "").strip()
                catalog_spec = catalog_module_metadata(canonical, {"activationMode": "static"})
            if not canonical:
                continue
            modules.setdefault(canonical, {
                "enabled": False,
                "source": "catalog",
                "displayName": catalog_spec["displayName"],
                "activationMode": catalog_spec["activationMode"],
                "catalog": catalog_spec,
                "parameters": {},
                "status": {},
            })
            enabled = spec.get("enabled") is True
            status = appliance_status_modules.get(canonical) or {}
            if not status and catalog_spec["activationMode"] == "static":
                status = {
                    "phase": "Ready" if enabled else "Disabled",
                    "message": "Static module is managed by the cluster bootstrap.",
                }
            modules[canonical].update({"enabled": enabled, "source": "appliance", "status": status})
        for activation in module_activations():
            metadata = activation.get("metadata") or {}
            spec = activation.get("spec") or {}
            status = activation.get("status") or {}
            try:
                module = canonical_module(spec.get("module") or metadata.get("name"), catalog)
                catalog_spec = catalog_modules.get(module) or catalog_module_metadata(module, {})
            except ValueError:
                module = str(spec.get("module") or metadata.get("name") or "").strip()
                catalog_spec = catalog_module_metadata(module, {"activationMode": "static"})
            if not module:
                continue
            modules.setdefault(module, {
                "enabled": False,
                "source": "catalog",
                "displayName": catalog_spec["displayName"],
                "activationMode": catalog_spec["activationMode"],
                "catalog": catalog_spec,
                "parameters": {},
                "status": {},
            })
            modules[module] = {
                "enabled": spec.get("enabled", True) is not False,
                "source": "moduleactivation",
                "activation": metadata.get("name"),
                "generation": int(metadata.get("generation") or 0),
                "observedGeneration": int(status.get("observedGeneration") or 0),
                "displayName": catalog_spec["displayName"],
                "activationMode": catalog_spec["activationMode"],
                "catalog": catalog_spec,
                "parameters": spec.get("parameters") or {},
                "status": status,
            }
        return {
            "catalog": json.dumps(catalog, indent=2, sort_keys=True),
            "catalogJson": catalog,
            "modules": modules,
            "activations": module_activations(),
        }


    def summarized_instances():
        grouped = {}
        for instance in app_instances():
            spec = instance.get("spec") or {}
            instance_type = spec.get("type") or "unknown"
            grouped.setdefault(instance_type, []).append({
                "metadata": instance.get("metadata") or {},
                "spec": spec,
                "status": instance.get("status") or {},
            })
        return {"instances": grouped, "items": app_instances()}


    def dcgm_labels(raw):
        labels = {}
        for part in raw.split(","):
            if "=" not in part:
                continue
            key, value = part.split("=", 1)
            labels[key.strip()] = value.strip().strip('"')
        return labels


    def parse_dcgm_metrics(text):
        gpus = {}
        for line in text.splitlines():
            line = line.strip()
            if not line or line.startswith("#"):
                continue
            match = re.match(r"^(DCGM_FI_DEV_FB_FREE|DCGM_FI_DEV_FB_USED)\{([^}]*)\}\s+([0-9.]+)", line)
            if not match:
                continue
            metric, raw_labels, raw_value = match.groups()
            labels = dcgm_labels(raw_labels)
            key = labels.get("UUID") or labels.get("gpu") or labels.get("device") or "gpu"
            gpu = gpus.setdefault(key, {
                "id": labels.get("gpu") or key,
                "uuid": labels.get("UUID") or "",
                "device": labels.get("device") or "",
                "modelName": labels.get("modelName") or "",
                "hostname": labels.get("Hostname") or "",
                "freeMi": 0,
                "usedMi": 0,
                "totalMi": 0,
            })
            value = int(float(raw_value))
            if metric == "DCGM_FI_DEV_FB_FREE":
                gpu["freeMi"] = value
            if metric == "DCGM_FI_DEV_FB_USED":
                gpu["usedMi"] = value
        for gpu in gpus.values():
            gpu["totalMi"] = int(gpu.get("freeMi", 0)) + int(gpu.get("usedMi", 0))
        return sorted(gpus.values(), key=lambda item: str(item.get("id", "")))


    def vram_summary(activations):
        planned = 0
        for activation in activations:
            spec = activation.get("spec") or {}
            if spec.get("type") != "local" or spec.get("enabled", True) is False:
                continue
            status_vram = positive_int((activation.get("status") or {}).get("vramRequiredMi"))
            local = spec.get("local") or {}
            planned += status_vram or parse_mib(local.get("vram")) or positive_int(local.get("vramMi")) or 0
        try:
            metrics = request_text("GET", f"/api/v1/namespaces/{DCGM_NAMESPACE}/services/{DCGM_SERVICE}:{DCGM_PORT}/proxy/metrics")
            gpus = parse_dcgm_metrics(metrics)
            free = sum(int(gpu.get("freeMi") or 0) for gpu in gpus)
            used = sum(int(gpu.get("usedMi") or 0) for gpu in gpus)
            total = sum(int(gpu.get("totalMi") or 0) for gpu in gpus)
            return {
                "available": True,
                "gpus": gpus,
                "freeMi": free,
                "usedMi": used,
                "totalMi": total,
                "plannedMi": planned,
                "plannedRemainingMi": max(0, free - planned),
            }
        except Exception as error:
            return {
                "available": False,
                "error": str(error),
                "gpus": [],
                "freeMi": 0,
                "usedMi": 0,
                "totalMi": 0,
                "plannedMi": planned,
                "plannedRemainingMi": 0,
            }


    def module_state(modules_payload, name):
        return ((modules_payload or {}).get("modules") or {}).get(name) or {}


    def first_ingress_url(namespace, name):
        ingress = get_resource(f"/apis/networking.k8s.io/v1/namespaces/{namespace}/ingresses/{name}")
        if not ingress:
            return ""
        for rule in (ingress.get("spec") or {}).get("rules") or []:
            host = rule.get("host")
            if host:
                return "http://" + host + "/"
        return ""


    def summarized_models():
        activations = model_activations()
        modules_payload = summarized_modules()
        stack_names = ["gpu", "kubeai", "litellm", "model-catalog", "anything-llm"]
        stack = {
            name: module_state(modules_payload, name)
            for name in stack_names
        }
        anything = dict(stack.get("anything-llm") or {})
        anything["url"] = first_ingress_url(MODEL_TARGET_NAMESPACE, "anything-llm")
        return {
            "catalog": generated_model_catalog(),
            "models": (generated_model_catalog().get("models") or []),
            "activations": activations,
            "presets": model_presets(),
            "modules": stack,
            "anythingLlm": anything,
            "vram": vram_summary(activations),
        }


    def status_payload():
        current = appliance()
        flux = list_resource("/apis/kustomize.toolkit.fluxcd.io/v1/namespaces/flux-system/kustomizations")
        pods = list_resource("/api/v1/pods")
        services = list_resource("/api/v1/services")
        ingresses = list_resource("/apis/networking.k8s.io/v1/ingresses")
        return {
            "appliance": {
                "metadata": current.get("metadata", {}),
                "spec": current.get("spec", {}),
                "status": current.get("status", {}),
            },
            "moduleActivations": module_activations(),
            "appInstances": app_instances(),
            "fluxKustomizations": summarize_objects(flux),
            "pods": summarize_objects(pods),
            "services": summarize_objects(services),
            "ingresses": summarize_ingresses(ingresses),
        }


    def summarize_objects(items):
        return [
            {
                "namespace": (item.get("metadata") or {}).get("namespace", ""),
                "name": (item.get("metadata") or {}).get("name", ""),
                "phase": (item.get("status") or {}).get("phase", ""),
                "conditions": (item.get("status") or {}).get("conditions", []),
            }
            for item in items
        ]


    def summarize_ingresses(items):
        summarized = []
        for item in items:
            metadata = item.get("metadata") or {}
            hosts = []
            for rule in (item.get("spec") or {}).get("rules", []):
                host = rule.get("host")
                if host:
                    hosts.append(host)
            summarized.append({
                "namespace": metadata.get("namespace", ""),
                "name": metadata.get("name", ""),
                "hosts": hosts,
            })
        return summarized


    class Handler(BaseHTTPRequestHandler):
        server_version = "MagicStickDashboardAPI/0.3"

        def log_message(self, format, *args):
            print("%s - %s" % (self.address_string(), format % args), flush=True)

        def send_json(self, payload, status=200):
            data = json.dumps(payload, indent=2, sort_keys=True).encode("utf-8")
            self.send_response(status)
            self.send_header("Content-Type", "application/json")
            self.send_header("Cache-Control", "no-store")
            self.send_header("Content-Length", str(len(data)))
            self.end_headers()
            self.wfile.write(data)

        def send_error_json(self, status, message):
            self.send_json({"error": message}, status)

        def route(self):
            parsed = urllib.parse.urlparse(self.path)
            return parsed.path.rstrip("/") or "/"

        def do_GET(self):
            try:
                path = self.route()
                if path == "/healthz":
                    self.send_json({"ok": True})
                elif path == "/api/appliance":
                    self.send_json(appliance())
                elif path == "/api/modules":
                    self.send_json(summarized_modules())
                elif path == "/api/instances":
                    self.send_json(summarized_instances())
                elif path == "/api/models":
                    self.send_json(summarized_models())
                elif path == "/api/status":
                    self.send_json(status_payload())
                elif path == "/api/settings":
                    self.send_json(settings_response())
                elif path == "/api/events":
                    core_events = list_resource("/api/v1/events")
                    new_events = list_resource("/apis/events.k8s.io/v1/events")
                    self.send_json({"events": summarize_objects(core_events + new_events)})
                else:
                    self.send_error_json(404, "not found")
            except urllib.error.HTTPError as error:
                self.send_error_json(error.code, error.read().decode("utf-8", errors="replace"))
            except Exception as error:
                self.send_error_json(500, str(error))

        def do_PATCH(self):
            if self.route() == "/api/settings":
                try:
                    self.send_json(settings_patch(read_body(self)))
                except LookupError as error:
                    self.send_error_json(404, str(error))
                except urllib.error.HTTPError as error:
                    self.send_error_json(error.code, error.read().decode("utf-8", errors="replace"))
                except Exception as error:
                    self.send_error_json(400, str(error))
                return
            if self.route() == "/api/appliance":
                self.send_error_json(405, "Appliance spec is Git-owned; create ModuleActivation or AppInstance resources instead.")
                return
            self.send_error_json(404, "not found")

        def do_POST(self):
            try:
                path = self.route()
                parts = path.strip("/").split("/")
                if len(parts) == 4 and parts[0] == "api" and parts[1] == "modules":
                    catalog = catalog_json()
                    module = canonical_module(parts[2], catalog)
                    catalog_spec = ((catalog.get("modules") or {}).get(module) or {})
                    if catalog_spec.get("activationMode") != "moduleactivation":
                        self.send_error_json(400, "module is statically managed: " + module)
                        return
                    if parts[3] not in {"enable", "disable"}:
                        self.send_error_json(404, "not found")
                        return
                    enabled = parts[3] == "enable"
                    payload = read_body(self)
                    resource = module_activation_payload(module, enabled, payload)
                    name = resource["metadata"]["name"]
                    collection = f"/apis/{APPLIANCE_GROUP}/{APPLIANCE_VERSION}/namespaces/{APPLIANCE_NAMESPACE}/moduleactivations"
                    item = collection + "/" + name
                    self.send_json(create_or_patch(collection, item, resource, {"spec": resource["spec"], "metadata": {"labels": resource["metadata"]["labels"]}}))
                    return

                if len(parts) == 3 and parts[:2] == ["api", "instances"] and parts[2] in INSTANCE_TYPES:
                    instance_type = parts[2]
                    resource = app_instance_payload(instance_type, read_body(self))
                    name = resource["metadata"]["name"]
                    collection = f"/apis/{APPLIANCE_GROUP}/{APPLIANCE_VERSION}/namespaces/{APPLIANCE_NAMESPACE}/appinstances"
                    item = collection + "/" + name
                    self.send_json(create_or_patch(collection, item, resource, {"spec": resource["spec"], "metadata": {"labels": resource["metadata"]["labels"]}}))
                    return

                if len(parts) == 3 and parts[:2] == ["api", "models"] and parts[2] in {"local", "external"}:
                    model_type = parts[2]
                    resource = model_activation_payload(model_type, read_body(self))
                    name = resource["metadata"]["name"]
                    collection = f"/apis/{APPLIANCE_GROUP}/{APPLIANCE_VERSION}/namespaces/{APPLIANCE_NAMESPACE}/modelactivations"
                    item = collection + "/" + name
                    self.send_json(create_or_patch(collection, item, resource, {"spec": resource["spec"], "metadata": {"labels": resource["metadata"]["labels"]}}))
                    return

                self.send_error_json(404, "not found")
            except urllib.error.HTTPError as error:
                self.send_error_json(error.code, error.read().decode("utf-8", errors="replace"))
            except Exception as error:
                self.send_error_json(400, str(error))

        def do_DELETE(self):
            try:
                path = self.route()
                parts = path.strip("/").split("/")
                if len(parts) == 3 and parts[:2] == ["api", "instances"]:
                    name = parts[2]
                    if not DNS_LABEL.match(name):
                        self.send_error_json(400, "name must be a DNS-1123 label")
                        return
                    delete_json(f"/apis/{APPLIANCE_GROUP}/{APPLIANCE_VERSION}/namespaces/{APPLIANCE_NAMESPACE}/appinstances/{name}")
                    self.send_json({"deleted": name})
                    return
                if len(parts) == 3 and parts[:2] == ["api", "models"]:
                    name = parts[2]
                    if not DNS_LABEL.match(name):
                        self.send_error_json(400, "name must be a DNS-1123 label")
                        return
                    activation = model_activation(name)
                    if activation:
                        spec = activation.get("spec") or {}
                        external = spec.get("external") or {}
                        ref = external.get("apiKeySecretRef") or {}
                        secret_name = ref.get("name") or ""
                        if secret_name.startswith(MODEL_SECRET_PREFIX):
                            secret = get_resource(f"/api/v1/namespaces/{MODEL_TARGET_NAMESPACE}/secrets/{secret_name}")
                            labels = ((secret or {}).get("metadata") or {}).get("labels") or {}
                            if labels.get("app.kubernetes.io/managed-by") == "ai-appliance-dashboard" and labels.get("appliance.magicstick.dev/modelactivation") == name:
                                delete_json(f"/api/v1/namespaces/{MODEL_TARGET_NAMESPACE}/secrets/{secret_name}")
                    delete_json(f"/apis/{APPLIANCE_GROUP}/{APPLIANCE_VERSION}/namespaces/{APPLIANCE_NAMESPACE}/modelactivations/{name}")
                    self.send_json({"deleted": name})
                    return
                self.send_error_json(404, "not found")
            except urllib.error.HTTPError as error:
                self.send_error_json(error.code, error.read().decode("utf-8", errors="replace"))
            except Exception as error:
                self.send_error_json(400, str(error))


    if __name__ == "__main__":
        port = int(os.environ.get("PORT", "8080"))
        ThreadingHTTPServer(("0.0.0.0", port), Handler).serve_forever()
