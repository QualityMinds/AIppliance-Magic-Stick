apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-appliance-dashboard-model-secrets
  namespace: ai
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-appliance-dashboard-model-secrets
  namespace: ai
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ai-appliance-dashboard-model-secrets
subjects:
  - kind: ServiceAccount
    name: ai-appliance-dashboard
    namespace: dashboard
