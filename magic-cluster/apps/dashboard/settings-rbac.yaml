apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-appliance-dashboard-settings
  namespace: flux-system
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["ai-appliance-settings"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-appliance-dashboard-settings
  namespace: flux-system
subjects:
  - kind: ServiceAccount
    name: ai-appliance-dashboard
    namespace: dashboard
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ai-appliance-dashboard-settings
