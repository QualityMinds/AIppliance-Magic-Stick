apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-ai
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-basis
  interval: 10m0s
  path: ./magic-cluster/platform/ai
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: kubeai
      namespace: flux-system
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: hermes-operator
      namespace: flux-system
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: paperclip-operator
      namespace: flux-system
    - apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      name: models.kubeai.org
    - apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      name: hermesinstances.hermes.agent
    - apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      name: hermesselfconfigs.hermes.agent
    - apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      name: hermesclusterdefaults.hermes.agent
    - apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      name: instances.paperclip.inc
