apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-basis
    - name: identity-pilot
  interval: 10m0s
  path: ./magic-cluster/apps/dashboard
  postBuild:
    substitute:
      var_substitution_enabled: "true"
    substituteFrom:
      - kind: ConfigMap
        name: ai-appliance-settings
        optional: true
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
