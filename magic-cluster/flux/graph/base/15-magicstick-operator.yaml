apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: magicstick-operator
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-basis
  healthChecks:
    - apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      name: appliances.appliance.magicstick.dev
  interval: 10m0s
  path: ./magic-cluster/platform/magicstick-operator
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
