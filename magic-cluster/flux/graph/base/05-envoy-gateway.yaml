  name: envoy-gateway
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-basis
  interval: 10m0s
  path: ./magic-cluster/platform/gateway/envoy-gateway
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 10m0s
