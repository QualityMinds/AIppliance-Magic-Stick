apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-basis
  interval: 10m0s
  path: ./magic-cluster/apps
  postBuild:
    substitute:
      var_substitution_enabled: "true"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
