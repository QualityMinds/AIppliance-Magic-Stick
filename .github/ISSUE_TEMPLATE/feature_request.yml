name: Feature request
description: Suggest a reusable public-template improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Keep requests deployment-neutral. Private deployment values belong in
        private overlays, not in this public repository.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What public-template need does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the desired public behavior or interface.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Suggested validation
      description: Which Kustomize, Ansible, or secret checks should cover this?
