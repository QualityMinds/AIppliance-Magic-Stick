name: Build MagicStick kdns image

on:
  push:
    paths:
      - .github/workflows/build-kdns-image.yml
      - magic-cluster/platform/basis/kdns/image/**
      - magic-cluster/platform/basis/kdns/patches/gateway-api.patch
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: kdns-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/qualityminds/magicstick-kdns
  IMAGE_VERSION: v0.2.22-gateway-api.1
  KDNS_REF: f956ab5d35564ee84e58ba155e78a17423cc835b

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out MagicStick
        uses: actions/checkout@v4

      - name: Check out pinned kdns source
        uses: actions/checkout@v4
        with:
          repository: lab42/kdns
          ref: ${{ env.KDNS_REF }}
          path: .build/kdns

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.0
          cache-dependency-path: .build/kdns/go.sum

      - name: Apply Gateway API contribution
        run: |
          git -C .build/kdns apply \
            "$GITHUB_WORKSPACE/magic-cluster/platform/basis/kdns/patches/gateway-api.patch"
          test -z "$(gofmt -l \
            .build/kdns/handler/gateway_api_handler.go \
            .build/kdns/handler/gateway_api_handler_test.go \
            .build/kdns/watcher/watcher.go \
            .build/kdns/cmd/root.go)"

      - name: Test patched source
        working-directory: .build/kdns
        run: |
          go test ./...
          go vet ./...

      - name: Set build metadata
        id: build-metadata
        working-directory: .build/kdns
        run: echo "date=$(git show -s --format=%cI "$KDNS_REF")" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=${{ env.IMAGE_VERSION }},enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=MagicStick kdns
            org.opencontainers.image.description=kdns with Gateway API HTTPRoute discovery pending upstream release
            org.opencontainers.image.source=https://github.com/QualityMinds/AIppliance-Magic-Stick
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.version=${{ env.IMAGE_VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push multi-architecture image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .build/kdns
          file: magic-cluster/platform/basis/kdns/image/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            KDNS_VERSION=${{ env.IMAGE_VERSION }}
            KDNS_REF=${{ env.KDNS_REF }}
            BUILD_DATE=${{ steps.build-metadata.outputs.date }}
          cache-from: type=gha,scope=magicstick-kdns
          cache-to: type=gha,mode=max,scope=magicstick-kdns
          provenance: mode=max
          sbom: true

      - name: Make repository package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method PATCH \
            /orgs/QualityMinds/packages/container/magicstick-kdns \
            -f visibility=public

      - name: Record immutable digest
        run: |
          {
            echo "### MagicStick kdns image"
            echo
            echo "- Image: \`${IMAGE_NAME}\`"
            echo "- Version: \`${IMAGE_VERSION}\`"
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
            echo "- Upstream: \`${KDNS_REF}\`"
          } >> "$GITHUB_STEP_SUMMARY"
