name: Build MagicStick Paperclip operator image

on:
  push:
    paths:
      - .github/workflows/build-paperclip-operator-image.yml
      - magic-cluster/platform/ai/paperclip-operator/patches/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: paperclip-operator-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/qualityminds/magicstick-paperclip-operator
  UPSTREAM_REF: v0.18.0

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out MagicStick
        uses: actions/checkout@v4

      - name: Check out pinned Paperclip operator source
        uses: actions/checkout@v4
        with:
          repository: paperclipinc/paperclip-operator
          ref: ${{ env.UPSTREAM_REF }}
          path: .build/paperclip-operator

      - name: Apply local-trusted loopback patch
        run: git -C .build/paperclip-operator apply "$GITHUB_WORKSPACE/magic-cluster/platform/ai/paperclip-operator/patches/local-trusted-loopback.patch"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: .build/paperclip-operator/go.mod
          cache-dependency-path: .build/paperclip-operator/go.sum

      - name: Test patched source
        working-directory: .build/paperclip-operator
        # Controller tests require envtest binaries and the upstream e2e suite
        # requires a pre-created kind cluster. The compatibility patch touches
        # only the resource builder; native runtime behavior is verified later
        # against the real MagicStick cluster.
        run: go test ./internal/resources ./internal/registry ./test/conformance

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: type=sha,prefix=sha-,format=long
          labels: |
            org.opencontainers.image.title=MagicStick Paperclip operator
            org.opencontainers.image.description=Paperclip operator with local_trusted loopback compatibility
            org.opencontainers.image.source=https://github.com/QualityMinds/AIppliance-Magic-Stick
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.UPSTREAM_REF }}

      - name: Build and push multi-architecture image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .build/paperclip-operator
          file: .build/paperclip-operator/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=magicstick-paperclip-operator
          cache-to: type=gha,mode=max,scope=magicstick-paperclip-operator
          provenance: mode=max
          sbom: true

      - name: Record immutable digest
        run: |
          {
            echo "### MagicStick Paperclip operator image"
            echo
            echo "- Image: \`${IMAGE_NAME}\`"
            echo "- Tag: \`sha-${GITHUB_SHA}\`"
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
            echo "- Upstream: \`${UPSTREAM_REF}\`"
          } >> "$GITHUB_STEP_SUMMARY"
