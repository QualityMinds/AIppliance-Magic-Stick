apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../../infra-cluster/apps
patches:
  - target:
      group: networking.k8s.io
      version: v1
      kind: Ingress
      name: ai-appliance-dashboard
      namespace: dashboard
    path: patches/dashboard-ingress.yaml
  - target:
      group: helm.toolkit.fluxcd.io
      version: v2
      kind: HelmRelease
      name: forgejo
      namespace: flux-system
    path: patches/forgejo-helmrelease.yaml
