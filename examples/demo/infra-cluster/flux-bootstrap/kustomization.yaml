apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../../magic-cluster/flux/entrypoints/base
patches:
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: infrastructure-basis
      namespace: flux-system
    patch: |-
      - op: replace
        path: /spec/path
        value: ./examples/demo/infra-cluster/infrastructure-basis
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: apps
      namespace: flux-system
    patch: |-
      - op: replace
        path: /spec/path
        value: ./examples/demo/infra-cluster/apps
