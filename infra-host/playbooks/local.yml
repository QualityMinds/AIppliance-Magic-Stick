- name: Configure local AI appliance host
  hosts: localhost
  connection: local
  gather_facts: false
  become: true

  pre_tasks:
    - name: Capture current user id
      ansible.builtin.command:
        argv:
          - id
          - -u
      register: current_user_uid
      changed_when: false

    - name: Capture current username
      ansible.builtin.command:
        argv:
          - id
          - -un
      register: current_username
      changed_when: false

    - name: Check passwordless sudo availability for non-root users
      ansible.builtin.command:
        argv:
          - sudo
          - -n
          - true
      register: passwordless_sudo_check
      changed_when: false
      failed_when: false
      when: current_user_uid.stdout != "0"

    - name: Fail when sudo requires interactive authentication
      ansible.builtin.fail:
        msg: >-
          This playbook needs root privileges without interactive prompts.
          Re-run with `sudo ansible-pull ...` or grant passwordless sudo for
          user `{{ current_username.stdout }}`.
      when:
        - current_user_uid.stdout != "0"
        - passwordless_sudo_check.rc != 0

    - name: Gather facts after sudo preflight
      ansible.builtin.setup:

    - name: Check central repository metadata file
      ansible.builtin.stat:
        path: "{{ repo_metadata_env_file }}"
      register: repo_metadata_env_file_stat

    - name: Read central repository metadata file
      ansible.builtin.slurp:
        path: "{{ repo_metadata_env_file }}"
      register: repo_metadata_env_file_content
      when: repo_metadata_env_file_stat.stat.exists

    - name: Parse central repository metadata file
      ansible.builtin.set_fact:
        repo_metadata_env_map: >-
          {{
            dict(
              (repo_metadata_env_file_content.content | b64decode).splitlines()
              | map('trim')
              | reject('equalto', '')
              | reject('match', '^#')
              | map('regex_replace', '^export\\s+', '')
              | map('split', '=', 1)
            )
          }}
      when: repo_metadata_env_file_stat.stat.exists

    - name: Apply central repository metadata as Ansible variables
      ansible.builtin.set_fact:
        git_host: "{{ git_host | default(repo_metadata_env_map.get('GIT_HOST', 'github.com'), true) }}"
        flux_github_owner: "{{ flux_github_owner | default(repo_metadata_env_map.get('GIT_OWNER', ''), true) }}"
        flux_github_repo: "{{ flux_github_repo | default(repo_metadata_env_map.get('GIT_REPO', ''), true) }}"
        flux_github_branch: "{{ flux_github_branch | default(repo_metadata_env_map.get('GIT_BRANCH', ''), true) }}"
        flux_cluster_path: "{{ flux_cluster_path | default(repo_metadata_env_map.get('FLUX_CLUSTER_PATH', ''), true) }}"
        magicstick_public_repo: "{{ magicstick_public_repo | default(repo_metadata_env_map.get('MAGICSTICK_PUBLIC_REPO', 'https://github.com/QualityMinds/AIppliance-Magic-Stick.git'), true) }}"
        magicstick_public_ref: "{{ magicstick_public_ref | default(repo_metadata_env_map.get('MAGICSTICK_PUBLIC_REF', ''), true) }}"
        ai_appliance_private_checkout: "{{ ai_appliance_private_checkout | default(repo_metadata_env_map.get('AI_APPLIANCE_PRIVATE_CHECKOUT', '/opt/ai-appliance/deployment'), true) }}"
        ansible_inventory_path: "{{ ansible_inventory_path | default(repo_metadata_env_map.get('ANSIBLE_INVENTORY_PATH', 'infra-host/inventory/localhost.yml'), true) }}"
        ansible_playbook_path: "{{ ansible_playbook_path | default(repo_metadata_env_map.get('ANSIBLE_PLAYBOOK_PATH', 'infra-host/playbooks/local.yml'), true) }}"
        flux_github_token: "{{ flux_github_token | default(repo_metadata_env_map.get('FLUX_GITHUB_TOKEN', ''), true) }}"
      when: repo_metadata_env_file_stat.stat.exists

    - name: Build monorepo_url from host, owner and repository
      ansible.builtin.set_fact:
        monorepo_url: >-
          {{
            monorepo_url
            if (monorepo_url is defined and monorepo_url | trim | length > 0)
            else ('https://' ~ (git_host | default('github.com')) ~ '/' ~ flux_github_owner ~ '/' ~ flux_github_repo ~ '.git')
          }}

    - name: Validate required repository metadata variables
      ansible.builtin.assert:
        that:
          - monorepo_url is defined and monorepo_url | trim | length > 0
          - flux_github_owner is defined and flux_github_owner | trim | length > 0
          - flux_github_repo is defined and flux_github_repo | trim | length > 0
          - flux_github_branch is defined and flux_github_branch | trim | length > 0
          - flux_cluster_path is defined and flux_cluster_path | trim | length > 0
          - magicstick_public_repo is defined and magicstick_public_repo | trim | length > 0
          - magicstick_public_ref is defined and magicstick_public_ref | trim | length > 0
          - ai_appliance_private_checkout is defined and ai_appliance_private_checkout | trim | length > 0
          - ansible_inventory_path is defined and ansible_inventory_path | trim | length > 0
          - ansible_playbook_path is defined and ansible_playbook_path | trim | length > 0
        fail_msg: >-
          Missing repository metadata. Provide GIT_HOST, GIT_OWNER,
          GIT_REPO, GIT_BRANCH, MAGICSTICK_PUBLIC_REPO,
          MAGICSTICK_PUBLIC_REF, AI_APPLIANCE_PRIVATE_CHECKOUT,
          FLUX_CLUSTER_PATH, ANSIBLE_INVENTORY_PATH and ANSIBLE_PLAYBOOK_PATH in
          {{ repo_metadata_env_file }} (cloud-init), or pass equivalent vars via
          ansible-pull -e.

  roles:
    - common
    - k3s
    - ansible-pull-timer
    - flux-bootstrap
    
