---
- name: Install AI appliance converge runner
  ansible.builtin.copy:
    src: ai-appliance-converge
    dest: "{{ ai_appliance_converge_path }}"
    owner: root
    group: root
    mode: "0755"

- name: Install converge systemd service unit
  ansible.builtin.template:
    src: ansible-pull.service.j2
    dest: /etc/systemd/system/ansible-pull.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Install converge systemd timer unit
  ansible.builtin.template:
    src: ansible-pull.timer.j2
    dest: /etc/systemd/system/ansible-pull.timer
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Flush handlers to reload systemd before enabling timer
  ansible.builtin.meta: flush_handlers

- name: Ensure converge timer is enabled and started
  ansible.builtin.systemd:
    name: ansible-pull.timer
    enabled: true
    state: started
