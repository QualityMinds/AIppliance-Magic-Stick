---
- name: Download Flux install script to a temporary file
  ansible.builtin.get_url:
    url: https://fluxcd.io/install.sh
    dest: /tmp/flux-install.sh
    mode: "0700"
  when: not ansible_check_mode

- name: Install Flux CLI (skip if already installed)
  ansible.builtin.command:
    cmd: /tmp/flux-install.sh
    creates: /usr/local/bin/flux

- name: Wait until K3s API server is reachable
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 6443
    timeout: 120

- name: Wait until Kubernetes API reports ready
  ansible.builtin.command:
    argv:
      - "{{ flux_kubectl_binary }}"
      - "{{ flux_kubectl_subcommand }}"
      - --kubeconfig
      - "{{ flux_kubeconfig_path }}"
      - get
      - --raw=/readyz
  register: k8s_apiserver_readyz
  changed_when: false
  retries: "{{ flux_k8s_ready_retries | int }}"
  delay: "{{ flux_k8s_ready_delay_seconds | int }}"
  until: k8s_apiserver_readyz.rc == 0

- name: Wait until Kubernetes API discovery is available
  ansible.builtin.command:
    argv:
      - "{{ flux_kubectl_binary }}"
      - "{{ flux_kubectl_subcommand }}"
      - --kubeconfig
      - "{{ flux_kubeconfig_path }}"
      - get
      - --raw=/apis
  register: k8s_apiserver_apis
  changed_when: false
  retries: "{{ flux_k8s_ready_retries | int }}"
  delay: "{{ flux_k8s_ready_delay_seconds | int }}"
  until: k8s_apiserver_apis.rc == 0

- name: Validate required Flux GitHub variables
  ansible.builtin.assert:
    that:
      - flux_github_owner is defined and flux_github_owner | length > 0
      - flux_github_repo is defined and flux_github_repo | length > 0
      - flux_github_branch is defined and flux_github_branch | length > 0
      - flux_cluster_path is defined and flux_cluster_path | length > 0
      - flux_github_token is defined
      - flux_github_token | trim | length > 0
      - flux_github_token | trim is not match('^\\*+$')
      - flux_github_token | trim is not match('(?i)^(replaceme|changeme|replace_with_.*|changeme_.*|your_token_here|<github-pat>)$')
    fail_msg: >
      Flux bootstrap requires valid GitHub variables. Set flux_github_owner,
      flux_github_repo, flux_github_branch, flux_cluster_path and
      flux_github_token (for example via Ansible Vault).

- name: Run Flux bootstrap (only when Git provider variables are set)
  ansible.builtin.command:
    cmd: >
      flux bootstrap github
      --owner={{ flux_github_owner }}
      --repository={{ flux_github_repo }}
      --branch={{ flux_github_branch }}
      --path={{ flux_cluster_path }}
      --token-auth
  environment:
    KUBECONFIG: "{{ flux_kubeconfig_path }}"
    GITHUB_TOKEN: "{{ flux_github_token }}"
  register: flux_bootstrap_result
  changed_when: true  # flux bootstrap is intentionally run each converge cycle to reconcile
  failed_when: false

- name: Prepare redacted Flux bootstrap details
  ansible.builtin.set_fact:
    flux_bootstrap_stderr_redacted: "{{ (flux_bootstrap_result.stderr | default('') | trim | replace(flux_github_token, '***REDACTED***') | replace(flux_github_token | urlencode, '***REDACTED***')) or '(empty)' }}"
    flux_bootstrap_stdout_redacted: "{{ (flux_bootstrap_result.stdout | default('') | trim | replace(flux_github_token, '***REDACTED***') | replace(flux_github_token | urlencode, '***REDACTED***')) or '(empty)' }}"
  when: flux_bootstrap_result.rc != 0

- name: Fail with redacted Flux bootstrap details
  ansible.builtin.fail:
    msg: >-
      Flux bootstrap failed (rc={{ flux_bootstrap_result.rc }}).
      stderr={{ flux_bootstrap_stderr_redacted }};
      stdout={{ flux_bootstrap_stdout_redacted }}
  when: flux_bootstrap_result.rc != 0
