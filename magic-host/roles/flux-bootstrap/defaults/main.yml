---
flux_kubectl_binary: /usr/local/bin/k3s
flux_kubectl_subcommand: kubectl
flux_kubeconfig_path: /etc/rancher/k3s/k3s.yaml
flux_k8s_ready_delay_seconds: 5
flux_k8s_ready_retries: 24
flux_bootstrap_mode: readonly-public
flux_bootstrap_seed_path: "{{ flux_cluster_path }}/bootstrap-seed"
flux_custom_sync_manifest_path: "{{ ai_appliance_private_checkout }}/{{ flux_cluster_path }}/flux-system/magicstick-sync.yaml"
flux_public_sync_path: magic-cluster/flux/entrypoints/single-node
flux_public_sync_manifest_path: /tmp/ai-appliance-flux-public-sync.yaml
flux_settings_configmap_manifest_path: /tmp/ai-appliance-settings.yaml
flux_settings_configmap_name: ai-appliance-settings
magicstick_public_ref_kind: branch
ai_appliance_domain: example.local
ai_appliance_dashboard_host: dashboard.example.local
ai_appliance_dashboard_mdns_name: ai-appliance
flux_reconcile_timeout: 5m0s
