---
- name: Download Flux install script to a temporary file
  ansible.builtin.get_url:
    url: https://fluxcd.io/install.sh
    dest: /tmp/flux-install.sh
    mode: "0700"
  when: not ansible_check_mode

- name: Install Flux CLI (skip if already installed)
  ansible.builtin.command:
    cmd: /tmp/flux-install.sh
    creates: /usr/local/bin/flux

- name: Wait until K3s API server is reachable
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 6443
    timeout: 120

- name: Wait until Kubernetes API reports ready
  ansible.builtin.command:
    argv:
      - "{{ flux_kubectl_binary }}"
      - "{{ flux_kubectl_subcommand }}"
      - --kubeconfig
      - "{{ flux_kubeconfig_path }}"
      - get
      - --raw=/readyz
  register: k8s_apiserver_readyz
  changed_when: false
  retries: "{{ flux_k8s_ready_retries | int }}"
  delay: "{{ flux_k8s_ready_delay_seconds | int }}"
  until: k8s_apiserver_readyz.rc == 0

- name: Wait until Kubernetes API discovery is available
  ansible.builtin.command:
    argv:
      - "{{ flux_kubectl_binary }}"
      - "{{ flux_kubectl_subcommand }}"
      - --kubeconfig
      - "{{ flux_kubeconfig_path }}"
      - get
      - --raw=/apis
  register: k8s_apiserver_apis
  changed_when: false
  retries: "{{ flux_k8s_ready_retries | int }}"
  delay: "{{ flux_k8s_ready_delay_seconds | int }}"
  until: k8s_apiserver_apis.rc == 0

- name: Normalize Flux bootstrap mode
  ansible.builtin.set_fact:
    flux_bootstrap_mode: "{{ flux_bootstrap_mode | default('readonly-public', true) }}"
    magicstick_public_ref_kind: "{{ magicstick_public_ref_kind | default('branch', true) }}"
    flux_public_sync_path: "{{ flux_public_sync_path | default('magic-cluster/flux/entrypoints/single-node', true) }}"

- name: Validate supported Flux bootstrap mode
  ansible.builtin.assert:
    that:
      - flux_bootstrap_mode in ['github', 'readonly-public']
      - magicstick_public_ref_kind in ['branch', 'tag', 'semver', 'commit']

- name: Bootstrap Flux through GitHub write-capable CLI path
  when: flux_bootstrap_mode == 'github'
  block:
    - name: Validate required Flux GitHub variables
      ansible.builtin.assert:
        that:
          - flux_github_owner is defined and flux_github_owner | length > 0
          - flux_github_repo is defined and flux_github_repo | length > 0
          - flux_github_branch is defined and flux_github_branch | length > 0
          - flux_cluster_path is defined and flux_cluster_path | length > 0
          - flux_bootstrap_seed_path is defined and flux_bootstrap_seed_path | length > 0
          - flux_bootstrap_seed_path != flux_cluster_path
          - magicstick_public_repo is defined and magicstick_public_repo | length > 0
          - magicstick_public_ref is defined and magicstick_public_ref | length > 0
          - ai_appliance_private_checkout is defined and ai_appliance_private_checkout | length > 0
          - flux_github_token is defined
          - flux_github_token | trim | length > 0
          - flux_github_token | trim is not match('^\\*+$')
          - flux_github_token | trim is not match('(?i)^(replaceme|changeme|replace_with_.*|changeme_.*|your_token_here|<github-pat>)$')
        fail_msg: >
          Flux bootstrap requires valid GitHub variables. Set flux_github_owner,
          flux_github_repo, flux_github_branch, flux_cluster_path,
          flux_bootstrap_seed_path, magicstick_public_repo, magicstick_public_ref,
          ai_appliance_private_checkout and
          flux_github_token (for example via Ansible Vault).

    - name: Run Flux bootstrap against CLI seed path
      ansible.builtin.command:
        argv:
          - flux
          - bootstrap
          - github
          - "--owner={{ flux_github_owner }}"
          - "--repository={{ flux_github_repo }}"
          - "--branch={{ flux_github_branch }}"
          - "--path={{ flux_bootstrap_seed_path }}"
          - --token-auth
      environment:
        KUBECONFIG: "{{ flux_kubeconfig_path }}"
        GITHUB_TOKEN: "{{ flux_github_token }}"
      register: flux_bootstrap_result
      changed_when: true  # flux bootstrap is intentionally run each converge cycle to reconcile
      failed_when: false

    - name: Prepare redacted Flux bootstrap details
      ansible.builtin.set_fact:
        flux_bootstrap_stderr_redacted: "{{ (flux_bootstrap_result.stderr | default('') | trim | replace(flux_github_token, '***REDACTED***') | replace(flux_github_token | urlencode, '***REDACTED***')) or '(empty)' }}"
        flux_bootstrap_stdout_redacted: "{{ (flux_bootstrap_result.stdout | default('') | trim | replace(flux_github_token, '***REDACTED***') | replace(flux_github_token | urlencode, '***REDACTED***')) or '(empty)' }}"
      when: flux_bootstrap_result.rc != 0

    - name: Fail with redacted Flux bootstrap details
      ansible.builtin.fail:
        msg: >-
          Flux bootstrap failed (rc={{ flux_bootstrap_result.rc }}).
          stderr={{ flux_bootstrap_stderr_redacted }};
          stdout={{ flux_bootstrap_stdout_redacted }}
      when: flux_bootstrap_result.rc != 0

    - name: Check AI Appliance Flux sync manifest
      ansible.builtin.stat:
        path: "{{ flux_custom_sync_manifest_path }}"
      register: flux_custom_sync_manifest_stat

    - name: Fail when AI Appliance Flux sync manifest is missing
      ansible.builtin.fail:
        msg: >-
          AI Appliance Flux sync manifest not found at
          {{ flux_custom_sync_manifest_path }}. It must be committed in the private
          deployment checkout and define the magicstick-public source include.
      when: not flux_custom_sync_manifest_stat.stat.exists

    - name: Apply AI Appliance Flux sync configuration
      ansible.builtin.command:
        argv:
          - "{{ flux_kubectl_binary }}"
          - "{{ flux_kubectl_subcommand }}"
          - --kubeconfig
          - "{{ flux_kubeconfig_path }}"
          - apply
          - -f
          - "{{ flux_custom_sync_manifest_path }}"
      register: flux_custom_sync_apply
      changed_when: >
        ('created' in flux_custom_sync_apply.stdout)
        or ('configured' in flux_custom_sync_apply.stdout)

    - name: Seed AI Appliance settings ConfigMap
      ansible.builtin.include_tasks: settings-configmap.yml

    - name: Reconcile public magicstick source
      ansible.builtin.command:
        argv:
          - flux
          - reconcile
          - source
          - git
          - magicstick-public
          - --namespace=flux-system
          - "--timeout={{ flux_reconcile_timeout }}"
      environment:
        KUBECONFIG: "{{ flux_kubeconfig_path }}"
      changed_when: true

    - name: Reconcile private Flux source with public include
      ansible.builtin.command:
        argv:
          - flux
          - reconcile
          - source
          - git
          - flux-system
          - --namespace=flux-system
          - "--timeout={{ flux_reconcile_timeout }}"
      environment:
        KUBECONFIG: "{{ flux_kubeconfig_path }}"
      changed_when: true

    - name: Reconcile primary Flux kustomization
      ansible.builtin.command:
        argv:
          - flux
          - reconcile
          - kustomization
          - flux-system
          - --namespace=flux-system
          - --with-source
          - "--timeout={{ flux_reconcile_timeout }}"
      environment:
        KUBECONFIG: "{{ flux_kubeconfig_path }}"
      changed_when: true

- name: Bootstrap Flux through public read-only path
  when: flux_bootstrap_mode == 'readonly-public'
  block:
    - name: Validate required public read-only Flux variables
      ansible.builtin.assert:
        that:
          - magicstick_public_repo is defined and magicstick_public_repo | length > 0
          - magicstick_public_ref is defined and magicstick_public_ref | length > 0
          - flux_public_sync_path is defined and flux_public_sync_path | length > 0
          - ai_appliance_domain is defined and ai_appliance_domain | length > 0
          - ai_appliance_dashboard_host is defined and ai_appliance_dashboard_host | length > 0
          - ai_appliance_mdns_domain is defined and ai_appliance_mdns_domain | length > 0
          - ai_appliance_mdns_name is defined and ai_appliance_mdns_name | length > 0
          - ai_appliance_dashboard_mdns_name is defined and ai_appliance_dashboard_mdns_name | length > 0
        fail_msg: >
          Public read-only Flux bootstrap requires magicstick_public_repo,
          magicstick_public_ref, flux_public_sync_path and appliance-wide
          AI_APPLIANCE runtime settings.

    - name: Install or upgrade Flux controllers
      ansible.builtin.command:
        argv:
          - flux
          - install
      environment:
        KUBECONFIG: "{{ flux_kubeconfig_path }}"
      changed_when: true

    - name: Seed AI Appliance settings ConfigMap
      ansible.builtin.include_tasks: settings-configmap.yml

    - name: Render public Flux sync manifest
      ansible.builtin.copy:
        dest: "{{ flux_public_sync_manifest_path }}"
        owner: root
        group: root
        mode: "0600"
        content: |
          ---
          apiVersion: source.toolkit.fluxcd.io/v1
          kind: GitRepository
          metadata:
            name: flux-system
            namespace: flux-system
          spec:
            interval: 1m0s
            ref:
              {{ magicstick_public_ref_kind }}: {{ magicstick_public_ref | to_json }}
            url: {{ magicstick_public_repo | to_json }}
          ---
          apiVersion: kustomize.toolkit.fluxcd.io/v1
          kind: Kustomization
          metadata:
            name: flux-system
            namespace: flux-system
          spec:
            interval: 10m0s
            path: {{ ('./' ~ (flux_public_sync_path | regex_replace('^\\./', ''))) | to_json }}
            prune: true
            sourceRef:
              kind: GitRepository
              name: flux-system

    - name: Apply public Flux sync manifest
      ansible.builtin.command:
        argv:
          - "{{ flux_kubectl_binary }}"
          - "{{ flux_kubectl_subcommand }}"
          - --kubeconfig
          - "{{ flux_kubeconfig_path }}"
          - apply
          - -f
          - "{{ flux_public_sync_manifest_path }}"
      register: flux_public_sync_apply
      changed_when: >
        ('created' in flux_public_sync_apply.stdout)
        or ('configured' in flux_public_sync_apply.stdout)

    - name: Remove private Git secret reference from public Flux source
      ansible.builtin.command:
        argv:
          - "{{ flux_kubectl_binary }}"
          - "{{ flux_kubectl_subcommand }}"
          - --kubeconfig
          - "{{ flux_kubeconfig_path }}"
          - patch
          - gitrepository
          - flux-system
          - --namespace=flux-system
          - --type=merge
          - -p
          - '{"spec":{"secretRef":null}}'
      register: flux_public_source_secret_patch
      changed_when: "'patched' in flux_public_source_secret_patch.stdout"
      failed_when: false

    - name: Reconcile public Flux source
      ansible.builtin.command:
        argv:
          - flux
          - reconcile
          - source
          - git
          - flux-system
          - --namespace=flux-system
          - "--timeout={{ flux_reconcile_timeout }}"
      environment:
        KUBECONFIG: "{{ flux_kubeconfig_path }}"
      changed_when: true

    - name: Reconcile public Flux kustomization
      ansible.builtin.command:
        argv:
          - flux
          - reconcile
          - kustomization
          - flux-system
          - --namespace=flux-system
          - --with-source
          - "--timeout={{ flux_reconcile_timeout }}"
      environment:
        KUBECONFIG: "{{ flux_kubeconfig_path }}"
      changed_when: true
