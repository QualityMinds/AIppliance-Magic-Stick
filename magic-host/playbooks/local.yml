- name: Configure local AI appliance host
  hosts: localhost
  connection: local
  gather_facts: false
  become: true

  pre_tasks:
    - name: Capture current user id
      ansible.builtin.command:
        argv:
          - id
          - -u
      register: current_user_uid
      changed_when: false

    - name: Capture current username
      ansible.builtin.command:
        argv:
          - id
          - -un
      register: current_username
      changed_when: false

    - name: Check passwordless sudo availability for non-root users
      ansible.builtin.command:
        argv:
          - sudo
          - -n
          - true
      register: passwordless_sudo_check
      changed_when: false
      failed_when: false
      when: current_user_uid.stdout != "0"

    - name: Fail when sudo requires interactive authentication
      ansible.builtin.fail:
        msg: >-
          This playbook needs root privileges without interactive prompts.
          Re-run with `sudo ansible-pull ...` or grant passwordless sudo for
          user `{{ current_username.stdout }}`.
      when:
        - current_user_uid.stdout != "0"
        - passwordless_sudo_check.rc != 0

    - name: Gather facts after sudo preflight
      ansible.builtin.setup:

    - name: Check central repository metadata file
      ansible.builtin.stat:
        path: "{{ repo_metadata_env_file }}"
      register: repo_metadata_env_file_stat

    - name: Read central repository metadata file
      ansible.builtin.slurp:
        path: "{{ repo_metadata_env_file }}"
      register: repo_metadata_env_file_content
      when: repo_metadata_env_file_stat.stat.exists

    - name: Parse central repository metadata file
      ansible.builtin.set_fact:
        repo_metadata_env_map: >-
          {{
            dict(
              (repo_metadata_env_file_content.content | b64decode).splitlines()
              | map('trim')
              | reject('equalto', '')
              | reject('match', '^#')
              | map('regex_replace', '^export\\s+', '')
              | map('split', '=', 1)
            )
          }}
      when: repo_metadata_env_file_stat.stat.exists

    - name: Apply central repository metadata as Ansible variables
      ansible.builtin.set_fact:
        git_host: "{{ git_host | default(repo_metadata_env_map.get('GIT_HOST', 'github.com'), true) }}"
        flux_github_owner: "{{ flux_github_owner | default(repo_metadata_env_map.get('GIT_OWNER', ''), true) }}"
        flux_github_repo: "{{ flux_github_repo | default(repo_metadata_env_map.get('GIT_REPO', ''), true) }}"
        flux_github_branch: "{{ flux_github_branch | default(repo_metadata_env_map.get('GIT_BRANCH', ''), true) }}"
        flux_cluster_path: "{{ flux_cluster_path | default(repo_metadata_env_map.get('FLUX_CLUSTER_PATH', ''), true) }}"
        flux_bootstrap_mode: "{{ flux_bootstrap_mode | default(repo_metadata_env_map.get('FLUX_BOOTSTRAP_MODE', 'readonly-public'), true) }}"
        flux_public_sync_path: "{{ flux_public_sync_path | default(repo_metadata_env_map.get('FLUX_PUBLIC_SYNC_PATH', 'magic-cluster/flux/entrypoints/single-node'), true) }}"
        magicstick_public_repo: "{{ magicstick_public_repo | default(repo_metadata_env_map.get('MAGICSTICK_PUBLIC_REPO', 'https://github.com/QualityMinds/AIppliance-Magic-Stick.git'), true) }}"
        magicstick_public_ref: "{{ magicstick_public_ref | default(repo_metadata_env_map.get('MAGICSTICK_PUBLIC_REF', ''), true) }}"
        magicstick_public_ref_kind: "{{ magicstick_public_ref_kind | default(repo_metadata_env_map.get('MAGICSTICK_PUBLIC_REF_KIND', 'branch'), true) }}"
        ai_appliance_private_checkout: "{{ ai_appliance_private_checkout | default(repo_metadata_env_map.get('AI_APPLIANCE_PRIVATE_CHECKOUT', '/opt/ai-appliance/deployment'), true) }}"
        ai_appliance_domain: "{{ ai_appliance_domain | default(repo_metadata_env_map.get('AI_APPLIANCE_DOMAIN', 'example.local'), true) }}"
        ai_appliance_dashboard_host: "{{ ai_appliance_dashboard_host | default(repo_metadata_env_map.get('AI_APPLIANCE_DASHBOARD_HOST', 'dashboard.example.local'), true) }}"
        ai_appliance_dashboard_mdns_name: "{{ ai_appliance_dashboard_mdns_name | default(repo_metadata_env_map.get('AI_APPLIANCE_DASHBOARD_MDNS_NAME', 'ai-appliance'), true) }}"
        ansible_inventory_path: "{{ ansible_inventory_path | default(repo_metadata_env_map.get('ANSIBLE_INVENTORY_PATH', 'magic-host/inventory/localhost.yml'), true) }}"
        ansible_playbook_path: "{{ ansible_playbook_path | default(repo_metadata_env_map.get('ANSIBLE_PLAYBOOK_PATH', 'magic-host/playbooks/local.yml'), true) }}"
        flux_github_token: "{{ flux_github_token | default(repo_metadata_env_map.get('FLUX_GITHUB_TOKEN', ''), true) }}"
      when: repo_metadata_env_file_stat.stat.exists

    - name: Build monorepo_url from host, owner and repository
      ansible.builtin.set_fact:
        monorepo_url: >-
          {{
            monorepo_url
            if (monorepo_url is defined and monorepo_url | trim | length > 0)
            else (
              'https://' ~ (git_host | default('github.com')) ~ '/' ~ flux_github_owner ~ '/' ~ flux_github_repo ~ '.git'
              if (
                flux_github_owner is defined
                and flux_github_owner | trim | length > 0
                and flux_github_repo is defined
                and flux_github_repo | trim | length > 0
              )
              else ''
            )
          }}

    - name: Validate common repository metadata variables
      ansible.builtin.assert:
        that:
          - flux_bootstrap_mode | default('readonly-public') in ['github', 'readonly-public']
          - magicstick_public_repo is defined and magicstick_public_repo | trim | length > 0
          - magicstick_public_ref is defined and magicstick_public_ref | trim | length > 0
          - magicstick_public_ref_kind | default('branch') in ['branch', 'tag', 'semver', 'commit']
          - ansible_inventory_path is defined and ansible_inventory_path | trim | length > 0
          - ansible_playbook_path is defined and ansible_playbook_path | trim | length > 0
        fail_msg: >-
          Missing common repository metadata. Provide FLUX_BOOTSTRAP_MODE,
          MAGICSTICK_PUBLIC_REPO, MAGICSTICK_PUBLIC_REF,
          MAGICSTICK_PUBLIC_REF_KIND and FLUX_PUBLIC_SYNC_PATH in
          {{ repo_metadata_env_file }} (cloud-init), or pass equivalent vars via
          ansible-pull -e. Inventory and playbook paths use public template
          defaults unless explicitly overridden.

    - name: Validate GitHub bootstrap metadata variables
      ansible.builtin.assert:
        that:
          - monorepo_url is defined and monorepo_url | trim | length > 0
          - flux_github_owner is defined and flux_github_owner | trim | length > 0
          - flux_github_repo is defined and flux_github_repo | trim | length > 0
          - flux_github_branch is defined and flux_github_branch | trim | length > 0
          - flux_cluster_path is defined and flux_cluster_path | trim | length > 0
          - ai_appliance_private_checkout is defined and ai_appliance_private_checkout | trim | length > 0
        fail_msg: >-
          Missing GitHub bootstrap metadata. Provide GIT_OWNER, GIT_REPO,
          GIT_BRANCH, FLUX_CLUSTER_PATH and any non-default private checkout in
          {{ repo_metadata_env_file }} (cloud-init), or pass equivalent vars via
          ansible-pull -e. GIT_HOST defaults to github.com.
      when: flux_bootstrap_mode | default('readonly-public') == 'github'

    - name: Validate public read-only bootstrap metadata variables
      ansible.builtin.assert:
        that:
          - flux_public_sync_path is defined and flux_public_sync_path | trim | length > 0
          - ai_appliance_domain is defined and ai_appliance_domain | trim | length > 0
          - ai_appliance_dashboard_host is defined and ai_appliance_dashboard_host | trim | length > 0
          - ai_appliance_dashboard_mdns_name is defined and ai_appliance_dashboard_mdns_name | trim | length > 0
        fail_msg: >-
          Missing public read-only bootstrap metadata. Provide
          FLUX_PUBLIC_SYNC_PATH, AI_APPLIANCE_DOMAIN,
          AI_APPLIANCE_DASHBOARD_HOST and AI_APPLIANCE_DASHBOARD_MDNS_NAME in
          {{ repo_metadata_env_file }} (cloud-init), or pass equivalent vars via
          ansible-pull -e.
      when: flux_bootstrap_mode | default('readonly-public') == 'readonly-public'

  roles:
    - common
    - k3s
    - ansible-pull-timer
    - flux-bootstrap
    
